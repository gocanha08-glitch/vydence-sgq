          <span style={{fontSize:12,color:isChildActive?C.accent:C.muted,fontWeight:isChildActive?600:400,textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{label}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
          {badge>0&&<span style={{background:C.danger,color:'#fff',borderRadius:9,fontSize:9,fontWeight:700,padding:'1px 5px',minWidth:16,textAlign:'center'}}>{badge}</span>}
          <span style={{fontSize:9,color:C.muted,transition:'transform .2s',display:'inline-block',transform:open?'rotate(90deg)':'none'}}>▶</span>
        </div>
      </button>
      {open && <div style={{borderLeft:'2px solid '+C.border,marginLeft:20,marginBottom:2}}>{children}</div>}
    </div>;
  };

  const pendCM = (pendEv+pendAcs)||0;
  // Contador de pendências aguardando o usuário atual
  const pendAprov = (()=>{
    let n=0;
    (roRecs||[]).forEach(r=>{
      if(["cancelada","fechada"].includes(r.status)) return;
      const itens = r.data?.itens||[];
      // RO pronta para fechar — conta pra quem pode fechar
      if(hasPerm(loggedIn,'ro.fechar') && r.status==="em_analise" && itens.length>0 && itens.every(it=>{
        if(it.disposicao==="correcao") return it.status==="concluida";
        if(it.disposicao==="segregar"){
          if(it.sublotes && it.sublotes.length>0) return it.sublotes.every(s=>["sucatamento","concessao_aprovada","migrada_nc"].includes(s.tipo));
          return false;
        }
        return ["sucatamento","concessao_aprovada","migrada_nc"].includes(it.disposicao);
      })){ n++; return; }
      itens.forEach(it=>{
        // Correção imediata aguardando aprovação
        if(it.disposicao==="correcao" && it.status==="pendente_aprovacao" && String(it.aprovadorCorrecaoId)===String(loggedIn?.id)) { n++; return; }
        // Sublotes de concessão
        if(it.sublotes && it.sublotes.length > 0){
          it.sublotes.forEach(s=>{
            if(s.tipo==="concessao_solicitada" && String(s.concessaoAprovadorId)===String(loggedIn?.id)) n++;
          });
        }
        // Modelo legado concessão
        else if(it.disposicao==="concessao_solicitada" && String(it.concessaoAprovadorId)===String(loggedIn?.id)) n++;
      });
    });
    return n;
  })();
  const pendAdm = (hasPerm(loggedIn,'auditoria.ver') ? 0 : 0);

  // Badge NC — concessões + ações pendentes pra mim + prontas para fechar
  const pendNCBadge = (()=>{
    let n=0;
    (ncRecs||[]).forEach(r=>{
      if(["fechada","cancelada"].includes(r.status)) return;
      const d=r.data||{};
      (d.itens||[]).forEach(it=>{
        if(it.dispNC==="concessao_solicitada"&&String(it.aprovadorConcessaoId)===String(loggedIn?.id)) n++;
      });
      (d.acoes||[]).forEach(a=>{
        if(String(a.responsavelId)===String(loggedIn?.id)&&!NC_ACAO_STATUS_TERMINAIS.includes(a.status)) n++;
      });
      const itensReais=(d.itens||[]).filter(x=>x.codigo);
      const acoes=d.acoes||[];
      if(hasPerm(loggedIn,'nc.fechar')||loggedIn?.role==='admin'){
        if(itensReais.length>0&&itensReais.every(it=>NC_DISP_TERMINAIS.includes(it.dispNC))&&(acoes.length===0||acoes.every(a=>NC_ACAO_STATUS_TERMINAIS.includes(a.status)))) n++;
      }
    });
    return n;
  })();

      {/* Logo */}
      <div style={{padding:'14px 12px 10px',borderBottom:'1px solid '+C.border}}>

        <div style={{display:'flex',alignItems:'baseline',gap:4,marginBottom:1}}>
          <span style={{fontSize:11,fontWeight:600,color:C.muted,letterSpacing:.5}}>SGQ</span>
          <span style={{fontSize:8,color:C.muted,letterSpacing:.3}}>Portal da Qualidade</span>
        </div>
        <div style={{fontSize:10,color:C.muted,letterSpacing:.2}}>
          v{APP_VERSION}
        </div>
      </div>

      {/* Nav */}
      <div style={{flex:1,padding:'6px 0'}}>

        {/* Início */}
        <SidebarNavItem id="dashboard" label="Início" badge={0}/>

        {/* Módulo: Controle de Mudanças */}
        <SidebarSection sectionKey="cm" label="Controle de Mudanças" icon="" badge={pendCM}>
          <SidebarNavItem id="changes" label="Controles" indent/>
          <SidebarNavItem id="acoes"   label="Tarefas"   badge={pendCM} indent/>
          <SidebarNavItem id="cm_config" label="Configurações" indent/>
        </SidebarSection>

        {/* Módulo: Ocorrências */}

          <SidebarNavItem id="ro_list" label="Registros" indent/>
          {<SidebarNavItem id="ro_aprovacoes" label="Ações pendentes" badge={pendAprov} indent/>}
        </SidebarSection>

        {/* Módulo: Não Conformidade */}
        <SidebarSection sectionKey="nc" label="Não Conformidade" icon="" badge={pendNCBadge}>
          {hasPerm(loggedIn,'nc.abrir')||hasPerm(loggedIn,'nc.tratar_itens')||hasPerm(loggedIn,'nc.gerenciar_acoes')||hasPerm(loggedIn,'nc.analisar')||hasPerm(loggedIn,'nc.fechar')||hasPerm(loggedIn,'nc.ver_todas')||loggedIn?.role==='admin'
            ? <SidebarNavItem id="nc_list" label="Registros" indent/>
            : null}
          {(hasPerm(loggedIn,'nc.tratar_itens')||hasPerm(loggedIn,'nc.aprovar_concessao')||hasPerm(loggedIn,'nc.gerenciar_acoes')||hasPerm(loggedIn,'nc.concluir_acao')||hasPerm(loggedIn,'nc.fechar')||loggedIn?.role==='admin')&&
            <SidebarNavItem id="nc_pendencias" label="Gestão de ações" badge={pendNCBadge} indent/>}
        </SidebarSection>

        {/* Módulos futuros */}
        {['RIACP'].map(m=>(
          <div key={m} style={{padding:'6px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',opacity:.35,cursor:'not-allowed'}}>
            <span style={{fontSize:12,color:C.muted}}>{m}</span>
            <span style={{fontSize:9,color:C.muted}}>em breve</span>
          </div>
        ))}

        <div style={{height:1,background:C.border,margin:'6px 12px'}}/>

        {/* Indicadores */}
        <SidebarNavItem id="indicators" label="Indicadores" badge={0}/>

        <div style={{height:1,background:C.border,margin:'6px 12px'}}/>

        {/* Administração */}
        {canSeeAdm && <SidebarSection sectionKey="adm" label="Administração" icon="">
          {(hasPerm(loggedIn,'users')||hasPerm(loggedIn,'usuarios.gerenciar'))&&<SidebarNavItem id="users"      label="Usuários"  indent/>}
          {(hasPerm(loggedIn,'grupos.ver')||hasPerm(loggedIn,'grupos.gerenciar'))&&<SidebarNavItem id="grupos"   label="Grupos"    indent/>}
          {(hasPerm(loggedIn,'auditoria.ver')||isAdmin)&&<SidebarNavItem id="log"         label="Auditoria" indent/>}
          {(hasPerm(loggedIn,'auditoria.ver')||isAdmin)&&<SidebarNavItem id="signatures"  label="Assinaturas" indent/>}
          {isAdmin&&<SidebarNavItem id="seed_produtos" label="Produtos" indent/>}
        </SidebarSection>}

        {/* Meu Perfil */}
        <SidebarNavItem id="settings" label="Meu Perfil" badge={0}/>

      </div>

      {/* User footer */}
      <div style={{padding:'10px 12px',borderTop:'1px solid '+C.border}}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}>
          <div style={{width:26,height:26,borderRadius:'50%',background:C.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:600,color:C.muted,flexShrink:0}}>
            {loggedIn.name.split(' ').map(w=>w[0]).slice(0,2).join('')}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,color:C.dim,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:600}}>{loggedIn.name}</div>
            <div style={{fontSize:9,color:C.muted}}>{loggedIn.email}</div>
          </div>
        </div>
        <button onClick={logout} style={{fontSize:10,color:C.muted,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:0}}>Sair</button>
      </div>
    </div>
  );

  return <div style={{display:'flex',minHeight:'100vh'}}>
    <Sidebar/>
    <div style={{marginLeft:192,flex:1,minHeight:'100vh',background:C.bg,overflowY:'auto'}}>
      {view==='dashboard' &&<Dashboard requests={requests} roRecs={roRecs} ncRecs={ncRecs} currentUser={loggedIn} allUsers={users} crits={crits} isAdmin={isAdmin} onNav={nav} onNavRO={(id)=>{setSel(id);setView('ro_detail');}} onNavNC={(id)=>{setSel(id);setView('nc_detail');}} onNew={()=>nav('new')} onOpenEval={(r,dept)=>{nav("detail",r.id,"avaliacao",dept);}} onOpenAction={(r,ac)=>{nav("detail",r.id,"execucao",null,ac.id);}}/>}
      <MyTasksDrawer
        open={myTasksOpen}
        onClose={()=>{setMyTasksOpen(false);setMyTasksTarget(null);}}
        requests={requests}
        currentUser={loggedIn}
        allUsers={users}
        crits={crits}
        initialSelected={myTasksTarget}
        onNav={nav}
        onUpdate={updateReq}
        matrix={matrix||mkMatrix()}
        deptQuestions={deptQ}
        phaseDl={phaseDl}
        C={C}/>
      {view==='changes'   &&<ChangesTable requests={requests} currentUser={loggedIn} allUsers={users} crits={crits} onOpen={(id)=>nav('detail',id)} onNew={()=>nav('new')}/>}
      {view==='acoes'     &&<ActionsPage requests={requests} currentUser={loggedIn} allUsers={users} crits={crits} onNav={nav}/>}
      {view==='indicators'&&<IndicatorsPage requests={requests} allUsers={users} crits={crits}/>}
      {view==='ro_list'   &&<ROList roRecords={roRecs} currentUser={loggedIn} allUsers={users} onOpen={(id)=>{setSel(id);setView('ro_detail');}} onNew={()=>setView('ro_new')}/>}
      {view==='ro_aprovacoes' && <ROAprovacoesInbox roRecords={roRecs} currentUser={loggedIn} allUsers={users} onUpdate={saveRO}/>}
      {view==='ro_new'    &&hasPerm(loggedIn,'ro.abrir')&&<NewRO currentUser={loggedIn} allUsers={users} onCancel={()=>setView('ro_list')} onSave={async(f,itens,atts)=>{
        const now=new Date().toISOString();
        const r={title:f.descricao.substring(0,60)||"Ocorrência",status:"em_analise",data:{...f,itens:itens||[],attachments:atts||[],historico:[{type:"abertura",at:now,by:loggedIn.name,byId:loggedIn.id,detail:"Ocorrência aberta pelo operador."}]},log:[],createdBy:loggedIn.id,createdByName:loggedIn.name,createdAt:now,owner_id:loggedIn.id,owner_name:loggedIn.name};
        const saved=await saveRO(r);
        addSL(loggedIn.name,'criacao','Nova RO aberta',(saved&&(saved.code||saved.id))||"");
        setView('ro_list');
      }}/>}
      {view==='ro_detail'&&selId&&selectedRO&&<RODetail roRecord={selectedRO} currentUser={loggedIn} allUsers={users} onBack={()=>setView('ro_list')} onUpdate={saveRO} onGenerateNC={generateNC}/>}
      {view==='nc_list'   &&(hasPerm(loggedIn,'nc.abrir')||hasPerm(loggedIn,'nc.tratar_itens')||hasPerm(loggedIn,'nc.gerenciar_acoes')||hasPerm(loggedIn,'nc.analisar')||hasPerm(loggedIn,'nc.fechar')||hasPerm(loggedIn,'nc.ver_todas')||loggedIn?.role==='admin')&&<NCList ncRecords={ncRecs} currentUser={loggedIn} allUsers={users} onOpen={(id)=>{setSel(id);setView('nc_detail');}} onNew={()=>setView('nc_new')}/>}
      {view==='nc_pendencias'&&<NCPendenciasInbox ncRecords={ncRecs} currentUser={loggedIn} allUsers={users} onUpdate={saveNC} onNavNC={(id)=>{setSel(id);setView('nc_detail');}}/>}
      {view==='nc_new'    &&hasPerm(loggedIn,'nc.abrir')&&<NewNC currentUser={loggedIn} allUsers={users} ncRecords={ncRecs} linkedRO={ncOriginRO} onCancel={()=>{setNcOriginRO(null);setView('nc_list');}} onSave={async(data)=>{
        const now=new Date().toISOString();
        const r={title:(data.descricao||"").substring(0,80)||"Não Conformidade",status:data.status||"aberta",data,createdBy:loggedIn.id,createdByName:loggedIn.name,createdAt:now,owner_id:loggedIn.id,owner_name:loggedIn.name};
        const saved=await saveNC(r);
        if(saved){
          const ncCode = saved.code || saved.id;
          // Para cada RO vinculada, marca os itens importados como migrada_nc
          for(const roCode of (data.linkedROs||[])){
            try{
              const ro = await apiGet('/api/records?module=ro&id='+encodeURIComponent(roCode));
              if(ro){
                // Pega códigos dos itens da NC originados dessa RO específica
                const itensDessaRO = (data.itens||[]).filter(it=>it.origem===roCode);
                const codigosImportados = itensDessaRO.map(it=>(it.codigo||"").toLowerCase());

                const roData = ro.data || ro;
                const itensRO = (roData.itens||[]).map(it=>{
                  if(codigosImportados.includes((it.codigo||"").toLowerCase())){
                    return {...it, disposicao:"migrada_nc", migrada_para_nc: ncCode, migrada_em: now};
                  }
                  return it;
                });
                const linkedNCsRO = [...(((roData.linkedNCs)||[])), ncCode];
                const logEntry = {at:now, by:loggedIn.name, type:'nc_vinculada', event:'Itens migrados para NC', detail:ncCode+' ('+itensDessaRO.length+' item(s))'};

                const updatedRO = {
                  ...ro,
                  data: {...roData, itens:itensRO, linkedNCs:linkedNCsRO},
                  log: [...((ro.log)||[]), logEntry],
                };
                await saveRO(updatedRO);
              }
            }catch(e){ console.error('Erro ao marcar RO '+roCode+':', e); }
          }
        }
        addSL(loggedIn.name,'criacao','Nova NC aberta',(saved&&(saved.code||saved.id))||"");
        setNcOriginRO(null);
        setView('nc_list');
      }}/>}
      {view==='nc_detail'&&selId&&selectedNC&&<NCDetail ncRecord={selectedNC} currentUser={loggedIn} allUsers={users} onBack={()=>setView('nc_list')} onUpdate={saveNC}/>}
      {view==='new'       &&<NewRequest currentUser={loggedIn} onSave={(f,atts)=>{const pd=phaseDl||DEFAULT_PHASE_DEADLINES;const now=new Date().toISOString();const yr=new Date().getFullYear();const id='SA-'+String(requests.length+1).padStart(3,'0')+'/'+yr;const r={id,...f,area:f.area||loggedIn.area||'Administrativo',status:'aberta',triage:null,evaluations:{},actions:[],attachments:atts||[],deadlineExtensions:[],stageDeadlines:{avaliacao_inicial:addDays(todayStr(),pd.avaliacao_inicial.days),avaliacao_areas:null,aprovacao_plano:null,montagem_plano:null,execucao:null},log:[{at:now,by:loggedIn.name,type:'criacao',event:'SA criada',detail:'Tipo: '+f.type}],createdBy:loggedIn.id,createdByName:loggedIn.name,createdAt:now};createReq(r);nav('detail',r.id);}} onCancel={()=>nav('changes')}/>}
      {view==='detail'&&selId&&selected&&<RequestDetail request={selected} allUsers={users} matrix={matrix||mkMatrix()} crits={crits} phaseDl={phaseDl} deptQuestions={deptQ} currentUser={loggedIn} onBack={()=>nav('changes')} onUpdate={updateReq} initialTab={initialTab} focusDept={focusDept} focusAcId={focusAcId} autoOpenDrawer={!!(focusDept||focusAcId)}/>}
      {view==='matrix'    &&<MatrixEditor matrix={matrix||mkMatrix()} crits={crits} currentUser={loggedIn} onSave={saveMatrix}/>}
      {view==='crits'     &&<CritEditor crits={crits} currentUser={loggedIn} onSave={saveCrits}/>}
      {view==='perguntas' &&<QuestionsEditor deptQuestions={deptQ} currentUser={loggedIn} onSave={saveDeptQ}/>}
      {view==='cm_config' &&<CMConfig crits={crits} matrix={matrix||mkMatrix()} deptQ={deptQ} phaseDl={phaseDl} currentUser={loggedIn} onSaveCrits={saveCrits} onSaveMatrix={saveMatrix} onSaveDeptQ={saveDeptQ} onSavePhaseDl={(ph)=>savePhaseDl(ph,loggedIn.name)}/>}
      {view==='users'     &&(hasPerm(loggedIn,'users')||hasPerm(loggedIn,'usuarios.gerenciar'))&&<UserManager users={users} currentUser={loggedIn} isSuperAdmin={isSuperAdmin} canManage={hasPerm(loggedIn,'usuarios.gerenciar')} onSave={saveUsers}/>}
      {view==='settings'  &&<Settings phaseDl={phaseDl} currentUser={loggedIn} theme={theme} setTheme={setTheme} onChangePwd={(np)=>{const u={...loggedIn,pwd:np};sessionStorage.setItem('sgq_user',JSON.stringify(u));setLI(u);}} onSavePhaseDl={(ph)=>savePhaseDl(ph,loggedIn.name)} onLogout={logout}/>}
      {view==='log'&&(isAdmin||hasPerm(loggedIn,'auditoria.ver'))&&<AuditLog requests={requests} sysLog={sysLog}/>}
      {view==='grupos'    &&(hasPerm(loggedIn,'grupos.ver')||hasPerm(loggedIn,'grupos.gerenciar'))&&<GroupManager currentUser={loggedIn} C={C} canManage={hasPerm(loggedIn,'grupos.gerenciar')}/>}
      {view==='seed_produtos'&&isAdmin&&<SeedProdutos currentUser={loggedIn}/>}
      {view==='produtos'  &&isAdmin&&<ProdutosAdmin currentUser={loggedIn}/>}
    </div>
  </div>;
}

const isReset = window.location.pathname === '/reset';
ReactDOM.createRoot(document.getElementById('root')).render(
  isReset ? <ThemeProvider><ResetPassword/></ThemeProvider> : <ThemeProvider><App/></ThemeProvider>
);
  
</script>
</body>
</html>
