<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vydence SGQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>

body{font-family:'DM Sans',sans-serif;background:#F5F7FA;color:#1A2035;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit}

::-webkit-scrollbar-track{background:transparent}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const SA_TYPES = ['Corretiva','Preventiva','Melhoria','Regulatória','Tecnológica','Outro'];
const SA_CRITS = ['Baixa','Média','Alta','Crítica'];

const DEPT_LIST = [
  'Qualidade','Produção','Engenharia','Logística','Compras',
  'TI','RH','Financeiro','Comercial','P&D','Segurança'
];

// Matriz tipo × criticidade → áreas obrigatórias
const DEFAULT_MATRIX = {
  'Corretiva':    { 'Baixa':['Qualidade'],         'Média':['Qualidade','Produção'],       'Alta':['Qualidade','Produção','Engenharia'],    'Crítica':['Qualidade','Produção','Engenharia','Segurança'] },
  'Preventiva':   { 'Baixa':['Qualidade'],         'Média':['Qualidade','Produção'],       'Alta':['Qualidade','Produção','Engenharia'],    'Crítica':['Qualidade','Produção','Engenharia','Segurança'] },
  'Melhoria':     { 'Baixa':['Qualidade'],         'Média':['Qualidade'],                  'Alta':['Qualidade','Engenharia'],               'Crítica':['Qualidade','Engenharia','Produção'] },
  'Regulatória':  { 'Baixa':['Qualidade'],         'Média':['Qualidade','Juridico'],       'Alta':['Qualidade','Juridico','RH'],            'Crítica':['Qualidade','Juridico','RH','Financeiro'] },
  'Tecnológica':  { 'Baixa':['TI'],                'Média':['TI','Engenharia'],             'Alta':['TI','Engenharia','Qualidade'],          'Crítica':['TI','Engenharia','Qualidade','Produção'] },
  'Outro':        { 'Baixa':['Qualidade'],         'Média':['Qualidade'],                  'Alta':['Qualidade'],                            'Crítica':['Qualidade'] },
};

const DEFAULT_DEPT_Q = {
  'Qualidade':    ['A mudança impacta processos certificados (ISO/IATF)?','Há necessidade de atualização de documentos do SGQ?','Foram realizados testes de qualidade adequados?'],
  'Produção':     ['A linha de produção será interrompida durante a mudança?','Os operadores foram treinados para a nova condição?','Há risco de geração de não conformidades?'],
  'Engenharia':   ['Há alteração de especificações técnicas ou desenhos?','Foi realizada análise FMEA para a mudança?','Os fornecedores foram notificados?'],
  'Logística':    ['A mudança impacta estoque ou armazenagem?','Há necessidade de ajuste nos processos de expedição?'],
  'Compras':      ['Há necessidade de novos fornecedores ou materiais?','Os contratos existentes precisam ser revisados?'],
  'TI':           ['A mudança afeta sistemas ou infraestrutura de TI?','Foi realizado backup dos dados antes da mudança?'],
  'RH':           ['Há necessidade de treinamento para a mudança?','O quadro de pessoal é suficiente para a implementação?'],
  'Financeiro':   ['O custo da mudança está orçado e aprovado?','Há impacto em processos contábeis ou fiscais?'],
  'Segurança':    ['A mudança gera novos riscos de segurança do trabalho?','O PPRA/PCMSO precisa ser revisado?'],
  'Comercial':    ['Clientes serão impactados pela mudança?','Há necessidade de comunicado formal aos clientes?'],
  'P&D':          ['A mudança envolve propriedade intelectual ou patentes?','Há impacto em projetos de desenvolvimento em andamento?'],
};

const PHASE_DEADLINES = { triagem: 3, avaliacao: 7, aprovacao: 5, execucao: 30 };

const STATUS_CONFIG = {
  'aberta':    { label:'Aberta',       color:'#2563EB', bg:'#EFF6FF' },
  'triagem':   { label:'Triagem SGQ',  color:'#7C3AED', bg:'#F5F3FF' },
  'avaliacao': { label:'Avaliação',    color:'#D97706', bg:'#FFFBEB' },
  'aprovacao': { label:'Aprovação',    color:'#059669', bg:'#ECFDF5' },
  'execucao':  { label:'Execução',     color:'#0891B2', bg:'#ECFEFF' },
  'concluida': { label:'Concluída',    color:'#16A34A', bg:'#F0FDF4' },
  'cancelada': { label:'Cancelada',    color:'#DC2626', bg:'#FEF2F2' },
};

const ACTION_STATUS = {
  'pendente':  { label:'Pendente',    color:'#D97706' },
  'andamento': { label:'Em Andamento',color:'#2563EB' },
  'concluida': { label:'Concluída',   color:'#16A34A' },
  'cancelada': { label:'Cancelada',   color:'#DC2626' },
};

// ─── COLORS ───────────────────────────────────────────────────────────────────
const C = {
  bg:       '#F5F7FA',
  surface:  '#FFFFFF',
  border:   '#E8ECF4',
  accent:   '#2563EB',
  accent2:  '#1D4ED8',
  text:     '#1A2035',
  muted:    '#64748B',
  dim:      '#94A3B8',
  danger:   '#DC2626',
  success:  '#16A34A',
  warning:  '#D97706',
  purple:   '#7C3AED',
  teal:     '#0891B2',
};

// ─── API HELPERS ──────────────────────────────────────────────────────────────
const API = '';
async function apiFetch(path, opts={}) {
  const token = sessionStorage.getItem('sgq_token');
  const res = await fetch(API + path, {
    headers: { 'Content-Type':'application/json', ...(token ? { Authorization:'Bearer '+token } : {}) },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 401) { sessionStorage.removeItem('sgq_token'); sessionStorage.removeItem('sgq_user'); window.location.reload(); return null; }
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || 'Erro '+res.status); }
  return res.json();
}
const apiGet  = p => apiFetch(p);
const apiPost = (p,b) => apiFetch(p, { method:'POST', body:b });
const apiPut  = (p,b) => apiFetch(p, { method:'PUT', body:b });
const apiDel  = (p,b) => apiFetch(p, { method:'DELETE', body:b });

// ─── UTILS ────────────────────────────────────────────────────────────────────
const fmt = (d) => { if (!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); };
const fmtDT = (d) => { if (!d) return '—'; const dt = new Date(d); return dt.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); };
const fmtDiff = (d) => { if (!d) return ''; const diff = Math.floor((Date.now()-new Date(d))/(1000*60*60*24)); if (diff===0) return 'hoje'; if (diff===1) return 'ontem'; return `${diff}d atrás`; };
const initials = (n='') => n.split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase();

// ─── UI COMPONENTS ────────────────────────────────────────────────────────────
const Badge = ({status}) => {
  const s = STATUS_CONFIG[status] || { label: status, color: C.muted, bg: '#F1F5F9' };
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,color:s.color,background:s.bg,whiteSpace:'nowrap'}}>
    <span style={{width:6,height:6,borderRadius:'50%',background:s.color,flexShrink:0}}/>
    {s.label}
  </span>;
};

const Avatar = ({name, size=28}) => (
  <div style={{width:size,height:size,borderRadius:'50%',background:C.accent+'22',color:C.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.35,fontWeight:700,flexShrink:0}}>
    {initials(name)}
  </div>
);

const Btn = ({children, onClick, variant='primary', size='md', disabled, style:sx, type}) => {
  const base = { display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,fontFamily:'inherit',fontWeight:600,borderRadius:8,cursor:disabled?'not-allowed':'pointer',border:'none',transition:'all .15s',opacity:disabled?.6:1,...sx };
  const sz = size==='sm' ? {padding:'5px 12px',fontSize:12} : size==='lg' ? {padding:'10px 22px',fontSize:14} : {padding:'7px 16px',fontSize:13};
  const variants = {
    primary: {background:C.accent, color:'#fff', ...(!disabled&&{'&:hover':{background:C.accent2}})},
    secondary: {background:C.border, color:C.text},
    ghost: {background:'transparent', color:C.muted},
    danger: {background:C.danger, color:'#fff'},
    outline: {background:'transparent', color:C.accent, border:`1px solid ${C.accent}22`},
  };
  return <button type={type||'button'} onClick={onClick} disabled={disabled} style={{...base,...sz,...variants[variant]}}>{children}</button>;
};

const Input = ({label, value, onChange, placeholder, type='text', required, disabled, hint, error}) => (
  <div style={{display:'flex',flexDirection:'column',gap:4}}>
    {label && <label style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>{label}{required&&<span style={{color:C.danger,marginLeft:2}}>*</span>}</label>}
    <input type={type} value={value||''} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled}
      style={{padding:'8px 12px',borderRadius:8,border:`1px solid ${error?C.danger:C.border}`,background:disabled?C.bg:C.surface,fontSize:13,color:C.text,outline:'none',transition:'border .15s'}}
      onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=error?C.danger:C.border}/>
    {hint && <span style={{fontSize:11,color:C.dim}}>{hint}</span>}
    {error && <span style={{fontSize:11,color:C.danger}}>{error}</span>}
  </div>
);

const Textarea = ({label, value, onChange, placeholder, rows=3, required, disabled}) => (
  <div style={{display:'flex',flexDirection:'column',gap:4}}>
    {label && <label style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>{label}{required&&<span style={{color:C.danger,marginLeft:2}}>*</span>}</label>}
    <textarea value={value||''} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} disabled={disabled}
      style={{padding:'8px 12px',borderRadius:8,border:`1px solid ${C.border}`,background:disabled?C.bg:C.surface,fontSize:13,color:C.text,outline:'none',resize:'vertical',transition:'border .15s'}}
      onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
  </div>
);

const Select = ({label, value, onChange, options, required, disabled, placeholder}) => (
  <div style={{display:'flex',flexDirection:'column',gap:4}}>
    {label && <label style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5}}>{label}{required&&<span style={{color:C.danger,marginLeft:2}}>*</span>}</label>}
    <select value={value||''} onChange={e=>onChange(e.target.value)} disabled={disabled}
      style={{padding:'8px 12px',borderRadius:8,border:`1px solid ${C.border}`,background:disabled?C.bg:C.surface,fontSize:13,color:value?C.text:C.dim,outline:'none',cursor:'pointer'}}>
      {placeholder && <option value="" disabled>{placeholder}</option>}
      {options.map(o => typeof o==='string' ? <option key={o} value={o}>{o}</option> : <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const Card = ({children, style:sx}) => (
  <div style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,padding:20,...sx}}>{children}</div>
);

const Modal = ({open, onClose, title, children, width=560}) => {
  if (!open) return null;
  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
    <div style={{background:C.surface,borderRadius:16,width:'100%',maxWidth:width,maxHeight:'90vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.15)'}} onClick={e=>e.stopPropagation()}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontWeight:700,fontSize:15,color:C.text}}>{title}</div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:18,lineHeight:1}}>✕</button>
      </div>
      <div style={{padding:20}}>{children}</div>
    </div>
  </div>;
};

const Divider = ({label}) => (
  <div style={{display:'flex',alignItems:'center',gap:12,margin:'4px 0'}}>
    {label && <span style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.8,whiteSpace:'nowrap'}}>{label}</span>}
    <div style={{flex:1,height:1,background:C.border}}/>
  </div>
);

const Stepper = ({steps, current}) => (
  <div style={{display:'flex',alignItems:'center',gap:0,overflowX:'auto',padding:'4px 0'}}>
    {steps.map((s,i)=>{
      const done = i < current;
      const active = i === current;
      return <React.Fragment key={i}>
        {i>0 && <div style={{flex:1,height:2,background:done?C.accent:C.border,minWidth:16,transition:'background .3s'}}/>}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flexShrink:0}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:done?C.accent:active?C.accent+'22':C.border,border:`2px solid ${done||active?C.accent:C.border}`,display:'flex',alignItems:'center',justifyContent:'center',transition:'all .3s'}}>
            {done ? <span style={{color:'#fff',fontSize:12}}>✓</span> : <span style={{fontSize:11,fontWeight:700,color:active?C.accent:C.dim}}>{i+1}</span>}
          </div>
          <span style={{fontSize:10,fontWeight:active?700:500,color:active?C.accent:done?C.muted:C.dim,whiteSpace:'nowrap'}}>{s}</span>
        </div>
      </React.Fragment>;
    })}
  </div>
);

// ─── SIGN MODAL ───────────────────────────────────────────────────────────────
function SignModal({ open, onClose, onSign, title, meaning, saId, action, detail }) {
  const [pwd, setPwd] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  useEffect(() => { if (open) { setPwd(''); setErr(''); } }, [open]);
  const submit = async () => {
    if (!pwd.trim()) { setErr('Informe a senha'); return; }
    setLoading(true); setErr('');
    try {
      const data = await apiPost('/api/auth?_route=verify', { password:pwd, record_id:saId, action, action_detail:detail, meaning });
      if (data?.ok) { onSign(data.signature); onClose(); }
      else setErr('Resposta inválida');
    } catch(e) { setErr(e.message || 'Senha incorreta'); }
    finally { setLoading(false); }
  };
  return <Modal open={open} onClose={onClose} title="Assinatura Digital" width={400}>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{background:C.accent+'0D',borderRadius:8,padding:'12px 14px'}}>
        <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:4}}>Ação a assinar</div>
        <div style={{fontSize:13,color:C.text,fontWeight:500}}>{title}</div>
        {meaning && <div style={{fontSize:11,color:C.muted,marginTop:4}}>{meaning}</div>}
      </div>
      <Input label="Confirme sua senha" type="password" value={pwd} onChange={setPwd} placeholder="••••••••" error={err}/>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <Btn variant="secondary" onClick={onClose}>Cancelar</Btn>
        <Btn onClick={submit} disabled={loading}>{loading ? 'Verificando...' : 'Assinar'}</Btn>
      </div>
    </div>
  </Modal>;
}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pwd, setPwd] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState('login'); // login | forgot | reset
  const [resetEmail, setResetEmail] = useState('');
  const [resetSent, setResetSent] = useState(false);

  const submit = async () => {
    setLoading(true); setErr('');
    try {
      const e = await onLogin(email, pwd);
      if (e) setErr(e);
    } catch(ex) { setErr(ex.message || 'Erro'); }
    finally { setLoading(false); }
  };

  const submitForgot = async () => {
    if (!resetEmail) { setErr('Informe o e-mail'); return; }
    setLoading(true); setErr('');
    try {
      await apiPost('/api/auth?_route=forgot', { email: resetEmail });
      setResetSent(true);
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  };

  return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg, #EFF6FF 0%, #F5F7FA 60%, #EDE9FE 100%)'}}>
    <div style={{width:'100%',maxWidth:380,padding:16}}>
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:10,marginBottom:8}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.accent,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          </div>
          <div style={{textAlign:'left'}}>
            <div style={{fontSize:18,fontWeight:800,color:C.text,letterSpacing:-.5}}>Vydence SGQ</div>
            <div style={{fontSize:11,color:C.muted,letterSpacing:.5}}>Sistema de Gestão da Qualidade</div>
          </div>
        </div>
      </div>
      <Card style={{boxShadow:'0 8px 40px rgba(37,99,235,.1)'}}>
        {mode === 'login' && <>
          <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:20}}>Entrar</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <Input label="E-mail" type="email" value={email} onChange={setEmail} placeholder="seu@email.com"/>
            <Input label="Senha" type="password" value={pwd} onChange={setPwd} placeholder="••••••••" error={err}/>
            <Btn size="lg" onClick={submit} disabled={loading} style={{width:'100%',marginTop:4}}>
              {loading ? 'Entrando...' : 'Entrar'}
            </Btn>
            <button onClick={()=>{setMode('forgot');setErr('');}} style={{background:'none',border:'none',cursor:'pointer',color:C.accent,fontSize:12,textAlign:'center',fontFamily:'inherit'}}>
              Esqueci minha senha
            </button>
          </div>
        </>}
        {mode === 'forgot' && <>
          <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:8}}>Recuperar Senha</div>
          {!resetSent ? <>
            <div style={{fontSize:13,color:C.muted,marginBottom:16}}>Informe seu e-mail para receber o link de redefinição.</div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <Input label="E-mail" type="email" value={resetEmail} onChange={setResetEmail} placeholder="seu@email.com" error={err}/>
              <Btn size="lg" onClick={submitForgot} disabled={loading} style={{width:'100%'}}>
                {loading ? 'Enviando...' : 'Enviar link'}
              </Btn>
              <button onClick={()=>{setMode('login');setErr('');}} style={{background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:12,textAlign:'center',fontFamily:'inherit'}}>
                ← Voltar ao login
              </button>
            </div>
          </> : <>
            <div style={{background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:8,padding:'12px 14px',fontSize:13,color:'#16A34A',marginBottom:16}}>
              E-mail enviado! Verifique sua caixa de entrada.
            </div>
            <Btn variant="secondary" onClick={()=>{setMode('login');setResetSent(false);}} style={{width:'100%'}}>Voltar ao login</Btn>
          </>}
        </>}
      </Card>
    </div>
  </div>;
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function Sidebar({ view, setView, loggedIn, logout, navItems }) {
  return <div style={{width:220,background:C.surface,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',height:'100vh',position:'fixed',left:0,top:0,zIndex:10}}>
    <div style={{padding:'18px 16px 14px',borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:32,height:32,borderRadius:8,background:C.accent,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        </div>
        <div>
          <div style={{fontSize:14,fontWeight:800,color:C.text,letterSpacing:-.3}}>Vydence SGQ</div>
          <div style={{fontSize:10,color:C.dim,letterSpacing:.4}}>v1.0 · {loggedIn.role.toUpperCase()}</div>
        </div>
      </div>
    </div>
    <div style={{flex:1,padding:'8px 8px',overflowY:'auto'}}>
      {navItems.map(item => {
        if (item.divider) return <div key={item.id} style={{padding:'12px 8px 4px'}}>
          <span style={{fontSize:10,fontWeight:700,color:C.dim,textTransform:'uppercase',letterSpacing:.8}}>{item.label}</span>
        </div>;
        const active = view === item.id;
        return <button key={item.id} onClick={()=>setView(item.id)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 10px',borderRadius:8,background:active?C.accent+'10':'transparent',border:'none',cursor:'pointer',marginBottom:1,transition:'background .12s'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:16,lineHeight:1}}>{item.icon}</span>
            <span style={{fontSize:13,fontWeight:active?700:500,color:active?C.accent:C.muted}}>{item.label}</span>
          </div>

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ records, currentUser, allUsers, onNav }) {
  const isAdmin = ['admin','sgq'].includes(currentUser.role);
  const myActions = records.flatMap(r => (r.actions||[]).filter(a => a.responsible === currentUser.id && a.status !== 'concluida' && a.status !== 'cancelada'));
  const overdue = myActions.filter(a => a.dueDate && new Date(a.dueDate) < new Date());

  const stats = [
    { label:'Controles Ativos', value: records.filter(r=>!['concluida','cancelada'].includes(r.status)).length, color: C.accent, icon:'📋' },
    { label:'Minhas Tarefas', value: myActions.length, color: C.purple, icon:'✅' },
    { label:'Atrasadas', value: overdue.length, color: C.danger, icon:'⚠️' },
    { label:'Concluídas', value: records.filter(r=>r.status==='concluida').length, color: C.success, icon:'🎯' },
  ];

  const recent = [...records].sort((a,b)=>new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt)).slice(0,5);

  return <div style={{padding:24}}>
    <div style={{marginBottom:24}}>
      <div style={{fontSize:22,fontWeight:800,color:C.text,letterSpacing:-.5}}>Olá, {currentUser.name.split(' ')[0]} 👋</div>
      <div style={{fontSize:14,color:C.muted,marginTop:4}}>{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14,marginBottom:24}}>
      {stats.map(s => <Card key={s.label} style={{cursor:'default'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{fontSize:24}}>{s.icon}</div>
          <div>
            <div style={{fontSize:24,fontWeight:800,color:s.color}}>{s.value}</div>
            <div style={{fontSize:12,color:C.muted,fontWeight:500}}>{s.label}</div>
          </div>
        </div>
      </Card>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <Card>
        <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>Controles Recentes</div>
        {recent.length === 0 ? <div style={{fontSize:13,color:C.dim,textAlign:'center',padding:'20px 0'}}>Nenhum controle encontrado</div>
        : recent.map(r => <div key={r.id} onClick={()=>onNav('detail',r.id)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer',gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.id}</div>
            <div style={{fontSize:11,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.title}</div>
          </div>
          <Badge status={r.status}/>
        </div>)}
      </Card>
      <Card>
        <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>Minhas Tarefas Pendentes</div>
        {myActions.length === 0 ? <div style={{fontSize:13,color:C.dim,textAlign:'center',padding:'20px 0'}}>Nenhuma tarefa pendente 🎉</div>
        : myActions.slice(0,5).map((a,i) => {
          const rec = records.find(r=>(r.actions||[]).some(x=>x.id===a.id));
          const late = a.dueDate && new Date(a.dueDate) < new Date();
          return <div key={i} onClick={()=>rec&&onNav('detail',rec.id)} style={{padding:'8px 0',borderBottom:`1px solid ${C.border}`,cursor:'pointer'}}>
            <div style={{fontSize:12,fontWeight:600,color:late?C.danger:C.text,marginBottom:2}}>{a.description}</div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              {rec && <span style={{fontSize:10,color:C.muted}}>{rec.id}</span>}
              {a.dueDate && <span style={{fontSize:10,color:late?C.danger:C.dim}}>• Prazo: {fmt(a.dueDate)}</span>}
            </div>
          </div>;
        })}
      </Card>
    </div>
  </div>;
}

// ─── SA LIST ──────────────────────────────────────────────────────────────────

  }).sort((a,b) => new Date(b.updatedAt||b.createdAt) - new Date(a.updatedAt||a.createdAt));

        </div>
        <select value={statusF} onChange={e=>setStatusF(e.target.value)} style={{padding:'8px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,color:C.muted,outline:'none',cursor:'pointer'}}>

// ─── NEW SA FORM ──────────────────────────────────────────────────────────────
function NewSAForm({ currentUser, onSave, onCancel, matrix }) {
  const [form, setForm] = useState({ title:'', type:'', criticality:'', description:'', justification:'', scope:'' });
  const [err, setErr] = useState({});
  const [loading, setLoading] = useState(false);

  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  const requiredAreas = () => {
    if (!form.type || !form.criticality) return [];
    const mat = matrix || DEFAULT_MATRIX;
    return mat[form.type]?.[form.criticality] || [];
  };

  const submit = async () => {
    const e = {};
    if (!form.title.trim()) e.title = 'Obrigatório';
    if (!form.type) e.type = 'Obrigatório';
    if (!form.criticality) e.criticality = 'Obrigatório';
    if (!form.description.trim()) e.description = 'Obrigatório';
    if (Object.keys(e).length) { setErr(e); return; }
    setLoading(true);
    try {
      const sa = {
        ...form,
        status: 'aberta',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        createdBy: currentUser.id,
        createdByName: currentUser.name,
        requiredAreas: requiredAreas(),
        evaluations: {},
        actions: [],
        attachments: [],
        log: [{ at: new Date().toISOString(), by: currentUser.name, text: 'SA criada' }],
      };
      await onSave(sa);
    } catch(ex) { setErr({ _: ex.message }); }
    finally { setLoading(false); }
  };

  const areas = requiredAreas();

  return <div style={{padding:24,maxWidth:760,margin:'0 auto'}}>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
      <button onClick={onCancel} style={{background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:18}}>←</button>
      <div>
        <div style={{fontSize:20,fontWeight:800,color:C.text,letterSpacing:-.4}}>Nova Solicitação de Análise</div>
        <div style={{fontSize:13,color:C.muted}}>Preencha os dados iniciais</div>
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <Card>
        <Divider label="Identificação"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginTop:14}}>
          <div style={{gridColumn:'1/-1'}}>
            <Input label="Título" value={form.title} onChange={v=>set('title',v)} required error={err.title} placeholder="Ex.: Mudança no processo de soldagem"/>
          </div>
          <Select label="Tipo de Mudança" value={form.type} onChange={v=>set('type',v)} options={SA_TYPES} required placeholder="Selecione..." error={err.type}/>
          <Select label="Criticidade" value={form.criticality} onChange={v=>set('criticality',v)} options={SA_CRITS} required placeholder="Selecione..." error={err.criticality}/>
        </div>
      </Card>
      {areas.length > 0 && <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:10,padding:'10px 14px',fontSize:12,color:'#92400E'}}>
        <strong>Áreas obrigatórias para avaliação:</strong> {areas.join(', ')}
      </div>}
      <Card>
        <Divider label="Descrição"/>
        <div style={{display:'flex',flexDirection:'column',gap:14,marginTop:14}}>
          <Textarea label="Descrição da Mudança" value={form.description} onChange={v=>set('description',v)} required rows={4} placeholder="Descreva detalhadamente a mudança proposta..."/>
          <Textarea label="Justificativa" value={form.justification} onChange={v=>set('justification',v)} rows={3} placeholder="Por que essa mudança é necessária?"/>
          <Textarea label="Escopo / Impacto" value={form.scope} onChange={v=>set('scope',v)} rows={2} placeholder="Quais processos, produtos ou áreas são afetados?"/>
        </div>
      </Card>
      {err._ && <div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:8,padding:'10px 14px',fontSize:13,color:C.danger}}>{err._}</div>}
      <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
        <Btn variant="secondary" onClick={onCancel}>Cancelar</Btn>
        <Btn onClick={submit} disabled={loading} size="lg">{loading ? 'Salvando...' : 'Criar SA'}</Btn>
      </div>
    </div>
  </div>;
}

// ─── SA DETAIL ────────────────────────────────────────────────────────────────
function SADetail({ record: r, allUsers, matrix, deptQuestions, currentUser, onBack, onUpdate }) {
  const [tab, setTab] = useState('info');
  const [sign, setSign] = useState(null); // { action, title, meaning, detail, onDone }
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const isAdmin = ['admin','sgq'].includes(currentUser.role);

  const addLog = (text) => ({ at: new Date().toISOString(), by: currentUser.name, text });

  const update = async (changes) => {
    setLoading(true); setErr('');
    try {
      const updated = { ...r, ...changes, updatedAt: new Date().toISOString() };
      await onUpdate(updated);
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  };

  const FLOW_STEPS = ['Aberta','Triagem','Avaliação','Aprovação','Execução','Concluída'];
  const STATUS_STEP = { 'aberta':0,'triagem':1,'avaliacao':2,'aprovacao':3,'execucao':4,'concluida':5,'cancelada':5 };
  const curStep = STATUS_STEP[r.status] || 0;

  const tabs = [
    { id:'info', label:'Informações' },
    { id:'triagem', label:'Triagem' },
    { id:'avaliacao', label:'Avaliação' },
    { id:'aprovacao', label:'Aprovação' },
    { id:'execucao', label:'Execução' },
    { id:'acoes', label:`Ações (${(r.actions||[]).length})` },
    { id:'log', label:'Histórico' },
  ];

  const crit = { 'Baixa':C.success,'Média':C.warning,'Alta':'#EA580C','Crítica':C.danger };

  return <div style={{padding:24}}>
    <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:20}}>
      <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:18,marginTop:2}}>←</button>
      <div style={{flex:1}}>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:4}}>
          <div style={{fontSize:20,fontWeight:800,color:C.text,letterSpacing:-.4}}>{r.id}</div>
          <Badge status={r.status}/>
          {r.criticality && <span style={{fontSize:11,fontWeight:700,color:crit[r.criticality]||C.muted,background:crit[r.criticality]+'15',padding:'3px 8px',borderRadius:20}}>{r.criticality}</span>}
          <span style={{fontSize:12,color:C.muted,background:C.bg,padding:'3px 10px',borderRadius:20,border:`1px solid ${C.border}`}}>{r.type}</span>
        </div>
        <div style={{fontSize:15,fontWeight:600,color:C.text}}>{r.title}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:2}}>Criado por {r.createdByName} · {fmt(r.createdAt)}</div>
      </div>
    </div>

    <Card style={{marginBottom:16}}>
      <Stepper steps={FLOW_STEPS} current={curStep}/>
    </Card>

    {err && <div style={{background:'#FEF2F2',borderRadius:8,padding:'10px 14px',fontSize:13,color:C.danger,marginBottom:12}}>{err}</div>}

    <div style={{display:'flex',gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:16,overflowX:'auto'}}>
      {tabs.map(t => <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'9px 14px',background:'none',border:'none',cursor:'pointer',fontSize:12,fontWeight:tab===t.id?700:500,color:tab===t.id?C.accent:C.muted,borderBottom:tab===t.id?`2px solid ${C.accent}`:'2px solid transparent',whiteSpace:'nowrap',transition:'all .15s'}}>{t.label}</button>)}
    </div>

    {tab === 'info' && <InfoTab r={r} allUsers={allUsers} currentUser={currentUser} isAdmin={isAdmin} onUpdate={update} loading={loading}/>}
    {tab === 'triagem' && <TriagemTab r={r} allUsers={allUsers} currentUser={currentUser} isAdmin={isAdmin} onUpdate={update} matrix={matrix} onSign={setSign} loading={loading}/>}
    {tab === 'avaliacao' && <AvaliacaoTab r={r} allUsers={allUsers} currentUser={currentUser} isAdmin={isAdmin} onUpdate={update} deptQuestions={deptQuestions} onSign={setSign} loading={loading}/>}
    {tab === 'aprovacao' && <AprovacaoTab r={r} allUsers={allUsers} currentUser={currentUser} isAdmin={isAdmin} onUpdate={update} onSign={setSign} loading={loading}/>}
    {tab === 'execucao' && <ExecucaoTab r={r} allUsers={allUsers} currentUser={currentUser} isAdmin={isAdmin} onUpdate={update} onSign={setSign} loading={loading}/>}
    {tab === 'acoes' && <AcoesTab r={r} allUsers={allUsers} currentUser={currentUser} isAdmin={isAdmin} onUpdate={update} onSign={setSign} loading={loading}/>}
    {tab === 'log' && <LogTab r={r}/>}

    {sign && <SignModal open={!!sign} onClose={()=>setSign(null)} title={sign.title} meaning={sign.meaning} saId={r.id} action={sign.action} detail={sign.detail} onSign={(sig) => { sign.onDone(sig); setSign(null); }}/>}
  </div>;
}

function InfoTab({ r, allUsers, currentUser, isAdmin, onUpdate, loading }) {
  const [edit, setEdit] = useState(false);
  const [form, setForm] = useState({ title: r.title, description: r.description, justification: r.justification||'', scope: r.scope||'' });
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const save = () => { onUpdate({ title: form.title, description: form.description, justification: form.justification, scope: form.scope, log: [...(r.log||[]), { at: new Date().toISOString(), by: currentUser.name, text: 'Informações atualizadas' }] }); setEdit(false); };
  const canEdit = isAdmin || r.createdBy === currentUser.id;
  return <div style={{display:'flex',flexDirection:'column',gap:14}}>
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <Divider label="Detalhes da Mudança"/>
        {canEdit && !edit && <Btn variant="outline" size="sm" onClick={()=>setEdit(true)}>Editar</Btn>}
        {edit && <div style={{display:'flex',gap:8}}><Btn variant="secondary" size="sm" onClick={()=>setEdit(false)}>Cancelar</Btn><Btn size="sm" onClick={save} disabled={loading}>Salvar</Btn></div>}
      </div>
      {edit ? <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Input label="Título" value={form.title} onChange={v=>set('title',v)} required/>
        <Textarea label="Descrição" value={form.description} onChange={v=>set('description',v)} rows={4}/>
        <Textarea label="Justificativa" value={form.justification} onChange={v=>set('justification',v)} rows={3}/>
        <Textarea label="Escopo / Impacto" value={form.scope} onChange={v=>set('scope',v)} rows={2}/>
      </div> : <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Row label="Título" value={r.title}/>
        <Row label="Tipo" value={r.type}/>
        <Row label="Criticidade" value={r.criticality}/>
        <Row label="Criado por" value={r.createdByName}/>
        <Row label="Criado em" value={fmt(r.createdAt)}/>
        <Row label="Atualizado em" value={fmt(r.updatedAt)}/>
        {r.description && <><Divider/><div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Descrição</div><div style={{fontSize:13,color:C.text,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{r.description}</div></>}
        {r.justification && <><div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:4,marginTop:8}}>Justificativa</div><div style={{fontSize:13,color:C.text,lineHeight:1.6}}>{r.justification}</div></>}
        {r.scope && <><div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:4,marginTop:8}}>Escopo</div><div style={{fontSize:13,color:C.text,lineHeight:1.6}}>{r.scope}</div></>}
      </div>}
    </Card>
    {(r.requiredAreas||[]).length > 0 && <Card>
      <Divider label="Áreas Envolvidas"/>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:10}}>
        {(r.requiredAreas||[]).map(a => <span key={a} style={{background:C.accent+'10',color:C.accent,borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:600}}>{a}</span>)}
      </div>
    </Card>}
  </div>;
}

function Row({ label, value }) {
  return <div style={{display:'flex',gap:12}}>
    <span style={{fontSize:12,fontWeight:600,color:C.muted,width:120,flexShrink:0}}>{label}</span>
    <span style={{fontSize:13,color:C.text}}>{value||'—'}</span>

}

function TriagemTab({ r, allUsers, currentUser, isAdmin, onUpdate, matrix, onSign, loading }) {
  const [form, setForm] = useState({
    assignedAreas: r.triage?.assignedAreas || [],
    assignments: r.triage?.assignments || {},
    observations: r.triage?.observations || '',
    deadline: r.triage?.deadline || '',
  });
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const canTriage = isAdmin && r.status === 'aberta';
  const alreadyDone = ['triagem','avaliacao','aprovacao','execucao','concluida'].includes(r.status);

  const reqAreas = () => {
    const mat = matrix || DEFAULT_MATRIX;
    return mat[r.type]?.[r.criticality] || [];
  };

  const toggleArea = (a) => {
    const cur = form.assignedAreas;
    if (cur.includes(a)) set('assignedAreas', cur.filter(x=>x!==a));
    else set('assignedAreas', [...cur, a]);
  };

  const assignUser = (area, uid) => set('assignments', {...form.assignments, [area]: uid ? parseInt(uid) : null });

  const submit = () => {
    onSign({
      action: 'triagem',
      title: `Triagem da ${r.id}`,
      meaning: 'Confirmo que realizei a triagem e defini as áreas de avaliação',
      detail: `Áreas: ${form.assignedAreas.join(', ')}`,
      onDone: (sig) => {
        onUpdate({
          status: 'triagem',
          triage: { ...form, doneAt: new Date().toISOString(), doneBy: currentUser.name, signature: sig },
          log: [...(r.log||[]), { at: new Date().toISOString(), by: currentUser.name, text: 'Triagem realizada — enviado para avaliação' }],
        });
      }
    });
  };

  const sendToEval = () => {
    if (!form.assignedAreas.length) { alert('Selecione ao menos uma área para avaliação'); return; }
    submit();
  };

  return <div style={{display:'flex',flexDirection:'column',gap:14}}>
    <Card>
      <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:12}}>Gate 1 — Triagem SGQ</div>
      {alreadyDone && r.triage?.doneAt ? <div style={{background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:8,padding:'10px 14px',fontSize:12,color:C.success,marginBottom:12}}>
        ✓ Triagem concluída por {r.triage.doneBy} em {fmtDT(r.triage.doneAt)}
      </div> : null}
      <Divider label="Áreas de Avaliação"/>
      <div style={{marginTop:10}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Obrigatórias: <strong style={{color:C.text}}>{reqAreas().join(', ')||'—'}</strong></div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
          {DEPT_LIST.map(a => {
            const required = reqAreas().includes(a);
            const selected = form.assignedAreas.includes(a);
            return <button key={a} onClick={()=>canTriage && toggleArea(a)} disabled={!canTriage} style={{padding:'6px 14px',borderRadius:20,border:`2px solid ${selected?(required?C.accent:C.purple):C.border}`,background:selected?(required?C.accent+'15':C.purple+'15'):'transparent',fontSize:12,fontWeight:selected?700:500,color:selected?(required?C.accent:C.purple):C.muted,cursor:canTriage?'pointer':'default',transition:'all .15s'}}>
              {required ? '★ ' : ''}{a}
            </button>;
          })}
        </div>
      </div>
      {form.assignedAreas.length > 0 && <>
        <Divider label="Responsáveis por Área"/>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:10}}>
          {form.assignedAreas.map(a => <div key={a} style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:12,fontWeight:600,color:C.text,width:120,flexShrink:0}}>{a}</span>
            <select value={form.assignments[a]||''} onChange={e=>assignUser(a,e.target.value)} disabled={!canTriage}
              style={{flex:1,padding:'6px 10px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:12,color:C.text,outline:'none'}}>
              <option value="">Selecionar responsável...</option>
              {allUsers.filter(u=>u.active).map(u=><option key={u.id} value={u.id}>{u.name} ({u.area||'—'})</option>)}
            </select>
          </div>)}
        </div>
      </>}
      <div style={{marginTop:14,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Input label="Prazo para Avaliação" type="date" value={form.deadline} onChange={v=>set('deadline',v)} disabled={!canTriage}/>
        <div/>
      </div>
      <div style={{marginTop:12}}>
        <Textarea label="Observações da Triagem" value={form.observations} onChange={v=>set('observations',v)} rows={2} disabled={!canTriage}/>
      </div>
      {canTriage && <div style={{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
        <Btn onClick={sendToEval} disabled={loading}>Confirmar Triagem ✎</Btn>
      </div>}
    </Card>
  </div>;
}

function AvaliacaoTab({ r, allUsers, currentUser, isAdmin, onUpdate, deptQuestions, onSign, loading }) {
  const canEvaluate = (area) => {
    const assign = r.triage?.assignments?.[area];
    return assign === currentUser.id || isAdmin;
  };

  const alreadyEval = (area) => !!(r.evaluations?.[area]?.at);
  const evalStatus = r.status;

  const DEPT_Q = deptQuestions || DEFAULT_DEPT_Q;

  const submitEval = (area, answers, obs) => {
    onSign({
      action: `avaliacao_${area}`,
      title: `Avaliação — ${area}`,
      meaning: `Confirmo minha avaliação da área ${area}`,
      detail: area,
      onDone: (sig) => {
        const newEvals = { ...(r.evaluations||{}), [area]: { answers, observations: obs, at: new Date().toISOString(), by: currentUser.name, signature: sig } };
        const allDone = (r.triage?.assignedAreas||[]).every(a => newEvals[a]?.at);
        onUpdate({
          evaluations: newEvals,
          status: allDone ? 'aprovacao' : r.status,
          log: [...(r.log||[]), { at: new Date().toISOString(), by: currentUser.name, text: `Avaliação da área ${area} concluída${allDone?' — todas as áreas avaliadas, enviado para aprovação':''}` }],
        });
      }
    });
  };

  const areas = r.triage?.assignedAreas || [];
  if (!areas.length) return <Card><div style={{fontSize:13,color:C.dim,textAlign:'center',padding:'24px 0'}}>Nenhuma área definida. Complete a triagem primeiro.</div></Card>;

  return <div style={{display:'flex',flexDirection:'column',gap:12}}>
    {isAdmin && <Card style={{padding:'10px 14px'}}>
      <div style={{fontSize:12,color:C.muted}}>Progresso: {areas.filter(a=>alreadyEval(a)).length}/{areas.length} áreas avaliadas</div>
      <div style={{display:'flex',gap:4,marginTop:6}}>
        {areas.map(a => <div key={a} style={{flex:1,height:4,borderRadius:4,background:alreadyEval(a)?C.success:C.border,transition:'background .3s'}}/>)}
      </div>
    </Card>}
    {areas.map(a => <EvalAreaCard key={a} area={a} record={r} allUsers={allUsers} currentUser={currentUser} questions={DEPT_Q[a]||[]} canEval={canEvaluate(a)} done={alreadyEval(a)} onSubmit={(ans,obs)=>submitEval(a,ans,obs)} loading={loading}/>)}
  </div>;
}

function EvalAreaCard({ area, record: r, allUsers, currentUser, questions, canEval, done, onSubmit, loading }) {
  const existing = r.evaluations?.[area];
  const [expanded, setExpanded] = useState(!done);
  const [answers, setAnswers] = useState(existing?.answers || {});
  const [obs, setObs] = useState(existing?.observations || '');

  const assignedId = r.triage?.assignments?.[area];
  const assignedUser = allUsers.find(u => u.id === assignedId);

  const answerQ = (q, v) => setAnswers(p=>({...p,[q]:v}));
  const allAnswered = questions.every(q => answers[q] !== undefined);

  return <Card>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer'}} onClick={()=>setExpanded(p=>!p)}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:done?C.success:canEval?C.accent:C.dim,flexShrink:0}}/>
        <span style={{fontSize:13,fontWeight:700,color:C.text}}>{area}</span>
        {assignedUser && <span style={{fontSize:11,color:C.muted}}>→ {assignedUser.name}</span>}
        {done && <span style={{fontSize:11,color:C.success,fontWeight:600}}>✓ Avaliado</span>}
      </div>
      <span style={{fontSize:12,color:C.muted}}>{expanded?'▲':'▼'}</span>
    </div>
    {expanded && <div style={{marginTop:14}}>
      {done && existing && <div style={{background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:8,padding:'10px 14px',fontSize:12,color:C.success,marginBottom:12}}>
        Avaliado por {existing.by} em {fmtDT(existing.at)}
      </div>}
      {questions.length > 0 && <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:12}}>
        {questions.map((q,i) => <div key={i} style={{background:C.bg,borderRadius:8,padding:'10px 12px'}}>
          <div style={{fontSize:12,fontWeight:500,color:C.text,marginBottom:6}}>{i+1}. {q}</div>
          <div style={{display:'flex',gap:8}}>
            {['Sim','Não','N/A'].map(opt => {
              const sel = (done?existing?.answers[q]:answers[q]) === opt;
              return <button key={opt} onClick={()=>!done&&canEval&&answerQ(q,opt)} disabled={done||!canEval}
                style={{padding:'4px 14px',borderRadius:20,border:`1.5px solid ${sel?C.accent:C.border}`,background:sel?C.accent+'10':'transparent',fontSize:11,fontWeight:sel?700:500,color:sel?C.accent:C.muted,cursor:(done||!canEval)?'default':'pointer',transition:'all .12s'}}>
                {opt}
              </button>;
            })}
          </div>
        </div>)}
      </div>}
      <Textarea label="Observações" value={done?existing?.observations||'':obs} onChange={setObs} rows={2} disabled={done||!canEval}/>
      {!done && canEval && <div style={{marginTop:10,display:'flex',justifyContent:'flex-end'}}>
        <Btn onClick={()=>onSubmit(answers,obs)} disabled={loading || (questions.length > 0 && !allAnswered)} size="sm">
          Concluir Avaliação ✎
        </Btn>
      </div>}
    </div>}
  </Card>;
}

function AprovacaoTab({ r, allUsers, currentUser, isAdmin, onUpdate, onSign, loading }) {
  const [plano, setPlano] = useState(r.planoAcao || '');
  const [risco, setRisco] = useState(r.risco || '');
  const [obs, setObs] = useState(r.aprovacao?.obs || '');
  const canApprove = isAdmin && r.status === 'aprovacao';
  const alreadyDone = r.aprovacao?.at;

  const approve = () => onSign({
    action: 'aprovacao',
    title: 'Aprovação do Plano de Ação',
    meaning: 'Aprovo o plano de ação e autorizo a execução da mudança',
    detail: `Plano: ${plano.substring(0,100)}`,
    onDone: (sig) => onUpdate({
      status: 'execucao',
      aprovacao: { at: new Date().toISOString(), by: currentUser.name, obs, signature: sig },
      planoAcao: plano,
      risco,
      log: [...(r.log||[]), { at: new Date().toISOString(), by: currentUser.name, text: 'Plano aprovado — SA em execução' }],
    }),
  });

  const reject = () => onSign({
    action: 'rejeicao',
    title: 'Rejeição do Plano de Ação',
    meaning: 'Rejeito o plano proposto e retorno a SA para reavaliação',
    detail: obs,
    onDone: (sig) => onUpdate({
      status: 'avaliacao',
      log: [...(r.log||[]), { at: new Date().toISOString(), by: currentUser.name, text: `Plano rejeitado — retornado para avaliação. Motivo: ${obs}` }],
    }),
  });

  return <div style={{display:'flex',flexDirection:'column',gap:14}}>
    {alreadyDone && <div style={{background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:8,padding:'10px 14px',fontSize:12,color:C.success}}>
      ✓ Aprovado por {r.aprovacao.by} em {fmtDT(r.aprovacao.at)}
    </div>}
    <Card>
      <Divider label="Gate 3 — Aprovação SGQ"/>
      <div style={{display:'flex',flexDirection:'column',gap:14,marginTop:14}}>
        <Textarea label="Plano de Ação" value={plano} onChange={setPlano} rows={4} disabled={!canApprove&&!isAdmin} placeholder="Descreva as ações planejadas para implementação..."/>
        <Textarea label="Análise de Risco" value={risco} onChange={setRisco} rows={3} disabled={!canApprove&&!isAdmin} placeholder="Identifique riscos e medidas de mitigação..."/>
        <Textarea label="Observações SGQ" value={obs} onChange={setObs} rows={2} disabled={!canApprove} placeholder="Comentários adicionais..."/>
      </div>
      {canApprove && <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:14}}>
        <Btn variant="danger" onClick={reject} disabled={loading}>Rejeitar ✎</Btn>
        <Btn onClick={approve} disabled={loading}>Aprovar e Executar ✎</Btn>
      </div>}
    </Card>
    {r.evaluations && Object.keys(r.evaluations).length > 0 && <Card>
      <Divider label="Resumo das Avaliações"/>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:10}}>
        {Object.entries(r.evaluations).map(([area, ev]) => ev && <div key={area} style={{background:C.bg,borderRadius:8,padding:'10px 12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:700,color:C.text}}>{area}</span>
            <span style={{fontSize:11,color:C.muted}}>{ev.by} · {fmt(ev.at)}</span>
          </div>
          {ev.observations && <div style={{fontSize:12,color:C.muted}}>{ev.observations}</div>}
        </div>)}
      </div>
    </Card>}
  </div>;
}

function ExecucaoTab({ r, allUsers, currentUser, isAdmin, onUpdate, onSign, loading }) {
  const [result, setResult] = useState(r.resultado || '');
  const [lessions, setLessions] = useState(r.licoesAprendidas || '');
  const canClose = isAdmin && r.status === 'execucao';
  const alreadyDone = r.status === 'concluida';

  const conclude = () => onSign({
    action: 'conclusao',
    title: 'Conclusão da SA',
    meaning: 'Confirmo a conclusão da implementação e encerramento desta SA',
    detail: result.substring(0,100),
    onDone: (sig) => onUpdate({
      status: 'concluida',
      conclusao: { at: new Date().toISOString(), by: currentUser.name, result, signature: sig },
      resultado: result,
      licoesAprendidas: lessions,
      log: [...(r.log||[]), { at: new Date().toISOString(), by: currentUser.name, text: 'SA concluída' }],
    }),
  });

  const cancel = () => {
    if (!window.confirm('Cancelar esta SA?')) return;
    onUpdate({ status: 'cancelada', log: [...(r.log||[]), { at: new Date().toISOString(), by: currentUser.name, text: 'SA cancelada' }] });
  };

  return <div style={{display:'flex',flexDirection:'column',gap:14}}>
    {alreadyDone && r.conclusao && <div style={{background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:8,padding:'10px 14px',fontSize:12,color:C.success}}>
      ✓ Concluída por {r.conclusao.by} em {fmtDT(r.conclusao.at)}
    </div>}
    <Card>
      <Divider label="Gate 5 — Conclusão"/>
      <div style={{display:'flex',flexDirection:'column',gap:14,marginTop:14}}>
        <Textarea label="Resultado da Implementação" value={result} onChange={setResult} rows={4} disabled={!canClose} placeholder="Descreva o resultado obtido com a implementação..."/>
        <Textarea label="Lições Aprendidas" value={lessions} onChange={setLessions} rows={3} disabled={!canClose} placeholder="O que aprendemos com essa mudança?"/>
      </div>
      {canClose && <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:14}}>
        <Btn variant="secondary" onClick={cancel} disabled={loading}>Cancelar SA</Btn>
        <Btn onClick={conclude} disabled={loading || !result.trim()}>Concluir SA ✎</Btn>
      </div>}
    </Card>
  </div>;
}

function AcoesTab({ r, allUsers, currentUser, isAdmin, onUpdate, onSign, loading }) {
  const [newAc, setNewAc] = useState(null);
  const [form, setForm] = useState({ description:'', responsible:'', dueDate:'', status:'pendente' });
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const actions = r.actions || [];

  const openNew = () => { setForm({ description:'', responsible:'', dueDate:'', status:'pendente' }); setNewAc(true); };

  const addAction = () => {
    if (!form.description.trim()) return;
    const ac = { ...form, id: Date.now(), responsible: form.responsible ? parseInt(form.responsible) : null, createdAt: new Date().toISOString(), createdBy: currentUser.name };
    onUpdate({ actions: [...actions, ac], log: [...(r.log||[]), { at: new Date().toISOString(), by: currentUser.name, text: `Ação adicionada: ${form.description}` }] });
    setNewAc(false);
  };

  const conclude = (ac) => onSign({
    action: `conclusao_acao_${ac.id}`,
    title: `Concluir: ${ac.description}`,
    meaning: 'Confirmo a conclusão desta ação',
    detail: ac.description,
    onDone: (sig) => {
      const updated = actions.map(a => a.id === ac.id ? { ...a, status:'concluida', doneAt: new Date().toISOString(), doneBy: currentUser.name, signature: sig } : a);
      onUpdate({ actions: updated, log: [...(r.log||[]), { at: new Date().toISOString(), by: currentUser.name, text: `Ação concluída: ${ac.description}` }] });
    }
  });

  const canAdd = isAdmin || r.status === 'execucao';
  const getUser = (id) => allUsers.find(u => u.id === id);

  return <div style={{display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'flex',justifyContent:'flex-end'}}>
      {canAdd && <Btn size="sm" onClick={openNew}>+ Nova Ação</Btn>}
    </div>
    {actions.length === 0 && <Card><div style={{fontSize:13,color:C.dim,textAlign:'center',padding:'24px 0'}}>Nenhuma ação cadastrada</div></Card>}
    {actions.map(ac => {
      const resp = getUser(ac.responsible);
      const canConclude = ac.status !== 'concluida' && ac.status !== 'cancelada' && (isAdmin || ac.responsible === currentUser.id);
      const late = ac.dueDate && ac.status !== 'concluida' && new Date(ac.dueDate) < new Date();
      return <Card key={ac.id} style={{borderLeft:`3px solid ${ac.status==='concluida'?C.success:late?C.danger:C.accent}`}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:4}}>{ac.description}</div>
            <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
              {resp && <span style={{fontSize:11,color:C.muted}}>👤 {resp.name}</span>}
              {ac.dueDate && <span style={{fontSize:11,color:late?C.danger:C.muted}}>📅 {fmt(ac.dueDate)}{late?' (atrasada)':''}</span>}
              <span style={{fontSize:11,color:ACTION_STATUS[ac.status]?.color||C.muted,fontWeight:600}}>{ACTION_STATUS[ac.status]?.label||ac.status}</span>
            </div>
            {ac.doneAt && <div style={{fontSize:11,color:C.success,marginTop:4}}>✓ Concluída por {ac.doneBy} em {fmtDT(ac.doneAt)}</div>}
          </div>
          {canConclude && <Btn size="sm" onClick={()=>conclude(ac)} variant="outline">Concluir ✎</Btn>}
        </div>
      </Card>;
    })}
    <Modal open={!!newAc} onClose={()=>setNewAc(false)} title="Nova Ação" width={460}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Textarea label="Descrição" value={form.description} onChange={v=>set('description',v)} required rows={2}/>
        <Select label="Responsável" value={form.responsible} onChange={v=>set('responsible',v)} placeholder="Selecionar..." options={allUsers.filter(u=>u.active).map(u=>({value:String(u.id),label:u.name}))}/>
        <Input label="Prazo" type="date" value={form.dueDate} onChange={v=>set('dueDate',v)}/>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <Btn variant="secondary" onClick={()=>setNewAc(false)}>Cancelar</Btn>
          <Btn onClick={addAction} disabled={!form.description.trim()}>Adicionar</Btn>
        </div>
      </div>
    </Modal>
  </div>;
}

      </div>)}

// ─── ACTIONS PAGE ─────────────────────────────────────────────────────────────
function ActionsPage({ records, currentUser, allUsers, onNav }) {
  const isAdmin = ['admin','sgq'].includes(currentUser.role);
  const myActions = records.flatMap(r => (r.actions||[]).filter(a => isAdmin || a.responsible === currentUser.id).map(a => ({ ...a, saId: r.id, saTitle: r.title })));
  const pending = myActions.filter(a => a.status !== 'concluida' && a.status !== 'cancelada');
  const done = myActions.filter(a => a.status === 'concluida');

  const evalPending = isAdmin ? [] : records.filter(r => r.status === 'avaliacao' && (r.triage?.assignedAreas||[]).some(d => r.triage?.assignments?.[d] === currentUser.id && !r.evaluations?.[d]?.at));

  return <div style={{padding:24}}>
    <div style={{fontSize:20,fontWeight:800,color:C.text,letterSpacing:-.4,marginBottom:20}}>Minhas Tarefas</div>
    {evalPending.length > 0 && <><div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:10}}>Avaliações Pendentes</div>
    <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
      {evalPending.map(r => {
        const pendAreas = (r.triage?.assignedAreas||[]).filter(d => r.triage?.assignments?.[d] === currentUser.id && !r.evaluations?.[d]?.at);
        return <Card key={r.id} style={{cursor:'pointer'}} onClick={()=>onNav('detail',r.id)}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.accent}}>{r.id}</div>
              <div style={{fontSize:12,color:C.muted}}>{r.title}</div>
              <div style={{fontSize:11,color:C.warning,marginTop:4}}>Áreas pendentes: {pendAreas.join(', ')}</div>
            </div>
            <span style={{fontSize:12,color:C.muted}}>→</span>
          </div>
        </Card>;
      })}
    </div></>}
    <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:10}}>Ações Pendentes ({pending.length})</div>
    {pending.length === 0 ? <Card><div style={{fontSize:13,color:C.dim,textAlign:'center',padding:'20px 0'}}>Nenhuma ação pendente 🎉</div></Card>
    : pending.map(a => {
      const late = a.dueDate && new Date(a.dueDate) < new Date();
      return <Card key={a.id} style={{marginBottom:8,borderLeft:`3px solid ${late?C.danger:C.accent}`,cursor:'pointer'}} onClick={()=>onNav('detail',a.saId)}>
        <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:2}}>{a.saId}</div>
        <div style={{fontSize:13,fontWeight:600,color:C.text}}>{a.description}</div>
        {a.dueDate && <div style={{fontSize:11,color:late?C.danger:C.muted,marginTop:4}}>📅 {fmt(a.dueDate)}{late?' — Atrasada':''}</div>}
      </Card>;
    })}
    {done.length > 0 && <>
      <div style={{fontWeight:700,fontSize:13,color:C.text,marginTop:20,marginBottom:10}}>Concluídas ({done.length})</div>
      {done.slice(0,10).map(a => <Card key={a.id} style={{marginBottom:8,opacity:.7,borderLeft:`3px solid ${C.success}`}}>
        <div style={{fontSize:12,color:C.muted}}>{a.saId} · {a.description}</div>
        <div style={{fontSize:11,color:C.success,marginTop:2}}>✓ {fmtDT(a.doneAt)}</div>
      </Card>)}
    </>}
  </div>;
}

// ─── USER MANAGER ─────────────────────────────────────────────────────────────
function UserManager({ users, roles, currentUser, isSuperAdmin, onSaveUser, onRefresh }) {
  const [sel, setSel] = useState(null);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const [tab, setTab] = useState('users'); // users | roles
  const [roleModal, setRoleModal] = useState(false);
  const [roleForm, setRoleForm] = useState({});
  const [q, setQ] = useState('');

  const openNew = () => { setForm({ name:'', email:'', area:'', role:'geral', pwd:'', active:true, groupIds:[] }); setErr(''); setModal(true); setSel(null); };
  const openEdit = (u) => { setForm({ ...u, pwd:'', newPwd:'' }); setErr(''); setModal(true); setSel(u); };
  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  const save = async () => {
    if (!form.name?.trim()) { setErr('Nome obrigatório'); return; }
    if (!form.email?.trim()) { setErr('E-mail obrigatório'); return; }
    if (!sel && !form.pwd?.trim()) { setErr('Senha obrigatória para novo usuário'); return; }
    setLoading(true); setErr('');
    try {
      if (sel) {
        const body = { id: sel.id, name: form.name, email: form.email, area: form.area||'', role: form.role, active: form.active!==false, groupIds: form.groupIds||[], evalDepts: form.evalDepts||[] };
        if (form.newPwd?.trim()) body.pwd = form.newPwd;
        await apiPut('/api/users', body);
      } else {
        await apiPost('/api/users', { name: form.name, email: form.email, area: form.area||'', role: form.role||'geral', pwd: form.pwd, groupIds: form.groupIds||[], evalDepts: form.evalDepts||[] });
      }
      await onRefresh();
      setModal(false);
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  };

  const filtered = users.filter(u => { if (!q) return true; const l = q.toLowerCase(); return u.name.toLowerCase().includes(l)||u.email.toLowerCase().includes(l); });

  const ALL_PERMS = ['sa.criar','sa.triagem','sa.avaliar','sa.aprovar','sa.concluir','admin.users','admin.grupos','admin.audit'];

  return <div style={{padding:24}}>
    <div style={{fontSize:20,fontWeight:800,color:C.text,letterSpacing:-.4,marginBottom:20}}>Administração</div>
    <div style={{display:'flex',gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:20}}>
      {['users','roles'].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:'8px 16px',background:'none',border:'none',cursor:'pointer',fontSize:13,fontWeight:tab===t?700:500,color:tab===t?C.accent:C.muted,borderBottom:tab===t?`2px solid ${C.accent}`:'2px solid transparent'}}>{t==='users'?`Usuários (${users.length})`:`Grupos (${(roles||[]).length})`}</button>)}
    </div>
    {tab === 'users' && <>
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Buscar..." style={{flex:1,padding:'8px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,outline:'none'}}/>
        <Btn onClick={openNew}>+ Novo Usuário</Btn>
      </div>
      <Card style={{padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:C.bg}}>
            {['Nome','E-mail','Área','Perfil','Status','Grupos',''].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.5,borderBottom:`1px solid ${C.border}`}}>{h}</th>)}
          </tr></thead>
          <tbody>{filtered.map(u=><tr key={u.id} style={{cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <td style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`}}><div style={{display:'flex',alignItems:'center',gap:8}}><Avatar name={u.name} size={28}/><span style={{fontSize:13,fontWeight:600,color:C.text}}>{u.name}</span></div></td>
            <td style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`,fontSize:12,color:C.muted}}>{u.email}</td>
            <td style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`,fontSize:12,color:C.muted}}>{u.area||'—'}</td>
            <td style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:11,fontWeight:600,color:u.role==='admin'?C.danger:u.role==='sgq'?C.accent:C.muted,background:u.role==='admin'?C.danger+'10':u.role==='sgq'?C.accent+'10':C.bg,padding:'2px 8px',borderRadius:20}}>{u.role}</span></td>
            <td style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:11,fontWeight:600,color:u.active?C.success:C.danger}}>{u.active?'Ativo':'Inativo'}</span></td>
            <td style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`,fontSize:12,color:C.muted}}>{(u.groups||[]).map(g=>g.name).join(', ')||'—'}</td>
            <td style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`}}><Btn size="sm" variant="ghost" onClick={()=>openEdit(u)}>Editar</Btn></td>
          </tr>)}</tbody>
        </table>
      </Card>
    </>}
    {tab === 'roles' && <RolesManager roles={roles||[]} currentUser={currentUser} isSuperAdmin={isSuperAdmin} allPerms={ALL_PERMS} onRefresh={onRefresh}/>}
    <Modal open={modal} onClose={()=>setModal(false)} title={sel?'Editar Usuário':'Novo Usuário'} width={520}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{gridColumn:'1/-1'}}><Input label="Nome" value={form.name} onChange={v=>set('name',v)} required/></div>
          <Input label="E-mail" type="email" value={form.email} onChange={v=>set('email',v)} required/>
          <Input label="Área / Departamento" value={form.area} onChange={v=>set('area',v)}/>
          <Select label="Perfil" value={form.role} onChange={v=>set('role',v)} options={[{value:'geral',label:'Geral'},{value:'sgq',label:'SGQ'},{value:'admin',label:'Admin'}]}/>
          <Select label="Status" value={String(form.active!==false)} onChange={v=>set('active',v==='true')} options={[{value:'true',label:'Ativo'},{value:'false',label:'Inativo'}]}/>
          {!sel && <div style={{gridColumn:'1/-1'}}><Input label="Senha" type="password" value={form.pwd} onChange={v=>set('pwd',v)} required/></div>}
          {sel && <div style={{gridColumn:'1/-1'}}><Input label="Nova Senha (deixe em branco para não alterar)" type="password" value={form.newPwd||''} onChange={v=>set('newPwd',v)}/></div>}
        </div>
        {err && <div style={{fontSize:12,color:C.danger,background:'#FEF2F2',padding:'8px 12px',borderRadius:8}}>{err}</div>}
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <Btn variant="secondary" onClick={()=>setModal(false)}>Cancelar</Btn>
          <Btn onClick={save} disabled={loading}>{loading?'Salvando...':'Salvar'}</Btn>
        </div>
      </div>
    </Modal>
  </div>;
}

function RolesManager({ roles, currentUser, isSuperAdmin, allPerms, onRefresh }) {
  const [modal, setModal] = useState(false);
  const [sel, setSel] = useState(null);
  const [form, setForm] = useState({ name:'', description:'', permissions:[] });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const togglePerm = (p) => set('permissions', form.permissions.includes(p) ? form.permissions.filter(x=>x!==p) : [...form.permissions, p]);

  const openNew = () => { setForm({ name:'', description:'', permissions:[] }); setSel(null); setErr(''); setModal(true); };
  const openEdit = (r) => { setForm({ name:r.name, description:r.description||'', permissions:r.permissions||[] }); setSel(r); setErr(''); setModal(true); };

  const save = async () => {
    if (!form.name.trim()) { setErr('Nome obrigatório'); return; }
    setLoading(true); setErr('');
    try {
      if (sel) await apiPut('/api/users?_route=roles', { id: sel.id, ...form });
      else await apiPost('/api/users?_route=roles', form);
      await onRefresh();
      setModal(false);
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  };

  const del = async (r) => {
    if (!window.confirm(`Excluir grupo "${r.name}"?`)) return;
    try { await apiDel('/api/users?_route=roles', { id: r.id }); await onRefresh(); }
    catch(e) { alert(e.message); }
  };

  return <div>
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}><Btn onClick={openNew}>+ Novo Grupo</Btn></div>
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {roles.map(r => <Card key={r.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{r.name} {r.is_system&&<span style={{fontSize:10,color:C.muted,background:C.bg,padding:'1px 6px',borderRadius:20,marginLeft:4}}>sistema</span>}</div>
          {r.description && <div style={{fontSize:12,color:C.muted,marginTop:2}}>{r.description}</div>}
          <div style={{fontSize:11,color:C.dim,marginTop:4}}>{(r.permissions||[]).join(', ')||'Sem permissões'}</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <Btn size="sm" variant="ghost" onClick={()=>openEdit(r)}>Editar</Btn>
          {!r.is_system && isSuperAdmin && <Btn size="sm" variant="ghost" onClick={()=>del(r)} style={{color:C.danger}}>Excluir</Btn>}
        </div>
      </Card>)}
    </div>
    <Modal open={modal} onClose={()=>setModal(false)} title={sel?'Editar Grupo':'Novo Grupo'} width={500}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Input label="Nome" value={form.name} onChange={v=>set('name',v)} required disabled={sel?.is_system}/>
        <Input label="Descrição" value={form.description} onChange={v=>set('description',v)}/>
        <div>
          <label style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:8}}>Permissões</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {allPerms.map(p => { const sel = form.permissions.includes(p); return <button key={p} onClick={()=>togglePerm(p)} style={{padding:'4px 12px',borderRadius:20,border:`1.5px solid ${sel?C.accent:C.border}`,background:sel?C.accent+'10':'transparent',fontSize:11,fontWeight:sel?700:500,color:sel?C.accent:C.muted,cursor:'pointer'}}>{p}</button>; })}
          </div>
        </div>
        {err && <div style={{fontSize:12,color:C.danger,background:'#FEF2F2',padding:'8px 12px',borderRadius:8}}>{err}</div>}
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <Btn variant="secondary" onClick={()=>setModal(false)}>Cancelar</Btn>
          <Btn onClick={save} disabled={loading}>{loading?'Salvando...':'Salvar'}</Btn>
        </div>
      </div>
    </Modal>
  </div>;
}

// ─── INDICATORS ───────────────────────────────────────────────────────────────
function Indicators({ records }) {
  const total = records.length;
  const byStatus = Object.entries(STATUS_CONFIG).map(([k,v]) => ({ label: v.label, count: records.filter(r=>r.status===k).length, color: v.color }));
  const byType = SA_TYPES.map(t => ({ label: t, count: records.filter(r=>r.type===t).length }));
  const byCrit = SA_CRITS.map(c => { const cc = { 'Baixa':C.success,'Média':C.warning,'Alta':'#EA580C','Crítica':C.danger }; return { label: c, count: records.filter(r=>r.criticality===c).length, color: cc[c] }; });
  const maxStatus = Math.max(1, ...byStatus.map(x=>x.count));
  const maxType = Math.max(1, ...byType.map(x=>x.count));

  return <div style={{padding:24}}>
    <div style={{fontSize:20,fontWeight:800,color:C.text,letterSpacing:-.4,marginBottom:20}}>Indicadores</div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <Card>
        <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:14}}>Por Status</div>
        {byStatus.filter(x=>x.count>0).map(x=><div key={x.label} style={{marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:12,color:C.muted}}>{x.label}</span>
            <span style={{fontSize:12,fontWeight:700,color:x.color}}>{x.count}</span>
          </div>
          <div style={{height:6,borderRadius:4,background:C.border}}><div style={{height:'100%',borderRadius:4,background:x.color,width:`${(x.count/maxStatus)*100}%`,transition:'width .5s'}}/></div>
        </div>)}
        {byStatus.every(x=>x.count===0) && <div style={{fontSize:13,color:C.dim,textAlign:'center',padding:'16px 0'}}>Sem dados</div>}
      </Card>
      <Card>
        <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:14}}>Por Tipo</div>
        {byType.filter(x=>x.count>0).map(x=><div key={x.label} style={{marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:12,color:C.muted}}>{x.label}</span>
            <span style={{fontSize:12,fontWeight:700,color:C.accent}}>{x.count}</span>
          </div>
          <div style={{height:6,borderRadius:4,background:C.border}}><div style={{height:'100%',borderRadius:4,background:C.accent,width:`${(x.count/maxType)*100}%`,transition:'width .5s'}}/></div>
        </div>)}
        {byType.every(x=>x.count===0) && <div style={{fontSize:13,color:C.dim,textAlign:'center',padding:'16px 0'}}>Sem dados</div>}
      </Card>
      <Card>
        <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:14}}>Por Criticidade</div>
        <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
          {byCrit.map(x=><div key={x.label} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <div style={{fontSize:28,fontWeight:800,color:x.color}}>{x.count}</div>
            <div style={{fontSize:11,color:C.muted,fontWeight:600}}>{x.label}</div>
          </div>)}
        </div>
      </Card>
      <Card>
        <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:14}}>Resumo Geral</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <Row label="Total de SAs" value={total}/>
          <Row label="Em andamento" value={records.filter(r=>!['concluida','cancelada'].includes(r.status)).length}/>
          <Row label="Concluídas" value={records.filter(r=>r.status==='concluida').length}/>
          <Row label="Canceladas" value={records.filter(r=>r.status==='cancelada').length}/>
