const hasPermission = (user, perm) => {
  if (!user) return false;
  // Só admin tem acesso total a tudo. Outros perfis (sgq, geral)
  // são controlados exclusivamente pelos grupos.
  if (user.role === 'admin') return true;
  const perms = user.permissions || [];
  return perms.includes(perm);
};
const hasPerm = (user, perm) => hasPermission(user, perm);

// ThemeContext
const ThemeCtx = React.createContext({theme:"dark", C:THEMES.dark, setTheme:()=>{}});
const useTheme = () => React.useContext(ThemeCtx);

function ThemeProvider({children}){
  const [theme, setThemeRaw] = useState(()=>localStorage.getItem("sgq_theme_v1")||"light");
  const applyBodyTheme=(C2)=>{
    document.body.style.background=C2.bg;
    document.body.style.color=C2.text;
    document.documentElement.style.setProperty('--app-bg',C2.bg);
    document.documentElement.style.setProperty('--sb-color',C2.border);
    // fix date picker icon for light mode
    const style=document.getElementById('_theme_style')||document.createElement('style');
    style.id='_theme_style';
    style.textContent=`input[type=date]::-webkit-calendar-picker-indicator{filter:${['#F4F6FB','#F5F7FA'].includes(C2.bg)?'none':'invert(.5)'}}select option{background:${C2.card};color:${C2.text}}`;
    document.head.appendChild(style);
  };
  const setTheme = t => {
    setThemeRaw(t);
    localStorage.setItem("sgq_theme_v1", t);
    applyBodyTheme(THEMES[t]||THEMES.dark);
  };
  const C = THEMES[theme] || THEMES.dark;
  useEffect(()=>applyBodyTheme(C),[]);
  return <ThemeCtx.Provider value={{theme, C, setTheme}}>{children}</ThemeCtx.Provider>;
}

const validatePwd=(p,user={})=>{
  if(!p||typeof p!=="string")return"Senha obrigatoria";
  if(p.length<8)return"Minimo 8 caracteres";
  if(p.length>20)return"Maximo 20 caracteres";
  if(!/[A-Z]/.test(p))return"Precisa de ao menos 1 letra maiuscula";
  if(!/[a-z]/.test(p))return"Precisa de ao menos 1 letra minuscula";
  if(!/[0-9]/.test(p))return"Precisa de ao menos 1 numero";
  if(!/[^A-Za-z0-9]/.test(p))return"Precisa de ao menos 1 caractere especial (!@#$%...)";
  if(/(.){4,}/.test(p))return"Senha nao pode ter caracteres repetidos em sequencia";
  const weak=["12345678","senha123","senha@123","qwerty123","admin@123","mudar@123","abc@1234","pass@1234"];
  if(weak.some(w=>p.toLowerCase()===w))return"Senha muito fraca ou comum";
  if(user.name){const parts=user.name.toLowerCase().split(/\s+/).filter(x=>x.length>=3);if(parts.some(pt=>p.toLowerCase().includes(pt)))return"Senha nao pode conter seu nome";}
  if(user.email){const loc=user.email.toLowerCase().split("@")[0];if(loc.length>=3&&p.toLowerCase().includes(loc))return"Senha nao pode conter seu e-mail";}
  return null;
};

function Stepper({request,C}){
  const status=request.status;
  const sd=request.stageDeadlines||{};
  const tr=request.triage||{};
  const evs=request.evaluations||{};
  const areas=tr.assignedAreas||[];
  const doneEv=areas.filter(d=>evs[d]&&evs[d].at).length;

  // last eval date (most recent area completion)
  const lastEvAt=areas.map(d=>evs[d]&&evs[d].at).filter(Boolean).sort().reverse()[0];
  // eval deadline = max area deadline
  const evalDl=areas.map(d=>tr.deadlines&&tr.deadlines[d]).filter(Boolean).sort().reverse()[0];

  const steps=[
    {
      key:"triagem",
      gate:"SGQ 1",
      label:"Triagem",
      statuses:["aberta"],
      doneWhen:s=>!["aberta"].includes(s)&&s!=="cancelada",
      activeWhen:s=>s==="aberta",
      info:()=>request.ap1At?[
        {l:"Realizado por",v:request.ap1ByName},
        {l:"Data",v:fmt(request.ap1At)},
        {l:"Prazo definido",v:fmtD(sd.triagem)},
      ]:[
        {l:"Prazo",v:fmtD(sd.triagem)},
      ],
    },
    {
      key:"avaliacao",
      gate:"SGQ 2",
      label:"Avaliacao",
      statuses:["avaliacao","revisao"],
      doneWhen:s=>["plano","execucao","concluida"].includes(s),
      activeWhen:s=>["avaliacao","revisao"].includes(s),
      info:()=>{
        if(request.ap2At) return[
          {l:"Aprovado por",v:request.ap2ByName},
          {l:"Data",v:fmt(request.ap2At)},
          {l:"Areas",v:doneEv+"/"+areas.length+" concluidas"},
        ];
        if(lastEvAt) return[
          {l:"Areas",v:doneEv+"/"+areas.length+" concluidas"},
          {l:"Ultima avaliacao",v:fmt(lastEvAt)},
          {l:"Prazo",v:fmtD(evalDl)},
        ];
        return[
          {l:"Areas",v:areas.length+" atribuidas"},
          {l:"Prazo",v:fmtD(evalDl)},
        ];
      },
    },
    {
      key:"plano",
      gate:"SGQ 3",
      label:"Plano",
      statuses:["plano"],
      doneWhen:s=>["execucao","concluida"].includes(s),
      activeWhen:s=>s==="plano",
      info:()=>{
        const acs=request.actions||[];
        const acDone=acs.filter(a=>a.status==="concluida").length;
        if(request.ap3At) return[
          {l:"Aprovado por",v:request.ap3ByName},
          {l:"Data",v:fmt(request.ap3At)},
          {l:"Acoes",v:acs.length+" no plano"},
        ];
        return[
          {l:"Acoes",v:acs.length+" cadastradas"},
          {l:"Prazo montagem",v:fmtD(sd.plano)},
        ];
      },
    },
    {
      key:"execucao",
      label:"Execucao",
      statuses:["execucao"],
      doneWhen:s=>s==="concluida",
      activeWhen:s=>s==="execucao",
      info:()=>{
        const acs=request.actions||[];
        const acDone=acs.filter(a=>a.status==="concluida").length;
        return[
          {l:"Acoes",v:acDone+"/"+acs.length+" concluidas"},
          {l:"Prazo",v:fmtD(sd.execucao)},
        ];
      },
    },
    {
      key:"concluida",
      label:"Concluida",
      statuses:["concluida"],
      doneWhen:s=>false,
      activeWhen:s=>s==="concluida",
      info:()=>request.closedAt?[
        {l:"Concluido em",v:fmt(request.closedAt)},
      ]:[],
    },
  ];

  const stIdx={aberta:0,avaliacao_inicial:1,avaliacao_areas:1,montagem_plano:2,aprovacao_plano:2,execucao:3,concluida:4,cancelada:-1}[status]||0;
  const gw=i=>(i===0&&status==="avaliacao_inicial")||(i===1&&(status==="aprovacao_plano"||status==="avaliacao_areas"))||(i===2&&(status==="montagem_plano"||status==="aprovacao_plano"));

  return <div style={{display:"flex",alignItems:"stretch",gap:0,marginBottom:16,overflowX:"auto"}}>
    {steps.map((st,i)=>{
      const done=st.doneWhen(status);
      const active=st.activeWhen(status);
      const waiting=gw(i);
      const col=done?C.success:waiting?C.warning:active?(REQ_ST[status]&&REQ_ST[status].color||C.accent):C.border;
      const infos=done||active||waiting?st.info():[];
      return <React.Fragment key={st.key}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"stretch",minWidth:120,maxWidth:160,flex:1}}>
          {/* Gate badge */}
          <div style={{height:18,display:"flex",justifyContent:"center",alignItems:"center",marginBottom:3}}>
            {st.gate&&<div style={{fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:4,
              background:done?C.success+"22":waiting?C.warning+"22":active?col+"22":C.border+"22",
              color:done?C.success:waiting?C.warning:active?col:C.muted,
              border:"1px solid "+(done?C.success:waiting?C.warning:active?col:C.border)}}>
              {st.gate}
            </div>}
          </div>
          {/* Circle + label */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,marginBottom:6}}>
            <div style={{width:26,height:26,borderRadius:"50%",
              background:done?C.success:active||waiting?col:"transparent",
              border:"2.5px solid "+col,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:11,fontWeight:800,color:(done||active||waiting)?"#000":C.muted}}>
              {done?"✓":i+1}
            </div>
            <span style={{fontSize:10,color:done?C.success:active||waiting?col:C.muted,
              fontWeight:active||waiting?700:400,textAlign:"center",lineHeight:1.2}}>{st.label}</span>
          </div>
          {/* Info card */}
          {infos.length>0&&<div style={{background:col+"0D",border:"1px solid "+col+"33",borderRadius:7,
            padding:"5px 8px",fontSize:10,display:"flex",flexDirection:"column",gap:3,flex:1}}>
            {infos.map((inf,ii)=><div key={ii} style={{display:"flex",flexDirection:"column",gap:0}}>
              <span style={{color:C.muted,fontSize:9,letterSpacing:.4}}>{inf.l}</span>
              <span style={{color:col,fontWeight:600,lineHeight:1.3,wordBreak:"break-word"}}>{inf.v||"—"}</span>
            </div>)}
          </div>}
          {/* Empty spacer for non-active steps */}
          {infos.length===0&&<div style={{flex:1}}/>}
        </div>
        {i<steps.length-1&&<div style={{width:20,display:"flex",alignItems:"flex-start",paddingTop:30,flexShrink:0}}>
          <div style={{flex:1,height:2,background:i<stIdx?C.success:C.border,marginTop:11}}/>
        </div>}
      </React.Fragment>;
    })}
  </div>;
}

// Prazo final da etapa atual — em avaliação usa o maior prazo pendente entre as áreas
function getPhaseDeadline(r){
  if(["concluida","cancelada"].includes(r.status))return null;
  const sd=r.stageDeadlines||{};
  if(r.status==="avaliacao_areas"&&r.triage){
    const dls=(r.triage.assignedAreas||[])
      .filter(d=>!(r.evaluations&&r.evaluations[d]&&r.evaluations[d].at))
      .map(d=>r.triage.deadlines&&r.triage.deadlines[d])
      .filter(Boolean);
    if(dls.length)return dls.sort().reverse()[0];
    return sd.avaliacao_areas||null;
  }
  // aprovacao_plano: usa maior prazo de aval como referencia
  if(r.status==="aprovacao_plano"){
    if(sd.aprovacao_plano)return sd.aprovacao_plano;
    if(r.triage){
      const dls=(r.triage.assignedAreas||[])
        .map(d=>r.triage.deadlines&&r.triage.deadlines[d]).filter(Boolean);
      if(dls.length)return dls.sort().reverse()[0];
    }
    return null;
  }
  const map={aberta:sd.avaliacao_inicial,avaliacao_inicial:sd.avaliacao_inicial,montagem_plano:sd.montagem_plano,execucao:sd.execucao};
  return map[r.status]||null;
}

function AttachmentsPanel({attachments,onAdd,onRemove,readOnly,stage,currentUser,isAdmin,C,refId,refType}){
  const Sg=mkSg(C);
  const [name,setName]=useState("");
  const [ref,setRef]=useState("");
  const [uploading,setUploading]=useState(false);
  const [err,setErr]=useState("");
  const [pendingFile,setPendingFile]=useState(null);
  const fileRef=React.useRef();

  const onFileChange=e=>{
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    setErr("");
    setName(file.name);
    setPendingFile(file);
    e.target.value="";
  };

  const add=async()=>{
    if(!name.trim())return;
    if(pendingFile){
      setUploading(true);
      try{
        const r=await apiPost('/api/uploads',{filename:pendingFile.name,contentType:pendingFile.type,refId:refId||'misc',refType:refType||'misc'});
        await fetch(r.uploadUrl,{method:'PUT',body:pendingFile,headers:{'Content-Type':pendingFile.type}});
        onAdd({id:'att_'+Date.now(),name:name.trim(),ref:ref.trim(),stage,addedBy:currentUser.name,addedAt:new Date().toISOString(),hasFile:true,mimeType:pendingFile.type,sizeKB:Math.round(pendingFile.size/1024),r2key:r.key});
        setName("");setRef("");setPendingFile(null);setErr("");
      }catch(e){setErr("Erro ao fazer upload: "+e.message);}
      setUploading(false);
    } else {
      onAdd({id:'att_'+Date.now(),name:name.trim(),ref:ref.trim(),stage,addedBy:currentUser.name,addedAt:new Date().toISOString(),hasFile:false});
      setName("");setRef("");setErr("");
    }
  };

  const download=async att=>{
    if(!att.hasFile)return;
    if(!att.r2key){alert("Arquivo salvo localmente nao disponivel.");return;}
    try{
      const r=await apiGet('/api/uploads?key='+encodeURIComponent(att.r2key));
      window.open(r.downloadUrl,'_blank');
    }catch(e){alert("Erro ao baixar: "+e.message);}
  };

  const all=attachments||[];
  return <div style={{marginTop:10}}>
    <div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.7,marginBottom:7}}>ANEXOS ({all.length})</div>

        {pendingFile&&<span style={{fontSize:11,color:C.success,alignSelf:"center",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pendingFile.name} ({Math.round(pendingFile.size/1024)}KB)</span>}

      </div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
        <input style={{...Sg.input(),flex:2,minWidth:130}} value={name} onChange={e=>setName(e.target.value)} placeholder="Nome / descricao do documento..."/>
        <input style={{...Sg.input(),flex:1,minWidth:100}} value={ref} onChange={e=>setRef(e.target.value)} placeholder="Ref (numero, codigo...)"/>
        <button style={{...Sg.btn("primary"),fontSize:11,padding:"6px 12px",opacity:name.trim()&&!uploading?1:.4}} disabled={!name.trim()||uploading} onClick={add}>
          {uploading?"Enviando...":"Adicionar"}
        </button>
      </div>
      {err&&<div style={{fontSize:11,color:C.danger,marginTop:4}}>{err}</div>}
    </div>}
    {all.length===0&&<div style={{fontSize:11,color:C.muted,padding:"6px 0"}}>Nenhum anexo registrado.</div>}
    {all.map((a,i)=>(
      <div key={a.id||i} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 10px",background:C.surface,borderRadius:7,marginBottom:4}}>
        <div style={{fontSize:13,flexShrink:0}}>{a.hasFile?"":""}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,color:C.text,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</div>
          <div style={{fontSize:10,color:C.muted,display:"flex",gap:8,flexWrap:"wrap"}}>
            {a.ref&&<span>Ref: {a.ref}</span>}
            {a.sizeKB&&<span>{a.sizeKB}KB</span>}
            <span style={{color:C.accent}}>{a.stage}</span>
            <span>{a.addedBy}</span>
            <span>{fmtD(a.addedAt&&a.addedAt.slice(0,10))}</span>
          </div>
        </div>
        {a.hasFile&&<button style={{...Sg.btn("primary"),fontSize:11,padding:"4px 10px",flexShrink:0}} onClick={()=>download(a)}>Download</button>}
        {onRemove&&isAdmin&&<button style={{...Sg.btn("danger"),fontSize:11,padding:"4px 8px",flexShrink:0}} title="Remover anexo" onClick={()=>{if(window.confirm("Remover o anexo \""+a.name+"\"? Esta acao fica registrada no historico."))onRemove(a);}}>×</button>}
      </div>
    ))}
  </div>;
}


// ================================================================
// CRIT EDITOR — admin cria/edita/remove niveis livremente
// ================================================================
function CritEditor({crits,currentUser,onSave}){
  const isAdmin=hasPerm(currentUser,'config.criticidades');
  const {C}=useTheme();const Sg=mkSg(C);
  const [local,setLocal]=useState(()=>crits.map(c=>({...c})));
  const [saved,setSaved]=useState(false);
  const [showNew,setShowNew]=useState(false);
  const [nCrit,setNC]=useState({v:"",label:"",color:"#4F8EF7",desc:""});
  const [ncErr,setNcErr]=useState("");

  const COLORS=["#2DD4BF","#4F8EF7","#F59E0B","#EF4444","#10B981","#8B5CF6"];

  const save=()=>{
    if(local.length===0){alert("Mantenha ao menos 1 nivel.");return;}
    onSave(local,currentUser.name);setSaved(true);setTimeout(()=>setSaved(false),2500);
  };

  const addCrit=()=>{
    if(!nCrit.v.trim()){setNcErr("Informe um codigo (ex: C5, ALTO...)");return;}
    if(!nCrit.label.trim()){setNcErr("Informe um nome");return;}
    if(local.find(c=>c.v.toUpperCase()===nCrit.v.toUpperCase())){setNcErr("Codigo ja existe");return;}
    setLocal(p=>[...p,{v:nCrit.v.toUpperCase().trim(),label:nCrit.label.trim(),color:nCrit.color,desc:nCrit.desc.trim()}]);
    setNC({v:"",label:"",color:"#4F8EF7",desc:""});setNcErr("");setShowNew(false);
  };

  const upd=(i,field,val)=>setLocal(p=>p.map((x,xi)=>xi===i?{...x,[field]:val}:x));
  const remove=(i)=>{if(local.length<=1){alert("Mantenha ao menos 1 nivel.");return;}setLocal(p=>p.filter((_,xi)=>xi!==i));};
  const moveUp=(i)=>{if(i===0)return;setLocal(p=>{const n=[...p];[n[i-1],n[i]]=[n[i],n[i-1]];return n;});};
  const moveDown=(i)=>{if(i===local.length-1)return;setLocal(p=>{const n=[...p];[n[i],n[i+1]]=[n[i+1],n[i]];return n;});};

  return <div style={{padding:"18px 22px",maxWidth:740}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,alignItems:"center",flexWrap:"wrap",gap:9}}>
      <div>
        <h1 style={{margin:0,fontSize:18,color:C.text,fontWeight:700}}>Niveis de Criticidade</h1>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>Crie e edite os niveis usados na triagem das SAs</div>
      </div>
      {isAdmin&&<div style={{display:"flex",gap:7}}>
        <button style={Sg.btn()} onClick={()=>setShowNew(v=>!v)}>+ Novo Nivel</button>
        {isAdmin&&<button style={{...Sg.btn(saved?"success":"primary"),minWidth:90}} onClick={save}>{saved?"Salvo!":"Salvar"}</button>}
      {!isAdmin&&<span style={{fontSize:12,color:'var(--muted)',padding:'6px 12px'}}>Visualização apenas — sem permissão para editar.</span>}
      </div>}
    </div>

    {showNew&&<div style={{...Sg.card({marginBottom:14,border:"1px solid "+C.accent+"44"})}}>
      <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:10}}>NOVO NIVEL</div>
      <div style={{display:"grid",gridTemplateColumns:"80px 1fr 1fr",gap:10,marginBottom:8}}>
        <div><label style={Sg.lbl}>Codigo *</label><input style={Sg.input()} value={nCrit.v} onChange={e=>setNC(n=>({...n,v:e.target.value}))} placeholder="C5"/></div>
        <div><label style={Sg.lbl}>Nome *</label><input style={Sg.input()} value={nCrit.label} onChange={e=>setNC(n=>({...n,label:e.target.value}))} placeholder="Critica"/></div>
        <div><label style={Sg.lbl}>Descricao</label><input style={Sg.input()} value={nCrit.desc} onChange={e=>setNC(n=>({...n,desc:e.target.value}))} placeholder="Impacto regulatorio..."/></div>
      </div>
      <div style={{marginBottom:8}}>
        <label style={Sg.lbl}>Cor</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          {COLORS.map(col=>(
            <button key={col} onClick={()=>setNC(n=>({...n,color:col}))} style={{width:26,height:26,borderRadius:5,background:col,border:"3px solid "+(nCrit.color===col?"#fff":"transparent"),cursor:"pointer",flexShrink:0}}/>
          ))}
          <input type="color" value={nCrit.color} onChange={e=>setNC(n=>({...n,color:e.target.value}))} style={{width:30,height:26,border:"none",borderRadius:4,cursor:"pointer",background:"transparent"}}/>
          <div style={{width:32,height:32,borderRadius:6,background:nCrit.color+"22",border:"2px solid "+nCrit.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:nCrit.color}}>{nCrit.v||"?"}</div>
        </div>
      </div>
      {ncErr&&<div style={{fontSize:11,color:C.danger,marginBottom:6}}>{ncErr}</div>}
      <div style={{display:"flex",gap:7,justifyContent:"flex-end"}}>
        <button style={Sg.btn()} onClick={()=>{setShowNew(false);setNcErr("");}}>Cancelar</button>
        <button style={Sg.btn("primary")} onClick={addCrit}>Adicionar</button>
      </div>
    </div>}

    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {local.map((cr,i)=>(
        <div key={cr.v} style={{...Sg.card({borderLeft:"4px solid "+cr.color,padding:"12px 14px"})}}>
          <div style={{display:"grid",gridTemplateColumns:"64px 1fr 1fr auto",gap:10,alignItems:"start"}}>
            <div style={{padding:"8px 4px",borderRadius:7,background:cr.color+"22",textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:800,color:cr.color}}>{cr.v}</div>
            </div>
            <div>
              <label style={Sg.lbl}>Nome</label>
              <input style={{...Sg.input(),opacity:isAdmin?1:.7}} value={cr.label} readOnly={!isAdmin} onChange={e=>isAdmin&&upd(i,"label",e.target.value)}/>
              <label style={{...Sg.lbl,marginTop:7}}>Descricao</label>
              <input style={{...Sg.input(),opacity:isAdmin?1:.7}} value={cr.desc||""} readOnly={!isAdmin} onChange={e=>isAdmin&&upd(i,"desc",e.target.value)} placeholder="Descricao do impacto..."/>
            </div>
            {isAdmin&&<div>
              <label style={Sg.lbl}>Cor</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>
                {COLORS.map(col=>(
                  <button key={col} onClick={()=>upd(i,"color",col)} style={{width:22,height:22,borderRadius:4,background:col,border:"2px solid "+(cr.color===col?"#fff":"transparent"),cursor:"pointer",flexShrink:0}}/>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <input type="color" value={cr.color} onChange={e=>upd(i,"color",e.target.value)} style={{width:28,height:24,border:"none",borderRadius:3,cursor:"pointer",background:"transparent"}}/>
                <span style={{fontSize:10,color:C.muted}}>Cor hex customizada</span>
              </div>
            </div>}
            {isAdmin&&<div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"center"}}>
              <button style={{...Sg.btn(),fontSize:11,padding:"3px 8px",opacity:i===0?.3:1}} onClick={()=>moveUp(i)} disabled={i===0} title="Mover para cima">^</button>
              <button style={{...Sg.btn(),fontSize:11,padding:"3px 8px",opacity:i===local.length-1?.3:1}} onClick={()=>moveDown(i)} disabled={i===local.length-1} title="Mover para baixo">v</button>
              <button style={{...Sg.btn("danger"),fontSize:11,padding:"3px 8px"}} onClick={()=>remove(i)} title="Remover nivel">X</button>
            </div>}
          </div>
        </div>
      ))}
    </div>
    {local.length===0&&<div style={{...Sg.card({textAlign:"center",padding:28,color:C.muted})}}>Nenhum nivel. Adicione ao menos 1 para poder fazer triagens.</div>}
  </div>;
}

// ================================================================
// EVAL FORM v10 — obs ao responder Sim, perguntas vem de deptQuestions state
// ================================================================
function EvalForm({dept,existing,readOnly,allUsers,assignedUserId,isAdmin,deptQuestions,onChangeOwner,onClose,onSave,onSaveDraft,currentUser,C}){
  const Sg=mkSg(C);
  // Use custom questions if available, fallback to DEPT_Q constant
  const qs=(deptQuestions&&deptQuestions[dept])||DEPT_Q[dept]||[];
  const [ans,setAns]=useState(()=>
    existing&&existing.answers&&existing.answers.length
      ?existing.answers.map(a=>({...a}))
      :qs.map(q=>({q,a:"",just:"",obs:""}))
  );
  const [obs,setObs]=useState((existing&&existing.obs)||"");
  const [atts,setAtts]=useState(()=>(existing&&existing.attachments)||[]);
  const [newOwner,setNewOwner]=useState("");
  const [showOwner,setShowOwner]=useState(false);
  const [submitted,setSubmitted]=useState(false);

  useEffect(()=>{
    setAns(existing&&existing.answers&&existing.answers.length
      ?existing.answers.map(a=>({...a}))
      :qs.map(q=>({q,a:"",just:"",obs:""})));
    setObs((existing&&existing.obs)||"");
    setAtts((existing&&existing.attachments)||[]);
    setSubmitted(false);
  },[dept,existing]);

  const needsJ=a=>a==="N"||a==="N/A";
  const setA=(i,a)=>setAns(p=>p.map((x,xi)=>xi===i?{...x,a}:x));
  const setJ=(i,j)=>setAns(p=>p.map((x,xi)=>xi===i?{...x,just:j}:x));
  const setQObs=(i,v)=>setAns(p=>p.map((x,xi)=>xi===i?{...x,obs:v}:x));
  const missing=ans.filter(a=>needsJ(a.a)&&!(a.just&&a.just.trim())).length;
  const unanswered=ans.filter(a=>!a.a).length;
  const canSave=unanswered===0&&missing===0;
  const evOpts=allUsers.filter(u=>u.active&&(u.evalDepts||[]).includes(dept));
  const aUser=allUsers.find(u=>u.id===assignedUserId);


  return <div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div style={{display:"flex",alignItems:"center",gap:9,padding:"7px 10px",background:C.surface,borderRadius:8}}>
      {aUser&&<Av user={aUser} size={26}/>}
      <div style={{flex:1,fontSize:12,color:C.dim}}>Responsavel: <strong style={{color:C.text}}>{aUser&&aUser.name||"--"}</strong></div>
      {isAdmin&&!readOnly&&<button style={{...Sg.btn(),fontSize:11,padding:"3px 9px"}} onClick={()=>setShowOwner(v=>!v)}>Trocar</button>}
    </div>
    {showOwner&&<div style={{display:"flex",gap:8}}>
      <div style={{flex:1}}><Sel value={newOwner} onChange={setNewOwner} options={evOpts.map(u=>({value:u.id,label:u.name}))} placeholder="Novo responsavel..." C={C}/></div>
      <button style={Sg.btn("primary")} onClick={()=>{if(newOwner){onChangeOwner(dept,parseInt(newOwner));setShowOwner(false);setNewOwner("");}}} disabled={!newOwner}>OK</button>
      <button style={Sg.btn()} onClick={()=>setShowOwner(false)}>X</button>
    </div>}

    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {ans.map((a,i)=>{
        const needJ=needsJ(a.a);const justErr=submitted&&needJ&&!(a.just&&a.just.trim());const noAnsErr=submitted&&!a.a;
        const isSim=a.a==="S";
        return <div key={i} style={{padding:"8px 10px",background:C.surface,borderRadius:8,
          border:"1px solid "+(justErr||noAnsErr?C.danger+"55":isSim?C.warning+"33":C.border)}}>
          <div style={{fontSize:12,color:C.text,marginBottom:6,lineHeight:1.5}}>{i+1}. {a.q}</div>
          <div style={{display:"flex",gap:6,marginBottom:(needJ||isSim)?6:0,flexWrap:"wrap"}}>
            {["S","N","N/A"].map(opt=>(
              <button key={opt} onClick={()=>!readOnly&&setA(i,opt)}
                style={{padding:"4px 13px",borderRadius:6,cursor:readOnly?"default":"pointer",fontSize:12,fontWeight:a.a===opt?700:400,
                  border:"1.5px solid "+(a.a===opt?(opt==="S"?C.warning:opt==="N"?C.danger:C.muted):C.border),
                  background:a.a===opt?(opt==="S"?C.warning+"22":opt==="N"?C.danger+"22":C.muted+"22"):"transparent",
                  color:a.a===opt?(opt==="S"?C.warning:opt==="N"?C.danger:C.muted):C.muted,fontFamily:"inherit"}}>
                {opt==="S"?"Sim":opt==="N"?"Nao":"N/A"}
              </button>
            ))}
            {noAnsErr&&<span style={{fontSize:11,color:C.danger,alignSelf:"center"}}>Obrigatorio</span>}
          </div>
          {/* Obs opcional ao responder Sim */}
          {isSim&&<div>
            <div style={{fontSize:10,color:C.muted,marginBottom:3}}>Observacao (opcional)</div>
            <textarea style={{...Sg.input(),minHeight:36,fontSize:12,resize:"vertical"}}
              value={a.obs||""} onChange={e=>!readOnly&&setQObs(i,e.target.value)}
              readOnly={readOnly} placeholder="Detalhes adicionais sobre o impacto..."/>
          </div>}
          {/* Justificativa obrigatoria para Nao/NA */}
          {needJ&&<div>
            <div style={{fontSize:10,marginBottom:3,color:justErr?C.danger:C.muted,fontWeight:justErr?600:400}}>
              {justErr?"ATENCAO: ":""}Justificativa obrigatoria para Nao / N/A
            </div>
            <textarea style={{...Sg.input(),minHeight:42,fontSize:12,resize:"vertical",borderColor:justErr?C.danger:C.border}}
              value={a.just||""} onChange={e=>setJ(i,e.target.value)} readOnly={readOnly} placeholder="Descreva o motivo..."/>
          </div>}
        </div>;
      })}
    </div>

    <div><label style={Sg.lbl}>Observacoes Gerais</label>
      <textarea style={{...Sg.input(),minHeight:42,resize:"vertical"}} value={obs} onChange={e=>!readOnly&&setObs(e.target.value)} readOnly={readOnly}/>
    </div>
    {existing&&existing.at&&<div style={{fontSize:11,color:C.success}}>Registrado por {existing.byName} em {fmt(existing.at)}</div>}
    {submitted&&!canSave&&<div style={{padding:"6px 10px",background:C.danger+"11",borderRadius:7,fontSize:12,color:C.danger}}>
      {unanswered>0&&<div>{unanswered} pergunta{unanswered!==1?"s":""} sem resposta</div>}
      {missing>0&&<div>{missing} justificativa{missing!==1?"s":""} pendente{missing!==1?"s":""}</div>}
    </div>}
    {!readOnly&&<AttachmentsPanel
      attachments={atts}
      onAdd={a=>setAtts(p=>[...p,a])}
      onRemove={a=>setAtts(p=>p.filter(x=>x.id!==a.id))}
      isAdmin={true}
      readOnly={false}
      stage="avaliacao"
      currentUser={currentUser||{name:"--"}}
      C={C}/>}
    {readOnly&&atts.length>0&&<AttachmentsPanel
      attachments={atts}
      readOnly={true}
      stage="avaliacao"
      currentUser={{name:"--"}}
      C={C}/>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,paddingTop:4,flexWrap:"wrap"}}>
      <div style={{fontSize:10,color:C.muted}}>{!readOnly&&onSaveDraft&&"Voce pode salvar rascunho e continuar depois."}</div>
      <div style={{display:"flex",gap:8}}>
        <button style={Sg.btn()} onClick={onClose}>Fechar</button>
        {!readOnly&&onSaveDraft&&<button style={{...Sg.btn(),fontSize:12}} onClick={()=>onSaveDraft(dept,ans,obs,atts)}>Salvar Rascunho</button>}
        {!readOnly&&<button style={Sg.btn("primary")} onClick={()=>{setSubmitted(true);if(canSave)onSave(dept,ans,obs,atts);}}>Registrar Avaliacao</button>}
      </div>
    </div>
  </div>;
}

// ================================================================
// TRIAGE PANEL v10 — mandatory/optional + phase deadline auto-fill
// ================================================================
function TriagePanel({request,matrix,allUsers,currentUser,crits,phaseDl,onSave,C}){
  const Sg=mkSg(C);
  const existing=request.triage;
  const [crit,setCrit]=useState((existing&&existing.criticality)||"");
  const [fR,setFR]=useState((existing&&existing.flagReg)||false);
  const [fP,setFP]=useState((existing&&existing.flagProd)||false);
  const [just,setJust]=useState((existing&&existing.justification)||"");
  const [areas,setAreas]=useState((existing&&existing.assignedAreas)||[]);
  const [assigns,setAssigns]=useState((existing&&existing.assignments)||{});
  const [dls,setDls]=useState((existing&&existing.deadlines)||{});

  const evalDays=(phaseDl&&phaseDl.avaliacao_areas&&phaseDl.avaliacao_areas.days)||7;

  const getCell=(dept)=>{
    if(!crit||!matrix||!matrix[request.type]||!matrix[request.type][dept])return"";
    return matrix[request.type][dept][crit]||"";
  };

  const isMandatory=dept=>{
    if(getCell(dept)==="mandatory")return true;
    if(fR&&dept==="Assuntos Regulatorios")return true;
    if(fP&&["Pesquisa e Desenvolvimento (P&D)","Controle de Qualidade","Assistencia Tecnica (AT)","Comercial"].includes(dept))return true;
    return false;
  };

  const isOptional=dept=>getCell(dept)==="optional"&&!isMandatory(dept);

  useEffect(()=>{
    if(!crit||existing)return;
    const mand=ALL_DEPTS.filter(d=>isMandatory(d));
    setAreas(mand);
    const dl={};
    mand.forEach(d=>{dl[d]=addDays(todayStr(),evalDays);});
    setDls(dl);
  },[crit,fR,fP]);

  const toggleArea=d=>{
    if(isMandatory(d))return;
    setAreas(p=>{
      if(p.includes(d))return p.filter(x=>x!==d);
      setDls(prev=>({...prev,[d]:addDays(todayStr(),evalDays)}));
      return [...p,d];
    });
  };

  const evFor=dept=>allUsers.filter(u=>u.active&&(u.evalDepts||[]).length>0&&(u.evalDepts||[]).includes(dept));
  const allSet=areas.length>0&&areas.every(a=>assigns[a]&&dls[a]);
  const canSave=crit&&just.trim()&&areas.length>0&&allSet;

  // Read-only — editar quando status aberta ou avaliacao_inicial
  if(existing&&!["aberta","avaliacao_inicial"].includes(request.status)){
    const t=existing;const cr=crits.find(c=>c.v===t.criticality);
    // isMandatory usando dados salvos (nao o estado local que está vazio no read-only)
    const isMandSaved=dept=>{
      const cell=(matrix[request.type]&&matrix[request.type][dept]&&matrix[request.type][dept][t.criticality])||"";
      if(cell==="mandatory")return true;
      if(t.flagReg&&dept==="Assuntos Regulatorios")return true;
      if(t.flagProd&&["Pesquisa e Desenvolvimento (P&D)","Controle de Qualidade","Assistencia Tecnica (AT)","Comercial"].includes(dept))return true;
      return false;
    };
    return <div>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:9}}>
        <div style={{padding:"6px 11px",borderRadius:7,background:(cr&&cr.color||C.muted)+"22",border:"2px solid "+(cr&&cr.color||C.muted),textAlign:"center",flexShrink:0}}>
          <div style={{fontSize:16,fontWeight:800,color:cr&&cr.color}}>{t.criticality}</div>
          <div style={{fontSize:9,color:cr&&cr.color}}>{cr&&cr.label}</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,color:C.text,lineHeight:1.4}}>{t.justification}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:2}}>por {t.classifiedByName} {fmt(t.classifiedAt)}</div>
          <div style={{display:"flex",gap:5,marginTop:3,flexWrap:"wrap"}}>

          </div>
        </div>
      </div>
      {(t.assignedAreas||[]).map(d=>{
        const u=allUsers.find(x=>x.id===(t.assignments&&t.assignments[d]));
        const done=!!(request.evaluations&&request.evaluations[d]&&request.evaluations[d].at);
        const dl=t.deadlines&&t.deadlines[d];
        const orig=t.originalDeadlines&&t.originalDeadlines[d];
        const extended=orig&&dl&&dl!==orig;
        const mand=isMandSaved(d);
        return <div key={d} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 9px",background:C.surface,borderRadius:6,marginBottom:3,fontSize:11}}>
          <span style={{fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:3,flexShrink:0,
            color:mand?C.warning:C.accent,background:mand?C.warning+"22":C.accent+"22"}}>
            {mand?"OBR":"OPC"}
          </span>
          <span style={{flex:1,color:C.text}}>{d}</span>
          {u&&<><Av user={u} size={17}/><span style={{color:C.dim}}>{u.name}</span></>}
          <span style={{color:isOD(dl,done?"concluida":"")?"#EF4444":C.muted}}>{fmtD(dl)}{extended&&<span style={{fontSize:9,color:C.warning,marginLeft:3}}>ext.</span>}</span>
          {done?<Badge label="Feito" color={C.success}/>:<Badge label="Pend." color={C.muted}/>}
        </div>;
      })}
    </div>;
  }

// ================================================================
// SignatureModal — assinatura eletrônica com confirmação de senha
// ================================================================
function SignatureModal({open,onClose,onConfirm,title,description,confirmLabel,confirmStyle,saId,action,C,Sg}){
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [showPwd,setShowPwd]=useState(false);
  React.useEffect(()=>{if(open){setPwd("");setErr("");setLoading(false);}},[open]);
  if(!open)return null;
  const go=async()=>{
    if(!pwd.trim()){setErr("Senha obrigatória");return;}
    setLoading(true);setErr("");
    try{
      const token=sessionStorage.getItem('sgq_token');
      const res=await fetch('/api/auth?_route=verify',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({password:pwd,sa_id:saId||undefined,action:action||undefined,meaning:title||undefined})
      });
      const data=await res.json();
      if(!res.ok){setErr(data.error||'Senha incorreta');setLoading(false);return;}
      onConfirm(data.signature);
    }catch(e){setErr('Erro ao verificar senha');setLoading(false);}
  };
  return <Modal open={open} onClose={onClose} title={title||"Assinatura Eletronica"} width={420}>
    <div style={{padding:"10px 14px",background:C.accent+"0D",border:"1px solid "+C.accent+"33",borderRadius:8,marginBottom:14,fontSize:13,color:C.accent}}>
       Confirme sua identidade digitando sua senha para assinar eletronicamente.
    </div>
    {description&&<div style={{fontSize:13,color:C.muted,marginBottom:12,padding:"8px 12px",background:C.surface,borderRadius:8}}>{description}</div>}
    <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:6}}>Sua Senha *</label>
    <div style={{position:"relative",marginBottom:14}}>
      <input type={showPwd?"text":"password"} style={{...Sg.input(),paddingRight:40}} value={pwd} onChange={e=>{setPwd(e.target.value);setErr("");}} placeholder="Digite sua senha..." onKeyDown={e=>e.key==="Enter"&&go()} autoFocus/>
      <button type="button" onClick={()=>setShowPwd(s=>!s)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14,color:C.muted,padding:0}}>{showPwd?"●":"○"}</button>
    </div>
    {err&&<div style={{fontSize:12,color:C.danger,marginBottom:10,padding:"6px 10px",background:C.danger+"11",borderRadius:6}}>{err}</div>}
    <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
      <button style={Sg.btn()} onClick={onClose} disabled={loading}>Cancelar</button>
      <button style={{...Sg.btn(confirmStyle||"primary"),opacity:pwd.trim()&&!loading?1:.4}} disabled={!pwd.trim()||loading} onClick={go}>
        {loading?"Verificando...":(" "+(confirmLabel||"Assinar e Confirmar"))}
      </button>
    </div>
  </Modal>;
}

    const oldU=allUsers.find(u=>u.id===(localReq.triage&&localReq.triage.assignments&&localReq.triage.assignments[dept]));
    const newU=allUsers.find(u=>u.id===parseInt(newUserId));
    const r=mkLog({...localReq,triage:{...localReq.triage,assignments:{...localReq.triage.assignments,[dept]:parseInt(newUserId)}}},currentUser.name,"reatribuicao","Responsavel de avaliacao alterado","Area: "+dept+" | De: "+(oldU?oldU.name:"—")+" → Para: "+(newU?newU.name:"—")+" | Motivo: "+motive);
    setLocalReq({...r,evaluations:r.evaluations||{},actions:r.actions||[]});onUpdate(r);setReassignEval(null);setReassignEvalUser("");
  };

  // ── Reabrir acao ──
  const doReopenAc=(acId,motive)=>{
    const ac=(localReq.actions||[]).find(a=>a.id===acId);
    const actions=(localReq.actions||[]).map(a=>a.id===acId?{...a,status:"pendente",doneAt:null,doneNote:null,doneAtt:null}:a);
    let r={...localReq,actions,status:localReq.status==="concluida"?"execucao":localReq.status};
    r=mkLog(r,currentUser.name,"reabrir","Acao reaberta","ID: "+acId+" | Motivo: "+motive+(ac&&ac.doneNote?" | Conclusao anterior: "+ac.doneNote.slice(0,60):""));
    setLocalReq({...r,evaluations:r.evaluations||{},actions:r.actions||[]});onUpdate(r);setReopenAc(null);
  };

  // ── Reatribuir acao ──
  const doReassignAc=(acId,newUserId,motive,signature)=>{
    const ac=(localReq.actions||[]).find(a=>a.id===acId);
    const oldU=allUsers.find(u=>u.id===ac.responsible);
    const newU=allUsers.find(u=>u.id===parseInt(newUserId));
    const actions=(localReq.actions||[]).map(a=>a.id===acId?{...a,responsible:parseInt(newUserId),...(signature?{reassignSignature:signature}:{})}:a);
    const r=mkLog({...localReq,actions},currentUser.name,"reatribuicao","Responsavel de acao alterado","ID: "+acId+" | De: "+(oldU?oldU.name:"—")+" → Para: "+(newU?newU.name:"—")+" | Motivo: "+motive+(signature?" | Assinado eletronicamente":""));
    setLocalReq({...r,evaluations:r.evaluations||{},actions:r.actions||[]});onUpdate(r);setReassignAc(null);setReassignAcUser("");setReassignAcObs("");setSigModal(null);
  };

  const doReassignPlan=(newUserId,obs,signature)=>{
    const oldName=localReq.planResponsibleName||"—";
    const newU=allUsers.find(u=>parseInt(u.id)===parseInt(newUserId));
    const patch={planResponsible:parseInt(newUserId),planResponsibleName:newU?newU.name:""};
    if(signature)patch.reassignPlanSignature=signature;
    const r=mkLog({...localReq,...patch},currentUser.name,"reatribuicao","Responsavel do plano reatribuido","De: "+oldName+" → Para: "+(newU?newU.name:"—")+(obs?" | Justificativa: "+obs.slice(0,100):"")+(signature?" | Assinado eletronicamente":""));
    setLocalReq({...r,evaluations:r.evaluations||{},actions:r.actions||[]});onUpdate(r);setReassignPlan(false);setReassignPlanUser("");setReassignPlanObs("");setSigModal(null);
  };

  const concludeSA=(note,signature)=>{
    if(!note||!note.trim())return;
    let r={...localReq,status:"concluida",closedAt:new Date().toISOString(),verifyNote:note,verifiedBy:currentUser.id,verifiedByName:currentUser.name,verifiedAt:new Date().toISOString()};
    if(signature)r={...r,conclusionSignature:signature};
    r=mkLog(r,currentUser.name,"conclusao","SA encerrada e verificada pelo SGQ","Verificado por: "+currentUser.name+" | "+note.slice(0,100)+(signature?" | Assinado eletronicamente":""));setLocalReq({...r,evaluations:r.evaluations||{},actions:r.actions||[]});onUpdate(r);setSigModal(null);
  };

  const rejeitar=()=>{
    let r={...localReq,status:"aberta",triage:null,evaluations:{},actions:[],ap1By:null,ap1At:null,ap2By:null,ap2At:null,ap3By:null,ap3At:null,
      rejections:[...(localReq.rejections||[]),{by:currentUser.id,byName:currentUser.name,at:new Date().toISOString(),note:rejectNote,fromStatus:localReq.status}]};
    r=mkLog(r,currentUser.name,"rejeicao","SA rejeitada e devolvida para abertura","Rejeitado por: "+currentUser.name+" | Motivo: "+rejectNote);
    setLocalReq({...r,evaluations:r.evaluations||{},actions:r.actions||[]});onUpdate(r);setReject(false);setRN("");onBack();
  };

  const regredir=()=>{
    const prev={avaliacao:"aberta",revisao:"avaliacao",plano:"revisao",execucao:"plano"}[localReq.status];
    if(!prev)return;
    let r={...localReq,status:prev};
    r=mkLog(r,currentUser.name,"retorno","SA retornada para fase anterior","De: "+st.label+" → Para: "+(REQ_ST[prev]&&REQ_ST[prev].label)+" | Motivo: "+regressNote+" | Por: "+currentUser.name);
    setLocalReq({...r,evaluations:r.evaluations||{},actions:r.actions||[]});onUpdate(r);setRegress(false);setGN("");
  };

  const requestExtension=(newDate,reason)=>{
    if(!extTarget)return;
    const ext={id:"EXT-"+Date.now(),targetType:extTarget.type,targetKey:extTarget.key,targetLabel:extTarget.label,currentDate:extTarget.currentDate,newDate,reason,status:"pending",requestedBy:currentUser.id,requestedByName:currentUser.name,requestedAt:new Date().toISOString()};
    let r={...localReq,deadlineExtensions:[...(localReq.deadlineExtensions||[]),ext]};
    r=mkLog(r,currentUser.name,"extensao","Extensao solicitada",extTarget.label+" | Novo: "+fmtD(newDate));
    setLocalReq({...r,evaluations:r.evaluations||{},actions:r.actions||[]});onUpdate(r);setExtTarget(null);
  };

  const applyAdminDl=(newDate)=>{
    if(!adminDlTarget)return;
    let r={...localReq};
    if(adminDlTarget.type==="eval"){const dl={...localReq.triage.deadlines,[adminDlTarget.key]:newDate};r={...r,triage:{...r.triage,deadlines:dl}};}
    else{const actions=r.actions.map(a=>a.id===adminDlTarget.key?{...a,deadline:newDate}:a);r={...r,actions};}
    r=mkLog(r,currentUser.name,"extensao","Prazo alterado pelo admin",adminDlTarget.label+" | De: "+fmtD(adminDlTarget.currentDate)+" → Para: "+fmtD(newDate));
    setLocalReq({...r,evaluations:r.evaluations||{},actions:r.actions||[]});onUpdate(r);setAdminDlTarget(null);
  };

  const decideExt=(ext,approved,note)=>{
    const exts=(localReq.deadlineExtensions||[]).map(e=>{
      if(e.id!==ext.id)return e;
      return {...e,status:approved?"approved":"rejected",decidedBy:currentUser.id,decidedByName:currentUser.name,decidedAt:new Date().toISOString(),decisionNote:note||""};
    });
    let r={...localReq,deadlineExtensions:exts};
    if(approved){
      if(ext.targetType==="eval"){const dl={...localReq.triage.deadlines,[ext.targetKey]:ext.newDate};r={...r,triage:{...r.triage,deadlines:dl}};}
      else{const actions=r.actions.map(a=>a.id===ext.targetKey?{...a,deadline:ext.newDate}:a);r={...r,actions};}
      r=mkLog(r,currentUser.name,"extensao","Extensao aprovada",ext.targetLabel+" -> "+fmtD(ext.newDate));
    }else{r=mkLog(r,currentUser.name,"extensao","Extensao rejeitada",ext.targetLabel);}
    setLocalReq({...r,evaluations:r.evaluations||{},actions:r.actions||[]});onUpdate(r);
  };

  // ── Style atoms ──────────────────────────────────────────────────

  // Field card: like reference HTML .field
  const FieldCard=({label,value,wide,children})=><div style={{
    border:"1px solid "+C.border,borderRadius:12,padding:"12px 16px",
    background:C.card,minHeight:wide?undefined:72
  }}>
    <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.6,marginBottom:6}}>{label}</div>
    {value!==undefined&&<div style={{fontSize:15,fontWeight:600,color:C.text,lineHeight:1.35,wordBreak:"break-word",overflowWrap:"anywhere"}}>{value}</div>}
    {children}
  </div>;

  // Section card: like reference HTML .card.section
  const SecCard=({id,title,children,action})=>{
    const isOpen=openSec[id];
    return <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,marginBottom:18,overflow:"hidden",boxShadow:"0 2px 12px "+C.border+"66"}}>
      <div style={{padding:"18px 24px",borderBottom:isOpen?"1px solid "+C.border:"none",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span onClick={()=>togSec(id)} style={{fontSize:17,fontWeight:700,color:C.text,cursor:"pointer",userSelect:"none",flex:1}}>{title}</span>
        <div style={{display:"flex",alignItems:"center",gap:10}} onClick={e=>e.stopPropagation()}>
          {action&&action}
          <span onClick={()=>togSec(id)} style={{color:C.muted,fontSize:13,transition:"transform .15s",display:"inline-block",transform:isOpen?"rotate(180deg)":"none",cursor:"pointer"}}>▾</span>
        </div>
      </div>
      {isOpen&&<div style={{padding:"20px 24px"}}>{children}</div>}
    </div>;
  };

  // Pill badge
  const Pill=({label,color})=><span style={{display:"inline-flex",padding:"5px 12px",borderRadius:999,fontSize:12,fontWeight:700,background:color+"1A",color,border:"1px solid "+color+"44",whiteSpace:"nowrap"}}>{label}</span>;

  // Table th/td
  const Th=({children,w})=><th style={{padding:"12px 16px",background:C.surface,borderBottom:"1px solid "+C.border,fontSize:12,fontWeight:700,color:C.muted,textAlign:"left",whiteSpace:"nowrap",width:w}}>{children}</th>;
  const Td=({children,colSpan,muted,style:sx})=><td colSpan={colSpan} style={{padding:"12px 16px",borderBottom:"1px solid "+C.border+"55",fontSize:13,color:muted?C.muted:C.text,verticalAlign:"top",lineHeight:1.5,...sx}}>{children}</td>;

  const allAtts=[
    ...(localReq.attachments||[]).map(a=>({...a,_src:"Solicitacao",_by:localReq.createdByName})),
    ...aa.flatMap(d=>{const ev=localReq.evaluations&&localReq.evaluations[d];return(ev&&ev.attachments||[]).map(a=>({...a,_src:"Avaliacao - "+d,_by:ev.byName}));}),
    ...(localReq.actions||[]).filter(a=>a.doneAtt).map(a=>({...a.doneAtt,_src:"Acao "+a.id,_by:a.responsible})),
  ];

  return <div style={{padding:"20px 24px",maxWidth:1100,margin:"0 auto"}}>

    {/* ══ HEADER BAR ══ */}
    {(()=>{
      const toggleSub=k=>setSgqSub(p=>p===k?null:k);
      const phases=[
        {key:"aberta",           label:"Solicitacao Aberta"},
        {key:"avaliacao_inicial",label:"Avaliacao Inicial"},
        {key:"avaliacao_areas",  label:"Avaliacoes de Impacto"},
        {key:"montagem_plano",   label:"Plano de Acao"},
        {key:"execucao",         label:"Execucao"},
      ];
      const canReopen=(toPhase)=>{
        const order={aberta:0,avaliacao_inicial:1,avaliacao_areas:2,aprovacao_plano:2,montagem_plano:3,execucao:4,concluida:5};
        return order[localReq.status]>order[toPhase];
      };
      return <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <button style={{...Sg.btn(),padding:"4px 10px",fontSize:12}} onClick={onBack}>← Voltar</button>
        <span style={{fontSize:16,fontWeight:700,color:C.text,flex:1}}>Controle de Mudanças</span>
        {isAdmin&&<div style={{position:"relative"}} ref={sgqRef}>
          <button style={{...Sg.btn("primary"),fontSize:12,padding:"6px 14px",display:"flex",alignItems:"center",gap:6}} onClick={()=>setSgqOpen(o=>!o)}>
             Acoes SGQ <span style={{fontSize:10,opacity:.7}}>{sgqOpen?"▲":"▼"}</span>
          </button>
          {sgqOpen&&(()=>{
            // ── helpers de item e separador ──────────────────────────────────
            const MI=({onClick,color,icon,label})=>(
              <button style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"8px 14px",textAlign:"left",fontSize:13,color:color||C.text,fontFamily:"inherit",display:"flex",alignItems:"center",gap:8}}
                onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                onClick={()=>{setSgqOpen(false);setSgqSub(null);onClick();}}>
                <span>{icon}</span>{label}
              </button>
            );
            const Sep=()=><div style={{height:1,background:C.border,margin:"4px 0"}}/>;
            const SectionLabel=({label,color})=><div style={{padding:"6px 14px 3px",fontSize:10,fontWeight:700,color:color||C.muted,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>;
            // Colapsavel: cabeçalho clicável + lista de subitens recuados
            const Collapsible=({id,icon,label,count,color,items,renderItem})=>{
              if(!items||items.length===0)return null;
              const open=sgqSub===id;
              return <><button style={{width:"100%",background:open?C.surface:"transparent",border:"none",cursor:"pointer",padding:"7px 14px",textAlign:"left",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between"}}
                onClick={e=>{e.stopPropagation();toggleSub(id);}}>
                <span style={{fontSize:12,fontWeight:700,color:color||C.muted,textTransform:"uppercase",letterSpacing:.4,display:"flex",alignItems:"center",gap:6}}>{icon} {label} <span style={{fontWeight:400,opacity:.7}}>({count})</span></span>
                <span style={{fontSize:9,color:color||C.muted,opacity:.8}}>{open?"▲":"▼"}</span>
              </button>
              {open&&items.map(it=>renderItem(it))}</>;
            };
            // ── dados por status ─────────────────────────────────────────────
            const st=localReq.status;
            const phasesBack=phases.filter(p=>canReopen(p.key));
            const acsMov=(localReq.actions||[]).filter(a=>!["cancelada","concluida"].includes(a.status));
            const acsConc=(localReq.actions||[]).filter(a=>a.status==="concluida");
            const evsDone=aa.filter(d=>localReq.evaluations&&localReq.evaluations[d]&&localReq.evaluations[d].at);
            const evsPend=aa.filter(d=>!(localReq.evaluations&&localReq.evaluations[d]&&localReq.evaluations[d].at));
            const notFinal=!["concluida","cancelada"].includes(st);
            return <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:C.card,border:"1px solid "+C.border,borderRadius:10,boxShadow:"0 8px 32px #0006",zIndex:200,minWidth:270,maxHeight:"80vh",overflowY:"auto",padding:"6px 0"}}>

              {/* ── FLUXO PRINCIPAL — ação do próximo passo ── */}
              {(st==="aberta"||st==="avaliacao_inicial")&&localReq.triage&&hasPerm(currentUser,"sa.avaliacao_inicial")&&<>
                <SectionLabel label="Proximo passo" color={C.accent}/>
                <MI onClick={()=>setTriageDrawer(true)} color={C.accent} icon="→" label="Aprovar Avaliacao Inicial"/>
                <Sep/>
              </>}
              {st==="aprovacao_plano"&&<>
                <SectionLabel label="Proximo passo" color={C.accent}/>
                <MI onClick={()=>setShowAp2(true)} color={C.accent} icon="✓" label="Aprovar avaliacoes — iniciar plano"/>
                <Sep/>
              </>}
              {st==="montagem_plano"&&(isAdmin||parseInt(localReq.planResponsible)===parseInt(currentUser.id))&&<>
                <SectionLabel label="Proximo passo" color={C.success}/>
                <MI onClick={()=>setShowAp3(true)} color={C.success} icon="▶" label="Liberar para execucao"/>
                <Sep/>
              </>}

              {/* ── EDITAR TRIAGEM — só quando status ainda é aberta/avaliacao ── */}
              {localReq.triage&&["aberta","avaliacao_inicial","avaliacao_areas"].includes(st)&&isAdmin&&<>
                <MI onClick={()=>{setEditTriagem(true);setTriageDrawer(true);}} icon="✏" label="Editar Avaliacao Inicial"/>
                <Sep/>
              </>}

              {/* ── REATRIBUIR AVALIACAO — só faz sentido durante avaliacao/revisao ── */}
              {["avaliacao_areas","aprovacao_plano"].includes(st)&&<Collapsible
                id="reatrib_ev" icon="" label="Reatribuir avaliacao" count={evsPend.length} color={C.accent}
                items={evsPend}
                renderItem={dept=><button key={dept} style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"6px 14px 6px 26px",textAlign:"left",fontSize:12,color:C.text,fontFamily:"inherit",display:"flex",alignItems:"center",gap:7}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                  onClick={()=>{setSgqOpen(false);setSgqSub(null);setReassignEval({dept,currentUserId:localReq.triage&&localReq.triage.assignments&&localReq.triage.assignments[dept]});setReassignEvalUser("");}}>
                  <span style={{color:C.accent,fontSize:10}}>▸</span>{dept}
                </button>}
              />}

              {/* ── REABRIR AVALIACAO — só durante avaliacao/revisao se há concluídas ── */}
              {["avaliacao_areas","aprovacao_plano"].includes(st)&&<Collapsible
                id="reabrir_ev" icon="↺" label="Reabrir avaliacao" count={evsDone.length} color={C.warning}
                items={evsDone}
                renderItem={dept=><button key={dept} style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"6px 14px 6px 26px",textAlign:"left",fontSize:12,color:C.warning,fontFamily:"inherit",display:"flex",alignItems:"center",gap:7}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                  onClick={()=>{setSgqOpen(false);setSgqSub(null);setReopenEval(dept);}}>
                  <span style={{fontSize:10}}>▸</span>{dept}
                </button>}
              />}

              {/* ── REATRIBUIR ACAO — durante plano e execucao ── */}
              {["montagem_plano","execucao"].includes(st)&&<Collapsible
                id="reatrib_ac" icon="" label="Reatribuir acao" count={acsMov.length} color={C.accent}
                items={acsMov}
                renderItem={ac=><button key={ac.id} style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"6px 14px 6px 26px",textAlign:"left",fontSize:12,color:C.text,fontFamily:"inherit",display:"flex",alignItems:"center",gap:7}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                  onClick={()=>{setSgqOpen(false);setSgqSub(null);setReassignAc(ac);setReassignAcUser("");}}>
                  <span style={{color:C.accent,fontSize:10}}>▸</span>{ac.id} — {ac.desc.slice(0,28)}
                </button>}
              />}

              {/* ── REABRIR ACAO — só durante execucao, se há concluídas ── */}
              {st==="execucao"&&<Collapsible
                id="reabrir_ac" icon="↺" label="Reabrir acao" count={acsConc.length} color={C.warning}
                items={acsConc}
                renderItem={ac=><button key={ac.id} style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"6px 14px 6px 26px",textAlign:"left",fontSize:12,color:C.warning,fontFamily:"inherit",display:"flex",alignItems:"center",gap:7}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                  onClick={()=>{setSgqOpen(false);setSgqSub(null);setReopenAc(ac);}}>
                  <span style={{fontSize:10}}>▸</span>{ac.id} — {ac.desc.slice(0,28)}
                </button>}
              />}

              {/* ── REABRIR FASE — sempre disponível se há fases anteriores ── */}
              {phasesBack.length>0&&<>
                <Sep/>
                <Collapsible
                  id="reabrir_fase" icon="↩" label="Reabrir fase anterior" count={phasesBack.length} color={C.warning}
                  items={phasesBack}
                  renderItem={p=><button key={p.key} style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"6px 14px 6px 26px",textAlign:"left",fontSize:12,color:C.warning,fontFamily:"inherit",display:"flex",alignItems:"center",gap:7}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                    onClick={()=>{setSgqOpen(false);setSgqSub(null);setReopenPhase(p);}}>
                    <span style={{fontSize:10}}>▸</span>{p.label}
                  </button>}
                />
              </>}

              {/* ── RETORNAR / REJEITAR / CANCELAR — sempre (enquanto ativo) ── */}
              {notFinal&&<>
  <Sep/>
  {["avaliacao_inicial","avaliacao_areas","aprovacao_plano"].includes(st)&&<MI onClick={()=>{setSgqOpen(false);setAddAreaModal(true);}} color={C.accent} icon="+" label="Adicionar área avaliadora"/>}
  {prevSt&&st!=="aberta"&&<MI onClick={()=>setRegress(true)} color={C.warning} icon="←" label="Retornar fase anterior"/>}
  <MI onClick={()=>setReject(true)} color={C.danger} icon="×" label="Rejeitar SA"/>
  <MI onClick={()=>setShowCancel(true)} color={C.danger} icon="⊘" label="Cancelar SA"/>
</>}
              {/* ── REABRIR SA — para cancelada ou concluída ── */}
              {["cancelada","concluida"].includes(st)&&<>
  <Sep/>
  <MI onClick={()=>{setSgqOpen(false);setShowReopenSA(true);}} color={C.accent} icon="↺" label={st==="cancelada"?"Reabrir SA cancelada":"Reabrir SA concluída"}/>
</>}
            </div>;
          })()}
        </div>}
      </div>;
    })()}

    {/* ══ BANNER CANCELADA / CONCLUÍDA ══ */}
    {localReq.status==="cancelada"&&<div style={{marginBottom:14,padding:"12px 18px",borderRadius:10,background:"#FEF2F2",border:"1px solid #FECACA"}}>
      <div style={{fontSize:13,fontWeight:600,color:C.danger}}>SA Cancelada</div>
      {localReq.cancellationMotive&&<div style={{fontSize:12,color:"#991B1B",marginTop:2}}>Motivo: {localReq.cancellationMotive}</div>}
      {localReq.cancelledByName&&<div style={{fontSize:11,color:"#B91C1C",marginTop:1}}>Por: {localReq.cancelledByName} · {fmt(localReq.cancelledAt)}</div>}
    </div>}
    {localReq.status==="concluida"&&localReq.verifyNote&&<div style={{marginBottom:14,padding:"12px 18px",borderRadius:10,background:"#F0FDF4",border:"1px solid #86EFAC"}}>
      <div style={{fontSize:13,fontWeight:600,color:C.success}}>SA Concluída</div>
      <div style={{fontSize:12,color:"#166534",marginTop:2}}>{localReq.verifyNote}</div>
      {localReq.verifiedByName&&<div style={{fontSize:11,color:"#15803D",marginTop:1}}>Por: {localReq.verifiedByName} · {fmt(localReq.closedAt)}</div>}
    </div>}

    {/* ══ FOCUS BANNER — shown when coming from task/evaluation click ══ */}
    {(focusDept||focusAcId)&&<div style={{marginBottom:14,padding:"12px 18px",borderRadius:10,background:C.accent+"0D",border:"1px solid "+C.accent+"33",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
      <span style={{fontSize:14,color:C.accent}}>
        {focusDept&&"Avaliacao pendente: "+focusDept}
        {focusAcId&&"Acao pendente: "+focusAcId}
      </span>
      <span style={{fontSize:13,color:C.muted}}>— role para baixo para ver o formulario</span>
    </div>}

    {/* ══ STEPPER CARD ══ */}
    <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"24px 32px 20px",marginBottom:18,boxShadow:"0 2px 12px "+C.border+"66",overflowX:"auto"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,position:"relative",minWidth:440}}>
        {/* background line */}
        <div style={{position:"absolute",top:16,left:"10%",right:"10%",height:4,background:C.border,borderRadius:4,zIndex:0}}/>
        {[
          {l:"Solicitacao Aberta",   done:statusIdx>=1, active:statusIdx===0},
          {l:"Aval. Inicial",        done:statusIdx>=2, active:statusIdx===1},
          {l:"Avaliacoes de Impacto",done:statusIdx>=3&&doneEv===aa.length&&aa.length>0, active:statusIdx===2, waiting:statusIdx===2&&doneEv<aa.length, pend:aa.length>0&&doneEv<aa.length?aa.length-doneEv:0},
          {l:"Plano de Acao",        done:statusIdx>=4||allActsDone, active:statusIdx===3},
          {l:"Conclusao",            done:statusIdx===5, active:statusIdx===4||allActsDone},
        ].map((s,i)=>{
          const col=s.done?C.success:s.waiting?C.warning:s.active?(REQ_ST[localReq.status]&&REQ_ST[localReq.status].color||C.accent):C.border;
          return <div key={i} style={{position:"relative",zIndex:1,textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
            <div style={{width:36,height:36,borderRadius:"50%",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",background:s.done?col:s.active||s.waiting?C.surface:C.surface,border:"3px solid "+col,fontWeight:800,fontSize:13,color:s.done?"#fff":col,boxShadow:"0 0 0 4px "+C.card}}>
              {s.done?"✓":i+1}
            </div>
            <span style={{fontSize:12,color:s.done?C.success:s.active||s.waiting?col:C.muted,fontWeight:s.done||s.active?700:400,lineHeight:1.3}}>{s.l}</span>
            {s.pend>0&&<Pill label={s.pend+" pendente"+(s.pend!==1?"s":"")} color={C.warning}/>}
          </div>;
        })}
      </div>

    </div>

    {/* ══ BANNERS CONTEXTUAIS ══ */}

    {/* ══════════════════════════════════════════════════════════
        1. DADOS DA SOLICITACAO
    ══════════════════════════════════════════════════════════ */}
    <SecCard id="solicitacao" title="Dados da Solicitacao" action={["aberta","avaliacao_inicial"].includes(localReq.status)&&(currentUser.id===localReq.createdBy||isAdmin)?<button onClick={openEditDados} style={{fontSize:11,padding:"4px 12px",borderRadius:6,border:"1px solid "+C.border,background:"none",color:C.accent,cursor:"pointer",fontFamily:"inherit"}}>✏ Editar Dados</button>:null}>
      {/* Modal de edição dos dados da solicitação */}
      <EditDadosModal open={editDados} onClose={()=>setEditDados(false)} req={localReq} onSave={(form)=>saveDados(form)} C={C} Sg={Sg}/>
      {/* Grid 3 cols: numero, data, solicitante */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:14}}>
        <FieldCard label="Numero do Controle" value={localReq.id}/>
        <FieldCard label="Data de Abertura" value={fmtD(localReq.createdAt&&localReq.createdAt.slice(0,10))}/>
        <FieldCard label="Solicitante" value={localReq.createdByName}/>
      </div>
      {/* Grid 3 cols: tipo, area solicitante, status */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:14}}>
        <FieldCard label="Tipo de Mudanca" value={localReq.type}/>
        <FieldCard label="Area Solicitante" value={localReq.area||"—"}/>
        <FieldCard label="Status Atual"><Badge label={st.label} color={st.color||C.muted}/></FieldCard>
      </div>
      {/* Titulo wide */}
      <div style={{marginBottom:14}}>
        <FieldCard label="Titulo da Mudanca" value={localReq.title} wide/>
      </div>
      {/* Descricao */}
      <div style={{marginBottom:14}}>
        <FieldCard label="Descricao da Mudanca" wide>
          <div style={{fontSize:14,color:C.text,lineHeight:1.6,wordBreak:"break-word",overflowWrap:"anywhere",maxHeight:480,overflowY:"auto",paddingRight:4}}>{localReq.description}</div>
        </FieldCard>
      </div>
      {/* Justificativa */}
      {localReq.justification&&<div style={{marginBottom:14}}>
        <FieldCard label="Justificativa / Motivo" wide>
          <div style={{fontSize:14,color:C.text,lineHeight:1.6}}>{localReq.justification}</div>
        </FieldCard>
      </div>}
      {/* Rejeicoes */}
      {(localReq.rejections||[]).length>0&&<div style={{marginBottom:14}}>
        <FieldCard label="Rejeicoes Anteriores" wide>
          {localReq.rejections.map((r,i)=><div key={i} style={{fontSize:13,padding:"7px 12px",background:C.danger+"08",borderRadius:7,marginBottom:4,borderLeft:"3px solid "+C.danger+"55"}}>
            <strong style={{color:C.danger}}>{r.byName} — {fmt(r.at)}:</strong> <span style={{color:C.muted}}>{r.note}</span>
          </div>)}
        </FieldCard>
      </div>}
      {/* Anexos */}
      <FieldCard label="Anexos da Solicitacao" wide>
        <AttachmentsPanel attachments={localReq.attachments||[]} onAdd={addAttachment} readOnly={!["aberta","avaliacao_inicial","avaliacao_areas"].includes(localReq.status)} stage={localReq.status} currentUser={currentUser} C={C}/>
        {!["aberta","avaliacao_inicial","avaliacao_areas"].includes(localReq.status)&&<div style={{fontSize:11,color:C.muted,marginTop:4,fontStyle:"italic"}}>Fase encerrada — use a secao "Anexos do Registro" abaixo para gerenciar.</div>}
      </FieldCard>
    </SecCard>

    {/* ══════════════════════════════════════════════════════════
        2. AVALIACAO INICIAL
    ══════════════════════════════════════════════════════════ */}
    <SecCard id="triagem" title="Avaliacao Inicial da Mudanca">
      {!localReq.triage||editTriagem
        ?isAdmin&&!["cancelada","concluida"].includes(localReq.status)
          ?<div>
            <button style={{...Sg.btn("primary"),fontSize:13,padding:"8px 18px"}} onClick={()=>setTriageDrawer(true)}>
              {editTriagem?"Editar Avaliacao Inicial":"Iniciar Avaliacao Inicial →"}
            </button>
          </div>
          :["cancelada","concluida"].includes(localReq.status)
            ?<div style={{fontSize:13,color:C.muted,padding:"8px 0"}}>—</div>
            :<div style={{fontSize:13,color:C.muted,padding:"8px 0"}}>Aguardando triagem pelo SGQ.</div>
        :<div>
          {/* Grid 3: nivel, avaliado por, data */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:14}}>
            <FieldCard label="Nivel Selecionado">
              {cr&&<span style={{fontSize:15,fontWeight:700,color:cr.color}}>{cr.v} — {cr.label}</span>}
              {cr&&cr.desc&&<div style={{fontSize:11,color:C.muted,marginTop:4,lineHeight:1.5}}>{cr.desc}</div>}
            </FieldCard>
            <FieldCard label="Avaliado por" value={localReq.ap1ByName}/>
            <FieldCard label="Data da Avaliacao" value={fmt(localReq.ap1At)}/>
          </div>
          {/* Grid 2: justificativa + areas */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <FieldCard label="Motivo da Classificacao" wide>
              <div style={{fontSize:14,color:C.text,lineHeight:1.6}}>{localReq.triage.justification||"—"}</div>
              <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>

              </div>

            </FieldCard>
            <FieldCard label="Areas Definidas para Avaliacao de Impacto" wide>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:4}}>
                {aa.map(d=>{
                  const done=!!(localReq.evaluations&&localReq.evaluations[d]&&localReq.evaluations[d].at);
                  const mand=isMandSaved(d);
                  return <span key={d} style={{fontSize:13,padding:"5px 12px",borderRadius:8,border:"1px solid "+(done?C.success+"55":C.border),background:done?C.success+"0D":C.surface,color:done?C.success:C.text,display:"inline-flex",alignItems:"center",gap:5}}>
                    {done&&<span style={{color:C.success}}>✓</span>}{d}
                    {mand&&<span style={{fontSize:10,color:C.warning,opacity:.8}}>obr</span>}
                  </span>;
                })}
              </div>
            </FieldCard>
          </div>
        </div>}
    </SecCard>

    {/* ══════════════════════════════════════════════════════════
        3. AVALIACOES DE IMPACTO
    ══════════════════════════════════════════════════════════ */}
    <SecCard id="avaliacoes" title={"Avaliacoes de Impacto"+(aa.length>0?" ("+doneEv+"/"+aa.length+")":"")}>
      {!localReq.triage
        ?<div style={{fontSize:14,color:C.muted}}>Aguardando triagem.</div>
        :<div style={{border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr>
                <Th>Area</Th>
                <Th>Responsavel</Th>
                <Th>Prazo</Th>
                <Th>Tipo</Th>
                <Th>Status</Th>
                <Th w="110px">Detalhe</Th>
              </tr>
            </thead>
            <tbody>
              {aa.map((dept,di)=>{
                const ev=localReq.evaluations&&localReq.evaluations[dept];
                const done=!!(ev&&ev.at);const draft=!!(ev&&!ev.at&&ev.draft);
                const u=getU(localReq.triage&&localReq.triage.assignments&&localReq.triage.assignments[dept]);
                const dl=localReq.triage&&localReq.triage.deadlines&&localReq.triage.deadlines[dept];
                const isMe=u&&u.id===currentUser.id;
                const canAct=(isMe||isAdmin)&&["avaliacao_areas","aprovacao_plano"].includes(localReq.status);
                const isExp=!!evalOpen[dept];
                const ov=isOD(dl,done?"concluida":"");
                const stColor=done?C.success:draft?C.accent:ov?C.danger:C.muted;
                const stLabel=done?"Concluida":draft?"Rascunho":ov?"Atrasada":"Pendente";
                const mand=isMandSaved(dept);
                const concObs=done&&ev&&(ev.obs||(ev.answers&&ev.answers.filter(a=>a.a==="S").length+" sim / "+ev.answers.filter(a=>a.a==="N").length+" nao"))||"—";
                const evalRowId="eval-row-"+dept.replace(/[\s\/()&]/g,"-");
                return <React.Fragment key={dept}>
                  <tr id={evalRowId} style={{background:isExp?C.accent+"08":di%2!==0?C.surface+"66":"transparent"}}>
                    <Td><span style={{fontWeight:600}}>{dept}</span></Td>
                    <Td muted>{u?u.name:"—"}</Td>
                    <Td><span style={{color:ov&&!done?C.danger:C.muted,fontSize:13}}>{fmtD(dl)}</span></Td>
                    <Td><Pill label={mand?"Obrigatoria":"Opcional"} color={mand?C.success:C.accent}/></Td>
                    <Td><Pill label={stLabel} color={stColor}/></Td>
                    <Td>
                      {(done||canAct)
                        ?<button style={{...Sg.btn(done&&!canAct?"":"primary"),fontSize:12,padding:"4px 12px"}} onClick={()=>openEvalDrawer(dept)}>
                          {done?"Ver respostas":draft?"Continuar":"Avaliar"}
                        </button>
                        :<span style={{fontSize:12,color:C.muted}}>—</span>}
                    </Td>
                  </tr>

                </React.Fragment>;
              })}
            </tbody>
          </table>
        </div>}
    </SecCard>

    {/* ══════════════════════════════════════════════════════════
        4. PLANO DE ACAO
    ══════════════════════════════════════════════════════════ */}
    <SecCard id="plano" title={"Plano de Acao"+(localReq.actions&&localReq.actions.length?" ("+localReq.actions.length+" acoes)":"")}>
      {(()=>{
        const inPlano=localReq.status==="montagem_plano";
        const canSeePlano=isAdmin||parseInt(localReq.planResponsible)===parseInt(currentUser.id);
        if(!["montagem_plano","execucao","concluida"].includes(localReq.status))
          return <div style={{fontSize:14,color:C.muted}}>Disponivel apos aprovacao das avaliacoes de impacto.</div>;
        if(inPlano&&!canSeePlano)
          return <div style={{fontSize:14,color:C.muted,padding:"8px 0"}}>O plano esta sendo montado. Voce tera acesso apos a liberacao para execucao.</div>;
        return <div>
          <div style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap",marginBottom:canPlan&&localReq.status==="montagem_plano"?12:0}}>
              <div style={{border:"1px solid "+C.border,borderRadius:10,padding:"10px 16px",background:C.card,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>Responsavel pelo Plano</div>
                  <div style={{fontSize:13,fontWeight:600,color:localReq.planResponsibleName?C.text:C.muted}}>{localReq.planResponsibleName||"Nao definido"}</div>
                </div>
                {isAdmin&&["montagem_plano","execucao"].includes(localReq.status)&&<button style={{...Sg.btn(),fontSize:11,padding:"4px 10px"}} onClick={()=>{setReassignPlanUser(localReq.planResponsible||"");setReassignPlan(true);}}>Trocar</button>}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {canPlan&&localReq.status==="montagem_plano"&&<button style={Sg.btn("primary")} onClick={()=>setAddAc(true)}>+ Nova Acao</button>}
                {isAdmin&&localReq.status==="execucao"&&<button style={Sg.btn("primary")} onClick={()=>setAddAcExec(true)}>+ Acrescentar Acao</button>}
              </div>
            </div>
            {canPlan&&localReq.status==="montagem_plano"&&<div style={{padding:"12px 16px",background:C.success+"0D",border:"1px solid "+C.success+"33",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.success}}>Plano em montagem</div>
                <div style={{fontSize:12,color:C.muted,marginTop:2}}>{(localReq.actions||[]).length} acao{(localReq.actions||[]).length!==1?"es":""} adicionada{(localReq.actions||[]).length!==1?"s":""}. Quando o plano estiver pronto, libere para execucao.</div>
              </div>
              <button style={{...Sg.btn("success"),fontSize:13,padding:"8px 18px"}} onClick={()=>setShowAp3(true)}>▶ Liberar para Execucao</button>
            </div>}
          </div>
          {(localReq.actions||[]).length===0
            ?<div style={{fontSize:14,color:C.muted}}>Nenhuma acao cadastrada ainda.</div>
            :<div style={{border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr>
                    <Th w="70px">Acao</Th>
                    <Th>Descricao</Th>
                    <Th>Responsavel</Th>
                    <Th>Prazo</Th>
                    <Th>Status</Th>
                    <Th>Observacao</Th>
                    <Th>Nota de Conclusao</Th>
                    <Th>Concluida por</Th>
                    <Th>Data conclusao</Th>
                    <Th>Anexo</Th>
                  </tr>
                </thead>
                <tbody>
                  {(localReq.actions||[]).map((ac,ai)=>{
                    const ov=isOD(ac.deadline,ac.status);
                    const acColor=ac.status==="concluida"?C.success:ac.status==="cancelada"?C.muted:ov?C.danger:C.warning;
                    const resp=getU(ac.responsible);
                    const isMine=parseInt(ac.responsible)===parseInt(currentUser.id);
                    const canAct=(isMine||isAdmin)&&localReq.status==="execucao"&&!["concluida","cancelada"].includes(ac.status);
                    const isExp=expandedAc[ac.id];
                    const hasExpContent=canAct||((canPlan||isAdmin)&&!["concluida","cancelada"].includes(ac.status));
                    return <React.Fragment key={ac.id}>
                      <tr id={"ac-row-"+ac.id} style={{cursor:hasExpContent?"pointer":"default",background:isExp?C.accent+"08":ai%2!==0?C.surface+"66":"transparent"}} onClick={()=>hasExpContent&&openAcDrawer(ac)}>
                        <Td><span style={{fontWeight:700,color:C.accent}}>{ac.id}</span></Td>
                        <Td>{ac.desc}</Td>
                        <Td muted>{resp?resp.name:"—"}</Td>
                        <Td><span style={{color:ov&&ac.status!=="concluida"?C.danger:C.muted,fontSize:13}}>{fmtD(ac.deadline)}</span></Td>
                        <Td><Pill label={ac.status==="concluida"?"Concluida":ac.status==="cancelada"?"Cancelada":ov?"Atrasada":"Pendente"} color={acColor}/></Td>
                        <Td muted>{ac.obs||"—"}</Td>
                        <Td muted>{ac.doneNote||"—"}</Td>
                        <Td muted>{ac.status==="concluida"&&(ac.doneByName||(resp?resp.name:null))||"—"}</Td>
                        <Td muted>{ac.doneAt?fmtD(ac.doneAt.slice(0,10)):"—"}</Td>
                        <Td muted>{ac.doneAtt?ac.doneAtt.name:"—"}</Td>
                      </tr>

                    </React.Fragment>;
                  })}
                </tbody>
              </table>
            </div>}
        </div>;
      })()}
    </SecCard>

    {/* ══════════════════════════════════════════════════════════
        5. CONCLUSAO
    ══════════════════════════════════════════════════════════ */}
    <SecCard id="conclusao" title="Conclusao da Mudanca">
      {localReq.status==="concluida"
        ?<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:14}}>
            <FieldCard label="Responsavel pela Conclusao" value={localReq.verifiedByName}/>
            <FieldCard label="Data da Conclusao" value={fmt(localReq.closedAt)}/>
            <FieldCard label="Status Final"><Pill label="Mudanca encerrada" color={C.success}/></FieldCard>
          </div>
          <FieldCard label="Avaliacao Final" wide>
            <div style={{fontSize:14,color:C.text,lineHeight:1.6}}>{localReq.verifyNote||"—"}</div>
          </FieldCard>
        </div>
        :localReq.status==="cancelada"
          ?<div style={{fontSize:13,color:C.muted}}>SA cancelada.</div>
          :isAdmin&&allActsDone
            ?<VerifyForm onConfirm={note=>setSigModal({action:(sig)=>concludeSA(note,sig),title:"Assinar - Encerramento da SA",desc:"SA: "+localReq.id+" - "+localReq.title,label:"Assinar e Encerrar",style:"success",saId:localReq.id,sigAction:"conclusao"})} C={C} Sg={Sg}/>
            :<div style={{fontSize:13,color:C.muted}}>{allActsDone?"Aguardando verificacao pelo SGQ/Admin.":"Disponivel quando todas as acoes estiverem concluidas."}</div>}
    </SecCard>

    {/* ══════════════════════════════════════════════════════════
        6. ANEXOS DO REGISTRO
    ══════════════════════════════════════════════════════════ */}
    <SecCard id="documentos" title={"Anexos do Registro"+(allAtts.length?" ("+allAtts.length+")":"")}>
      {/* Admin pode adicionar anexo em qualquer fase por aqui */}
      {isAdmin&&<div style={{marginBottom:12}}>
        <AttachmentsPanel attachments={[]} onAdd={addAttachment} onRemove={null} isAdmin={isAdmin} readOnly={false} stage={localReq.status} currentUser={currentUser} C={C} refId={localReq.id} refType="request"/>
      </div>}
      {allAtts.length===0
        ?<div style={{fontSize:14,color:C.muted}}>Nenhum documento anexado.</div>
        :<div style={{border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr><Th>Documento</Th><Th>Origem</Th><Th>Incluido por</Th><Th>Data</Th><Th w={isAdmin?"140px":"90px"}></Th></tr></thead>
            <tbody>
              {allAtts.map((a,i)=>(
                <tr key={a.id||i} style={{background:i%2!==0?C.surface+"66":"transparent"}}>
                  <Td><span style={{fontWeight:600}}> {a.name}</span></Td>
                  <Td muted>{a._src||"—"}</Td>
                  <Td muted>{a._by||"—"}</Td>
