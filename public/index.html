// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [loggedIn, setLoggedIn] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('dashboard');
  const [selId, setSel] = useState(null);
  const [records, setRecords] = useState([]);
  const [users, setUsers] = useState([]);
  const [roles, setRoles] = useState([]);
  const [matrix, setMatrix] = useState(null);
  const [deptQ, setDeptQ] = useState(null);
  const [sysLog, setSysLog] = useState([]);

  useEffect(() => {
    const token = sessionStorage.getItem('sgq_token');
    const userStr = sessionStorage.getItem('sgq_user');
    if (token && userStr) { try { setLoggedIn(JSON.parse(userStr)); } catch {} }
    setLoading(false);
  }, []);

  useEffect(() => { if (loggedIn) loadAll(); }, [loggedIn]);

  const loadAll = async () => {
    const [recs, us, rls] = await Promise.all([
      apiGet('/api/records?module=sa').catch(()=>null),
      apiGet('/api/users').catch(()=>null),
      apiGet('/api/users?_route=roles').catch(()=>null),
    ]);
    if (recs) setRecords(recs);
    if (us) setUsers(us);
    if (rls) setRoles(rls);
    try { const mx = await apiGet('/api/config/matrix'); if (mx) setMatrix(mx); } catch {}
    try { const dq = await apiGet('/api/config/deptq'); if (dq) setDeptQ(dq); } catch {}
    try { const sl = await apiGet('/api/config/syslog'); if (sl && Array.isArray(sl)) setSysLog(sl); } catch {}
  };

  const login = async (email, password) => {
    const data = await apiPost('/api/auth?_route=login', { email, password });
    if (!data) return 'Erro de conexão';
    sessionStorage.setItem('sgq_token', data.token);
    sessionStorage.setItem('sgq_user', JSON.stringify(data.user));
    setLoggedIn(data.user);
    return null;
  };

  const logout = () => {
    sessionStorage.removeItem('sgq_token');
    sessionStorage.removeItem('sgq_user');
    setLoggedIn(null); setView('dashboard');
  };

  const addLog = async (type, event, detail) => {
    const e = { at: new Date().toISOString(), by: loggedIn.name, type, event, detail: detail||'' };
    setSysLog(p => [e, ...p]);
    try { await apiPut('/api/config?key=syslog', e); } catch {}
  };

  const updateRecord = async (rec) => {
    const exists = records.find(r => r.id === rec.id);
    if (exists) await apiPut(`/api/records?module=sa&id=${encodeURIComponent(rec.id)}`, rec);
    else await apiPost('/api/records?module=sa', rec);
    setRecords(p => exists ? p.map(r => r.id === rec.id ? rec : r) : [rec, ...p]);
  };

  const createRecord = async (rec) => {
    const data = await apiPost('/api/records?module=sa', rec);
    const id = data?.code || rec.id;
    const created = { ...rec, id };
    setRecords(p => [created, ...p]);
    addLog('criacao', 'SA criada', `${id} — ${rec.title}`);
    nav('detail', id);
  };

  const nav = (v, id) => { setView(v); if (id !== undefined) setSel(id); };
  const isAdmin = loggedIn && ['admin','sgq'].includes(loggedIn.role);
  const isSuperAdmin = loggedIn && loggedIn.role === 'admin';
  const selected = records.find(r => r.id === selId);

  const myPendAcs = loggedIn ? records.flatMap(r=>(r.actions||[]).filter(a=>a.responsible===loggedIn.id&&a.status!=='concluida'&&a.status!=='cancelada')).length : 0;
  const myPendEvals = loggedIn ? records.filter(r=>r.status==='avaliacao'&&(r.triage?.assignedAreas||[]).some(d=>r.triage?.assignments?.[d]===loggedIn.id&&!r.evaluations?.[d]?.at)).length : 0;

  const navItems = [
    { id:'dashboard', label:'Início', icon:'🏠', badge:0 },
    { id:'changes', label:'Controles SA', icon:'📋', badge:0 },
    { id:'acoes', label:'Tarefas', icon:'✅', badge:(myPendAcs+myPendEvals)||0 },
    { id:'indicators', label:'Indicadores', icon:'📊', badge:0 },
    ...(isAdmin ? [
      { divider:true, id:'adm-div', label:'Administração' },
      { id:'users', label:'Usuários', icon:'👥', badge:0 },
      { id:'log', label:'Auditoria', icon:'🔍', badge:0 },
    ] : []),
  ];

  if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:C.muted,fontSize:14}}>Carregando...</div>;
  if (!loggedIn) return <LoginScreen onLogin={login}/>;

  return <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
    <Sidebar view={view} setView={v=>nav(v)} loggedIn={loggedIn} logout={logout} navItems={navItems}/>
    <div style={{marginLeft:220,flex:1,minHeight:'100vh',overflowY:'auto'}}>
      {view==='dashboard'  && <Dashboard records={records} currentUser={loggedIn} allUsers={users} onNav={nav}/>}
      {view==='changes'    && <SAList records={records} currentUser={loggedIn} allUsers={users} onNav={nav} onNew={()=>nav('new')}/>}
      {view==='new'        && <NewSAForm currentUser={loggedIn} matrix={matrix} onSave={createRecord} onCancel={()=>nav('changes')}/>}
      {view==='detail' && selId && <SADetail record={selected || {id:selId,title:'Carregando...',status:'aberta',log:[],actions:[],evaluations:{}}} allUsers={users} matrix={matrix} deptQuestions={deptQ} currentUser={loggedIn} onBack={()=>nav('changes')} onUpdate={async (changes)=>{ await updateRecord({ ...(records.find(r=>r.id===selId)||{}), ...changes, id:selId }); }}/>}
      {view==='acoes'      && <ActionsPage records={records} currentUser={loggedIn} allUsers={users} onNav={nav}/>}
      {view==='indicators' && <Indicators records={records}/>}
      {view==='users'      && isAdmin && <UserManager users={users} roles={roles} currentUser={loggedIn} isSuperAdmin={isSuperAdmin} onSaveUser={updateRecord} onRefresh={loadAll}/>}
      {view==='log'        && isAdmin && <AuditLog sysLog={sysLog} records={records}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
