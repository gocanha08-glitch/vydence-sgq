                  <Td muted>{fmtD(a.addedAt&&a.addedAt.slice(0,10))}</Td>
                  <Td><div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                    {a.hasFile&&<button style={{...Sg.btn("primary"),fontSize:12,padding:"3px 10px"}} onClick={async()=>{if(!a.r2key){alert("Arquivo local nao disponivel.");return;}try{const r=await apiGet('/api/uploads?key='+encodeURIComponent(a.r2key));window.open(r.downloadUrl,'_blank');}catch(e){alert("Erro: "+e.message);}}}>Download</button>}
                    {isAdmin&&<button style={{...Sg.btn("danger"),fontSize:12,padding:"3px 8px"}} title="Remover anexo" onClick={()=>{if(window.confirm('Remover "'+a.name+'"? Ficara registrado no historico.'))removeAttachment(a);}}>×</button>}
                  </div></Td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>}
    </SecCard>

    {/* ══════════════════════════════════════════════════════════
        7. HISTORICO
    ══════════════════════════════════════════════════════════ */}
    <SecCard id="historico" title={"Historico da Mudanca"}>
      <div style={{border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr><Th w="160px">Data / Hora</Th><Th w="140px">Por</Th><Th w="100px">Tipo</Th><Th>Evento</Th><Th>Detalhe</Th></tr></thead>
          <tbody>
            {(localReq.log||[]).slice().reverse().map((e,i)=>{
              const tc={avaliacao_inicial:C.warning,avaliacao:C.accent,aprovacao:C.success,rejeicao:C.danger,retorno:C.accent,sistema:C.accent,criacao:C.success,anexo:C.warning,extensao:C.warning,plano:C.accent,execucao:C.success,conclusao:C.success}[e.type]||C.muted;
              return <tr key={i} style={{background:i%2!==0?C.surface+"66":"transparent"}}>
                <Td muted><span style={{fontSize:13}}>{fmt(e.at)}</span></Td>
                <Td muted><span style={{fontSize:13}}>{e.by}</span></Td>
                <Td><span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:4,background:tc+"18",color:tc}}>{e.type}</span></Td>
                <Td><span style={{fontSize:13}}>{e.event}</span></Td>
                <Td muted><span style={{fontSize:13}}>{e.detail||"—"}</span></Td>
              </tr>;
            })}
            {!(localReq.log||[]).length&&<tr><td colSpan={5} style={{padding:"20px",color:C.muted,fontSize:14,textAlign:"center"}}>Nenhum evento registrado.</td></tr>}
          </tbody>
        </table>
      </div>
    </SecCard>

    {/* ══ MODALS ══ */}
    <Modal open={showAddAc} onClose={()=>setAddAc(false)} title="Nova Acao" width={460}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={Sg.lbl}>Descricao *</label><textarea style={{...Sg.input(),minHeight:52,resize:"vertical"}} value={nAc.desc} onChange={e=>setNAc(n=>({...n,desc:e.target.value}))}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={Sg.lbl}>Responsavel *</label><Sel value={nAc.responsible} onChange={v=>setNAc(n=>({...n,responsible:v}))} options={allUsers.filter(u=>u.active).map(u=>({value:u.id,label:u.name}))} placeholder="Selecione..." C={C}/></div>
          <div><label style={Sg.lbl}>Prazo *</label><input type="date" style={Sg.input()} value={nAc.deadline} min={todayStr()} onChange={e=>setNAc(n=>({...n,deadline:e.target.value}))}/></div>
        </div>
        <div><label style={Sg.lbl}>Obs</label><input style={Sg.input()} value={nAc.obs} onChange={e=>setNAc(n=>({...n,obs:e.target.value}))}/></div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button style={Sg.btn()} onClick={()=>setAddAc(false)}>Cancelar</button>
          <button style={{...Sg.btn("primary"),opacity:nAc.desc&&nAc.responsible&&nAc.deadline?1:.4}} disabled={!nAc.desc||!nAc.responsible||!nAc.deadline} onClick={addAction}>Adicionar</button>
        </div>
      </div>
    </Modal>
    <Modal open={!!editAc} onClose={()=>setEditAc(null)} title="Editar Acao" width={420}>
      {editAc&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={Sg.lbl}>Descricao</label><textarea style={{...Sg.input(),minHeight:46,resize:"vertical"}} defaultValue={editAc.desc} onChange={e=>setEditAc(a=>({...a,desc:e.target.value}))}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={Sg.lbl}>Prazo</label><input type="date" style={Sg.input()} defaultValue={editAc.deadline} onChange={e=>setEditAc(a=>({...a,deadline:e.target.value}))}/></div>
          <div><label style={Sg.lbl}>Status</label><Sel value={editAc.status} onChange={v=>setEditAc(a=>({...a,status:v}))} options={[{value:"pendente",label:"Pendente"},{value:"andamento",label:"Em andamento"},{value:"concluida",label:"Concluida"},{value:"cancelada",label:"Cancelada"}]} C={C}/></div>
        </div>
        <div><label style={Sg.lbl}>Obs</label><input style={Sg.input()} defaultValue={editAc.obs||""} onChange={e=>setEditAc(a=>({...a,obs:e.target.value}))}/></div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button style={Sg.btn()} onClick={()=>setEditAc(null)}>Cancelar</button>
          <button style={Sg.btn("primary")} onClick={()=>{updAc(editAc.id,editAc,"Acao editada",editAc.desc);setEditAc(null);}}>Salvar</button>
        </div>
      </div>}
    </Modal>
    <Modal open={showReject} onClose={()=>setReject(false)} title="Rejeitar SA" width={400}>
      <div style={{padding:"8px 12px",background:C.danger+"0D",borderRadius:8,marginBottom:12,fontSize:13,color:C.danger}}>SA sera devolvida ao inicio. Triagem, avaliacoes e acoes serao resetadas.</div>
      <label style={Sg.lbl}>Motivo *</label>
      <textarea style={{...Sg.input(),minHeight:60,resize:"vertical",marginBottom:14}} value={rejectNote} onChange={e=>setRN(e.target.value)}/>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <button style={Sg.btn()} onClick={()=>setReject(false)}>Cancelar</button>
        <button style={{...Sg.btn("danger"),opacity:rejectNote.trim()?1:.4}} disabled={!rejectNote.trim()} onClick={rejeitar}>Confirmar Rejeicao</button>
      </div>
    </Modal>
    <Modal open={showRegress} onClose={()=>setRegress(false)} title="Retornar a Fase Anterior" width={400}>
      <div style={{fontSize:13,color:C.muted,marginBottom:10}}><Badge label={st.label} color={st.color||C.muted}/> <span style={{marginInline:6}}>→</span> <strong>{REQ_ST[prevSt]&&REQ_ST[prevSt].label||"--"}</strong></div>
      <label style={Sg.lbl}>Motivo *</label>
      <textarea style={{...Sg.input(),minHeight:52,resize:"vertical",marginBottom:14}} value={regressNote} onChange={e=>setGN(e.target.value)}/>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <button style={Sg.btn()} onClick={()=>setRegress(false)}>Cancelar</button>
        <button style={{...Sg.btn("warning"),opacity:regressNote.trim()?1:.4}} disabled={!regressNote.trim()} onClick={regredir}>Confirmar</button>
      </div>
    </Modal>
    {extTarget&&<Modal open={!!extTarget} onClose={()=>setExtTarget(null)} title="Solicitar Extensao de Prazo" width={420}>
      <div style={{padding:"10px 14px",background:C.warning+"0D",border:"1px solid "+C.warning+"44",borderRadius:8,marginBottom:14,fontSize:13,color:C.warning}}>
        <div style={{fontWeight:700}}>{extTarget.label}</div>
        <div>Prazo atual: {fmtD(extTarget.currentDate)}</div>
      </div>
      <ExtReqForm onClose={()=>setExtTarget(null)} onSubmit={requestExtension} currentDeadline={extTarget.currentDate} C={C} Sg={Sg}/>
    </Modal>}
    {adminDlTarget&&<Modal open={!!adminDlTarget} onClose={()=>setAdminDlTarget(null)} title="Alterar Prazo (Admin)" width={420}>
      <div style={{padding:"10px 14px",background:C.accent+"0D",border:"1px solid "+C.accent+"44",borderRadius:8,marginBottom:14,fontSize:13}}>
        <div style={{fontWeight:700,color:C.text}}>{adminDlTarget.label}</div>
        <div style={{color:C.muted}}>Prazo atual: {fmtD(adminDlTarget.currentDate)}</div>
      </div>
      <ExtReqForm onClose={()=>setAdminDlTarget(null)} onSubmit={applyAdminDl} currentDeadline={adminDlTarget.currentDate} C={C} Sg={Sg} isAdmin/>
    </Modal>}

    {/* Confirmar exclusao de acao durante plano */}
    {confirmRemoveAc&&<Modal open={!!confirmRemoveAc} onClose={()=>setConfirmRemoveAc(null)} title="Excluir Acao" width={400}>
      <div style={{fontSize:13,color:C.muted,marginBottom:6}}>A acao sera excluida permanentemente do plano.</div>
      <div style={{padding:"10px 14px",background:C.danger+"0D",border:"1px solid "+C.danger+"33",borderRadius:8,marginBottom:16,fontSize:13}}>
        <strong style={{color:C.text}}>{confirmRemoveAc.id}</strong> — {confirmRemoveAc.desc}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <button style={Sg.btn()} onClick={()=>setConfirmRemoveAc(null)}>Cancelar</button>
        <button style={Sg.btn("danger")} onClick={()=>doRemoveAcPlano(confirmRemoveAc)}>Excluir</button>
      </div>
    </Modal>}

    {/* Remover acao durante execucao — SGQ com motivo */}
    <MotiveModal open={!!removeAcExec} onClose={()=>setRemoveAcExec(null)}
      onConfirm={motive=>doRemoveAcExec(removeAcExec,motive)}
      title={"Remover Acao — "+(removeAcExec&&removeAcExec.id||"")}
      confirmLabel="Remover" confirmStyle="danger"
      description={removeAcExec?"Acao: "+removeAcExec.desc+". A acao sera marcada como cancelada e o motivo ficara registrado no historico.":null}
      C={C} Sg={Sg}/>

    {/* Acrescentar acao durante execucao */}
    {addAcExec&&<Modal open={addAcExec} onClose={()=>setAddAcExec(false)} title="Acrescentar Acao ao Plano" width={480}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Descricao *</label>
          <textarea style={{...Sg.input(),minHeight:52,resize:"vertical"}} value={nAcExec.desc} onChange={e=>setNAcExec(n=>({...n,desc:e.target.value}))}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Responsavel *</label>
            <Sel value={nAcExec.responsible} onChange={v=>setNAcExec(n=>({...n,responsible:v}))} options={allUsers.filter(u=>u.active).map(u=>({value:u.id,label:u.name}))} placeholder="Selecione..." C={C}/></div>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Prazo *</label>
            <input type="date" style={Sg.input()} value={nAcExec.deadline} min={todayStr()} onChange={e=>setNAcExec(n=>({...n,deadline:e.target.value}))}/></div>
        </div>
        <div><label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Observacao</label>
          <input style={Sg.input()} value={nAcExec.obs} onChange={e=>setNAcExec(n=>({...n,obs:e.target.value}))}/></div>
        <div><label style={{fontSize:11,fontWeight:700,color:C.warning,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Motivo do Acrescimo *</label>
          <textarea style={{...Sg.input(),minHeight:52,resize:"vertical",borderColor:C.warning+"66"}} value={nAcExec.motive} onChange={e=>setNAcExec(n=>({...n,motive:e.target.value}))} placeholder="Justifique o acrescimo desta acao ao plano em andamento..."/></div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button style={Sg.btn()} onClick={()=>setAddAcExec(false)}>Cancelar</button>
          <button style={{...Sg.btn("primary"),opacity:nAcExec.desc&&nAcExec.responsible&&nAcExec.deadline&&nAcExec.motive.trim()?1:.4}}
            disabled={!nAcExec.desc||!nAcExec.responsible||!nAcExec.deadline||!nAcExec.motive.trim()}
            onClick={doAddAcExec}>Acrescentar</button>
        </div>
      </div>
    </Modal>}

    {/* ══ TRIAGE DRAWER ══ */}
    {triageDrawer&&<TaskDrawer open={true} onClose={()=>setTriageDrawer(false)} title={editTriagem?"Editar Avaliacao Inicial":"Avaliacao Inicial da Mudanca"} subtitle={editTriagem?"Alteracoes ficam registradas no historico":null} C={C}>
      {editTriagem&&<div style={{marginBottom:12,padding:"8px 12px",background:C.warning+"0D",borderRadius:8,border:"1px solid "+C.warning+"33",fontSize:13,color:C.warning}}>Editando — areas removidas terao suas avaliacoes apagadas.</div>}
      <TriagePanel request={localReq} matrix={matrix||mkMatrix()} allUsers={allUsers} currentUser={currentUser} crits={crits} phaseDl={phaseDl} onSave={(t)=>{setTriageDrawer(false);setSigModal({action:(sig)=>{saveTriage(t,editTriagem,sig);setEditTriagem(false);},title:"Assinar - Avaliacao Inicial",desc:"SA: "+localReq.id+" | Criticidade: "+t.criticality+" | "+t.assignedAreas.length+" areas",label:"Assinar e Confirmar Triagem",style:"warning",saId:localReq.id,sigAction:"avaliacao_inicial"});}} C={C}/>
      <button style={{...Sg.btn(),marginTop:12,fontSize:12}} onClick={()=>{setTriageDrawer(false);setEditTriagem(false);}}>Cancelar</button>
    </TaskDrawer>}

    {/* ══ TASK DRAWER ══ */}
    {drawer&&(()=>{
      if(drawer.type==="eval"){
        const dept=drawer.dept;
        const ev=localReq.evaluations&&localReq.evaluations[dept];
        const done=!!(ev&&ev.at);
        const u=allUsers.find(u=>u.id===(localReq.triage&&localReq.triage.assignments&&localReq.triage.assignments[dept]));
        const isMe=u&&u.id===currentUser.id;
        const canAct=(isMe||isAdmin)&&["avaliacao_areas","aprovacao_plano"].includes(localReq.status);
        // Avaliacao concluida = somente leitura para todos. Para alterar, usar "Reabrir avaliacao" no menu SGQ.
        return <TaskDrawer open={true} onClose={closeDrawer} title={dept} subtitle={(done?"Concluida por "+ev.byName+" em "+fmt(ev.at):"Avaliacao pendente")+(u?" · Responsavel: "+u.name:"")} C={C}>
          {done&&!canAct
            ?<><EvalDetail dept={dept} ev={ev} u={u} isAdmin={false} onEdit={()=>{}} C={C} Sg={Sg}/>
              {isAdmin&&<div style={{marginTop:14,padding:"10px 14px",background:C.warning+"0D",border:"1px solid "+C.warning+"44",borderRadius:8,fontSize:12,color:C.warning}}>
                Para editar esta avaliacao, use <strong>Acoes SGQ → Reabrir avaliacao</strong>.
              </div>}</>
            :<EvalForm dept={dept} existing={ev} readOnly={false}
              allUsers={allUsers} deptQuestions={deptQuestions}
              assignedUserId={localReq.triage&&localReq.triage.assignments&&localReq.triage.assignments[dept]}
              isAdmin={isAdmin} currentUser={currentUser}
              onChangeOwner={(d,id)=>{
                const oldU=allUsers.find(u=>u.id===(localReq.triage&&localReq.triage.assignments&&localReq.triage.assignments[d]));
                const newU=allUsers.find(u=>u.id===id);
                const r={...localReq,triage:{...localReq.triage,assignments:{...localReq.triage.assignments,[d]:id}}};
                onUpdate(mkLog(r,currentUser.name,"reatribuicao","Responsavel de avaliacao alterado","Area: "+d+" | De: "+(oldU?oldU.name:"—")+" → Para: "+(newU?newU.name:"—")));
              }}
              onClose={closeDrawer}
              onSaveDraft={(dept,answers,obs,atts)=>{saveDraftEval(dept,answers,obs,atts);closeDrawer();}}
              onSave={(dept,answers,obs,atts)=>{setSigModal({action:(sig)=>{saveEval(dept,answers,obs,atts,sig);closeDrawer();},title:"Assinar - Avaliacao de Impacto",desc:"SA: "+localReq.id+" | Area: "+dept,label:"Assinar e Registrar Avaliacao",style:"primary",saId:localReq.id,sigAction:"avaliacao"});}}
              C={C}/>}
        </TaskDrawer>;
      }
      if(drawer.type==="plan"){
        const acts=localReq.actions||[];
        const actsVisible=localReq.status==="execucao"?acts:acts; // all during plano
        return <TaskDrawer open={true} onClose={closeDrawer}
          title="Plano de Acao"
          subtitle={(acts.length+" acao"+(acts.length!==1?"es":""))+" · "+(localReq.status==="montagem_plano"?"Em montagem":"Em execucao")}
          C={C}>
          {/* Banner liberar */}
          {canPlan&&localReq.status==="montagem_plano"&&<div style={{padding:"12px 16px",background:C.success+"0D",border:"1px solid "+C.success+"33",borderRadius:10,marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.success}}>Plano em montagem</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>{acts.length} acao{acts.length!==1?"es":""} adicionada{acts.length!==1?"s":""}.</div>
            </div>
            <button style={{...Sg.btn("success"),fontSize:13}} onClick={()=>{closeDrawer();setShowAp3(true);}}>▶ Liberar para Execucao</button>
          </div>}
          {/* Responsavel + add */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,gap:8,flexWrap:"wrap"}}>
            <div style={{fontSize:13,color:C.muted}}>Responsavel: <strong style={{color:C.text}}>{localReq.planResponsibleName||"Nao definido"}</strong></div>
            <div style={{display:"flex",gap:8}}>
              {isAdmin&&["montagem_plano","execucao"].includes(localReq.status)&&<button style={{...Sg.btn(),fontSize:11,padding:"4px 10px"}} onClick={()=>{setReassignPlanUser(localReq.planResponsible||"");setReassignPlan(true);}}>Trocar</button>}
              {canPlan&&localReq.status==="montagem_plano"&&<button style={Sg.btn("primary")} onClick={()=>setAddAc(true)}>+ Nova Acao</button>}
              {isAdmin&&localReq.status==="execucao"&&<button style={Sg.btn("primary")} onClick={()=>setAddAcExec(true)}>+ Acrescentar Acao</button>}
            </div>
          </div>
          {/* Lista de acoes */}
          {acts.length===0
            ?<div style={{fontSize:14,color:C.muted,padding:"20px 0",textAlign:"center"}}>Nenhuma acao adicionada ainda.</div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>
              {acts.map(ac=>{
                const resp=allUsers.find(u=>u.id===parseInt(ac.responsible));
                const ov=isOD(ac.deadline,ac.status);
                const acColor=ac.status==="concluida"?C.success:ac.status==="cancelada"?C.muted:ov?C.danger:C.warning;
                return <div key={ac.id} style={{border:"1px solid "+C.border,borderRadius:10,padding:"12px 16px",background:C.card,cursor:"pointer"}}
                  onClick={()=>{setDrawer({type:"action",ac,_fromPlan:true});setDrawerEditing(false);setDrawerEditVals({desc:ac.desc,responsible:String(ac.responsible),deadline:ac.deadline,obs:ac.obs||""});}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,fontWeight:700,color:C.accent}}>{ac.id}</span>
                      <span style={{fontSize:13,color:C.text,fontWeight:500}}>{ac.desc}</span>
                    </div>
                    <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:999,background:acColor+"1A",color:acColor,border:"1px solid "+acColor+"44",flexShrink:0}}>
                      {ac.status==="concluida"?"Concluida":ac.status==="cancelada"?"Cancelada":ov?"Atrasada":"Pendente"}
                    </span>
                  </div>
                  <div style={{display:"flex",gap:16,fontSize:12,color:C.muted}}>
                    <span> {resp?resp.name:"—"}</span>
                    <span style={{color:ov&&ac.status!=="concluida"?C.danger:C.muted}}>📅 {fmtD(ac.deadline)}</span>
                    {ac.obs&&<span> {ac.obs.slice(0,40)}{ac.obs.length>40?"...":""}</span>}
                  </div>
                  {canPlan&&localReq.status==="montagem_plano"&&<div style={{display:"flex",gap:6,marginTop:8}} onClick={e=>e.stopPropagation()}>
                    <button style={{...Sg.btn(),fontSize:11,padding:"3px 8px"}} onClick={()=>setEditAc(ac)}>Editar</button>
                    <button style={{...Sg.btn("danger"),fontSize:11,padding:"3px 8px"}} onClick={()=>setConfirmRemoveAc(ac)}>Excluir</button>
                  </div>}
                </div>;
              })}
            </div>}
        </TaskDrawer>;
      }

      if(drawer.type==="action"){
        const ac=(localReq.actions||[]).find(a=>a.id===drawer.ac.id)||drawer.ac;
        const resp=allUsers.find(u=>u.id===parseInt(ac.responsible));
        const isMine=parseInt(ac.responsible)===parseInt(currentUser.id);
        const canAct=(isMine||isAdmin)&&localReq.status==="execucao"&&!["concluida","cancelada"].includes(ac.status);
        const ov=isOD(ac.deadline,ac.status);
        const acColor=ac.status==="concluida"?C.success:ac.status==="cancelada"?C.muted:ov?C.danger:C.warning;
        if(drawerEditing) return <TaskDrawer open={true} onClose={()=>setDrawerEditing(false)} title={"Editar: "+ac.id} C={C}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div><label style={Sg.lbl}>Descricao</label><textarea style={{...Sg.input(),minHeight:52,resize:"vertical"}} value={drawerEditVals.desc||""} onChange={e=>setDrawerEditVals(v=>({...v,desc:e.target.value}))}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={Sg.lbl}>Responsavel</label><Sel value={drawerEditVals.responsible||""} onChange={v=>setDrawerEditVals(ev=>({...ev,responsible:v}))} options={allUsers.filter(u=>u.active).map(u=>({value:u.id,label:u.name}))} C={C}/></div>
              <div><label style={Sg.lbl}>Prazo</label><input type="date" style={Sg.input()} value={drawerEditVals.deadline||""} onChange={e=>setDrawerEditVals(v=>({...v,deadline:e.target.value}))}/></div>
            </div>
            <div><label style={Sg.lbl}>Observacao</label><input style={Sg.input()} value={drawerEditVals.obs||""} onChange={e=>setDrawerEditVals(v=>({...v,obs:e.target.value}))}/></div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
              <button style={Sg.btn()} onClick={()=>setDrawerEditing(false)}>Cancelar</button>
              <button style={{...Sg.btn("primary"),opacity:(drawerEditVals.desc||"").trim()?1:.4}} disabled={!(drawerEditVals.desc||"").trim()} onClick={()=>{
                const updated={...ac,...drawerEditVals,responsible:parseInt(drawerEditVals.responsible)};
                updAc(ac.id,updated,"Acao editada",ac.id+" | "+drawerEditVals.desc);
                setDrawer(d=>({...d,ac:updated}));
                setDrawerEditing(false);
              }}>Salvar</button>
            </div>
          </div>
        </TaskDrawer>;
        return <TaskDrawer
          open={true}
          onClose={closeDrawer}
          title={ac.id}
          subtitle={null}
          C={C}>

          {/* Voltar para plano */}
          {drawer._fromPlan&&<button style={{...Sg.btn(),fontSize:12,marginBottom:16,display:"inline-flex",alignItems:"center",gap:6}} onClick={()=>openPlanDrawer()}>← Voltar ao Plano</button>}

          {/* Info grid */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <FieldCard label="Descricao" wide><span style={{fontSize:14,color:C.text,lineHeight:1.5}}>{ac.desc}</span></FieldCard>
            <FieldCard label="Responsavel" value={resp?resp.name:"—"}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
            <FieldCard label="Prazo"><span style={{fontSize:14,fontWeight:600,color:ov&&ac.status!=="concluida"?C.danger:C.text}}>{fmtD(ac.deadline)}</span></FieldCard>
            <FieldCard label="Status"><span style={{display:"inline-flex",padding:"4px 10px",borderRadius:999,fontSize:12,fontWeight:700,background:acColor+"1A",color:acColor,border:"1px solid "+acColor+"44"}}>{ac.status==="concluida"?"Concluida":ac.status==="cancelada"?"Cancelada":ov?"Atrasada":"Pendente"}</span></FieldCard>
            {ac.obs?<FieldCard label="Observacao" value={ac.obs}/>:<FieldCard label="Observacao" value="—"/>}
          </div>



          {/* Conclusao anterior */}
          {ac.status==="concluida"&&<div style={{padding:"12px 16px",background:C.success+"0D",border:"1px solid "+C.success+"33",borderRadius:10,marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:700,color:C.success,marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Concluida em {fmtD(ac.doneAt&&ac.doneAt.slice(0,10))}</div>
            <div style={{fontSize:14,color:C.text,lineHeight:1.5}}>{ac.doneNote||"—"}</div>
            {ac.doneAtt&&<div style={{fontSize:12,color:C.muted,marginTop:6}}> {ac.doneAtt.name}</div>}
          </div>}

          {/* Form conclusao */}
          {canAct&&<AcConcForm acId={ac.id} onConfirm={(note,att)=>{setSigModal({action:(sig)=>{concludeAction(ac.id,note,att,sig);closeDrawer();},title:"Assinar - Conclusao de Acao",desc:"Acao: "+ac.id+" - "+ac.desc.slice(0,60),label:"Assinar e Concluir",style:"success",saId:localReq.id,sigAction:"concluir_acao"});}} request={localReq} currentUser={currentUser} C={C} Sg={Sg}/>}

          {/* Acoes admin/canPlan — somente se acao NAO estiver concluida/cancelada */}
          {["concluida","cancelada"].includes(ac.status)
            ?isAdmin&&<div style={{marginTop:14,padding:"10px 14px",background:C.warning+"0D",border:"1px solid "+C.warning+"44",borderRadius:8,fontSize:12,color:C.warning}}>
                Para reabrir esta acao, use <strong>Acoes SGQ → Reabrir acao</strong>.
              </div>
            :<>{isAdmin&&<div style={{marginTop:16,display:"flex",flexDirection:"column",gap:8}}>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>Gerenciar acao (SGQ)</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {localReq.status==="montagem_plano"&&<button style={{...Sg.btn(),fontSize:12}} onClick={()=>{
                setDrawerEditVals({desc:ac.desc,responsible:String(ac.responsible),deadline:ac.deadline,obs:ac.obs||""});
                setDrawerEditing(true);
              }}>✏ Editar</button>}
              <button style={{...Sg.btn(),fontSize:12}} onClick={()=>{closeDrawer();setReassignAc(ac);setReassignAcUser("");}}> Reatribuir</button>
              <button style={{...Sg.btn(),fontSize:12}} onClick={()=>{closeDrawer();setAdminDlTarget({type:"action",key:ac.id,label:ac.desc,currentDate:ac.deadline});}}>📅 Alterar prazo</button>
              {localReq.status==="montagem_plano"&&<button style={{...Sg.btn("danger"),fontSize:12}} onClick={()=>{closeDrawer();setConfirmRemoveAc(ac);}}>🗑 Excluir</button>}
              {localReq.status==="execucao"&&<button style={{...Sg.btn("danger"),fontSize:12}} onClick={()=>{closeDrawer();setRemoveAcExec(ac);}}>× Remover do plano</button>}
            </div>
          </div>}
          {canPlan&&localReq.status==="montagem_plano"&&!isAdmin&&<div style={{marginTop:16,display:"flex",flexDirection:"column",gap:8}}>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>Gerenciar acao</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button style={{...Sg.btn(),fontSize:12}} onClick={()=>{
                setDrawerEditVals({desc:ac.desc,responsible:String(ac.responsible),deadline:ac.deadline,obs:ac.obs||""});
                setDrawerEditing(true);
              }}>✏ Editar</button>
              <button style={{...Sg.btn("danger"),fontSize:12}} onClick={()=>{closeDrawer();setConfirmRemoveAc(ac);}}>🗑 Excluir</button>
            </div>
          </div>}</>}

          {isMine&&localReq.status==="execucao"&&!["concluida","cancelada"].includes(ac.status)&&<div style={{marginTop:12}}>
            <button style={{...Sg.btn(),fontSize:12}} onClick={()=>{closeDrawer();setExtTarget({type:"action",key:ac.id,label:ac.desc,currentDate:ac.deadline});}}>⏱ Pedir extensao de prazo</button>
          </div>}
        </TaskDrawer>;
      }
      return null;
    })()}

    {/* Reabrir fase */}
    <MotiveModal open={!!reopenPhase} onClose={()=>setReopenPhase(null)}
      onConfirm={motive=>doReopenPhase(reopenPhase&&reopenPhase.key,motive)}
      title={"Reabrir fase: "+(reopenPhase&&reopenPhase.label||"")}
      confirmLabel="Reabrir fase" confirmStyle="warning"
      description={reopenPhase?"ATENCAO: Retorna a SA para a fase '"+reopenPhase.label+"'. Dados da fase atual e posteriores serao preservados no historico mas o fluxo voltara para este ponto.":null}
      C={C} Sg={Sg}/>

    {/* Aprovar avaliacoes - iniciar plano */}
    {showAp2&&<Modal open={showAp2} onClose={()=>setShowAp2(false)} title="Aprovar Avaliacoes — Iniciar Plano" width={460}>
      <div style={{fontSize:13,color:C.muted,marginBottom:14}}>As avaliações de impacto foram concluídas. Confirme a aprovação e defina o prazo para montagem do plano de ações.</div>
      <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Responsável pelo Plano de Ação *</label>
      <Sel value={ap2PlanResp} onChange={v=>setAp2PlanResp(v)} options={allUsers.filter(u=>u.active).map(u=>({value:u.id,label:u.name}))} placeholder="Selecione o responsável..." C={C}/>
      <div style={{height:14}}/>
      <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Prazo para Montagem do Plano *</label>
      <input type="date" style={{...Sg.input(),marginBottom:14}} value={ap2DateVal||addDays(todayStr(),(phaseDl&&phaseDl.montagem_plano&&phaseDl.montagem_plano.days)||5)} min={todayStr()} onChange={e=>setAp2DateVal(e.target.value)}/>
      <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Observações da Aprovação (opcional)</label>
      <textarea style={{...Sg.input(),minHeight:72,resize:"vertical",marginBottom:14}} value={ap2Obs} onChange={e=>setAp2Obs(e.target.value)} placeholder="Registre observações sobre as avaliações, condicionantes ou orientações para o plano..."/>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <button style={Sg.btn()} onClick={()=>setShowAp2(false)}>Cancelar</button>
        <button style={{...Sg.btn("success"),opacity:ap2PlanResp?1:.4}} disabled={!ap2PlanResp} onClick={()=>{const d=ap2DateVal||addDays(todayStr(),(phaseDl&&phaseDl.plano&&phaseDl.plano.days)||5);const u=allUsers.find(x=>parseInt(x.id)===parseInt(ap2PlanResp));setShowAp2(false);setSigModal({action:(sig)=>{ap2(d,ap2Obs,ap2PlanResp,u&&u.name||"",sig);setAp2Obs("");setAp2PlanResp("");},title:"Assinar - Aprovar Avaliacoes",desc:"SA: "+localReq.id+" - Responsável: "+(u&&u.name||"")+" | Prazo: "+addDays(todayStr(),(phaseDl&&phaseDl.plano&&phaseDl.plano.days)||5),label:"Assinar e Aprovar",style:"success",saId:localReq.id,sigAction:"aprovacao_avaliacoes"});}}>Continuar →</button>
      </div>
    </Modal>}

    {/* Liberar para execucao */}
    {showAp3&&<Modal open={showAp3} onClose={()=>setShowAp3(false)} title="Liberar para Execucao" width={400}>
      <div style={{fontSize:13,color:C.muted,marginBottom:18}}>O plano tem <strong style={{color:C.text}}>{(localReq.actions||[]).length} acao{(localReq.actions||[]).length!==1?"es":""}</strong>. Ao confirmar, as acoes serao liberadas para execucao pelos responsaveis.</div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <button style={Sg.btn()} onClick={()=>setShowAp3(false)}>Cancelar</button>
        <button style={Sg.btn("success")} onClick={()=>{setShowAp3(false);setSigModal({action:(sig)=>{ap3(sig);},title:"Assinar - Liberar para Execucao",desc:"SA: "+localReq.id+" - "+((localReq.actions||[]).length)+" acoes serao liberadas",label:"Assinar e Liberar",style:"success",saId:localReq.id,sigAction:"liberar_execucao"});}}>Continuar →</button>
      </div>
    </Modal>}

    {/* Cancelar SA */}
    <MotiveModal open={showCancel} onClose={()=>setShowCancel(false)} onConfirm={motive=>{setShowCancel(false);setSigModal({action:(sig)=>cancelSA(motive,sig),title:"Assinar - Cancelamento da SA",desc:"SA: "+localReq.id+" - Motivo: "+motive,label:"Assinar e Cancelar",style:"danger",saId:localReq.id,sigAction:"cancelamento"});}}
      title="Cancelar SA" confirmLabel="Continuar →" confirmStyle="danger"
      description={"SA "+localReq.id+" sera cancelada permanentemente. Esta acao nao pode ser desfeita."}
      C={C} Sg={Sg}/>

    {/* Reabrir avaliacao */}
    <MotiveModal open={!!reopenEval} onClose={()=>setReopenEval(null)}
      onConfirm={motive=>doReopenEval(reopenEval,motive)}
      title={"Reabrir Avaliacao — "+(reopenEval||"")} confirmLabel="Reabrir" confirmStyle="warning"
      description="A avaliacao voltara para pendente. O responsavel precisara refazer."
      C={C} Sg={Sg}/>

    {/* Reatribuir avaliacao */}
    {reassignEval&&<Modal open={!!reassignEval} onClose={()=>{setReassignEval(null);setReassignEvalUser("");setReassignEvalObs("");}} title={"Reatribuir Avaliacao — "+reassignEval.dept} width={460}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:13,color:C.muted}}>Responsavel atual: <strong style={{color:C.text}}>{(allUsers.find(u=>u.id===reassignEval.currentUserId)||{}).name||"—"}</strong></div>
        <div><label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Novo Responsavel *</label>
          <select style={{...Sg.input(),width:"100%"}} value={reassignEvalUser} onChange={e=>setReassignEvalUser(e.target.value)}>
            <option value="">Selecione...</option>
            {allUsers.filter(u=>u.active).map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <div><label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Motivo *</label>
          <textarea style={{...Sg.input(),minHeight:60,resize:"vertical",width:"100%"}} value={reassignEvalObs} onChange={e=>setReassignEvalObs(e.target.value)} placeholder="Motivo da reatribuicao..."/>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button style={Sg.btn()} onClick={()=>{setReassignEval(null);setReassignEvalUser("");setReassignEvalObs("");}}>Cancelar</button>
          <button style={{...Sg.btn("primary"),opacity:reassignEvalUser&&reassignEvalObs.trim()?1:.4}} disabled={!reassignEvalUser||!reassignEvalObs.trim()} onClick={()=>doReassignEval(reassignEval.dept,reassignEvalUser,reassignEvalObs)}>Confirmar</button>
        </div>
      </div>
    </Modal>}

    {/* Reabrir acao */}
    <MotiveModal open={!!reopenAc} onClose={()=>setReopenAc(null)}
      onConfirm={motive=>doReopenAc(reopenAc.id,motive)}
      title={"Reabrir Acao — "+(reopenAc&&reopenAc.id||"")} confirmLabel="Reabrir" confirmStyle="warning"
      description={reopenAc?"Acao "+reopenAc.id+" ("+reopenAc.desc+") voltara para pendente. A conclusao registrada sera removida.":null}
      C={C} Sg={Sg}/>

    {/* Reatribuir acao */}
    {reassignAc&&<Modal open={!!reassignAc} onClose={()=>{setReassignAc(null);setReassignAcUser("");setReassignAcObs("");}} title={"Reatribuir Acao — "+reassignAc.id} width={460}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:13,color:C.muted}}>Responsavel atual: <strong style={{color:C.text}}>{(allUsers.find(u=>u.id===reassignAc.responsible)||{}).name||"—"}</strong></div>
        <div><label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Novo Responsavel *</label>
          <select style={{...Sg.input(),width:"100%"}} value={reassignAcUser} onChange={e=>setReassignAcUser(e.target.value)}>
            <option value="">Selecione...</option>
            {allUsers.filter(u=>u.active).map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <div><label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Motivo *</label>
          <textarea style={{...Sg.input(),minHeight:60,resize:"vertical",width:"100%"}} value={reassignAcObs} onChange={e=>setReassignAcObs(e.target.value)} placeholder="Motivo da reatribuicao..."/>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button style={Sg.btn()} onClick={()=>{setReassignAc(null);setReassignAcUser("");setReassignAcObs("");}}>Cancelar</button>
          <button style={{...Sg.btn("primary"),opacity:reassignAcUser&&reassignAcObs.trim()?1:.4}} disabled={!reassignAcUser||!reassignAcObs.trim()} onClick={()=>{const acId=reassignAc.id;const newU=allUsers.find(u=>parseInt(u.id)===parseInt(reassignAcUser));setReassignAc(null);setSigModal({action:(sig)=>{doReassignAc(acId,reassignAcUser,reassignAcObs,sig);},title:"Assinar - Reatribuir Acao",desc:"Acao: "+acId+" | Novo responsavel: "+(newU?newU.name:""),label:"Assinar e Confirmar",style:"primary",saId:localReq.id,sigAction:"reatribuicao"});}}>Continuar →</button>
        </div>
      </div>
    </Modal>}

    {reassignPlan&&<Modal open={reassignPlan} onClose={()=>{setReassignPlan(false);setReassignPlanUser("");setReassignPlanObs("");}} title="Reatribuir Responsavel do Plano" width={460}>
      <div style={{fontSize:13,color:C.muted,marginBottom:14}}>Responsavel atual: <strong style={{color:C.text}}>{localReq.planResponsibleName||"Nao definido"}</strong></div>
      <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Novo Responsavel *</label>
      <select style={{...Sg.input(),width:"100%",marginBottom:12}} value={reassignPlanUser} onChange={e=>setReassignPlanUser(e.target.value)}>
        <option value="">Selecione...</option>
        {allUsers.filter(u=>u.active).map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
      </select>
      <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:5}}>Justificativa *</label>
      <textarea style={{...Sg.input(),minHeight:72,resize:"vertical",marginBottom:14}} value={reassignPlanObs} onChange={e=>setReassignPlanObs(e.target.value)} placeholder="Por que esta trocando o responsavel pelo plano?"/>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <button style={Sg.btn()} onClick={()=>{setReassignPlan(false);setReassignPlanUser("");setReassignPlanObs("");}}>Cancelar</button>
        <button style={{...Sg.btn("warning"),opacity:reassignPlanUser&&reassignPlanObs.trim()?1:.4}} disabled={!reassignPlanUser||!reassignPlanObs.trim()} onClick={()=>{setReassignPlan(false);setSigModal({action:(sig)=>{doReassignPlan(reassignPlanUser,reassignPlanObs,sig);},title:"Assinar - Reatribuir Plano",desc:"SA: "+localReq.id+" | Novo responsavel: "+((allUsers.find(u=>parseInt(u.id)===parseInt(reassignPlanUser))||{}).name||""),label:"Assinar e Confirmar",style:"warning",saId:localReq.id,sigAction:"reatribuicao"});}}>Continuar →</button>
      </div>
    </Modal>}

    {/* ══ ADICIONAR ÁREA AVALIADORA ══ */}
{addAreaModal&&<Modal open={addAreaModal} onClose={()=>{setAddAreaModal(false);setNewArea({dept:"",responsible:"",deadline:"",motive:""});}} title="Adicionar Área Avaliadora" width={500}>
  <div style={{fontSize:13,color:C.muted,marginBottom:14,padding:"8px 12px",background:C.accent+"0D",borderRadius:8}}>
    A área será adicionada ao processo de avaliação e o responsável será notificado. O motivo ficará registrado no histórico.
  </div>
  <div style={{display:"flex",flexDirection:"column",gap:12}}>
    <div>
      <label style={Sg.lbl}>Área *</label>
      <Sel value={newArea.dept} onChange={v=>setNewArea(p=>({...p,dept:v}))}
        options={ALL_DEPTS.filter(d=>!(localReq.triage?.assignedAreas||[]).includes(d)).map(d=>({value:d,label:d}))}
        placeholder="Selecione a área..." C={C}/>
    </div>
    <div>
      <label style={Sg.lbl}>Responsável *</label>
      <Sel value={newArea.responsible} onChange={v=>setNewArea(p=>({...p,responsible:v}))}
        options={allUsers.filter(u=>u.active&&(u.evalDepts||u.eval_depts||[]).includes(newArea.dept)).map(u=>({value:u.id,label:u.name}))}
        placeholder="Selecione o responsável..." C={C}/>
    </div>
    <div>
      <label style={Sg.lbl}>Prazo *</label>
      <input type="date" style={Sg.input()} value={newArea.deadline} min={todayStr()}
        onChange={e=>setNewArea(p=>({...p,deadline:e.target.value}))}/>
    </div>
    <div>
      <label style={{...Sg.lbl,color:C.warning}}>Motivo da inclusão *</label>
      <textarea style={{...Sg.input(),minHeight:60,resize:"vertical",borderColor:C.warning+"66"}}
        value={newArea.motive} onChange={e=>setNewArea(p=>({...p,motive:e.target.value}))}
        placeholder="Justifique a inclusão desta área no processo..."/>
    </div>
    {newArea.dept&&allUsers.filter(u=>u.active&&(u.evalDepts||u.eval_depts||[]).includes(newArea.dept)).length===0&&
      <div style={{fontSize:12,color:C.danger}}> Nenhum avaliador cadastrado para esta área.</div>}
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
      <button style={Sg.btn()} onClick={()=>{setAddAreaModal(false);setNewArea({dept:"",responsible:"",deadline:"",motive:""});}}>Cancelar</button>
      <button style={{...Sg.btn("primary"),opacity:newArea.dept&&newArea.responsible&&newArea.deadline&&newArea.motive.trim()?1:.4}}
        disabled={!newArea.dept||!newArea.responsible||!newArea.deadline||!newArea.motive.trim()}
        onClick={()=>{
          const newTriage={
            ...localReq.triage,
            assignedAreas:[...(localReq.triage?.assignedAreas||[]),newArea.dept],
            assignments:{...(localReq.triage?.assignments||{}),[newArea.dept]:parseInt(newArea.responsible)},
            deadlines:{...(localReq.triage?.deadlines||{}),[newArea.dept]:newArea.deadline},
            originalDeadlines:{...(localReq.triage?.originalDeadlines||{}),[newArea.dept]:newArea.deadline},
          };
          let r={...localReq,triage:newTriage};
          r=mkLog(r,currentUser.name,"avaliacao","Área avaliadora adicionada",
            "Área: "+newArea.dept+" | Responsável: "+(allUsers.find(u=>u.id===parseInt(newArea.responsible))?.name||"—")+" | Prazo: "+fmtD(newArea.deadline)+" | Motivo: "+newArea.motive);
          onUpdate(r);
          setAddAreaModal(false);
          setNewArea({dept:"",responsible:"",deadline:"",motive:""});
        }}>
        Adicionar Área
      </button>
    </div>
  </div>
</Modal>}
    {/* ══ REABRIR SA ══ */}
    <MotiveModal open={showReopenSA} onClose={()=>setShowReopenSA(false)}
      onConfirm={motive=>{setShowReopenSA(false);setSigModal({action:(sig)=>reopenSA(motive,sig),title:"Assinar — Reabertura da SA",desc:"SA: "+localReq.id+" | Motivo: "+motive,label:"Assinar e Reabrir",style:"primary",saId:localReq.id,sigAction:"reabrir_sa"});}}
      title={"Reabrir SA — "+localReq.id}
      confirmLabel="Continuar →" confirmStyle="primary"
      description={"A SA voltará para o status Aberta. Todo o histórico e dados serão preservados."}
      C={C} Sg={Sg}/>

    {/* ══ SIGNATURE MODAL ══ */}
    {sigModal&&<SignatureModal
      open={!!sigModal}
      onClose={()=>setSigModal(null)}
      onConfirm={(sig)=>{sigModal.action(sig);setSigModal(null);}}
      title={sigModal.title}
      description={sigModal.desc}
      confirmLabel={sigModal.label}
      confirmStyle={sigModal.style}
      saId={sigModal.saId}
      action={sigModal.sigAction}
      C={C} Sg={Sg}/>}

  </div>;
}

// Shared form for extension request
function ExtReqForm({onClose,onSubmit,currentDeadline,C,Sg,isAdmin}){
  const [newDate,setND]=useState("");const [reason,setR]=useState("");
  return <div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div><label style={Sg.lbl}>Novo prazo *</label><input type="date" style={Sg.input()} value={newDate} min={currentDeadline||todayStr()} onChange={e=>setND(e.target.value)}/></div>
    <div><label style={Sg.lbl}>{isAdmin?"Motivo da alteracao *":"Justificativa *"}</label><textarea style={{...Sg.input(),minHeight:56,resize:"vertical"}} value={reason} onChange={e=>setR(e.target.value)} placeholder={isAdmin?"Motivo da alteracao direta...":"Descreva o motivo da necessidade de extensao..."}/></div>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
      <button style={Sg.btn()} onClick={onClose}>Cancelar</button>
      <button style={{...Sg.btn(isAdmin?"primary":"warning"),opacity:newDate&&reason.trim()?1:.4}} disabled={!newDate||!reason.trim()} onClick={()=>onSubmit(newDate,reason)}>{isAdmin?"Alterar":"Solicitar"}</button>
    </div>
  </div>;
}

// Extensions tab
function ExtensionsTab({request,currentUser,allUsers,isAdmin,onDecide,onAdminChange,C,Sg}){
  const all=request.deadlineExtensions||[];
  const pending=all.filter(e=>e.status==="pending");
  const decided=all.filter(e=>e.status!=="pending");
  const EItem=({ext})=>{
    const [rejNote,setRN]=useState("");const [showRej,setSR]=useState(false);
    const req=allUsers.find(u=>u.id===ext.requestedBy);
    const sc={pending:C.warning,approved:C.success,rejected:C.danger}[ext.status]||C.muted;
    return <div style={{...Sg.card({padding:"10px 13px",marginBottom:6,borderLeft:"3px solid "+sc})}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text}}>{ext.targetLabel}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>
            {fmtD(ext.currentDate)} → <strong style={{color:sc}}>{fmtD(ext.newDate)}</strong>
          </div>
          <div style={{fontSize:11,color:C.dim,marginTop:2}}>por {req&&req.name||"--"} em {fmt(ext.requestedAt)}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:3,fontStyle:"italic"}}>"{ext.reason}"</div>
          {ext.decisionNote&&<div style={{fontSize:10,color:C.muted,marginTop:2}}>Resposta: {ext.decisionNote}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
          <Badge label={ext.status==="pending"?"Pendente":ext.status==="approved"?"Aprovada":"Rejeitada"} color={sc}/>
          {ext.decidedByName&&<div style={{fontSize:10,color:C.muted}}>por {ext.decidedByName}</div>}
          {isAdmin&&ext.status==="pending"&&<div style={{display:"flex",gap:5,marginTop:3}}>
            <button style={{...Sg.btn("success"),fontSize:11,padding:"3px 9px"}} onClick={()=>onDecide(ext,true,"")}>Aprovar</button>
            <button style={{...Sg.btn("danger"),fontSize:11,padding:"3px 9px"}} onClick={()=>setSR(v=>!v)}>Rejeitar</button>
          </div>}
        </div>
      </div>
      {showRej&&<div style={{marginTop:8,display:"flex",gap:7}}>
        <input style={{...Sg.input(),flex:1,fontSize:12}} value={rejNote} onChange={e=>setRN(e.target.value)} placeholder="Motivo da rejeicao..."/>
        <button style={{...Sg.btn("danger"),fontSize:11,padding:"4px 9px",opacity:rejNote.trim()?1:.4}} disabled={!rejNote.trim()} onClick={()=>onDecide(ext,false,rejNote)}>OK</button>
      </div>}
    </div>;
  };
  return <div>
    {pending.length>0&&<div style={{marginBottom:14}}>
      <div style={{fontSize:10,fontWeight:700,color:C.warning,marginBottom:7,letterSpacing:.6}}>AGUARDANDO APROVACAO ({pending.length})</div>
      {pending.map(e=><EItem key={e.id} ext={e}/>)}
    </div>}
    {decided.length>0&&<div>
      <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:7,letterSpacing:.6}}>HISTORICO DE EXTENSOES ({decided.length})</div>
      {decided.map(e=><EItem key={e.id} ext={e}/>)}
    </div>}
    {!all.length&&<div style={{...Sg.card({textAlign:"center",color:C.muted,padding:28})}}>Nenhuma solicitacao de extensao de prazo.</div>}
  </div>;
}

// ================================================================
// MyTasksDrawer — inbox of all pending tasks for current user
// ================================================================
function MyTasksDrawer({open,onClose,requests,currentUser,allUsers,crits,initialSelected,onNav,onUpdate,matrix,deptQuestions,phaseDl,C}){
  const Sg=mkSg(C);
  const [selected,setSelected]=React.useState(null);
  const [sigModal,setSigModal]=React.useState(null);

  // Sync initialSelected when drawer opens
  React.useEffect(()=>{
    if(open&&initialSelected){
      // Find matching task from live requests
      const r=requests.find(r=>r.id===(initialSelected.req&&initialSelected.req.id));
      if(r){
        if(initialSelected.type==="eval") setSelected({type:"eval",req:r,dept:initialSelected.dept});
        else if(initialSelected.type==="action"){
          const ac=(r.actions||[]).find(a=>a.id===initialSelected.ac.id)||initialSelected.ac;
          setSelected({type:"action",req:r,ac});
        }
      }
    }
    if(!open) setSelected(null);
  },[open]);

  // Build task list from live requests
  const buildTasks=()=>{
    const tasks=[];
    requests.forEach(r=>{
      if(["avaliacao_areas","aprovacao_plano"].includes(r.status)){
        const aa=(r.triage&&r.triage.assignedAreas)||[];
        aa.forEach(dept=>{
          const assignedId=r.triage&&r.triage.assignments&&r.triage.assignments[dept];
          if(parseInt(assignedId)!==parseInt(currentUser.id))return;
          const ev=r.evaluations&&r.evaluations[dept];
          const done=!!(ev&&ev.at);
          tasks.push({type:"eval",req:r,dept,done,label:dept,sublabel:r.id+" · "+r.title,urg:done?"done":urgCls((r.stageDeadlines&&r.stageDeadlines.avaliacao)||r.deadline,done?"concluida":"pendente")});
        });
      }
      if(r.status==="execucao"){
        (r.actions||[]).filter(a=>parseInt(a.responsible)===parseInt(currentUser.id)&&a.status==="pendente").forEach(a=>{
          tasks.push({type:"action",req:r,ac:a,label:a.id+" — "+a.desc,sublabel:r.id+" · "+r.title,urg:urgCls(a.deadline,a.status)});
        });
      }
      if(r.status==="plano"&&parseInt(r.planResponsible)===parseInt(currentUser.id)){
        tasks.push({type:"plan",req:r,label:"Montar Plano de Acao",sublabel:r.id+" · "+r.title,urg:urgCls(r.stageDeadlines&&r.stageDeadlines.plano,"pendente")});
      }
    });
    const urgOrder={overdue:0,today:1,soon:2,normal:3,done:4};
    return tasks.sort((a,b)=>(urgOrder[a.urg||"normal"]||3)-(urgOrder[b.urg||"normal"]||3));
  };
  const tasks=buildTasks().filter(t=>t.urg!=="done");
  const urgColor=(u)=>u==="overdue"?C.danger:u==="today"?C.warning:u==="soon"?C.accent:u==="done"?C.success:C.muted;
  const urgLabel=(u)=>u==="overdue"?"Atrasada":u==="today"?"Hoje":u==="soon"?"Em breve":u==="done"?"Concluida":"Pendente";
  const pending=tasks.filter(t=>t.urg!=="done").length;

  // Render task content inline
  const renderTask=(t)=>{
    if(t.type==="eval"){
      const r=t.req;
      const dept=t.dept;
      const ev=r.evaluations&&r.evaluations[dept];
      const done=!!(ev&&ev.at);
      const u=allUsers.find(u=>parseInt(u.id)===parseInt(r.triage&&r.triage.assignments&&r.triage.assignments[dept]));
      const isMe=u&&parseInt(u.id)===parseInt(currentUser.id);
      const isAdmin=hasPerm(currentUser,'sa.avaliacao_inicial');
      const canAct=(isMe||isAdmin)&&["avaliacao_areas","aprovacao_plano"].includes(r.status);
      const saveEval=(dept,answers,obs,atts)=>{
        const ev2={answers,obs,atts:atts||[],by:currentUser.id,byName:currentUser.name,at:new Date().toISOString()};
        const newEvs={...(r.evaluations||{}),[dept]:ev2};
        const r2=mkLog({...r,evaluations:newEvs},currentUser.name,"avaliacao","Avaliacao concluida","Area: "+dept);
        onUpdate(r2);
      };
      const saveDraft=(dept,answers,obs,atts)=>{
        const ev2={answers,obs,atts:atts||[],by:currentUser.id,byName:currentUser.name,draft:true};
        const r2={...r,evaluations:{...(r.evaluations||{}),[dept]:ev2}};
        onUpdate(r2);
      };
      return <EvalForm dept={dept} existing={ev} readOnly={done}
        allUsers={allUsers} deptQuestions={deptQuestions}
        assignedUserId={r.triage&&r.triage.assignments&&r.triage.assignments[dept]}
        isAdmin={isAdmin} currentUser={currentUser}
        onChangeOwner={(d,id)=>{
          const newU=allUsers.find(u=>u.id===id);
          const r2={...r,triage:{...r.triage,assignments:{...r.triage.assignments,[d]:id}}};
          onUpdate(mkLog(r2,currentUser.name,"reatribuicao","Responsavel de avaliacao alterado","Area: "+d+" → Para: "+(newU?newU.name:"—")));
        }}
        onClose={()=>setSelected(null)}
        onSaveDraft={(dept,answers,obs,atts)=>{saveDraft(dept,answers,obs,atts);setSelected(null);}}
        onSave={(dept,answers,obs,atts)=>{
  const ev2={answers,obs,attachments:atts||[],by:currentUser.id,byName:currentUser.name,at:new Date().toISOString()};
  const newEvs={...(r.evaluations||{}),[dept]:ev2};
  const allDone=(r.triage?.assignedAreas||[]).every(d=>newEvs[d]&&newEvs[d].at);
  const r2=mkLog({...r,evaluations:newEvs,status:allDone?"aprovacao_plano":"avaliacao_areas"},currentUser.name,"avaliacao","Avaliacao concluida","Area: "+dept);
  if(allDone)r2.log=[...r2.log,{at:new Date().toISOString(),by:"Sistema",type:"sistema",event:"Todas as avaliacoes concluidas",detail:"Aguarda Aprovacao 2 (SGQ)"}];
  onUpdate(r2);
  setSelected(null);
}}
        C={C}/>;
    }
    if(t.type==="action"){
      const r=t.req;
      const ac=(r.actions||[]).find(a=>a.id===t.ac.id)||t.ac;
      const resp=allUsers.find(u=>parseInt(u.id)===parseInt(ac.responsible));
      const isMine=parseInt(ac.responsible)===parseInt(currentUser.id);
      const ov=isOD(ac.deadline,ac.status);
      const acColor=ac.status==="concluida"?C.success:ac.status==="cancelada"?C.muted:ov?C.danger:C.warning;
      const canAct=isMine&&r.status==="execucao"&&!["concluida","cancelada"].includes(ac.status);
      const concludeAc=(note,att,sig)=>{
        const patch={status:"concluida",doneNote:note,doneAtt:att,doneBy:currentUser.id,doneByName:currentUser.name,doneAt:new Date().toISOString(),...(sig?{doneSignature:sig}:{})};
        const actions=(r.actions||[]).map(a=>a.id===ac.id?{...a,...patch}:a);
        const allDone=actions.every(a=>["concluida","cancelada"].includes(a.status));
        let r2=mkLog({...r,actions},currentUser.name,"acao","Acao concluida","ID: "+ac.id+" | "+(note.slice(0,80))+(sig?" | Assinado eletronicamente":""));
        if(allDone)r2=mkLog(r2,"Sistema","sistema","Todas as acoes concluidas","Aguardando verificacao e encerramento pelo SGQ");
        onUpdate(r2);setSelected(null);
      };
      return <div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div style={{border:"1px solid "+C.border,borderRadius:10,padding:"10px 14px",background:C.card,gridColumn:"1/-1"}}>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>Descricao</div>
            <div style={{fontSize:14,color:C.text}}>{ac.desc}</div>
          </div>
          <div style={{border:"1px solid "+C.border,borderRadius:10,padding:"10px 14px",background:C.card}}>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>Responsavel</div>
            <div style={{fontSize:13,fontWeight:600,color:C.text}}>{resp?resp.name:"—"}</div>
          </div>
          <div style={{border:"1px solid "+C.border,borderRadius:10,padding:"10px 14px",background:C.card}}>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>Prazo</div>
            <div style={{fontSize:13,fontWeight:600,color:ov?C.danger:C.text}}>{fmtD(ac.deadline)}</div>
          </div>
          <div style={{border:"1px solid "+C.border,borderRadius:10,padding:"10px 14px",background:C.card}}>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>Status</div>
            <span style={{display:"inline-flex",padding:"4px 10px",borderRadius:999,fontSize:12,fontWeight:700,background:acColor+"1A",color:acColor,border:"1px solid "+acColor+"44"}}>{ac.status==="concluida"?"Concluida":ov?"Atrasada":"Pendente"}</span>
          </div>
          {ac.obs&&<div style={{border:"1px solid "+C.border,borderRadius:10,padding:"10px 14px",background:C.card,gridColumn:"1/-1"}}>
            <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>Observacao</div>
            <div style={{fontSize:13,color:C.text}}>{ac.obs}</div>
          </div>}
        </div>
        {canAct&&<AcConcForm acId={ac.id} onConfirm={(note,att)=>{setSigModal({action:(sig)=>{concludeAc(note,att,sig);},title:"Assinar - Conclusao de Acao",desc:"Acao: "+ac.id+" - "+ac.desc.slice(0,60),label:"Assinar e Concluir",style:"success",saId:r.id,sigAction:"concluir_acao"});}} request={r} currentUser={currentUser} C={C} Sg={Sg}/>}
        {ac.status==="concluida"&&<div style={{padding:"12px 16px",background:C.success+"0D",border:"1px solid "+C.success+"33",borderRadius:10,marginTop:8}}>
          <div style={{fontSize:10,fontWeight:700,color:C.success,marginBottom:4,textTransform:"uppercase"}}>Concluida</div>
          <div style={{fontSize:13,color:C.text}}>{ac.doneNote}</div>
        </div>}
        <button style={{...Sg.btn(),fontSize:12,marginTop:16,display:"inline-flex",alignItems:"center",gap:6}} onClick={()=>onNav("detail",r.id)}>↗ Ver SA completa</button>
      </div>;
    }
    if(t.type==="plan"){
      return <div style={{textAlign:"center",padding:"20px 0"}}>
        <div style={{fontSize:14,color:C.muted,marginBottom:16}}>Voce e responsavel por montar o plano de acao desta SA.</div>
        <button style={Sg.btn("primary")} onClick={()=>{onClose();onNav("detail",t.req.id,"plano");}}>Abrir Plano de Acao →</button>
      </div>;
    }
    return null;
  };

  if(!open)return null;
  return <>
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"#000a",zIndex:300,backdropFilter:"blur(2px)"}}/>
    <div style={{position:"fixed",top:0,right:0,bottom:0,width:"min(580px,100vw)",background:C.bg,borderLeft:"1px solid "+C.border,zIndex:301,display:"flex",flexDirection:"column",boxShadow:"-8px 0 40px #0008"}}>
      {/* Header */}
      <div style={{padding:"16px 20px",borderBottom:"1px solid "+C.border,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        {selected&&<button onClick={()=>setSelected(null)} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:7,cursor:"pointer",color:C.muted,fontSize:13,padding:"4px 10px",fontFamily:"inherit",flexShrink:0}}>← Voltar</button>}
        <div style={{flex:1,minWidth:0}}>
          {selected
            ?<><div style={{fontSize:14,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selected.label}</div>
               <div style={{fontSize:11,color:C.muted,marginTop:1}}>{selected.sublabel}</div></>
            :<><div style={{fontSize:15,fontWeight:700,color:C.text}}>Minhas Tarefas</div>
               <div style={{fontSize:12,color:C.muted,marginTop:1}}>{pending} pendente{pending!==1?"s":""} · {tasks.length} total</div></>}
        </div>
        <button onClick={onClose} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:7,cursor:"pointer",color:C.muted,fontSize:18,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",flexShrink:0}}>×</button>
      </div>
      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
        {selected?renderTask(selected):<>
          {tasks.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.muted,fontSize:14}}>Nenhuma tarefa pendente </div>}
          {tasks.map((t,i)=>{
            const uc=urgColor(t.urg);
            return <div key={i}
              style={{border:"1px solid "+C.border,borderRadius:10,padding:"12px 16px",background:C.card,marginBottom:10,cursor:"pointer"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent}
              onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}
              onClick={()=>setSelected(t)}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:4}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:15}}>{t.type==="eval"?"":t.type==="plan"?"":"⚡"}</span>
                  <span style={{fontSize:13,fontWeight:600,color:C.text}}>{t.label}</span>
                </div>
                <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:999,background:uc+"18",color:uc,border:"1px solid "+uc+"33",flexShrink:0}}>{urgLabel(t.urg)}</span>
              </div>
              <div style={{fontSize:11,color:C.muted,paddingLeft:23}}>{t.sublabel}</div>
              {t.type==="action"&&<div style={{fontSize:11,color:uc,paddingLeft:23,marginTop:2}}>Prazo: {fmtD(t.ac.deadline)}</div>}
            </div>;
          })}
        </>}
      </div>
    </div>
    <SignatureModal open={!!sigModal} onClose={()=>setSigModal(null)} onConfirm={(sig)=>{if(sigModal&&sigModal.action){sigModal.action(sig);}setSigModal(null);}} title={sigModal&&sigModal.title} description={sigModal&&sigModal.desc} confirmLabel={sigModal&&sigModal.label} confirmStyle={sigModal&&sigModal.style} saId={sigModal&&sigModal.saId} action={sigModal&&sigModal.sigAction} C={C} Sg={Sg}/>
  </>;
}

// ================================================================
function Dashboard({requests,roRecs,ncRecs,currentUser,allUsers,crits,onNav,onNavRO,onNavNC,onOpenEval,onOpenAction,onNew}){
  const {C}=useTheme();const Sg=mkSg(C);
  const isAdmin=hasPerm(currentUser,'sa.avaliacao_inicial');
  const h=new Date().getHours(),nome=currentUser.name.split(" ")[0];
  const getCrit=v=>crits.find(c=>c.v===v);

  const aprovSGQ=isAdmin?[
    ...requests.filter(r=>r.status==="aberta"||r.status==="avaliacao_inicial").map(r=>({type:"triage",r,urg:urgCls(getPhaseDeadline(r),""),tag:"Aval. Inicial",tagColor:C.warning,deadline:getPhaseDeadline(r)})),
    ...requests.filter(r=>r.status==="aprovacao_plano").map(r=>({type:"revisao",r,urg:"today",tag:"Aprovar Aval.",tagColor:C.accent,deadline:getPhaseDeadline(r)})),
    ...requests.filter(r=>r.status==="montagem_plano"&&(r.actions||[]).length>0).map(r=>({type:"plano",r,urg:urgCls(getPhaseDeadline(r),""),tag:"Aprovar Plano",tagColor:C.success,deadline:getPhaseDeadline(r)})),
    ...requests.filter(r=>r.status==="montagem_plano"&&!(r.actions||[]).length).map(r=>({type:"montarplano",r,urg:urgCls(getPhaseDeadline(r),""),tag:"Montar Plano",tagColor:C.accent,deadline:getPhaseDeadline(r)})),
    ...requests.filter(r=>(r.deadlineExtensions||[]).some(e=>e.status==="pending")).map(r=>({type:"extensao",r,urg:"today",tag:"Extensao Prazo",tagColor:C.warning,deadline:getPhaseDeadline(r)})),
  ]:[];

  const pendExt=isAdmin?requests.filter(r=>(r.deadlineExtensions||[]).some(e=>e.status==="pending")):[];

  const analises=[];
  requests.forEach(r=>{
    if(!(["avaliacao_areas","aprovacao_plano"].includes(r.status))||!r.triage)return;
    (r.triage.assignedAreas||[]).forEach(dept=>{
      if(r.triage.assignments&&r.triage.assignments[dept]!==currentUser.id)return;
      if(r.evaluations&&r.evaluations[dept]&&r.evaluations[dept].at)return;
      const dl=r.triage.deadlines&&r.triage.deadlines[dept];
      analises.push({r,dept,dl,urg:urgCls(dl,"")});
    });
  });

  const acoes=[];
  requests.forEach(r=>{
    if(r.status!=="execucao")return;
    (r.actions||[]).filter(a=>parseInt(a.responsible)===parseInt(currentUser.id)&&a.status==="pendente").forEach(a=>{
      acoes.push({r,a,dl:a.deadline,urg:urgCls(a.deadline,a.status)});
    });
  });

  const planosAguardando=requests.filter(r=>r.status==="montagem_plano"&&parseInt(r.planResponsible)===parseInt(currentUser.id));
  const minhasSAs=requests.filter(r=>r.createdBy===currentUser.id&&!["concluida","cancelada"].includes(r.status));
  const O={overdue:0,today:1,soon:2,normal:3};
  const sortU=arr=>[...arr].sort((a,b)=>(O[a.urg||"normal"]||3)-(O[b.urg||"normal"]||3));

  const UrgChip=({urg,dl})=>{
    if(!dl)return null;
    const color=urg==="overdue"?C.danger:urg==="today"?C.warning:urg==="soon"?C.accent:C.muted;
    const label=urg==="overdue"?"Atrasado":urg==="today"?"Hoje":urg==="soon"?"Em breve":"";
    return <div style={{display:"flex",flexDirection:"column",gap:1,alignItems:"flex-start"}}>
      <span style={{fontSize:11,fontWeight:700,color}}>{fmtD(dl)}</span>
      {label&&<span style={{fontSize:9,fontWeight:700,color,background:color+"18",borderRadius:3,padding:"0 4px"}}>{label}</span>}
    </div>;
  };

  const total=aprovSGQ.length+analises.length+acoes.length+minhasSAs.length;

  const canAnalyzeRO=hasPerm(currentUser,'ro.analisar');
  const canCloseRO=hasPerm(currentUser,'ro.fechar');
  const canTratarSeg=hasPerm(currentUser,'ro.tratar_segregado');
  const canAprovarConc=hasPerm(currentUser,'ro.aprovar_concessao');

  // ROs com pelo menos uma linha aguardando qualidade (Segregar ou rejeitada)
  const roParaAnalisar = canTratarSeg ? (roRecs||[]).filter(r=>{
    if(["cancelada","fechada"].includes(r.status)) return false;
    const itens = r.data?.itens || [];
    return itens.some(it =>
      (it.disposicao==="segregar" && it.status!=="concluida") ||
      it.disposicao==="concessao_rejeitada"
    );
  }) : [];

  // ROs com pelo menos uma linha aguardando MINHA aprovação (concessão ou correção)
  const canAprovarCorr = hasPerm(currentUser,'ro.aprovar_correcao');
  const roParaAprovar = (canAprovarConc||canAprovarCorr) ? (roRecs||[]).filter(r=>{
    if(["cancelada","fechada"].includes(r.status)) return false;
    const itens = r.data?.itens || [];
    return itens.some(it => {
      // Correção imediata aguardando minha aprovação
      if(canAprovarCorr && it.disposicao==="correcao" && it.status==="pendente_aprovacao" &&
         String(it.aprovadorCorrecaoId)===String(currentUser.id)) return true;
      // Modelo novo: sublotes de concessão
      if(canAprovarConc && it.sublotes && it.sublotes.length > 0){
        return it.sublotes.some(s =>
          s.tipo==="concessao_solicitada" &&
          String(s.concessaoAprovadorId)===String(currentUser.id)
        );
      }
      // Modelo legado concessão
      return canAprovarConc && it.disposicao==="concessao_solicitada" &&
        String(it.concessaoAprovadorId)===String(currentUser.id);
    });
  }) : [];

  const roParaConcluir = canCloseRO ? (roRecs||[]).filter(r=>r.status==='aguardando_conclusao') : [];

  // ROs prontas para validação final (todos itens terminais, aguardando qualidade fechar)
  const roParaValidar = canCloseRO ? (roRecs||[]).filter(r=>{
    if(["cancelada","fechada","aguardando_conclusao"].includes(r.status)) return false;
    if(r.status!=="em_analise") return false;
    const itens = r.data?.itens||[];
    if(!itens.length) return false;
    return itens.every(it=>{
      if(!it.disposicao) return false; // sem disposição = pendente
      if(it.disposicao==="correcao") return it.status==="concluida"; // precisa aprovação
      if(it.disposicao==="segregar"){
        if(it.sublotes && it.sublotes.length>0)
          return it.sublotes.every(s=>["sucatamento","concessao_aprovada","migrada_nc"].includes(s.tipo));
        return false; // segregado sem sublotes = ainda não tratado
      }
      return ["sucatamento","concessao_aprovada","migrada_nc"].includes(it.disposicao);
    });
  }) : [];

  const pendRO = roParaAnalisar.length + roParaAprovar.length + roParaConcluir.length + roParaValidar.length;

  // ── Pendências NC ────────────────────────────────────────────────
  const canNC = hasPerm(currentUser,'nc.abrir')||hasPerm(currentUser,'nc.tratar_itens')||hasPerm(currentUser,'nc.gerenciar_acoes')||hasPerm(currentUser,'nc.analisar')||hasPerm(currentUser,'nc.fechar')||currentUser?.role==='admin';
  const ncAtivas = (ncRecs||[]).filter(r=>!["fechada","cancelada"].includes(r.status));
  const ncConcessoesMinha = ncAtivas.reduce((acc,r)=>{
    const itens = r.data?.itens||[];
    const minhas = itens.filter(it=>it.dispNC==="concessao_solicitada"&&String(it.aprovadorConcessaoId)===String(currentUser?.id));
    return acc + minhas.length;
  },0);
  const ncAcoesMinha = ncAtivas.reduce((acc,r)=>{
    const acoes = r.data?.acoes||[];
    return acc + acoes.filter(a=>String(a.responsavelId)===String(currentUser?.id)&&!NC_ACAO_STATUS_TERMINAIS.includes(a.status)).length;
  },0);
  const canCloseNC = hasPerm(currentUser,'nc.fechar')||currentUser?.role==='admin';
  const ncParaFechar = canCloseNC ? ncAtivas.filter(r=>{
    const itens = (r.data?.itens||[]).filter(x=>x.codigo);

// ResizableTable — table with draggable column dividers
// ================================================================
function ResizableTable({cols:initialCols,headers,rows,onRowClick,C,storageKey}){
  const load=()=>{
    try{
      const s=storageKey&&localStorage.getItem(storageKey);
      if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length===initialCols.length&&p.every(v=>typeof v==="number"&&v>0))return p;}
    }catch(e){}
    return initialCols.map(v=>Number(v)||80);
  };
  const [cols,setCols]=React.useState(()=>load());
  const dragging=React.useRef(null);
  const containerRef=React.useRef(null);

  const startDrag=(e,i)=>{
    e.preventDefault();e.stopPropagation();
    const startX=e.clientX;
    const startW=cols[i];
    dragging.current={i,startX,startW,live:[...cols]};
    const onMove=(ev)=>{
      if(!dragging.current)return;
      const delta=ev.clientX-dragging.current.startX;
      const next=[...dragging.current.live];
      next[dragging.current.i]=Math.max(60,Math.min(600,dragging.current.startW+delta));
      dragging.current.live=next;
      setCols([...next]);
    };
    const onUp=()=>{
      if(dragging.current&&storageKey)localStorage.setItem(storageKey,JSON.stringify(dragging.current.live));
      dragging.current=null;
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseup",onUp);
    };
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  };

  const [containerW,setContainerW]=React.useState(0);
  React.useEffect(()=>{
    if(!containerRef.current)return;
    const ro=new ResizeObserver(entries=>{setContainerW(entries[0].contentRect.width);});
    ro.observe(containerRef.current);
    return ()=>ro.disconnect();
  },[]);
  const tplStr=React.useMemo(()=>{
    // Cada coluna tem tamanho exato e independente.
    // Nenhuma redistribuição — só scroll horizontal se necessário.
    return cols.map(w=>w+"px").join(" ");
  },[cols]);
  const totalW=cols.reduce((a,b)=>a+b,0);

  return <div ref={containerRef} style={{overflowX:"auto",width:"100%"}}>
    <div style={{minWidth:totalW,width:"100%"}}>
      {/* Header */}
      <div style={{display:"grid",gridTemplateColumns:tplStr,background:C.surface,borderBottom:"1px solid "+C.border}}>
        {headers.map((h,i)=>(
          <div key={i} style={{position:"relative",padding:"7px 10px",fontSize:9,fontWeight:700,color:C.muted,letterSpacing:.6,userSelect:"none",display:"flex",alignItems:"center",overflow:"hidden"}}>
            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{h}</span>
            {i<headers.length-1&&<div
              onMouseDown={e=>startDrag(e,i)}
              title="Arraste para redimensionar"
              style={{position:"absolute",right:-1,top:0,bottom:0,width:8,cursor:"col-resize",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3}}
            ><div style={{width:2,height:"55%",background:C.accent+"66",borderRadius:1}}/></div>}
          </div>
        ))}
      </div>
      {/* Rows */}
      {rows.map((row,i)=>(
        <div key={i} onClick={()=>onRowClick&&onRowClick(row)}
          style={{display:"grid",gridTemplateColumns:tplStr,borderBottom:"1px solid "+C.border+"22",background:i%2===0?"transparent":C.surface+"44",cursor:onRowClick?"pointer":"default",transition:"background .1s"}}
          onMouseEnter={e=>{if(onRowClick)e.currentTarget.style.background=C.accent+"0D";}}
          onMouseLeave={e=>{e.currentTarget.style.background=i%2===0?"transparent":C.surface+"44";}}>
          {row.cells.map((cell,j)=>(
            <div key={j} style={{padding:"7px 10px",overflow:"hidden",alignSelf:"center",minWidth:0}}>{cell}</div>
          ))}
        </div>
      ))}
      {rows.length===0&&<div style={{textAlign:"center",padding:28,color:C.muted,fontSize:13}}>Nenhum registro encontrado.</div>}
    </div>
    </div>;
}

function ChangesTable({requests,currentUser,crits,allUsers,onOpen,onNew}){
  const {C}=useTheme();const Sg=mkSg(C);

  const pool=requests;
  const vis=pool.filter(r=>(
    (!q||(r.id+r.title+r.type+(r.description||"")).toLowerCase().includes(q.toLowerCase()))&&
    (!sf||r.status===sf)&&(!st2||r.type===st2)
  )).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const counts=Object.fromEntries(Object.keys(REQ_ST).map(s=>[s,pool.filter(r=>r.status===s).length]));
  const getCrit=v=>crits.find(c=>c.v===v);

  const DeadlineCell=({r})=>{
    let dl=getPhaseDeadline(r);
    // For "plano" and "execucao" status, use latest action deadline as reference
    if((r.status==="plano"||r.status==="execucao")&&(r.actions||[]).length>0){
      const pendingDls=(r.actions||[]).filter(a=>a.status!=="concluida"&&a.status!=="cancelada"&&a.deadline).map(a=>a.deadline);
      if(pendingDls.length>0) dl=pendingDls.sort().reverse()[0];
      else{
        // all done — show latest completion
        const doneDls=(r.actions||[]).filter(a=>a.deadline).map(a=>a.deadline);
        if(doneDls.length>0) dl=doneDls.sort().reverse()[0];
      }
    }
    if(!dl)return <span style={{color:C.muted,fontSize:11}}>—</span>;
    const urg=urgCls(dl,"");
    const color=urg==="overdue"?C.danger:urg==="today"?C.warning:urg==="soon"?C.accent:C.muted;

      <span style={{fontSize:11,fontWeight:700,color}}>{fmtD(dl)}</span>

      <select value={st2} onChange={e=>setST2(e.target.value)} style={{...Sg.input(),maxWidth:200}}>
        <option value="">Todos os tipos</option>
        {CHANGE_TYPES.map(t=><option key={t} value={t}>{t}</option>)}

    <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>

          {v.label} ({counts[k]})

      <ResizableTable
        storageKey="cm_changes_cols_v5"
        cols={[95,200,260,115,38,185,82,90]}
        headers={["ID","Título","Descrição","Tipo","Crit.","Status","Abertura","Prazo Etapa"]}
        onRowClick={row=>onOpen(row.r.id)}
        C={C}
        rows={vis.map(r=>{
          const cr=getCrit(r.triage&&r.triage.criticality);const st=REQ_ST[r.status]||{};
          const aa=(r.triage&&r.triage.assignedAreas)||[];const doneEv=aa.filter(d=>r.evaluations&&r.evaluations[d]&&r.evaluations[d].at).length;
          const ovAc=(r.actions||[]).filter(a=>isOD(a.deadline,a.status)).length;
          const pendExt=(r.deadlineExtensions||[]).filter(e=>e.status==="pending").length;
          return {r,cells:[

              <div style={{fontSize:12,fontWeight:600,color:C.text,lineHeight:1.3,maxHeight:56,overflowY:"auto",wordBreak:"break-word"}}>{r.title}</div>
              <div style={{display:"flex",gap:3,marginTop:2}}>
