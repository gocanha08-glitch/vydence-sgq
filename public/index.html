function ActionsPage({requests,currentUser,allUsers,crits,onNav}){
  const {C}=useTheme();const Sg=mkSg(C);
  const isAdmin=hasPerm(currentUser,'sa.avaliacao_inicial');

  const [q,setQ]=useState("");
  const [fType,setFType]=useState(""); // ""=todas | "acao" | "avaliacao"
  const [fStatus,setFStatus]=useState("pendente"); // "pendente" | "concluida" | "todas"
  const [fResp,setFResp]=useState("");
  const [fSA,setFSA]=useState("");

  const [sortCol,setSortCol]=useState("createdAt");
  const [sortDir,setSortDir]=useState("asc");
  const toggleSort=(col)=>{if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("asc");}};

  // Montar lista unificada
  const allItems=[];

  // Ações
  requests.forEach(r=>{
    (r.actions||[]).forEach(a=>{
      const cr=crits.find(c=>c.v===(r.triage&&r.triage.criticality));
      const resp=allUsers.find(u=>u.id===a.responsible);
      const done=a.status==="concluida";const cancel=a.status==="cancelada"||r.status==="cancelada";
      const ov=isOD(a.deadline,a.status);
      const urg=done||cancel?"done":urgCls(a.deadline,a.status);
      allItems.push({type:"acao",key:r.id+"-"+a.id,r,a,cr,resp,done,cancel,ov,urg,dl:a.deadline,label:a.desc,sublabel:a.id,status:cancel?"cancelada":a.status,doneAt:a.doneAt,doneBy:a.doneByName||(done&&resp?resp.name:null)});
    });
  });

  // Avaliações — excluir SAs canceladas e avaliações canceladas
  requests.forEach(r=>{
    if(!r.triage||r.status==="cancelada")return;
    (r.triage.assignedAreas||[]).forEach(dept=>{
      const cr=crits.find(c=>c.v===r.triage.criticality);
      const respId=r.triage.assignments&&r.triage.assignments[dept];
      const resp=allUsers.find(u=>u.id===respId);
      const ev=r.evaluations&&r.evaluations[dept];
      if(ev&&ev.cancelled)return; // pular avaliações canceladas
      const dl=r.triage.deadlines&&r.triage.deadlines[dept];
      const done=!!(ev&&ev.at);
      const ov=!done&&isOD(dl,"");
      const urg=done?"done":urgCls(dl,"");
      allItems.push({type:"avaliacao",key:r.id+"-eval-"+dept,r,dept,cr,resp,ev,dl,done,ov,urg,label:dept,sublabel:r.id,status:done?"concluida":"pendente",doneAt:ev&&ev.at,doneBy:ev&&ev.byName});
    });
  });

  // Filtrar
  const respList=[...new Set(allItems.map(i=>i.resp&&i.resp.name).filter(Boolean))].sort();
  const saList=[...new Set(allItems.map(i=>i.r.id))].sort();

  const urgOrder={overdue:0,today:1,soon:2,normal:3,done:4};
  const vis=allItems.filter(i=>{
    const matchQ=!q||(i.label+i.sublabel+i.r.id+i.r.title+(i.resp&&i.resp.name||"")).toLowerCase().includes(q.toLowerCase());
    const matchType=!fType||i.type===fType;
    const matchStatus=fStatus==="todas"||(fStatus==="pendente"&&!i.done&&!i.cancel)||(fStatus==="concluida"&&(i.done||i.cancel));
    const matchResp=!fResp||(i.resp&&i.resp.name===fResp);
    const matchSA=!fSA||i.r.id===fSA;
    return matchQ&&matchType&&matchStatus&&matchResp&&matchSA;
  }).sort((a,b)=>{
    let va,vb;
    if(sortCol==="dl"){va=a.dl||"9999";vb=b.dl||"9999";}
    else if(sortCol==="status"){va=a.status||"";vb=b.status||"";}
    else if(sortCol==="resp"){va=a.resp&&a.resp.name||"";vb=b.resp&&b.resp.name||"";}
    else if(sortCol==="tipo"){va=a.type||"";vb=b.type||"";}
    else if(sortCol==="sa"){va=a.r.id||"";vb=b.r.id||"";}
    else{va=a.r.createdAt||"";vb=b.r.createdAt||"";}
    const cmp=va.localeCompare(vb);
    return sortDir==="asc"?cmp:-cmp;
  });

  const SortTh=({label,col,style={}})=>{
    const active=sortCol===col;
    const arrow=active?(sortDir==="asc"?" ↑":" ↓"):" ↕";
    return <span onClick={()=>toggleSort(col)} style={{cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",...style}}>
      {label}<span style={{opacity:active?1:.3,fontSize:9}}>{arrow}</span>
    </span>;
  };

  const pend=allItems.filter(i=>!i.done&&!i.cancel).length;
  const late=allItems.filter(i=>i.ov).length;
  const done=allItems.filter(i=>i.done||i.cancel).length;

  const [fFrom,setFF]=React.useState("");
  const [fTo,setFT]=React.useState("");

  const load=async()=>{
    setLoading(true);

// ── Autocomplete de produto ──────────────────────────────────────
// IMPORTANTE: usa ReactDOM.createPortal para fugir de overflow:auto/hidden
// do container pai (caso típico: dropdown dentro de tabela com scroll horizontal).
function ProdutoAutocomplete({value, onChange, onSelect, C, Sg, placeholder}){
  const [q, setQ] = useState(value||"");
  const [results, setResults] = useState([]);
  const [open, setOpen] = useState(false);
  const [loading, setLoading] = useState(false);
  const [coords, setCoords] = useState({top:0,left:0,width:0});
  const ref = React.useRef(null);
  const inputRef = React.useRef(null);

  React.useEffect(()=>{ setQ(value||""); },[value]);

  // Click fora fecha — considera tanto o container quanto o dropdown portado
  React.useEffect(()=>{
    const handler = e => {
      const inHost = ref.current && ref.current.contains(e.target);
      const dd = document.getElementById('produto-autocomplete-dropdown');
      const inDd = dd && dd.contains(e.target);
      if(!inHost && !inDd) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return ()=>document.removeEventListener("mousedown", handler);
  },[]);

  // Recalcula posição absoluta do dropdown (em coordenadas da viewport)
  const updateCoords = () => {
    if(inputRef.current){
      const r = inputRef.current.getBoundingClientRect();
      const minW = 540;
      const desiredW = Math.max(r.width, minW);
      const maxW = window.innerWidth - r.left - 16;
      const width = Math.min(desiredW, maxW);
      setCoords({top: r.bottom + 2, left: r.left, width});
    }
  };

  React.useEffect(()=>{
    if(!open) return;
    updateCoords();
    const onScroll = () => setOpen(false);   // fecha ao rolar
    const onResize = () => updateCoords();
    window.addEventListener('scroll', onScroll, true);
    window.addEventListener('resize', onResize);
    return ()=>{
      window.removeEventListener('scroll', onScroll, true);
      window.removeEventListener('resize', onResize);
    };
  },[open]);

  const search = async (term) => {
    if(!term||term.length<2){ setResults([]); setOpen(false); return; }
    setLoading(true);
    try{
      const token = sessionStorage.getItem('sgq_token');
      const res = await fetch('/api/produtos?q='+encodeURIComponent(term),{headers:{'Authorization':'Bearer '+token}});
      const data = await res.json();
      const list = Array.isArray(data)?data:[];
      setResults(list);
      // Se retornou exatamente 1 resultado com código igual ao digitado → preenche direto
      if(list.length===1 && list[0].codigo.toLowerCase()===term.toLowerCase()){
        onSelect(list[0]);
        setOpen(false);
      } else {
        setOpen(list.length>0);
      }
    }catch{ setResults([]); }
    setLoading(false);
  };

  // Busca exata ao sair do campo (blur) ou apertar Enter/Tab
  const fetchExact = async (term) => {
    if(!term||term.length<2) return;
    try{
      const token = sessionStorage.getItem('sgq_token');
      const res = await fetch('/api/produtos?codigo='+encodeURIComponent(term.trim()),{headers:{'Authorization':'Bearer '+token}});
      const data = await res.json();
      if(data && data.codigo){ onSelect(data); setOpen(false); }
    }catch{}
  };

  const debounceRef = React.useRef(null);
  const handleChange = (v) => {
    setQ(v);
    onChange(v);
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(()=>search(v), 300);
  };

  // Dropdown via portal — escapa do overflow do container pai
  const dropdown = (open && results.length>0) ? ReactDOM.createPortal(
    <div id="produto-autocomplete-dropdown" style={{
      position:"fixed",
      top: coords.top,
      left: coords.left,
      width: coords.width,
      zIndex: 9999,
      background: C.card,
      border:"1px solid "+C.border,
      borderRadius:8,
      boxShadow:"0 8px 24px rgba(0,0,0,0.18)",
      maxHeight:220,
      overflowY:"auto"
    }}>
      {results.map((p,i)=>(
        <div key={i}
          style={{padding:"8px 12px",cursor:"pointer",borderBottom:"1px solid "+C.border,fontSize:12}}
          onMouseEnter={e=>e.currentTarget.style.background=C.surface}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}
          onMouseDown={e=>e.preventDefault()}
          onClick={()=>{ onSelect(p); setQ(p.codigo); setOpen(false); }}>
          <span style={{fontWeight:700,color:C.accent}}>{p.codigo}</span>
          <span style={{color:C.muted,marginLeft:8}}>{p.descricao}</span>
        </div>
      ))}
    </div>,
    document.body
  ) : null;

  return <div ref={ref} style={{position:"relative",width:"100%"}}>
    <div style={{position:"relative"}}>
      <input
        ref={inputRef}
        style={{...Sg.input(), paddingRight: loading?32:10}}
        value={q}
        onChange={e=>handleChange(e.target.value)}
        placeholder={placeholder||"Digite o código..."}
        onFocus={()=>{ if(results.length>0) setOpen(true); }}
        onBlur={()=>{ setTimeout(()=>{ if(q.trim()) fetchExact(q.trim()); setOpen(false); },200); }}
        onKeyDown={e=>{ if(e.key==='Enter'||e.key==='Tab'){ fetchExact(q.trim()); setOpen(false); } }}
        autoComplete="off"
      />
      {loading&&<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:10,color:C.muted}}>...</span>}
    </div>
    {dropdown}
  </div>;
}

// ── Linha de item (produto afetado) ─────────────────────────────
// ── Textarea com altura automática ───────────────────────────────
function AutoTextarea({value, onChange, placeholder, style, ...rest}){
  const ref = React.useRef(null);
  const resize = () => {
    const t = ref.current;
    if(!t) return;
    t.style.height = 'auto';
    t.style.height = t.scrollHeight + 'px';
  };
  React.useEffect(()=>{ resize(); }, [value]);
  return <textarea
    ref={ref}
    rows={1}
    value={value||""}
    onChange={e=>{ onChange(e); resize(); }}
    placeholder={placeholder}
    style={{
      width:"100%", fontSize:12, padding:"7px 8px", resize:"none",
      fontFamily:"inherit", lineHeight:1.4, overflow:"hidden",
      boxSizing:"border-box", display:"block",
      ...(style||{})
    }}
    {...rest}
  />;
}

// ── Disposições (todas as possíveis) ─────────────────────────────
// Abertura (operador): correcao, segregar
// Tratamento (qualidade): sucatamento, concessao_solicitada (depois aprovada/rejeitada), migrada_nc
const RO_DISP_ABERTURA = {
  correcao:  {label:"Correção imediata", short:"Correção", color:"success"},
  segregar:  {label:"Segregar com Qualidade", short:"Segregar", color:"warning"}
};

// Estados terminais e intermediários (podem ser definidos pela qualidade)
const RO_DISP_QUALIDADE = {
  sucatamento:           {label:"Sucatamento", short:"Sucatado", color:"danger"},
  concessao_solicitada:  {label:"Concessão solicitada", short:"Concessão", color:"info"},
  concessao_aprovada:    {label:"Concessão aprovada", short:"Concessão ✓", color:"success"},
  concessao_rejeitada:   {label:"Concessão rejeitada", short:"Rejeitada", color:"danger"},
  migrada_nc:            {label:"Migrada para NC", short:"→ NC", color:"info"}
};

const RO_DISP_TODAS = {...RO_DISP_ABERTURA, ...RO_DISP_QUALIDADE};

function dispLabel(disp){ return (RO_DISP_TODAS[disp]||{}).short || "—"; }

// Determina se a linha está num estado pendente (precisa de ação)
function lineIsPending(item){
  if(!item) return false;
  if(item.sublotes && item.sublotes.length > 0){
    return item.sublotes.some(s =>
      s.tipo==="concessao_solicitada" || s.tipo==="concessao_rejeitada"
    );
  }
  const d = item.disposicao;
  if(!d) return true;
  if(d==="segregar" && item.status!=="concluida") return true;
  if(d==="concessao_solicitada") return true;
  if(d==="concessao_rejeitada") return true;
  return false;
}

function linePendencyType(item){
  if(!item) return null;
  if(item.sublotes && item.sublotes.length > 0){
    if(item.sublotes.some(s => s.tipo==="concessao_rejeitada")) return "redecidir";
    if(item.sublotes.some(s => s.tipo==="concessao_solicitada")) return "aprovacao";
    return null;
  }
  const d = item.disposicao;
  if(!d) return "definir";
  if(d==="segregar" && item.status!=="concluida") return "qualidade";
  if(d==="concessao_solicitada") return "aprovacao";
  if(d==="concessao_rejeitada") return "redecidir";
  return null;
}

function lineIsTratada(item){
  if(!item) return false;
  if(item.sublotes && item.sublotes.length > 0){
    return item.sublotes.every(s =>
      ["sucatamento","concessao_aprovada","migrada_nc"].includes(s.tipo)
    );
  }
  return ["sucatamento","concessao_aprovada","migrada_nc"].includes(item.disposicao);
}

function DispBadge({disp, status, sublotes, C}){
  // Modelo novo: sublotes
  if(sublotes && sublotes.length > 0){
    const colorMap2 = {
      sucatamento:         {bg:"#FCEBEB", col:"#501313", label:"Sucatado"},
      concessao_solicitada:{bg:"#E6F1FB", col:"#0C447C", label:"Concessão"},
      concessao_aprovada:  {bg:"#EAF3DE", col:"#27500A", label:"Concessão ✓"},
      concessao_rejeitada: {bg:"#FCEBEB", col:"#501313", label:"Rejeitada"},
      migrada_nc:          {bg:"#EEE8FB", col:"#3D1F8C", label:"→ NC"},
    };
    return <span style={{display:"flex", flexWrap:"wrap", gap:4}}>
      {sublotes.map((s,i)=>{
        const m = colorMap2[s.tipo]||{bg:"#eee", col:"#555", label:s.tipo};
        return <span key={i} style={{
          fontSize:11, padding:"2px 7px", borderRadius:8,
          background:m.bg, color:m.col, fontWeight:500, whiteSpace:"nowrap"
        }}>{s.qtd}x {m.label}</span>;
      })}
    </span>;
  }
  // Modelo legado
  if(!disp) return <span style={{fontSize:11, color:C.muted, fontStyle:"italic"}}>definir...</span>;
  const meta = RO_DISP_TODAS[disp]||{};
  const colorMap = {success:C.success, warning:C.warning, danger:C.danger, info:C.accent};
  const col = colorMap[meta.color]||C.muted;
  const isPending = (disp==="segregar" && status!=="concluida")
                 || disp==="concessao_solicitada"
                 || disp==="concessao_rejeitada";
  return <span style={{
    display:"inline-flex", alignItems:"center", gap:5,
    fontSize:11, color:col, fontWeight:600,
    padding:"3px 8px",
    background:col+"15", borderRadius:10,
    whiteSpace:"nowrap"
  }}>
    {meta.short||"—"}
    <span style={{fontSize:9, opacity:.8}}>{isPending?"⏳":"✓"}</span>
  </span>;
}

// ── Modal pra escolher/registrar disposição ──────────────────────
function DisposicaoModal({open, item, onClose, onSave, allUsers, currentUser, C, Sg}){
  const [disp, setDisp] = useState(item?.disposicao||"");
  const [acao, setAcao] = useState(item?.acaoCorrecao||"");
  const [aprovCorr, setAprovCorr] = useState(item?.aprovadorCorrecaoId||"");

  React.useEffect(()=>{
    if(open){
      setDisp(item?.disposicao||"");
      setAcao(item?.acaoCorrecao||"");
      setAprovCorr(item?.aprovadorCorrecaoId||"");
    }
  }, [open, item]);

  if(!open) return null;
  const aprovadoresCorr = (allUsers||[]).filter(u=>u.active!==false && hasPerm(u,"ro.aprovar_correcao") && u.id!==currentUser?.id);
  const canSave = disp==="segregar" || (disp==="correcao" && acao.trim().length>0 && aprovCorr);

  return <Modal open={open} onClose={onClose} title="Definir disposição" width={500}>
    <div style={{display:"flex", flexDirection:"column", gap:14}}>
      {item && <div style={{padding:"8px 12px", background:C.surface, borderRadius:6, fontSize:12, color:C.muted}}>
        <strong style={{color:C.accent}}>{item.codigo||"—"}</strong>
        {item.descricao && <span> · {item.descricao}</span>}
        {item.lote && <span> · Lote {item.lote}</span>}
        {item.qtdNC && <span> · Qtd {item.qtdNC}</span>}
      </div>}

      <div>
        <label style={Sg.lbl}>Disposição *</label>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:4}}>
          <button
            onClick={()=>setDisp("correcao")}
            style={{
              padding:"12px 10px", textAlign:"left", cursor:"pointer",
              border:"1px solid "+(disp==="correcao"?C.accent:C.border),
              background:disp==="correcao"?C.accent+"10":C.card,
              borderRadius:8, fontSize:12, color:C.text
            }}>
            <div style={{fontWeight:600, marginBottom:2}}>Correção imediata</div>
            <div style={{fontSize:11, color:C.muted}}>Já resolvi, vou registrar o que foi feito</div>
          </button>
          <button
            onClick={()=>setDisp("segregar")}
            style={{
              padding:"12px 10px", textAlign:"left", cursor:"pointer",
              border:"1px solid "+(disp==="segregar"?C.accent:C.border),
              background:disp==="segregar"?C.accent+"10":C.card,
              borderRadius:8, fontSize:12, color:C.text
            }}>
            <div style={{fontWeight:600, marginBottom:2}}>Segregar com Qualidade</div>
            <div style={{fontSize:11, color:C.muted}}>Não resolvo agora, qualidade decide</div>
          </button>
        </div>
      </div>

      {disp==="correcao" && <div>
        <label style={Sg.lbl}>O que foi feito *</label>
        <textarea
          style={{...Sg.input(), minHeight:80, resize:"vertical", fontFamily:"inherit"}}
          value={acao}
          onChange={e=>setAcao(e.target.value)}
          placeholder="Ex: Solda refeita no ponto J3, inspecionada visualmente."
        />
      </div>}
      {disp==="correcao" && <div>
        <label style={Sg.lbl}>Aprovador da correção *</label>
        <div style={{fontSize:12, color:C.muted, marginBottom:6}}>Quem vai validar que a correção foi feita corretamente.</div>
        <select value={aprovCorr} onChange={e=>setAprovCorr(e.target.value)} style={Sg.input()}>
          <option value="">Selecione o aprovador...</option>
          {aprovadoresCorr.map(u=>(
            <option key={u.id} value={u.id}>{u.name}{u.area?" — "+u.area:""}</option>
          ))}
        </select>
        {aprovadoresCorr.length===0 && <div style={{fontSize:11, color:C.danger, marginTop:4}}>Nenhum usuário com permissão "Aprovar correção imediata" cadastrado.</div>}
      </div>}



      <div style={{display:"flex", justifyContent:"flex-end", gap:8, marginTop:6}}>
        <button style={Sg.btn()} onClick={onClose}>Cancelar</button>
        <button
          style={{...Sg.btn("primary"), opacity:canSave?1:.4}}
          disabled={!canSave}
          onClick={()=>{
            onSave({
              disposicao: disp,
              acaoCorrecao: disp==="correcao" ? acao.trim() : "",
              aprovadorCorrecaoId: disp==="correcao" ? aprovCorr : "",
              aprovadorCorrecaoNome: disp==="correcao" ? (aprovadoresCorr.find(u=>String(u.id)===String(aprovCorr))?.name||"") : "",
              status: disp==="segregar" ? "pendente" : "pendente_aprovacao",
              dispDefinedAt: new Date().toISOString()
            });
          }}>
          Confirmar
        </button>
      </div>
    </div>
  </Modal>;
}

    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16}}>

        <div style={{fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:.4, marginBottom:4}}>Peça</div>

        {item.descricao && <div style={{fontSize:12, color:C.muted, marginTop:2}}>{item.descricao}</div>}

      <div>
        <div style={{fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:.4, marginBottom:4}}>Lote</div>

      </div>
      <div>
        <div style={{fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:.4, marginBottom:4}}>Quantidade</div>

      </div>

}

// ── 1. Menu Tratar ────────────────────────────────────────────────
// Quando qualidade clica em "Tratar" numa linha segregada, abre este menu.
// Cada opção é um card clicável que dispara onPick(decisao).
// ── TratarItemModal — modelo de sublotes ─────────────────────────
// Qualidade distribui as unidades segregadas entre disposições.
// Cada linha: disposição + qtd + campo extra (justificativa/motivo/obs).
// Concessão mostra seletor de aprovador + campo de aprovador único por RO.
function TratarItemModal({open, item, allUsers, currentUser, aprovadorGlobal, onClose, onConfirm, C, Sg}){
  const OPTS = [
    {val:"concessao_solicitada", label:"Concessão",    bg:"#E6F1FB", col:"#0C447C"},
    {val:"sucatamento",          label:"Sucatamento",  bg:"#FCEBEB", col:"#501313"},
    {val:"migrada_nc",           label:"Mover para NC",bg:"#EEE8FB", col:"#3D1F8C"},
  ];
  const [linhas, setLinhas] = useState([{tipo:"concessao_solicitada", qtd:"", extra:""}]);
  const [aprovador, setAprovador] = useState(aprovadorGlobal||"");

  React.useEffect(()=>{
    if(open){
      const prev = item?.sublotes;
      if(prev && prev.length > 0){
        setLinhas(prev.map(s=>({tipo:s.tipo, qtd:String(s.qtd||""), extra:s.extra||""})));
      } else {
        setLinhas([{tipo:"concessao_solicitada", qtd:"", extra:""}]);
      }
      setAprovador(aprovadorGlobal||"");
    }
  }, [open, item, aprovadorGlobal]);

  if(!open) return null;

  const qtdTotal = parseInt(item?.qtdNC)||0;
  const soma = linhas.reduce((acc,l)=>acc+(parseInt(l.qtd)||0),0);
  const totalOk = soma === qtdTotal && qtdTotal > 0;

  const temConcessao = linhas.some(l=>l.tipo==="concessao_solicitada");
  const aprovadores = (allUsers||[]).filter(u=>{
    if(u.active===false) return false;
    if(u.id===currentUser?.id) return false;
    return hasPerm(u,"ro.aprovar_concessao");
  });

  const usadas = linhas.map(l=>l.tipo);
  const disponiveis = OPTS.filter(o=>!usadas.includes(o.val));

  const addLinha = () => {
    if(disponiveis.length===0) return;
    setLinhas(prev=>[...prev, {tipo:disponiveis[0].val, qtd:"", extra:""}]);
  };

  const remLinha = (i) => {
    setLinhas(prev=>prev.filter((_,j)=>j!==i));
  };

  const updLinha = (i, field, val) => {
    setLinhas(prev=>{
      const n=[...prev];
      n[i]={...n[i],[field]:val};
      return n;
    });
  };

  const extraLabel = (tipo) => {
    if(tipo==="concessao_solicitada") return "Justificativa técnica";
    if(tipo==="sucatamento") return "Motivo do sucatamento";
    return "Observação (opcional)";
  };

  const canConfirm = totalOk && (!temConcessao || aprovador);
  const linhasValidas = linhas.filter(l=>parseInt(l.qtd)>0);

  return <Modal open={open} onClose={onClose} title="" width={600}>
    <div style={{margin:-16}}>
      <div style={{padding:"18px 22px 14px"}}>
        <div style={{fontSize:16, fontWeight:600, color:C.text}}>Tratar item segregado</div>
        <div style={{fontSize:12, color:C.muted, marginTop:3}}>Distribua as {qtdTotal} unidades entre as disposições abaixo</div>
      </div>
      <ItemInfoStrip item={item} C={C}/>
      <div style={{padding:"18px 22px"}}>

        {/* Linhas de disposição */}
        {linhas.map((l,i)=>{
          const optsDisponiveis = OPTS.filter(o=>o.val===l.tipo || !usadas.filter((_,j)=>j!==i).includes(o.val));
          return <div key={i} style={{
            display:"grid", gridTemplateColumns:"160px 68px 1fr auto",
            gap:8, alignItems:"start", marginBottom:10
          }}>
            <select
              value={l.tipo}
              onChange={e=>updLinha(i,"tipo",e.target.value)}
              style={{...Sg.input(), fontSize:12, height:34}}>
              {optsDisponiveis.map(o=>(
                <option key={o.val} value={o.val}>{o.label}</option>
              ))}
            </select>
            <input
              type="number" min="1" max={qtdTotal}
              placeholder="Qtd"
              value={l.qtd}
              onChange={e=>updLinha(i,"qtd",e.target.value)}
              style={{...Sg.input(), fontSize:12, height:34, textAlign:"center",
                MozAppearance:"textfield", WebkitAppearance:"none"}}/>
            <input
              type="text"
              placeholder={extraLabel(l.tipo)}
              value={l.extra||""}
              onChange={e=>updLinha(i,"extra",e.target.value)}
              style={{...Sg.input(), fontSize:12, height:34}}/>
            {linhas.length>1
              ? <button onClick={()=>remLinha(i)} style={{
                  height:34, padding:"0 10px", border:"0.5px solid "+C.border,
                  borderRadius:6, background:"transparent", cursor:"pointer",
                  color:C.muted, fontSize:14, fontFamily:"inherit"
                }}>×</button>
              : <div style={{width:34}}/>}
          </div>;
        })}

        {/* Total */}
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:6, marginBottom:14}}>
          <span style={{fontSize:13, color:totalOk?C.success:C.danger, fontWeight:500}}>
            Total: {soma} / {qtdTotal} {!totalOk && soma>0 ? "— precisa fechar exato" : ""}
          </span>
          {disponiveis.length>0 && <button
            onClick={addLinha}
            style={{fontSize:12, padding:"4px 12px", border:"0.5px dashed "+C.border,
              borderRadius:6, background:"transparent", cursor:"pointer", color:C.muted}}>
            + adicionar disposição
          </button>}
        </div>

        {/* Aprovador único (aparece quando tem concessão) */}
        {temConcessao && <div style={{
          background:C.surface, borderRadius:8, padding:"14px 16px", marginTop:4
        }}>
          <label style={{display:"block", fontSize:13, fontWeight:600, color:C.text, marginBottom:6}}>
            Aprovador da concessão <span style={{color:C.danger}}>*</span>
          </label>
          <div style={{fontSize:12, color:C.muted, marginBottom:8}}>
            Todas as concessões desta RO irão para o mesmo aprovador.
          </div>
          <select
            value={aprovador}
            onChange={e=>setAprovador(e.target.value)}
            style={Sg.input()}>
            <option value="">Selecione o aprovador...</option>
            {aprovadores.map(u=>(
              <option key={u.id} value={u.id}>{u.name}{u.area?" — "+u.area:""}</option>
            ))}
          </select>
        </div>}
      </div>

      <div style={{padding:"12px 22px", borderTop:"1px solid "+C.border, display:"flex", justifyContent:"flex-end", gap:8}}>
        <button style={{...Sg.btn(), fontSize:12, padding:"7px 14px"}} onClick={onClose}>Cancelar</button>
        <button
          style={{...Sg.btn("primary"), fontSize:12, padding:"7px 18px", opacity:canConfirm?1:.4}}
          disabled={!canConfirm}
          onClick={()=>onConfirm({linhas:linhasValidas, aprovador})}>
          Confirmar tratamento
        </button>
      </div>
    </div>
  </Modal>;
}

// ── 5. Aprovar Concessão ──────────────────────────────────────────
// Aprovador lê a análise da qualidade e decide. Aprovar vai direto pra
// assinatura. Rejeitar abre modal de motivo antes da assinatura.
// ── ValidarConcluirModal ─────────────────────────────────────────
// Qualidade revisa o resumo dos itens e registra análise final antes de fechar.
function ValidarConcluirModal({open, itens, onClose, onConfirm, C, Sg}){
  const [analise, setAnalise] = useState("");
  React.useEffect(()=>{ if(open) setAnalise(""); }, [open]);
  if(!open) return null;

  const DISP_LABEL = {
    correcao: "Correção imediata",
    sucatamento: "Sucatado", concessao_aprovada: "Concessão aprovada",
    migrada_nc: "→ NC", concessao_solicitada: "Concessão (aguardando)",
    concessao_rejeitada: "Concessão rejeitada", segregar: "Segregado"
  };
  const DISP_COLOR = {
    correcao: "#27500A", sucatamento: "#501313", concessao_aprovada: "#27500A",
    migrada_nc: "#3D1F8C", concessao_solicitada: "#0C447C", concessao_rejeitada: "#501313"
  };

  return <Modal open={open} onClose={onClose} title="" width={600}>
    <div style={{margin:-16}}>
      <div style={{padding:"18px 22px 14px"}}>
        <div style={{fontSize:16, fontWeight:600, color:C.text}}>Validação final</div>
        <div style={{fontSize:12, color:C.muted, marginTop:3}}>Revise o que foi feito e registre a análise da qualidade</div>
      </div>

      {/* Resumo dos itens */}
      <div style={{padding:"0 22px 16px"}}>
        <table style={{width:"100%", borderCollapse:"collapse", fontSize:12}}>
          <thead>
            <tr style={{borderBottom:"1px solid "+C.border}}>
              <th style={{padding:"6px 8px", textAlign:"left", fontWeight:600, color:C.muted}}>Código</th>
              <th style={{padding:"6px 8px", textAlign:"left", fontWeight:600, color:C.muted}}>Descrição</th>
              <th style={{padding:"6px 8px", textAlign:"left", fontWeight:600, color:C.muted}}>Qtd</th>
              <th style={{padding:"6px 8px", textAlign:"left", fontWeight:600, color:C.muted}}>Resultado</th>
            </tr>
          </thead>
          <tbody>
            {(itens||[]).map((it,i)=>{
              const disp = it.disposicao;
              if(disp==="correcao"){
                return <tr key={i} style={{borderBottom:"1px solid "+C.border+"44"}}>
                  <td style={{padding:"8px 8px", fontWeight:600, color:C.accent}}>{it.codigo||"—"}</td>
                  <td style={{padding:"8px 8px", color:C.muted, fontSize:11}}>{it.descricao||"—"}</td>
                  <td style={{padding:"8px 8px"}}>{it.qtdNC||"—"}</td>
                  <td style={{padding:"8px 8px"}}>
                    <div style={{fontSize:11, padding:"2px 7px", borderRadius:6, background:"#EAF3DE", color:"#27500A", fontWeight:500, display:"inline-block", marginBottom:2}}>Correção imediata</div>
                    {it.acaoCorrecao && <div style={{fontSize:11, color:C.muted, marginTop:3}}>"{it.acaoCorrecao}"</div>}
                  </td>
                </tr>;
              }
              if(disp==="segregar" && it.sublotes && it.sublotes.length>0){
                return <tr key={i} style={{borderBottom:"1px solid "+C.border+"44"}}>
                  <td style={{padding:"8px 8px", fontWeight:600, color:C.accent}}>{it.codigo||"—"}</td>
                  <td style={{padding:"8px 8px", color:C.muted, fontSize:11}}>{it.descricao||"—"}</td>
                  <td style={{padding:"8px 8px"}}>{it.qtdNC||"—"}</td>
                  <td style={{padding:"8px 8px"}}>
                    <div style={{display:"flex", flexWrap:"wrap", gap:4}}>
                      {it.sublotes.map((s,si)=>{
                        const col = DISP_COLOR[s.tipo]||C.muted;
                        const lbl = DISP_LABEL[s.tipo]||s.tipo;
                        const bg = s.tipo==="sucatamento"?"#FCEBEB":s.tipo==="concessao_aprovada"?"#EAF3DE":s.tipo==="migrada_nc"?"#EEE8FB":"#E6F1FB";
                        return <span key={si} style={{fontSize:11,padding:"2px 7px",borderRadius:6,background:bg,color:col,fontWeight:500}}>{s.qtd}x {lbl}</span>;
                      })}
                    </div>
                  </td>
                </tr>;
              }
              return null;
            })}
          </tbody>
        </table>
      </div>

      {/* Análise final */}
      <div style={{padding:"0 22px 20px"}}>
        <label style={{display:"block", fontSize:13, fontWeight:600, color:C.text, marginBottom:6}}>
          Análise final da qualidade <span style={{color:C.danger}}>*</span>
        </label>
        <div style={{fontSize:12, color:C.muted, marginBottom:8}}>
          Registre a conclusão da qualidade sobre esta ocorrência. Fica gravado no histórico para rastreabilidade.
        </div>
        <textarea
          style={{...Sg.input(), minHeight:90, resize:"vertical", fontFamily:"inherit"}}
          value={analise}
          onChange={e=>setAnalise(e.target.value)}
          placeholder="Ex: Itens inspecionados. Correção imediata validada. Sucatamento realizado conforme procedimento. Concessão aprovada para uso em lote controlado."
        />
      </div>

// ── Linha de item editável ───────────────────────────────────────
function ItemRow({item, idx, onChange, onCommit, onRemove, onOpenDisp, C, Sg}){
  const cellMid = {padding:"8px 6px", verticalAlign:"middle"};
  const inputStyle = {...Sg.input(), fontSize:12, height:32, boxSizing:"border-box"};
  const taStyle = {border:"0.5px solid "+C.border, borderRadius:8, background:C.card, color:C.text};

  // Estado local pra não disparar histórico a cada teclada
  const commitField = (field, value) => {
    if((item[field]||"") !== (value||"")) {
      onCommit(field, item[field]||"", value||"");
    }
  };

  return <tr style={{borderBottom:"1px solid "+C.border}}>
    <td style={{...cellMid, width:140}}>
      <ProdutoAutocomplete
        value={item.codigo||""}
        onChange={v=>onChange({...item, codigo:v})}
        onSelect={p=>{
          const prevCode = item.codigo||"";
          const next = {...item, codigo:p.codigo, descricao:p.descricao};
          onChange(next);
          // Autocomplete já é commit (usuário escolheu da lista)
          if(prevCode !== p.codigo) onCommit("codigo", prevCode, p.codigo);
        }}
        C={C} Sg={Sg} placeholder="Código..."/>
    </td>
    <td style={cellMid}>
      <AutoTextarea
        value={item.descricao||""}
        onChange={e=>onChange({...item, descricao:e.target.value})}
        placeholder="Descrição"
        style={taStyle}
      />
    </td>
    <td style={{...cellMid, width:110}}>
      <input
        style={inputStyle}
        value={item.lote||""}
        onChange={e=>onChange({...item, lote:e.target.value})}
        onBlur={e=>commitField("lote", e.target.value)}
        placeholder="Lote"/>
    </td>
    <td style={{...cellMid, width:72}}>
      <input
        style={{...inputStyle, textAlign:"center", MozAppearance:"textfield", WebkitAppearance:"none"}}
        type="number" min="0"
        value={item.qtdNC||""}
        onChange={e=>onChange({...item, qtdNC:e.target.value})}
        onBlur={e=>commitField("qtdNC", e.target.value)}
        placeholder="0"/>
    </td>
    <td style={{...cellMid, width:240}}>
      <button
        onClick={()=>onOpenDisp(idx)}
        style={{
          background:"transparent", border:"0.5px dashed "+C.border,
          padding:"5px 10px", borderRadius:6, cursor:"pointer",
          width:"100%", textAlign:"left"
        }}>
        <DispBadge disp={item.disposicao} status={item.status} C={C}/>
      </button>
    </td>
    <td style={{...cellMid, width:32, textAlign:"center"}}>
      <button
        onClick={onRemove}
        title="Remover item"
        style={{background:"none", border:"none", cursor:"pointer", color:C.danger, fontSize:16, padding:0, lineHeight:1}}>×</button>
    </td>
  </tr>;
}

// Helper: formata data curta
function fmtShort(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

// Monta as "linhas de disposição" de um item para a tabela expandida
function buildDispLinhas(item){
  const linhas = [];
  const disp = item.disposicao;

  if(disp==="correcao"){
    linhas.push({
      tipo:"correcao",
      tipoLabel:"Correção imediata",
      tipoBg:"#EAF3DE", tipoCol:"#27500A",
      qtd: item.qtdNC,
      analise: item.acaoCorrecao||"—",
      solicitadoPor: null, // operador = quem abriu a RO
      solicitadoEm: item.dispDefinedAt,
      aprovadoPor: item.correcaoAprovadaBy||null,
      aprovadoEm: item.correcaoAprovadaAt||null,
      pendente: item.status==="pendente_aprovacao",
      rejeitado: item.status==="correcao_rejeitada",
      motivoRejeicao: item.correcaoRejeitadaMotivo||null,
    });
    return linhas;
  }

  if(disp==="segregar" && item.sublotes && item.sublotes.length>0){
    item.sublotes.forEach(s=>{
      const LABELS = {
        sucatamento:          {label:"Sucatamento",        bg:"#FCEBEB", col:"#501313"},
        concessao_solicitada: {label:"Concessão",          bg:"#E6F1FB", col:"#0C447C"},
        concessao_aprovada:   {label:"Concessão aprovada", bg:"#EAF3DE", col:"#27500A"},
        concessao_rejeitada:  {label:"Concessão rejeitada",bg:"#FCEBEB", col:"#501313"},
        migrada_nc:           {label:"Mover para NC",      bg:"#EEE8FB", col:"#3D1F8C"},
      };
      const m = LABELS[s.tipo]||{label:s.tipo, bg:"#eee", col:"#555"};
      linhas.push({
        tipo: s.tipo,
        tipoLabel: m.label,
        tipoBg: m.bg, tipoCol: m.col,
        qtd: s.qtd,
        analise: s.extra||"—",
        solicitadoPor: s.concessaoSolicitadaBy||s.sucatadoBy||item.tratadoBy||null,
        solicitadoEm: s.concessaoSolicitadaAt||s.sucatadoAt||item.tratadoAt||null,
        aprovadoPor: s.concessaoAprovadaBy||s.concessaoRejeitadaBy||(s.tipo==="sucatamento"?s.sucatadoBy:null)||null,
        aprovadoEm: s.concessaoAprovadaAt||s.concessaoRejeitadaAt||(s.tipo==="sucatamento"?s.sucatadoAt:null)||null,
        pendente: s.tipo==="concessao_solicitada",
        rejeitado: s.tipo==="concessao_rejeitada",
        motivoRejeicao: s.concessaoRejeitadaMotivo||null,
        subloteIdx: item.sublotes.indexOf(s),
      });
    });
    return linhas;
  }

  // Modelo legado ou sem tratamento
  linhas.push({
    tipo: disp||"pendente",
    tipoLabel: disp==="segregar"?"Aguardando tratamento": disp||"Pendente",
    tipoBg: disp==="segregar"?"#FAEEDA":"#eee",
    tipoCol: disp==="segregar"?"#633806":"#555",
    qtd: item.qtdNC,
    analise: item.concessaoJustificativa||item.tratamentoMotivo||"—",
    solicitadoPor: item.concessaoSolicitadaBy||item.tratadoBy||null,
    solicitadoEm: item.concessaoSolicitadaAt||item.tratadoAt||null,
    aprovadoPor: item.concessaoAprovadaBy||null,
    aprovadoEm: item.concessaoAprovadaAt||null,
    pendente: !disp || disp==="segregar" || disp==="concessao_solicitada",
  });
  return linhas;
}

function ItemRowReadOnly({item, idx, onTratar, canTratar, onAprovar, canAprovar, C, Sg}){
  const cell = {padding:"7px 8px", fontSize:12, verticalAlign:"top"};
  const hasSublotes = item.sublotes && item.sublotes.length > 0;
  const segregadoPendente = item.disposicao==="segregar" && !hasSublotes;
  const comRejeicao = hasSublotes && item.sublotes.some(s=>s.tipo==="concessao_rejeitada");
  const showTratar = canTratar && (segregadoPendente || comRejeicao ||
    (!hasSublotes && (item.disposicao==="segregar" || item.disposicao==="concessao_rejeitada")));
  const showAprovar = canAprovar && hasSublotes && item.sublotes.some(s=>s.tipo==="concessao_solicitada");
  const showAprovarLegado = canAprovar && !hasSublotes && item.disposicao==="concessao_solicitada";

  const dispLinhas = buildDispLinhas(item);

  return <React.Fragment>
    {dispLinhas.map((dl, di)=>(
      <tr key={di} style={{borderBottom: di===dispLinhas.length-1?"1px solid "+C.border:"0.5px dashed "+C.border+"66"}}>
        <td style={{...cell, fontWeight:600, color:C.accent, width:110}}>{item.codigo||"—"}</td>
        <td style={{...cell, color:C.text, maxWidth:180}}>{item.descricao||"—"}</td>
        <td style={{...cell, color:C.muted, width:90, whiteSpace:"nowrap"}}>{item.lote||"—"}</td>
        <td style={{...cell, width:40, textAlign:"center"}}>{dl.qtd||"—"}</td>
        <td style={{...cell, width:130}}>
          <span style={{fontSize:11, padding:"2px 7px", borderRadius:6, background:dl.tipoBg, color:dl.tipoCol, fontWeight:500, whiteSpace:"nowrap"}}>
            {dl.tipoLabel}
          </span>
          {dl.rejeitado && dl.motivoRejeicao && <div style={{fontSize:10, color:C.danger, marginTop:3}}>Rejeitado: {dl.motivoRejeicao}</div>}
        </td>
        <td style={{...cell, color:C.muted, maxWidth:200, fontSize:11}}>{dl.analise}</td>
        <td style={{...cell, width:110}}>
          {dl.solicitadoPor && <div style={{fontSize:11, color:C.text}}>{dl.solicitadoPor}</div>}
          {dl.solicitadoEm && <div style={{fontSize:10, color:C.muted}}>{fmtShort(dl.solicitadoEm)}</div>}
          {!dl.solicitadoPor && <span style={{color:C.muted}}>—</span>}
        </td>
        <td style={{...cell, width:110}}>
          {dl.aprovadoPor && <div style={{fontSize:11, color:C.text}}>{dl.aprovadoPor}</div>}
          {dl.aprovadoEm && <div style={{fontSize:10, color:C.muted}}>{fmtShort(dl.aprovadoEm)}</div>}
          {dl.pendente && !dl.aprovadoPor && <span style={{fontSize:10, color:C.warning, fontStyle:"italic"}}>aguardando</span>}
          {!dl.pendente && !dl.aprovadoPor && <span style={{color:C.muted}}>—</span>}
        </td>
        <td style={{...cell, width:80, textAlign:"right"}}>
          {di===0 && showTratar && onTratar && <button
            onClick={()=>onTratar(idx)}
            style={{fontSize:11, padding:"3px 10px", background:C.accent, color:"#fff", border:"none", borderRadius:6, cursor:"pointer", fontWeight:600, whiteSpace:"nowrap"}}>
            Tratar →
          </button>}
          {di===0 && (showAprovar||showAprovarLegado) && onAprovar && <button
            onClick={()=>{
              if(showAprovar && item.sublotes){
                const si = item.sublotes.findIndex(s=>s.tipo==="concessao_solicitada");
                onAprovar(idx, si>=0?si:null);
              } else { onAprovar(idx, null); }
            }}
            style={{fontSize:11, padding:"3px 10px", background:C.warning, color:"#fff", border:"none", borderRadius:6, cursor:"pointer", fontWeight:600, whiteSpace:"nowrap"}}>
            Decidir →
          </button>}
        </td>
      </tr>
    ))}
  </React.Fragment>;
}

// ── Tabela de itens dinâmica ─────────────────────────────────────
function ItensTable({itens, onChange, readOnly, currentUser, onAddHistory, onTratar, canTratar, onAprovar, canAprovar, C, Sg, allUsers}){
  const [dispModalIdx, setDispModalIdx] = useState(null);
  // Rastreia quais itens já foram "anunciados" (têm código real) pra não duplicar
  const announcedRef = React.useRef(new Set());

  const itemDesc = (it) => {
    const parts = [];
    if(it?.codigo) parts.push(it.codigo);
    if(it?.descricao) parts.push(it.descricao.length>40 ? it.descricao.substring(0,40)+"…" : it.descricao);
    return parts.join(" — ") || "(sem código)";
  };

  // Adicionar linha NÃO registra no histórico (só registra quando ganhar código)
  const addItem = () => {
    onChange([...itens, {codigo:"", descricao:"", lote:"", qtdNC:"", disposicao:"", status:""}]);
  };

  // Update sem registrar (a cada teclada) — usado no onChange dos inputs
  const updItem = (i, v) => {
    const n = [...itens];
    n[i] = v;
    onChange(n);
  };

  // Commit de campo específico — registra no histórico
  const commitField = (i, field, oldVal, newVal) => {
    if(!onAddHistory) return;
    const item = itens[i];
    if(!item) return;
    const code = item.codigo || newVal && field==="codigo" ? newVal : "";
    const announceKey = "i_"+i+"_"+(code||"");

    // Se item ainda não tem código identificável, não anuncia adição de campo
    if(!code) return;

    // Primeira vez que esse item é "real" (tem código) — anuncia adição
    if(field==="codigo" && !announcedRef.current.has(announceKey)){
      announcedRef.current.add(announceKey);
      onAddHistory({
        type: "item_add",
        itemIdx: i,
        itemCodigo: newVal,
        detail: "Item adicionado: " + newVal + (item.descricao?" — "+item.descricao:"")
      });
      return;
    }

    // Mudanças de campo em item já existente
    const labelMap = {codigo:"código", lote:"lote", qtdNC:"quantidade"};
    const label = labelMap[field] || field;
    onAddHistory({
      type: "item_edit",
      itemIdx: i,
      itemCodigo: code,
      detail: "Item " + code + ": " + label + " alterado de \"" + (oldVal||"vazio") + "\" para \"" + (newVal||"vazio") + "\""
    });
  };

  // Remover — só registra se item tinha código (era real)
  const remItem = (i) => {
    const removed = itens[i];
    onChange(itens.filter((_,j)=>j!==i));
    if(onAddHistory && removed?.codigo){
      onAddHistory({
        type: "item_remove",
        itemCodigo: removed.codigo,
        detail: "Item removido: " + itemDesc(removed)
      });
    }
  };

  const handleSaveDisp = (changes) => {
    if(dispModalIdx===null) return;
    const cur = itens[dispModalIdx]||{};
    const next = {...cur, ...changes};
    updItem(dispModalIdx, next);
    if(onAddHistory){
      const dispText = (RO_DISP_ABERTURA[changes.disposicao]||{}).label || changes.disposicao;
      let detail = "Disposição definida em " + (cur.codigo||"item #"+(dispModalIdx+1)) + ": " + dispText;
      if(changes.disposicao==="correcao" && changes.acaoCorrecao){
        detail += "\nO que foi feito: " + changes.acaoCorrecao;
      }
      if(changes.solicitarReposicao){
        detail += "\nReposição solicitada.";
      }
      onAddHistory({
        type: "disposicao",
        itemIdx: dispModalIdx,
        itemCodigo: cur.codigo||"",
        detail
      });
    }
    setDispModalIdx(null);
  };

  return <div>
    <div>
      <table style={{width:"100%", borderCollapse:"collapse", fontSize:12, tableLayout:"fixed"}}>
        <colgroup>
          <col style={{width:140}}/>
          <col/>
          <col style={{width:110}}/>
          <col style={{width:60}}/>
          <col style={{width:240}}/>
          <col style={{width:32}}/>
        </colgroup>
        <thead>
          <tr style={{background:C.surface, borderBottom:"1px solid "+C.border}}>
            {(readOnly
              ? ["Código","Descrição","Lote","Qtd","Disposição","Análise / O que foi feito","Solicitado por","Aprovado por",""]
              : ["Código","Descrição","Lote","Qtd","Disposição",""]
            ).map((h,i)=>(
              <th key={i} style={{padding:"7px 10px", textAlign:"left", fontSize:10, fontWeight:700, color:C.muted, letterSpacing:.4, textTransform:"uppercase"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {itens.length===0 && <tr><td colSpan={6} style={{padding:"12px 8px", color:C.muted, fontSize:12, textAlign:"center"}}>Nenhum item adicionado</td></tr>}
          {itens.map((item,i)=>(
            readOnly
              ? <ItemRowReadOnly key={i} item={item} idx={i} onTratar={onTratar} canTratar={canTratar} onAprovar={onAprovar} canAprovar={canAprovar && (currentUser && String(item.concessaoAprovadorId)===String(currentUser.id))} C={C} Sg={Sg}/>
              : <ItemRow key={i} item={item} idx={i}
                  onChange={v=>updItem(i,v)}
                  onCommit={(field, oldVal, newVal)=>commitField(i, field, oldVal, newVal)}
                  onRemove={()=>remItem(i)}
                  onOpenDisp={(idx)=>setDispModalIdx(idx)}
                  C={C} Sg={Sg}/>
          ))}
        </tbody>
      </table>
    </div>
    {!readOnly && <button style={{...Sg.btn(), fontSize:11, padding:"4px 12px", marginTop:8}} onClick={addItem}>+ Adicionar item</button>}

    <DisposicaoModal
      open={dispModalIdx!==null}
      item={dispModalIdx!==null?itens[dispModalIdx]:null}
      onClose={()=>setDispModalIdx(null)}
      onSave={handleSaveDisp}
      allUsers={allUsers}
      currentUser={currentUser}
      C={C} Sg={Sg}
    />
  </div>;
}

// ── Tabela de peças solicitadas (lista simples sem status) ────────
// Apenas registro pra rastreabilidade — quem mexe no estoque usa o ERP.
function PecasSolicitadasTable({pecas, onChange, readOnly, currentUser, onAddHistory, C, Sg}){
  const cellMid = {padding:"8px 6px", verticalAlign:"middle", fontSize:12};
  const inputStyle = {...Sg.input(), fontSize:12, height:32, boxSizing:"border-box"};

  const addPeca = () => {
    onChange([...(pecas||[]), {
      codigo:"", descricao:"", qtd:"", motivo:"",
      addedAt: new Date().toISOString(),
      addedBy: currentUser?.name || currentUser?.email || ""
    }]);
  };

  const updPeca = (i, v) => {
    const n = [...(pecas||[])];
    n[i] = v;
    onChange(n);
  };

  const remPeca = (i) => {
    const removed = (pecas||[])[i];
    onChange((pecas||[]).filter((_,j)=>j!==i));
    if(onAddHistory && removed?.codigo){
      onAddHistory({
        type: "peca_solicitada_remove",
        detail: "Peça solicitada removida: " + (removed.codigo||"") + (removed.descricao?" — "+removed.descricao:"") + (removed.qtd?" (qtd "+removed.qtd+")":"")
      });
    }
  };

  const commitAdd = (i) => {
    if(!onAddHistory) return;
    const p = (pecas||[])[i];
    if(!p?.codigo) return;
    onAddHistory({
      type: "peca_solicitada_add",
      detail: "Peça solicitada: " + p.codigo + (p.descricao?" — "+p.descricao:"") + (p.qtd?" · qtd "+p.qtd:"") + (p.motivo?"\nMotivo: "+p.motivo:"")
    });
  };

  const list = pecas||[];

  return <div>
    <table style={{width:"100%", borderCollapse:"collapse", fontSize:12, tableLayout:"fixed"}}>
      <colgroup>
        <col style={{width:140}}/>
        <col/>
        <col style={{width:60}}/>
        <col style={{width:240}}/>
        <col style={{width:32}}/>
      </colgroup>
      <thead>
        <tr style={{background:C.surface, borderBottom:"1px solid "+C.border}}>
          {["Código","Descrição","Qtd","Motivo da solicitação",""].map((h,i)=>(
            <th key={i} style={{padding:"7px 10px", textAlign:"left", fontSize:10, fontWeight:700, color:C.muted, letterSpacing:.4, textTransform:"uppercase"}}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {list.length===0 && <tr><td colSpan={5} style={{padding:"12px 8px", color:C.muted, fontSize:12, textAlign:"center"}}>Nenhuma peça solicitada</td></tr>}
        {list.map((p,i)=>(
          readOnly
            ? <tr key={i} style={{borderBottom:"1px solid "+C.border}}>
                <td style={{...cellMid, fontWeight:700, color:C.accent}}>{p.codigo||"—"}</td>
                <td style={{...cellMid, color:C.text, whiteSpace:"pre-wrap"}}>{p.descricao||"—"}</td>
                <td style={{...cellMid, color:C.text}}>{p.qtd||"—"}</td>
                <td style={{...cellMid, color:C.muted, fontSize:11, whiteSpace:"pre-wrap"}}>{p.motivo||"—"}</td>
                <td style={cellMid}/>
              </tr>
            : <tr key={i} style={{borderBottom:"1px solid "+C.border}}>
                <td style={cellMid}>
                  <ProdutoAutocomplete
                    value={p.codigo||""}
                    onChange={v=>updPeca(i,{...p, codigo:v})}
                    onSelect={prod=>{
                      const nxt = {...p, codigo:prod.codigo, descricao:prod.descricao};
                      updPeca(i, nxt);
                      // Anuncia no histórico ao primeiro código
                      if(!p.codigo) commitAdd(i);
                    }}
                    C={C} Sg={Sg} placeholder="Código..."/>
                </td>
                <td style={cellMid}>
                  <AutoTextarea
                    value={p.descricao||""}
                    onChange={e=>updPeca(i,{...p, descricao:e.target.value})}
                    placeholder="Descrição"
                    style={{border:"0.5px solid "+C.border, borderRadius:8, background:C.card, color:C.text}}
                  />
                </td>
                <td style={cellMid}>
                  <input
                    style={inputStyle}
                    type="number" min="0"
                    value={p.qtd||""}
                    onChange={e=>updPeca(i,{...p, qtd:e.target.value})}
                    placeholder="0"/>
                </td>
                <td style={cellMid}>
                  <AutoTextarea
                    value={p.motivo||""}
                    onChange={e=>updPeca(i,{...p, motivo:e.target.value})}
                    placeholder="Ex: quebra no retrabalho"
                    style={{border:"0.5px solid "+C.border, borderRadius:8, background:C.card, color:C.text}}
                  />
                </td>
                <td style={{...cellMid, textAlign:"center"}}>
                  <button
                    onClick={()=>remPeca(i)}
                    title="Remover peça"
                    style={{background:"none", border:"none", cursor:"pointer", color:C.danger, fontSize:16, padding:0, lineHeight:1}}>×</button>
                </td>
              </tr>
        ))}
      </tbody>
    </table>
    {!readOnly && <button style={{...Sg.btn(), fontSize:11, padding:"4px 12px", marginTop:8}} onClick={addPeca}>+ Solicitar peça</button>}
  </div>;
}

// ── Inbox do Aprovador ────────────────────────────────────────────
// Tela dedicada onde quem tem ro.aprovar_concessao vê só os pedidos
// que foram enviados pra ele. Aprovar/rejeitar abre os modais
// AprovarConcessaoModal/MotiveModal já existentes.
function ROAprovacoesInbox({roRecords, currentUser, allUsers, onUpdate}){
  const {C}=useTheme();const Sg=mkSg(C);
  const [acaoAlvo, setAcaoAlvo] = useState(null);
  const [pendingApply, setPendingApply] = useState(null);
  const [sigModal, setSigModal] = useState(null);
  const [verTudo, setVerTudo] = useState(false);

  const isGestor = hasPerm(currentUser,'ro.ver_todas');
  const canAprovarConc = hasPerm(currentUser,'ro.aprovar_concessao');
  const canAprovarCorr = hasPerm(currentUser,'ro.aprovar_correcao');
  const canFechar = hasPerm(currentUser,'ro.fechar');

  // Coleta TODAS as pendências da fila (para gestor) ou só as minhas
  const todasPendencias = [];
  (roRecords||[]).forEach(r=>{
    if(["cancelada","fechada"].includes(r.status)) return;
    const itens = r.data?.itens||[];

    // RO pronta para fechar
    if(r.status==="em_analise" && itens.length>0 && itens.every(it=>{
      if(!it.disposicao) return false;
      if(it.disposicao==="correcao") return it.status==="concluida";
      if(it.disposicao==="segregar"){
        if(it.sublotes && it.sublotes.length>0)
          return it.sublotes.every(s=>["sucatamento","concessao_aprovada","migrada_nc"].includes(s.tipo));
        return false;
      }
      return ["sucatamento","concessao_aprovada","migrada_nc"].includes(it.disposicao);
    })){
      // Quem pode fechar
      const responsavel = (allUsers||[]).find(u=>hasPerm(u,'ro.fechar'));
      todasPendencias.push({
        ro:r, tipo:"fechar", aguardando: responsavel?.name||"Qualidade",
        aguardandoId: responsavel?.id, desc:"RO pronta para validação final e fechamento",
        isMinha: canFechar
      });
    }

    itens.forEach((it, idx)=>{
      // Correção imediata aguardando aprovação
      if(it.disposicao==="correcao" && it.status==="pendente_aprovacao"){
        const aprov = (allUsers||[]).find(u=>String(u.id)===String(it.aprovadorCorrecaoId));
        todasPendencias.push({
          ro:r, idx, subloteIdx:null, item:it, sublote:null, tipo:"correcao",
          aguardando: aprov?.name||"—", aguardandoId: it.aprovadorCorrecaoId,
          isMinha: String(it.aprovadorCorrecaoId)===String(currentUser?.id)
        });
      }
      // Sublotes de concessão
      if(it.sublotes && it.sublotes.length>0){
        it.sublotes.forEach((s,si)=>{
          if(s.tipo==="concessao_solicitada"){
            const aprov = (allUsers||[]).find(u=>String(u.id)===String(s.concessaoAprovadorId));
            todasPendencias.push({
              ro:r, idx, subloteIdx:si, item:it, sublote:s, tipo:"concessao",
              aguardando: aprov?.name||"—", aguardandoId: s.concessaoAprovadorId,
              isMinha: String(s.concessaoAprovadorId)===String(currentUser?.id)
            });
          }
        });
      }
      // Legado concessão
      else if(it.disposicao==="concessao_solicitada"){
        const aprov = (allUsers||[]).find(u=>String(u.id)===String(it.concessaoAprovadorId));
        todasPendencias.push({
          ro:r, idx, subloteIdx:null, item:it, sublote:null, tipo:"concessao",
          aguardando: aprov?.name||"—", aguardandoId: it.concessaoAprovadorId,
          isMinha: String(it.concessaoAprovadorId)===String(currentUser?.id)
        });
      }
    });
  });

  const minhasPendencias = todasPendencias.filter(p=>p.isMinha);
  const listaVisivel = (isGestor && verTudo) ? todasPendencias : minhasPendencias;

  const applyDecisao = async (sig) => {
    if(!pendingApply){ setSigModal(null); return; }
    const {ro, idx, subloteIdx, tipo, decisao, motivo} = pendingApply;
    const itens = [...(ro.data?.itens||[])];
    const linha = {...itens[idx]};
    const userName = currentUser?.name || currentUser?.email || "—";
    const now = new Date().toISOString();
    let detalhe = "";

    if(tipo==="correcao"){
      if(decisao==="aprovar"){
        linha.status = "concluida";
        linha.correcaoAprovadaAt = now;
        linha.correcaoAprovadaBy = userName;
        detalhe = "Item "+(linha.codigo||"#"+(idx+1))+": correção APROVADA por "+userName+".";
      } else {
        linha.status = "correcao_rejeitada";
        linha.correcaoRejeitadaAt = now;
        linha.correcaoRejeitadaBy = userName;
        linha.correcaoRejeitadaMotivo = motivo;
        detalhe = "Item "+(linha.codigo||"#"+(idx+1))+": correção REJEITADA.\nMotivo: "+motivo;
      }
    } else if(subloteIdx!=null && linha.sublotes){
      const sublotes = [...(linha.sublotes||[])];
      if(decisao==="aprovar"){
        sublotes[subloteIdx] = {...sublotes[subloteIdx], tipo:"concessao_aprovada", concessaoAprovadaAt:now, concessaoAprovadaBy:userName};
        detalhe = "Item "+(linha.codigo||"#"+(idx+1))+": concessão de "+sublotes[subloteIdx].qtd+"x APROVADA.";
      } else {
        sublotes[subloteIdx] = {...sublotes[subloteIdx], tipo:"concessao_rejeitada", concessaoRejeitadaAt:now, concessaoRejeitadaBy:userName, concessaoRejeitadaMotivo:motivo};
        detalhe = "Item "+(linha.codigo||"#"+(idx+1))+": concessão REJEITADA.\nMotivo: "+motivo;
      }
      linha.sublotes = sublotes;
    } else {
      if(decisao==="aprovar"){
        linha.disposicao = "concessao_aprovada"; linha.status = "concluida";
        linha.concessaoAprovadaAt = now; linha.concessaoAprovadaBy = userName;
        detalhe = "Item "+(linha.codigo||"#"+(idx+1))+": concessão APROVADA por "+userName+".";
      } else {
        linha.disposicao = "concessao_rejeitada"; linha.status = "pendente";
        linha.concessaoRejeitadaAt = now; linha.concessaoRejeitadaBy = userName;
        linha.concessaoRejeitadaMotivo = motivo;
        detalhe = "Item "+(linha.codigo||"#"+(idx+1))+": concessão REJEITADA.\nMotivo: "+motivo;
      }
    }
    itens[idx] = linha;
    const novoHist = {type:"decisao_aprovador", at:now, by:userName, byId:currentUser?.id, itemIdx:idx, itemCodigo:linha.codigo||"", detail:detalhe+"\\n(assinado eletronicamente)"};
    const histTotal = [...((ro.data?.historico)||[]), novoHist];
    await onUpdate({...ro, data:{...(ro.data||{}), itens, historico:histTotal}});
    setPendingApply(null); setSigModal(null); setAcaoAlvo(null);
  };

  const TIPO_META = {
    correcao:  {label:"Correção imediata", bg:"#EAF3DE", col:"#27500A"},
    concessao: {label:"Concessão",          bg:"#E6F1FB", col:"#0C447C"},
    fechar:    {label:"Pronta para fechar", bg:"#EAF3DE", col:"#27500A"},
  };

  return <div style={{padding:"18px 22px", maxWidth:1100}}>
    <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16}}>
      <div>
        <div style={{fontSize:18, fontWeight:600, color:C.text}}>Ações pendentes</div>
        <div style={{fontSize:12, color:C.muted, marginTop:3}}>
          {listaVisivel.length===0 ? (verTudo&&isGestor?"Nenhuma pendência em aberto.":"Nenhuma pendência aguardando você.") :
           listaVisivel.length===1 ? "1 pendência" : listaVisivel.length+" pendências"}
          {!verTudo && isGestor && todasPendencias.length > minhasPendencias.length &&
            <span style={{color:C.accent}}> · {todasPendencias.length - minhasPendencias.length} de outras pessoas</span>}
        </div>
      </div>
      {isGestor && <div style={{display:"flex", gap:6}}>
        <button
          style={{...Sg.btn(verTudo?"primary":""), fontSize:12, padding:"6px 14px"}}
          onClick={()=>setVerTudo(false)}>
          Minhas ({minhasPendencias.length})
        </button>
        <button
          style={{...Sg.btn(!verTudo?"":"primary"), fontSize:12, padding:"6px 14px"}}
          onClick={()=>setVerTudo(true)}>
          Todas ({todasPendencias.length})
        </button>
      </div>}
    </div>

    {listaVisivel.length===0 ? (
      <div style={{...Sg.card(), padding:"40px 20px", textAlign:"center", color:C.muted, fontSize:13}}>
        {verTudo && isGestor ? "Nenhuma pendência em aberto nas ROs." : "Quando alguém pedir aprovação para você, aparece aqui."}
      </div>
    ) : (
      <table style={{width:"100%", borderCollapse:"collapse", fontSize:13}}>
        <thead>
          <tr style={{borderBottom:"1px solid "+C.border}}>
            <th style={{padding:"7px 10px", textAlign:"left", fontWeight:600, color:C.muted, fontSize:11}}>RO</th>
            <th style={{padding:"7px 10px", textAlign:"left", fontWeight:600, color:C.muted, fontSize:11}}>Item</th>
            <th style={{padding:"7px 10px", textAlign:"left", fontWeight:600, color:C.muted, fontSize:11}}>Tipo</th>
            <th style={{padding:"7px 10px", textAlign:"left", fontWeight:600, color:C.muted, fontSize:11}}>Detalhe</th>
            {verTudo && isGestor && <th style={{padding:"7px 10px", textAlign:"left", fontWeight:600, color:C.muted, fontSize:11}}>Aguardando</th>}
            <th style={{padding:"7px 10px"}}></th>
          </tr>
        </thead>
        <tbody>
          {listaVisivel.map((p,i)=>{
            const meta = TIPO_META[p.tipo]||{label:p.tipo, bg:"#eee", col:"#555"};
            const podeAgir = p.isMinha && p.tipo!=="fechar";
            const detalhe = p.tipo==="correcao" ? (p.item?.acaoCorrecao||"—") :
                            p.tipo==="concessao" ? (p.sublote?.extra||p.item?.concessaoJustificativa||"—") :
                            p.desc||"";
            return <tr key={i} style={{borderBottom:"1px solid "+C.border+"44", background: p.isMinha?"":"transparent"}}>
              <td style={{padding:"10px 10px", fontWeight:600, color:C.accent, whiteSpace:"nowrap"}}>
                {p.ro.code||p.ro.id}
              </td>
              <td style={{padding:"10px 10px", color:C.text}}>
                {p.item ? <><strong>{p.item.codigo||"—"}</strong><div style={{fontSize:11,color:C.muted}}>{(p.item.descricao||"").substring(0,40)}</div></> : <span style={{fontSize:12,color:C.muted}}>—</span>}
              </td>
              <td style={{padding:"10px 10px"}}>
                <span style={{fontSize:11, padding:"2px 8px", borderRadius:6, background:meta.bg, color:meta.col, fontWeight:500, whiteSpace:"nowrap"}}>{meta.label}</span>
              </td>
              <td style={{padding:"10px 10px", color:C.muted, fontSize:12, maxWidth:220, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
                {detalhe}
              </td>
              {verTudo && isGestor && <td style={{padding:"10px 10px", fontSize:12, color: p.isMinha?C.accent:C.text, fontWeight: p.isMinha?600:400}}>
                {p.isMinha?"Você":p.aguardando}
              </td>}
              <td style={{padding:"10px 10px", textAlign:"right", whiteSpace:"nowrap"}}>
                {podeAgir ? <div style={{display:"flex", gap:6, justifyContent:"flex-end"}}>
                  <button
                    style={{fontSize:11, padding:"4px 12px", border:"1px solid "+C.danger, borderRadius:6, background:"transparent", color:C.danger, cursor:"pointer", fontFamily:"inherit"}}
                    onClick={()=>setAcaoAlvo({...p, step:"rejeitar"})}>
                    Rejeitar
                  </button>
                  <button
                    style={{...Sg.btn("primary"), fontSize:11, padding:"4px 12px"}}
                    onClick={()=>{
                      setPendingApply({ro:p.ro, idx:p.idx, subloteIdx:p.subloteIdx, tipo:p.tipo, decisao:"aprovar"});
                      setSigModal({
                        title: p.tipo==="correcao"?"Assinar — Aprovação de correção":"Assinar — Aprovação de concessão",
                        confirmLabel:"Assinar e aprovar", confirmStyle:"success"
                      });
                    }}>
                    Aprovar
                  </button>
                </div> : p.tipo==="fechar" && p.isMinha ? <span style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>Ver RO para fechar</span>
                : <span style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>aguardando</span>}
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    )}

    {acaoAlvo!==null && acaoAlvo.step==="rejeitar" && <MotiveModal
      open={true}
      onClose={()=>setAcaoAlvo(null)}
      onConfirm={(motivo)=>{
        setPendingApply({ro:acaoAlvo.ro, idx:acaoAlvo.idx, subloteIdx:acaoAlvo.subloteIdx, tipo:acaoAlvo.tipo, decisao:"rejeitar", motivo:motivo||""});
        setAcaoAlvo(null);
        setSigModal({title:"Assinar — Rejeição", confirmLabel:"Assinar e rejeitar", confirmStyle:"danger"});
      }}
      title="Motivo da rejeição"
      description="Registre o motivo. O responsável receberá essa informação para corrigir."
      confirmLabel="Continuar para assinatura"
      confirmStyle="danger"
      C={C} Sg={Sg}
    />}

    {sigModal && <SignatureModal
      open={true}
      onClose={()=>{setSigModal(null); setPendingApply(null);}}
      onConfirm={async(sig)=>{ await applyDecisao(sig); }}
      title={sigModal.title}
      description="Confirme sua senha para registrar a decisão."
      confirmLabel={sigModal.confirmLabel}
      confirmStyle={sigModal.confirmStyle}
      saId={pendingApply?.ro?.id||pendingApply?.ro?.code||""}
      action="aprovacao_concessao"
      C={C} Sg={Sg}
    />}
  </div>;
}

// ── ROList ───────────────────────────────────────────────────────
function ROList({roRecords, currentUser, allUsers, onOpen, onNew}){
  const {C}=useTheme();const Sg=mkSg(C);
  const [fText,setFText]=useState("");
  const [fStatus,setFStatus]=useState("");
  const [fTipo,setFTipo]=useState("");
  const canNew = hasPerm(currentUser,'ro.abrir');

  const vis = (roRecords||[]).filter(r=>{
    const q=fText.toLowerCase();
    const ok = !q||(r.code||r.id||"").toLowerCase().includes(q)||(r.title||"").toLowerCase().includes(q)||(r.data?.descricao||"").toLowerCase().includes(q);
    const okS = !fStatus||r.status===fStatus;
    const okT = !fTipo||r.data?.tipo===fTipo;
    return ok&&okS&&okT;
  });

  return <div style={{padding:"18px 22px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div>
        <h1 style={{margin:0,fontSize:17,color:C.text,fontWeight:700}}>Registro de Ocorrências</h1>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>{(roRecords||[]).length} registro{(roRecords||[]).length!==1?"s":""} no total</div>
      </div>
      {canNew&&<button style={{...Sg.btn("primary"),padding:"8px 16px"}} onClick={onNew}>+ Nova RO</button>}
    </div>
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
      <input value={fText} onChange={e=>setFText(e.target.value)} placeholder="Buscar por código, título..." style={{...Sg.input(),maxWidth:280}}/>
      <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{...Sg.input(),maxWidth:180}}>
        <option value="">Todos os status</option>
        {Object.entries(RO_STATUS_LABELS).map(([v,s])=><option key={v} value={v}>{s.label}</option>)}
      </select>
      <select value={fTipo} onChange={e=>setFTipo(e.target.value)} style={{...Sg.input(),maxWidth:140}}>
        <option value="">Todos os tipos</option>
        {RO_TIPOS.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
      <span style={{fontSize:11,color:C.muted,alignSelf:"center"}}>{vis.length} resultado{vis.length!==1?"s":""}</span>
    </div>
    <div style={{...Sg.card({padding:0,overflow:"hidden"})}}>
      {vis.length===0
        ? <div style={{textAlign:"center",padding:36,color:C.muted}}>Nenhum registro encontrado.</div>
        : <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{borderBottom:"1px solid "+C.border,background:C.surface}}>
                {["Código","Tipo","Local","Descrição","Itens","Abertura","Status","Próxima ação"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {vis.map((r,i)=>{
                const d=r.data||{};
                const itens=(d.itens||[]).filter(x=>x.codigo);
                return <tr key={r.id||i} style={{borderBottom:"1px solid "+C.border,cursor:"pointer"}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                  onMouseLeave={e=>e.currentTarget.style.background=""}
                  onClick={()=>onOpen(r.id||r.code)}>
                  <td style={{padding:"9px 12px",fontSize:12,fontWeight:700,color:C.accent,whiteSpace:"nowrap"}}>{r.code||r.id}</td>
                  <td style={{padding:"9px 12px",fontSize:12,color:C.text}}>{d.tipo||"—"}</td>
                  <td style={{padding:"9px 12px",fontSize:12,color:C.dim}}>{d.local||"—"}</td>
                  <td style={{padding:"9px 12px",fontSize:12,color:C.text,maxWidth:260}}>
                    <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.descricao||r.title||"—"}</div>
                  </td>
                  <td style={{padding:"9px 12px",fontSize:12,color:C.muted,textAlign:"center"}}>
                    {itens.length>0?<span style={{background:C.accent+"20",color:C.accent,borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:600}}>{itens.length}</span>:"—"}
                  </td>
                  <td style={{padding:"9px 12px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{fmt(r.createdAt)}</td>
                  <td style={{padding:"9px 12px"}}><ROStatusBadge status={r.status}/></td>
                  <td style={{padding:"9px 12px",fontSize:11}}>
                    {(()=>{
                      // Conta linhas por status (calculado das disposições)
                      if(r.status==="cancelada") return <span style={{color:C.muted}}>—</span>;
                      if(r.status==="fechada"||r.status==="concluida") return <span style={{color:C.success}}>✓ concluída</span>;
                      const semDisp = itens.filter(x=>!x.disposicao).length;
                      const segregadas = itens.filter(x=>(x.disposicao==="segregar"&&x.status!=="concluida")||x.disposicao==="concessao_rejeitada").length;
                      const concessoes = itens.filter(x=>x.disposicao==="concessao_solicitada").length;
                      const partes = [];
                      if(semDisp>0) partes.push(<span key="d" style={{color:C.muted}}>{semDisp} sem disposição</span>);
                      if(segregadas>0) partes.push(<span key="s" style={{color:C.warning,fontWeight:500}}>⏳ {segregadas} c/ qualidade</span>);
                      if(concessoes>0) partes.push(<span key="c" style={{color:C.accent,fontWeight:500}}>⏳ {concessoes} aprovação</span>);
                      return partes.length===0 ? <span style={{color:C.muted}}>—</span> : <span>{partes.reduce((acc,p,i)=>i===0?[p]:[...acc," · ",p],[])}</span>;
                    })()}
                  </td>
                </tr>;
              })}
            </tbody>
          </table>
      }
    </div>
  </div>;
}

// ── NewRO ────────────────────────────────────────────────────────
function NewRO({currentUser, allUsers, onSave, onCancel}){
  const {C}=useTheme();const Sg=mkSg(C);
  const [f,setF]=useState({tipo:"",local:"",opChamado:"",descricao:"",classificacao:"",disposicao:""});
  const [itens,setItens]=useState([]);
  const [pecasSolicitadas,setPecasSolicitadas]=useState([]);
  const [attachments,setAttachments]=useState([]);
  const set = (k,v)=>setF(p=>({...p,[k]:v}));
  const ok = f.tipo&&f.local&&f.descricao;

  // Estilos dos blocos numerados
  const stepHeader = (n, title, desc, ativo=true) => (
    <div style={{display:"flex", alignItems:"flex-start", gap:10, marginBottom:14}}>
      <div style={{
        width:24, height:24, borderRadius:"50%",
        background: ativo ? C.accent : C.surface,
        color: ativo ? "#fff" : C.muted,
        display:"flex", alignItems:"center", justifyContent:"center",
        fontSize:12, fontWeight:600, flexShrink:0,
        border: ativo ? "none" : "1px solid "+C.border
      }}>{n}</div>
      <div>
        <div style={{fontSize:14, fontWeight:600, color: ativo?C.text:C.muted}}>{title}</div>
        {desc && <div style={{fontSize:11, color:C.muted, marginTop:2}}>{desc}</div>}
      </div>
    </div>
  );

  return <div style={{padding:"18px 22px",maxWidth:1100}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div>
        <h1 style={{margin:0,fontSize:17,color:C.text,fontWeight:700}}>Nova Ocorrência</h1>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>Campos com * são obrigatórios</div>
      </div>
      <button style={Sg.btn()} onClick={onCancel}>Cancelar</button>
    </div>

    {/* Bloco 1 — Dados básicos */}
    <div style={{...Sg.card(),marginBottom:14}}>
      {stepHeader(1, "Dados básicos", "Onde, o que aconteceu, qual a OP")}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div>
          <label style={Sg.lbl}>Tipo *</label>
          <select style={Sg.input()} value={f.tipo} onChange={e=>{set("tipo",e.target.value);set("disposicao","");set("classificacao","");}}>
            <option value="">Selecione...</option>
            {RO_TIPOS.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        <div>
          <label style={Sg.lbl}>Local *</label>
          <select style={Sg.input()} value={f.local} onChange={e=>set("local",e.target.value)}>
            <option value="">Selecione...</option>
            {RO_LOCAIS.map(l=><option key={l} value={l}>{l}</option>)}
          </select>
        </div>
      </div>

      <div style={{marginBottom:12}}><label style={Sg.lbl}>Nº OP / Chamado</label><input style={Sg.input()} value={f.opChamado} onChange={e=>set("opChamado",e.target.value)} placeholder="Ex: OP-12345"/></div>

      <div style={{marginBottom: f.tipo?12:0}}><label style={Sg.lbl}>Descrição da Ocorrência *</label><textarea style={{...Sg.input(),minHeight:72,resize:"vertical"}} value={f.descricao} onChange={e=>set("descricao",e.target.value)} placeholder="Descreva o que foi identificado..."/></div>

      {f.tipo&&<div>
        <label style={Sg.lbl}>Classificação da Ocorrência</label>
        <select style={Sg.input()} value={f.classificacao} onChange={e=>set("classificacao",e.target.value)}>
          <option value="">Selecione...</option>
          {f.tipo==="Processo"
            ? RO_CLASS_PROCESSO.map(c=><option key={c} value={c}>{c}</option>)
            : RO_CLASS_OCORRENCIA.map(c=><option key={c} value={c}>{c}</option>)
          }
        </select>
      </div>}
    </div>

    {/* Bloco 2 — Produto não conforme (só pra tipo Produto) */}
    {f.tipo==="Produto"&&<div style={{...Sg.card(),marginBottom:14}}>
      {stepHeader(2, "Produto não conforme", "O que tem problema e o que você fez na hora")}
      <ItensTable
        itens={itens}
        onChange={setItens}
        readOnly={false}
        currentUser={currentUser}
        C={C} Sg={Sg} allUsers={allUsers}/>
    </div>}

    {/* Bloco 3 — Peças solicitadas (opcional, só pra tipo Produto) */}
    {f.tipo==="Produto"&&<div style={{...Sg.card(),marginBottom:14}}>
      {stepHeader(3, "Precisa de peças?", "Peças necessárias para resolver — só registro pra rastrear (opcional)", pecasSolicitadas.length>0)}
      <PecasSolicitadasTable
        pecas={pecasSolicitadas}
        onChange={setPecasSolicitadas}
        readOnly={false}
        currentUser={currentUser}
        C={C} Sg={Sg}/>
    </div>}

    {/* Anexos */}
    <div style={{...Sg.card(),marginBottom:14}}>
      <AttachmentsPanel attachments={attachments} onAdd={a=>setAttachments(p=>[...p,a])} onRemove={a=>setAttachments(p=>p.filter(x=>x.id!==a.id))} readOnly={false} stage="abertura" currentUser={currentUser} C={C}/>
    </div>

    {/* Footer com botões */}
    <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
      <button style={Sg.btn()} onClick={onCancel}>Cancelar</button>
      <button style={{...Sg.btn("primary"),opacity:ok?1:.4,padding:"8px 20px"}} disabled={!ok} onClick={()=>{
        // Monta resumo dos itens registrados na abertura
        const itensReais = (itens||[]).filter(it=>it.codigo);
        const linhasItens = itensReais.map(it=>{
          const partes = [];
          partes.push(it.codigo);
          if(it.descricao) partes.push("— " + it.descricao);
          if(it.lote) partes.push("· lote " + it.lote);
          if(it.qtdNC) partes.push("· qtd " + it.qtdNC);
          if(it.disposicao){
            const dispText = (RO_DISP_ABERTURA[it.disposicao]||{}).label || it.disposicao;
            partes.push("· " + dispText);
          }
          if(it.acaoCorrecao) partes.push("\n   → " + it.acaoCorrecao);
          return "  • " + partes.join(" ");
        });
        let resumo = "Ocorrência aberta";
        if(itensReais.length>0){
          resumo += "\n\nItens registrados (" + itensReais.length + "):\n" + linhasItens.join("\n");
        }
        if(pecasSolicitadas.filter(p=>p.codigo).length>0){
          resumo += "\n\nPeças solicitadas (" + pecasSolicitadas.filter(p=>p.codigo).length + ")";
        }
        const aberturaEntry = {
          type: "abertura",
          at: new Date().toISOString(),
          by: currentUser?.name || currentUser?.email || "—",
          byId: currentUser?.id,
          detail: resumo
        };
        onSave({...f, historico: [aberturaEntry], pecasSolicitadas}, itens, attachments);
      }}>Abrir Ocorrência</button>
    </div>
  </div>;
}
