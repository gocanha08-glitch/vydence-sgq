    <div style={{marginBottom:12}}>
      <label style={Sg.lbl}>Resultado</label>
      <div style={{display:"flex",gap:8}}>
        {[{k:"concluida",l:"Concluída"},{k:"justificada",l:"Justificada"},{k:"cancelada",l:"Cancelada"}].map(opt=>(
          <button key={opt.k} style={{...Sg.btn(tipo===opt.k?"primary":""),flex:1,padding:"7px 0",fontSize:12}} onClick={()=>setTipo(opt.k)}>{opt.l}</button>
        ))}
      </div>
    </div>
    <div style={{marginBottom:16}}>
      <label style={Sg.lbl}>{tipo==="concluida"?"Evidência / Observação *":"Justificativa *"}</label>
      <textarea style={{...Sg.input(),minHeight:64,resize:"vertical"}} value={evidencia} onChange={e=>setEvidencia(e.target.value)} placeholder={tipo==="concluida"?"Descreva o que foi feito, número do documento revisado, etc.":"Motivo pelo qual a ação não foi executada..."}/>
    </div>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
      <button style={Sg.btn()} onClick={onClose}>Cancelar</button>
      <button style={{...Sg.btn("primary"),opacity:evidencia.trim()?1:.4}} disabled={!evidencia.trim()} onClick={()=>onConfirm({tipo,evidencia})}>Registrar</button>
    </div>
  </Modal>;
}

// ── NCHistorico ───────────────────────────────────────────────────
function NCHistorico({nc, C}){
  const [open, setOpen] = useState(true);
  const Sg = mkSg(C);
  const historico = nc?.data?.historico||[];
  return <div style={{...Sg.card({marginTop:14})}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",marginBottom:open?10:0}} onClick={()=>setOpen(p=>!p)}>
      <span style={{fontSize:12,fontWeight:700,color:C.dim,letterSpacing:.3}}>HISTÓRICO ({historico.length})</span>
      <span style={{fontSize:10,color:C.muted}}>{open?"▲":"▼"}</span>
    </div>
    {open&&(historico.length===0
      ? <div style={{fontSize:12,color:C.muted,padding:"8px 0"}}>Sem eventos registrados.</div>
      : <div style={{display:"flex",flexDirection:"column",gap:0}}>
          {[...historico].reverse().map((ev,i)=>(
            <div key={i} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:"1px solid "+C.border,alignItems:"flex-start"}}>
              <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap",width:112,flexShrink:0}}>{fmtShort(ev.at)}</div>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontSize:12,color:C.text,fontWeight:500}}>{ev.event||ev.type}</span>
                {ev.detail&&<span style={{fontSize:11,color:C.muted,marginLeft:6}}>{ev.detail}</span>}
              </div>
              <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{ev.by}</div>
            </div>
          ))}
        </div>
    )}
  </div>;
}

// ── NCList ────────────────────────────────────────────────────────
function NCList({ncRecords, currentUser, allUsers, onOpen, onNew}){
  const {C}=useTheme(); const Sg=mkSg(C);
  const [fText, setFText]     = useState("");
  const [fStatus, setFStatus] = useState("");
  const [fNat, setFNat]       = useState("");
  const canNew = hasPerm(currentUser,'nc.abrir');

  const vis = (ncRecords||[]).filter(r=>{
    const d = r.data||{};
    const q = fText.toLowerCase();
    const okT = !q
      || (r.code||r.id||"").toLowerCase().includes(q)
      || (r.title||"").toLowerCase().includes(q)
      || (d.descricao||"").toLowerCase().includes(q)
      || (d.fornecedor||"").toLowerCase().includes(q);
    const okS = !fStatus || r.status===fStatus;
    const okN = !fNat    || d.natureza===fNat;
    return okT && okS && okN;
  });

  return <div style={{padding:"18px 22px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div>
        <h1 style={{margin:0,fontSize:17,color:C.text,fontWeight:700}}>Não Conformidades</h1>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>{(ncRecords||[]).length} registro{(ncRecords||[]).length!==1?"s":""} no total</div>
      </div>
      {canNew&&<button style={{...Sg.btn("primary"),padding:"8px 16px"}} onClick={onNew}>+ Nova NC</button>}
    </div>

    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
      <input value={fText} onChange={e=>setFText(e.target.value)} placeholder="Buscar por código, descrição, fornecedor..." style={{...Sg.input(),maxWidth:300}}/>
      <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{...Sg.input(),maxWidth:200}}>
        <option value="">Todos os status</option>
        {Object.entries(NC_STATUS_LABELS).map(([v,s])=><option key={v} value={v}>{s.label}</option>)}
      </select>
      <select value={fNat} onChange={e=>setFNat(e.target.value)} style={{...Sg.input(),maxWidth:160}}>
        <option value="">Qualquer natureza</option>
        {NC_NATUREZAS.map(n=><option key={n.value} value={n.value}>{n.label}</option>)}
      </select>
      <span style={{fontSize:11,color:C.muted,alignSelf:"center"}}>{vis.length} resultado{vis.length!==1?"s":""}</span>
    </div>

    <div style={{...Sg.card({padding:0,overflow:"hidden"})}}>
      {vis.length===0
        ? <div style={{textAlign:"center",padding:36,color:C.muted}}>Nenhum registro encontrado.</div>
        : <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{borderBottom:"1px solid "+C.border,background:C.surface}}>
                {["Código","Natureza","Descrição","Itens","Ações","Origem","Abertura","Status"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {vis.map((r,i)=>{
                const d = r.data||{};
                const itens = (d.itens||[]).filter(x=>x.codigo||x.processo);
                const acoes = (d.acoes||[]);
                const acoesAbertas = acoes.filter(a=>!NC_ACAO_STATUS_TERMINAIS.includes(a.status)).length;
                const origem = (d.linkedROs||[]).length>0 ? (d.linkedROs||[]).join(" · ") : "Manual";
                const natLabel = (NC_NATUREZAS.find(n=>n.value===d.natureza)||{}).label || "—";
                return <tr key={r.id||i} style={{borderBottom:"1px solid "+C.border,cursor:"pointer"}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                  onMouseLeave={e=>e.currentTarget.style.background=""}
                  onClick={()=>onOpen(r.id||r.code)}>
                  <td style={{padding:"9px 12px",fontSize:12,fontWeight:700,color:C.accent,whiteSpace:"nowrap"}}>{r.code||r.id}</td>
                  <td style={{padding:"9px 12px",fontSize:12,color:C.dim,whiteSpace:"nowrap"}}>{natLabel}</td>
                  <td style={{padding:"9px 12px",fontSize:12,color:C.text,maxWidth:280}}>
                    <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.descricao||r.title||"—"}</div>
                    {d.fornecedor&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>Fornec.: {d.fornecedor}</div>}
                  </td>
                  <td style={{padding:"9px 12px",fontSize:12,color:C.muted,textAlign:"center"}}>
                    {itens.length>0?<span style={{background:C.accent+"20",color:C.accent,borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:600}}>{itens.length}</span>:"—"}
                  </td>
                  <td style={{padding:"9px 12px",fontSize:12,color:C.muted,textAlign:"center"}}>
                    {acoes.length>0
                      ? <span style={{background:acoesAbertas>0?C.warning+"20":C.success+"20",color:acoesAbertas>0?C.warning:C.success,borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:600}}>
                          {acoesAbertas>0?acoesAbertas+" pend.":acoes.length+" ✓"}
                        </span>
                      : "—"}
                  </td>
                  <td style={{padding:"9px 12px",fontSize:11,color:origem==="Manual"?C.muted:C.accent,whiteSpace:"nowrap"}}>{origem}</td>
                  <td style={{padding:"9px 12px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{fmt(r.createdAt)}</td>
                  <td style={{padding:"9px 12px"}}><NCStatusBadge status={r.status}/></td>
                </tr>;
              })}
            </tbody>
          </table>
      }
    </div>
  </div>;
}

// ── NewNC ─────────────────────────────────────────────────────────
function NewNC({currentUser, allUsers, ncRecords, onSave, onCancel, linkedRO}){
  const {C}=useTheme(); const Sg=mkSg(C);

  const canVincularRO = hasPerm(currentUser,'nc.vincular_ro');

  const [natureza, setNatureza]                 = useState(linkedRO ? "produto" : "");
  const [ondeIdent, setOndeIdent]               = useState(linkedRO?.data?.local || "");
  const [ondeIdentOutro, setOndeIdentOutro]     = useState("");
  const [descricao, setDescricao]               = useState("");
  const [fornecedor, setFornecedor]             = useState("");
  const [nf, setNf]                             = useState("");

  // itens: cada um traz origem (RO-XXX ou "Manual") e lote_serie (string única)
  const [itensProduto, setItensProduto] = useState([]);
  const [itensProcesso, setItensProcesso] = useState([]);

  // ROs vinculadas: array de { code, ro_snapshot_brief }
  const [linkedROs, setLinkedROs] = useState([]);

  // Quando vier de "Gerar NC" no RODetail, importa os itens do linkedRO automaticamente
  // mas só uma vez (na montagem inicial)
  React.useEffect(()=>{
    if(linkedRO){
      const code = linkedRO.code||linkedRO.id;
      const itens = (linkedRO.data?.itens||[]).filter(x=>x.codigo && x.disposicao!=="migrada_nc");
      const importados = itens.map(it=>{
        const lote_serie = [it.lote, it.numSerie].filter(Boolean).join(" / ");
        return {
          origem: code,
          codigo: it.codigo||"",
          descricao: it.descricao||"",
          lote_serie: lote_serie,
          qtd_nc: it.qtdNC||"",
        };
      });
      setItensProduto(importados);
      setLinkedROs([code]);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // Modais
  const [vincularROModal, setVincularROModal] = useState(null);  // {roCode}
  const [verROModal, setVerROModal]           = useState(null);  // {roCode}
  const [roInput, setRoInput]                 = useState("");

  const [attachments, setAttachments] = useState([]);

  const stepHeader = (n, title, desc, ativo=true) => (
    <div style={{display:"flex", alignItems:"flex-start", gap:10, marginBottom:14}}>
      <div style={{
        width:24, height:24, borderRadius:"50%",
        background: ativo ? C.accent : C.surface,
        color: ativo ? "#fff" : C.muted,
        display:"flex", alignItems:"center", justifyContent:"center",
        fontSize:12, fontWeight:600, flexShrink:0,
        border: ativo ? "none" : "1px solid "+C.border
      }}>{n}</div>
      <div>
        <div style={{fontSize:14, fontWeight:600, color: ativo?C.text:C.muted}}>{title}</div>
        {desc && <div style={{fontSize:11, color:C.muted, marginTop:2}}>{desc}</div>}
      </div>
    </div>
  );

  // Handlers itens produto
  const addProd = () => setItensProduto(p=>[...p,{origem:"Manual",codigo:"",descricao:"",lote_serie:"",qtd_nc:""}]);
  const updProd = (i,k,v) => setItensProduto(p=>{ const n=[...p]; n[i]={...n[i],[k]:v}; return n; });
  const remProd = (i) => {
    // se item veio de uma RO, ao remover precisamos avaliar se devemos remover a RO da lista de linkedROs
    setItensProduto(p=>{
      const removido = p[i];
      const novoArr = p.filter((_,j)=>j!==i);
      // Se origem era uma RO e não há mais itens daquela RO, remover dos linkedROs
      if(removido && removido.origem && removido.origem!=="Manual"){
        const aindaTemDaRO = novoArr.some(x=>x.origem===removido.origem);
        if(!aindaTemDaRO){
          setLinkedROs(prev=>prev.filter(c=>c!==removido.origem));
        }
      }
      return novoArr;
    });
  };

  // Handlers itens processo
  const addProc = () => setItensProcesso(p=>[...p,{origem:"Manual",processo:"",documento:"",area:""}]);
  const updProc = (i,k,v) => setItensProcesso(p=>{ const n=[...p]; n[i]={...n[i],[k]:v}; return n; });
  const remProc = (i) => setItensProcesso(p=>p.filter((_,j)=>j!==i));

  // Tentar vincular RO: abre modal de confirmação
  const tryVincularRO = () => {
    const v = roInput.trim();
    if(!v) return;
    setVincularROModal({ roCode: v });
  };

  // Confirmou no modal: importa itens e adiciona aos linkedROs
  const confirmVincularRO = ({ ro, itensNovos }) => {
    const code = ro.code || vincularROModal.roCode;
    const importados = itensNovos.map(it=>{
      const lote_serie = [it.lote, it.numSerie].filter(Boolean).join(" / ");
      return {
        origem: code,
        codigo: it.codigo||"",
        descricao: it.descricao||"",
        lote_serie: lote_serie,
        qtd_nc: it.qtdNC||"",
      };
    });
    setItensProduto(p=>[...p, ...importados]);
    setLinkedROs(p=>p.includes(code) ? p : [...p, code]);
    setVincularROModal(null);
    setRoInput("");
  };

  // Validação
  const ondeFinal = ondeIdent==="Outro" ? ondeIdentOutro.trim() : ondeIdent;
  const itensProdValidos = itensProduto.filter(it=>it.codigo&&it.codigo.trim());
  const itensProcValidos = itensProcesso.filter(it=>it.processo&&it.processo.trim());
  const tabelaOK = natureza==="produto" ? itensProdValidos.length>0
                  : natureza==="processo" ? itensProcValidos.length>0
                  : false;
  const ok = natureza && ondeFinal && descricao.trim() && tabelaOK;

  return <div style={{padding:"18px 22px",maxWidth:1100}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div>
        <h1 style={{margin:0,fontSize:17,color:C.text,fontWeight:700}}>Nova Não Conformidade{linkedRO?" — via "+(linkedRO.code||linkedRO.id):""}</h1>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>Campos com * são obrigatórios</div>
      </div>
      <button style={Sg.btn()} onClick={onCancel}>Cancelar</button>
    </div>

    {/* Bloco 1 — Dados gerais */}
    <div style={{...Sg.card(),marginBottom:14}}>
      {stepHeader(1, "Dados gerais", "Natureza, onde foi identificado e o que aconteceu")}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div>
          <label style={Sg.lbl}>Natureza *</label>
          <select style={Sg.input()} value={natureza} onChange={e=>{
            const v = e.target.value;
            setNatureza(v);
            if(v!=="produto"){ setFornecedor(""); setNf(""); }
          }}>
            <option value="">Selecione...</option>
            {NC_NATUREZAS.map(n=><option key={n.value} value={n.value}>{n.label}</option>)}
          </select>
        </div>
        <div>
          <label style={Sg.lbl}>Onde foi identificado *</label>
          <select style={Sg.input()} value={ondeIdent} onChange={e=>{setOndeIdent(e.target.value); if(e.target.value!=="Outro") setOndeIdentOutro("");}}>
            <option value="">Selecione...</option>
            {NC_ONDE_IDENTIFICADO.map(l=><option key={l} value={l}>{l}</option>)}
          </select>
        </div>
      </div>

      {ondeIdent==="Outro" && <div style={{marginBottom:12}}>
        <label style={Sg.lbl}>Especifique *</label>
        <input style={Sg.input()} value={ondeIdentOutro} onChange={e=>setOndeIdentOutro(e.target.value)} placeholder="Onde foi identificado..."/>
      </div>}

      <div>
        <label style={Sg.lbl}>Descrição do problema *</label>
        <textarea style={{...Sg.input(),minHeight:80,resize:"vertical"}} value={descricao} onChange={e=>setDescricao(e.target.value)} placeholder="Descreva a não conformidade identificada..."/>
      </div>
    </div>

    {/* Bloco 2 — Itens (Produto) */}
    {natureza==="produto" && <div style={{...Sg.card(),marginBottom:14}}>
      {stepHeader(2, "Itens afetados *", "Produtos da NC. Itens com origem RO mostram seta — clique para ver detalhes da RO.")}
      {itensProduto.length>0 && <table style={{width:"100%",borderCollapse:"collapse",marginBottom:10,tableLayout:"fixed"}}>
        <colgroup>
          <col style={{width:"95px"}}/>
          <col style={{width:"140px"}}/>
          <col/>
          <col style={{width:"140px"}}/>
          <col style={{width:"85px"}}/>
          <col style={{width:"70px"}}/>
        </colgroup>
        <thead>
          <tr style={{borderBottom:"1px solid "+C.border,background:C.surface}}>
            {["Origem","Código","Descrição","Lote / Série","Qtd NC",""].map(h=>(
              <th key={h} style={{padding:"6px 8px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.3,textTransform:"uppercase"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {itensProduto.map((it,i)=>{
            const fromRO = it.origem && it.origem !== "Manual";
            return <tr key={i} style={{borderBottom:"1px solid "+C.border}}>
              <td style={{padding:"5px 8px",fontSize:11}}>
                {fromRO
                  ? <span
                      onClick={()=>setVerROModal({roCode: it.origem})}
                      style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:10,background:C.accent+"15",color:C.accent,fontWeight:600,cursor:"pointer",border:"1px solid "+C.accent+"30"}}
                      title="Ver detalhes da RO">{it.origem} ↗</span>
                  : <span style={{color:C.muted}}>Manual</span>
                }
              </td>
              <td style={{padding:"5px 6px"}}>
                {fromRO
                  ? <input style={{...Sg.input(),padding:"4px 6px",fontSize:12,background:C.surface}} value={it.codigo} readOnly title="Importado da RO — não pode ser editado"/>
                  : <ProdutoAutocomplete
                      value={it.codigo}
                      onChange={v=>updProd(i,"codigo",v)}
                      onSelect={p=>{ updProd(i,"codigo",p.codigo||""); updProd(i,"descricao",p.descricao||p.nome||""); }}
                      C={C} Sg={Sg}
                      placeholder="Código..."/>
                }
              </td>
              <td style={{padding:"5px 6px"}}>
                <input
                  style={{...Sg.input(),padding:"4px 6px",fontSize:12, ...(fromRO?{background:C.surface}:{})}}
                  value={it.descricao}
                  readOnly={fromRO}
                  onChange={e=>updProd(i,"descricao",e.target.value)}
                  placeholder="Descrição..."
                  title={fromRO?"Importado da RO":""}/>
              </td>
              <td style={{padding:"5px 6px"}}>
                <input
                  style={{...Sg.input(),padding:"4px 6px",fontSize:12, ...(fromRO?{background:C.surface}:{})}}
                  value={it.lote_serie}
                  readOnly={fromRO}
                  onChange={e=>updProd(i,"lote_serie",e.target.value)}
                  placeholder="Lote ou S/N..."
                  title={fromRO?"Importado da RO":""}/>
              </td>
              <td style={{padding:"5px 6px"}}>
                <input type="number" min="0"
                  style={{...Sg.input(),padding:"4px 6px",fontSize:12, ...(fromRO?{background:C.surface}:{})}}
                  value={it.qtd_nc}
                  readOnly={fromRO}
                  onChange={e=>updProd(i,"qtd_nc",e.target.value)}
                  placeholder="0"
                  title={fromRO?"Importado da RO":""}/>
              </td>
              <td style={{padding:"5px 6px",textAlign:"center"}}>
                <button style={{...Sg.btn(),fontSize:11,padding:"2px 8px",color:C.danger,borderColor:C.danger+"50"}} onClick={()=>remProd(i)}>remover</button>
              </td>
            </tr>;
          })}
        </tbody>
      </table>}
      <button style={{...Sg.btn(),fontSize:12}} onClick={addProd}>+ Adicionar item manual</button>
      {itensProduto.length===0 && <div style={{fontSize:11,color:C.muted,marginTop:8}}>Adicione pelo menos um item, ou vincule uma RO logo abaixo.</div>}
    </div>}

    {/* Bloco 2 — Itens (Processo) */}
    {natureza==="processo" && <div style={{...Sg.card(),marginBottom:14}}>
      {stepHeader(2, "Processo afetado *", "Processo, documento e área onde foi identificado")}
      {itensProcesso.length>0 && <table style={{width:"100%",borderCollapse:"collapse",marginBottom:10}}>
        <thead>
          <tr style={{borderBottom:"1px solid "+C.border,background:C.surface}}>
            {["Processo","Documento","Área",""].map(h=>(
              <th key={h} style={{padding:"6px 8px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.3,textTransform:"uppercase"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {itensProcesso.map((it,i)=>(
            <tr key={i} style={{borderBottom:"1px solid "+C.border}}>
              <td style={{padding:"5px 6px"}}><input style={{...Sg.input(),padding:"4px 6px",fontSize:12}} value={it.processo} onChange={e=>updProc(i,"processo",e.target.value)} placeholder="Ex: Compras, Expedição..."/></td>
              <td style={{padding:"5px 6px"}}><input style={{...Sg.input(),padding:"4px 6px",fontSize:12}} value={it.documento} onChange={e=>updProc(i,"documento",e.target.value)} placeholder="POP/IT/Procedimento..."/></td>
              <td style={{padding:"5px 6px"}}><input style={{...Sg.input(),padding:"4px 6px",fontSize:12}} value={it.area} onChange={e=>updProc(i,"area",e.target.value)} placeholder="Área..."/></td>
              <td style={{padding:"5px 8px",textAlign:"center"}}><button style={{...Sg.btn(),fontSize:11,padding:"2px 8px",color:C.danger,borderColor:C.danger+"50"}} onClick={()=>remProc(i)}>remover</button></td>
            </tr>
          ))}
        </tbody>
      </table>}
      <button style={{...Sg.btn(),fontSize:12}} onClick={addProc}>+ Adicionar processo</button>
      {itensProcesso.length===0 && <div style={{fontSize:11,color:C.muted,marginTop:8}}>Adicione pelo menos um registro.</div>}
    </div>}

    {/* Bloco 3 — Informações adicionais */}
    {natureza && <div style={{...Sg.card(),marginBottom:14}}>
      {stepHeader(3, "Informações adicionais", "Opcionais: fornecedor, NF e vínculo com ROs")}

      {natureza==="produto" && <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr",gap:12,marginBottom:12}}>
        <div>
          <label style={Sg.lbl}>Fornecedor</label>
          <input style={Sg.input()} value={fornecedor} onChange={e=>setFornecedor(e.target.value)} placeholder="Nome do fornecedor..."/>
        </div>
        <div>
          <label style={Sg.lbl}>NF / Invoice</label>
          <input style={Sg.input()} value={nf} onChange={e=>setNf(e.target.value)} placeholder="Número da NF/Invoice..." disabled={!fornecedor.trim()}/>
        </div>
      </div>}

      {natureza==="produto" && canVincularRO && <div style={{marginBottom:12}}>
        <label style={Sg.lbl}>Vincular RO (importa os itens dela)</label>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <input
            style={{...Sg.input(),maxWidth:240}}
            value={roInput}
            onChange={e=>setRoInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); tryVincularRO(); } }}
            placeholder="Código da RO (Ex: RO-001/2026)"/>
          <button style={{...Sg.btn(),fontSize:12}} onClick={tryVincularRO} disabled={!roInput.trim()}>+ buscar e vincular</button>
        </div>
        {linkedROs.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
          {linkedROs.map(code=>(
            <span key={code}
              onClick={()=>setVerROModal({roCode: code})}
              style={{display:"inline-flex",alignItems:"center",gap:6,padding:"3px 8px",borderRadius:12,background:C.accent+"15",border:"1px solid "+C.accent+"40",fontSize:12,color:C.accent,fontWeight:600,cursor:"pointer"}}
              title="Ver detalhes da RO">
              {code} ↗
            </span>
          ))}
        </div>}
        <div style={{fontSize:11,color:C.muted,marginTop:6,fontStyle:"italic"}}>
          Para desvincular uma RO, remova todos os itens dela na tabela acima.
        </div>
      </div>}

      {natureza==="produto" && !canVincularRO && linkedROs.length===0 && <div style={{padding:"7px 12px",background:C.surface,borderRadius:6,border:"1px dashed "+C.border,fontSize:11,color:C.muted}}>
        Você não tem permissão para vincular ROs. A Qualidade poderá vincular ROs depois, no detalhe da NC.
      </div>}
    </div>}

    {/* Anexos */}
    {natureza && <div style={{...Sg.card(),marginBottom:14}}>
      <AttachmentsPanel attachments={attachments} onAdd={a=>setAttachments(p=>[...p,a])} onRemove={a=>setAttachments(p=>p.filter(x=>x.id!==a.id))} readOnly={false} stage="abertura_nc" currentUser={currentUser} C={C}/>
    </div>}

    {/* Footer */}
    <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
      <button style={Sg.btn()} onClick={onCancel}>Cancelar</button>
      <button style={{...Sg.btn("primary"),opacity:ok?1:.4,padding:"8px 20px"}} disabled={!ok} onClick={()=>{
        const now = new Date().toISOString();
        const userLabel = currentUser?.name || currentUser?.email || "—";

        const itensFinal = natureza==="produto"
          ? itensProdValidos.map(it=>({
              origem: it.origem || "Manual",
              codigo: it.codigo || "",
              descricao: it.descricao || "",
              lote_serie: it.lote_serie || "",
              qtd_nc: it.qtd_nc || 0,
              // tratativa (preenchida depois)
              disposicao: "",
              justificativa_disposicao: "",
              qtd_tratada: 0,
              responsavel_id: null,
              responsavel_nome: null,
              data_planejada: null,
              data_conclusao: null,
              concluido_por_id: null,
              concluido_por_nome: null,
              anexos: [],
              status: "pendente",
            }))
          : itensProcValidos.map(it=>({
              origem: it.origem || "Manual",
              processo: it.processo || "",
              documento: it.documento || "",
              area: it.area || "",
              disposicao: "",
              justificativa_disposicao: "",
              responsavel_id: null,
              responsavel_nome: null,
              data_planejada: null,
              data_conclusao: null,
              concluido_por_id: null,
              concluido_por_nome: null,
              anexos: [],
              status: "pendente",
            }));

        const partes = [];
        partes.push("Natureza: "+(natureza==="produto"?"Produto":"Processo"));
        partes.push("Onde: "+ondeFinal);
        if(natureza==="produto" && fornecedor) partes.push("Fornecedor: "+fornecedor+(nf?" (NF "+nf+")":""));
        if(linkedROs.length>0) partes.push("Vinculada a: "+linkedROs.join(", "));
        if(itensFinal.length>0) partes.push(itensFinal.length+" item(s)/registro(s)");

        const data = {
          natureza,
          onde_identificado: ondeFinal,
          descricao,
          fornecedor: natureza==="produto" ? fornecedor : "",
          nf: natureza==="produto" ? nf : "",
          linkedROs,
          itens: itensFinal,

          classificacao: {
            tipo_desvio: null,
            escopo: null,
            envolve_fornecedor: false,
            fornecedor_nome: null,
            observacao: null,
            classificado_em: null,
            classificado_por_id: null,
            classificado_por_nome: null,
          },

          segregacao: {
            local: null,
            quantidade: null,
            realizada_em: null,
            realizada_por_id: null,
            realizada_por_nome: null,
            observacao: null,
          },

          acoes: [],

          encerramento: {
            tratativa_concluida: false,
            evidencia_ok: false,
            produto_liberado: false,
            necessita_riacp: false,
            riacp_codigo: null,
            assinatura: null,
          },

          attachments,
          historico: [{
            type:"abertura",
            at: now,
            by: userLabel,
            byId: currentUser?.id,
            event: "NC aberta",
            detail: partes.join(" · ")
          }],
        };

        onSave({...data, status:"aberta"});
      }}>Abrir NC</button>
    </div>

    {/* Modais */}
    {vincularROModal && <VincularROModal
      open={true}
      roCode={vincularROModal.roCode}
      currentNCItens={itensProduto}
      alreadyLinkedROs={linkedROs}
      ncRecords={ncRecords}
      currentUser={currentUser}
      C={C} Sg={Sg}
      onClose={()=>setVincularROModal(null)}
      onConfirm={confirmVincularRO}
    />}

    {verROModal && <ROQuickViewModal
      open={true}
      roCode={verROModal.roCode}
      C={C} Sg={Sg}
      onClose={()=>setVerROModal(null)}
    />}
  </div>;
}

// ── NCDetail ──────────────────────────────────────────────────────
function NCDetail({ncRecord, currentUser, allUsers, onBack, onUpdate}){
  const {C}=useTheme(); const Sg=mkSg(C);
  const [tratarIdx, setTratarIdx] = useState(null);
  const [aprovConcessaoIdx, setAprovConcessaoIdx] = useState(null);
  const [novaAcaoModal, setNovaAcaoModal] = useState(false);
  const [concluirAcaoIdx, setConcluirAcaoIdx] = useState(null);
  const [fecharModal, setFecharModal] = useState(false);
  const [cancelarModal, setCancelarModal] = useState(false);
  const [cancelarMotivo, setCancelarMotivo] = useState("");
  const [abaAtiva, setAbaAtiva] = useState("comunicacoes");
  const [novaComunicacao, setNovaComunicacao] = useState({tipo:"",resumo:""});
  const [addingComun, setAddingComun] = useState(false);
  const [sigModal, setSigModal] = useState(null);

  useEffect(()=>{ window.__sgqModalOpen = !!(tratarIdx!==null||aprovConcessaoIdx!==null||novaAcaoModal||concluirAcaoIdx!==null||fecharModal||cancelarModal||sigModal); return ()=>{window.__sgqModalOpen=false;}; },[tratarIdx,aprovConcessaoIdx,novaAcaoModal,concluirAcaoIdx,fecharModal,cancelarModal,sigModal]);

  if(!ncRecord) return null;

  const d = ncRecord.data||{};
  const itens = d.itens||[];
  const acoes = d.acoes||[];
  const comunicacoes = d.comunicacoes||[];
  const status = ncRecord.status||"em_analise";

  const canAbrir     = hasPerm(currentUser,'nc.abrir')||isAdmin;
  const canTratar    = hasPerm(currentUser,'nc.tratar_itens')||isAdmin;
  const canAprovConc = hasPerm(currentUser,'nc.aprovar_concessao')||isAdmin;
  const canGerAcoes  = hasPerm(currentUser,'nc.gerenciar_acoes')||isAdmin;
  const canConclAcao = hasPerm(currentUser,'nc.concluir_acao')||hasPerm(currentUser,'nc.gerenciar_acoes')||isAdmin;
  const canAnalyze   = hasPerm(currentUser,'nc.analisar')||canTratar||canGerAcoes||isAdmin;
  const canClose     = hasPerm(currentUser,'nc.fechar')||isAdmin;
  const canCancel    = hasPerm(currentUser,'nc.cancelar')||isAdmin;
  const canReopen    = hasPerm(currentUser,'nc.reabrir')||isAdmin;

  // Verifica se todos os itens têm disposição terminal
  const itensReais = itens.filter(x=>x.codigo);
  const todosItensTerminais = itensReais.length>0 && itensReais.every(it=>NC_DISP_TERMINAIS.includes(it.dispNC));

  // Verifica se todas as ações têm status terminal
  const todasAcoesTerminais = acoes.length===0 || acoes.every(a=>NC_ACAO_STATUS_TERMINAIS.includes(a.status));

  const prontaParaFechar = todosItensTerminais && todasAcoesTerminais && status==="em_analise";

  // Verifica se o usuário tem concessão pendente para ele
  const minhasConcessoes = itensReais.map((it,i)=>({it,i})).filter(({it})=>it.dispNC==="concessao_solicitada"&&String(it.aprovadorConcessaoId)===String(currentUser?.id));

  const save = async (updates) => {
    const updated = {...ncRecord, ...updates, data:{...d,...(updates.data||{})}};
    await onUpdate(updated);
  };

  const addHistorico = (ev) => {
    const now = new Date().toISOString();
    return [...(d.historico||[]), {at:now, by:currentUser?.name, byId:currentUser?.id, ...ev}];
  };

  // Qualidade define disposição de um item
  const handleTratarItem = async ({disp, justificativa, aprovadorId, aprovadorNome}) => {
    const now = new Date().toISOString();
    const novosItens = itens.map((it,i)=>{
      if(i!==tratarIdx) return it;
      return {...it, dispNC:disp, justificativaDisposicao:justificativa, tratadoAt:now, tratadoBy:currentUser?.name,
        ...(disp==="concessao_solicitada"?{aprovadorConcessaoId:aprovadorId,aprovadorConcessaoNome:aprovadorNome,concessaoSolicitadaAt:now}:{}),
      };
    });
    const item = itens[tratarIdx];
    const hist = addHistorico({type:"disposicao_item",event:"Disposição definida",detail:(NC_DISP[disp]||{}).label+" — "+item.codigo});
    await save({status:"em_analise",data:{...d,itens:novosItens,historico:hist}});
    setTratarIdx(null);
  };

  // Aprovador decide sobre concessão
  const handleAprovConcessao = async ({decisao, motivo, sig}) => {
    const now = new Date().toISOString();
    const novosItens = itens.map((it,i)=>{
      if(i!==aprovConcessaoIdx) return it;
      if(decisao==="aprovar") return {...it, dispNC:"concessao_aprovada", concessaoAprovadaAt:now, concessaoAprovadaBy:currentUser?.name, concessaoMotivo:motivo};
      else return {...it, dispNC:"concessao_rejeitada", concessaoRejeitadaAt:now, concessaoRejeitadaBy:currentUser?.name, concessaoMotivo:motivo};
    });
    const item = itens[aprovConcessaoIdx];
    const hist = addHistorico({type:"concessao",event:decisao==="aprovar"?"Concessão aprovada":"Concessão rejeitada",detail:item.codigo+" — "+motivo});
    await save({data:{...d,itens:novosItens,historico:hist}});
    setAprovConcessaoIdx(null);
  };

  // Adicionar ação ao plano
  const handleNovaAcao = async (acao) => {
    const now = new Date().toISOString();
    const novasAcoes = [...acoes, {...acao, id:Date.now(), criadaAt:now, criadaBy:currentUser?.name}];
    const hist = addHistorico({type:"acao_adicionada",event:"Ação adicionada ao plano",detail:acao.descricao.substring(0,60)});
    await save({data:{...d,acoes:novasAcoes,historico:hist}});
    setNovaAcaoModal(false);
  };

  // Concluir/justificar/cancelar ação
  const handleConcluirAcao = async ({tipo, evidencia}) => {
    const now = new Date().toISOString();
    const novasAcoes = acoes.map((a,i)=>{
      if(i!==concluirAcaoIdx) return a;
      return {...a, status:tipo, evidencia, concluidaAt:now, concluidaBy:currentUser?.name};
    });
    const acao = acoes[concluirAcaoIdx];
    const hist = addHistorico({type:"acao_concluida",event:"Ação "+tipo,detail:acao.descricao.substring(0,60)});
    await save({data:{...d,acoes:novasAcoes,historico:hist}});
    setConcluirAcaoIdx(null);
  };

  // Fechar NC
  const handleFechar = async ({analise, sig}) => {
    const now = new Date().toISOString();
    const hist = addHistorico({type:"fechamento",event:"NC fechada",detail:"Análise final registrada"});
    await save({status:"fechada",data:{...d,analiseFinal:analise,fechadoBy:currentUser?.name,fechadoByName:currentUser?.name,fechadoAt:now,historico:hist}});
    setFecharModal(false);
  };

  // Cancelar NC com assinatura
  const handleCancelar = async (sig) => {
    const now = new Date().toISOString();
    const hist = addHistorico({type:"cancelamento",event:"NC cancelada",detail:cancelarMotivo});
    await save({status:"cancelada",data:{...d,canceladaBy:currentUser?.name,canceladaAt:now,cancelamentoMotivo:cancelarMotivo,historico:hist}});
    setCancelarModal(false); setCancelarMotivo("");
  };

  // Adicionar comunicação
  const handleAddComunicacao = async () => {
    if(!novaComunicacao.tipo||!novaComunicacao.resumo.trim()) return;
    const now = new Date().toISOString();
    const nova = {...novaComunicacao, at:now, by:currentUser?.name, id:Date.now()};
    const novasCom = [...comunicacoes, nova];
    const hist = addHistorico({type:"comunicacao",event:"Comunicação registrada",detail:novaComunicacao.tipo+" — "+novaComunicacao.resumo.substring(0,50)});
    await save({data:{...d,comunicacoes:novasCom,historico:hist}});
    setNovaComunicacao({tipo:"",resumo:""}); setAddingComun(false);
  };

  // Badges de concessão pendente
  const badgeColors = {info:C.accent,warning:C.warning,success:C.success,danger:C.danger};
  const dispBadge = (disp) => {
    const dd = NC_DISP[disp];
    if(!dd) return <span style={{color:C.muted,fontSize:11}}>—</span>;
    const c = badgeColors[dd.color]||C.muted;
    return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:500,background:c+"15",color:c,border:"1px solid "+c+"30",whiteSpace:"nowrap"}}>{dd.short}</span>;
  };

  const acoesStatusBadge = (st) => {
    const s = NC_ACAO_STATUS[st]||{label:st,color:"#64748B"};
    return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:500,background:s.color+"15",color:s.color,border:"1px solid "+s.color+"30",whiteSpace:"nowrap"}}>{s.label}</span>;
  };

  return <div style={{padding:"18px 22px",maxWidth:1100}}>

    {/* Cabeçalho */}
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16,gap:12,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <button style={{...Sg.btn(),fontSize:11,padding:"4px 10px"}} onClick={onBack}>← Voltar</button>
        <div>
          <h1 style={{margin:0,fontSize:17,color:C.text,fontWeight:700}}>{ncRecord.code||ncRecord.id}</h1>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4,flexWrap:"wrap"}}>
            <NCStatusBadge status={status}/>
            {d.origem&&<span style={{fontSize:12,color:C.dim,padding:"2px 8px",background:C.surface,borderRadius:4,border:"1px solid "+C.border}}>{d.origem}</span>}
            {(d.linkedROs||[]).map(ro=>(
              <span key={ro} style={{fontSize:12,color:C.accent,padding:"2px 8px",background:C.accent+"10",borderRadius:4,border:"1px solid "+C.accent+"30"}}>{ro}</span>
            ))}
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {canCancel&&status==="em_analise"&&<button style={{...Sg.btn(),color:C.danger,borderColor:C.danger+"50",fontSize:12}} onClick={()=>setCancelarModal(true)}>Cancelar NC</button>}
        {canClose&&prontaParaFechar&&<button style={{...Sg.btn("primary"),fontSize:12,background:"#16A34A",borderColor:"#16A34A"}} onClick={()=>setFecharModal(true)}>Fechar NC</button>}
      </div>
    </div>

    {/* Banner pronta para fechar */}
    {prontaParaFechar&&<div style={{marginBottom:14,padding:"10px 16px",background:"#16A34A10",borderRadius:8,border:"1px solid #16A34A40",fontSize:13,color:"#16A34A",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <span>Todos os itens e ações estão concluídos. Esta NC está pronta para ser fechada.</span>
      {canClose&&<button style={{...Sg.btn(),background:"#16A34A",color:"#fff",borderColor:"#16A34A",fontSize:12,padding:"5px 14px"}} onClick={()=>setFecharModal(true)}>Fechar NC</button>}
    </div>}

    {/* Banner concessão pendente pra mim */}
    {minhasConcessoes.length>0&&<div style={{marginBottom:14,padding:"10px 16px",background:C.accent+"10",borderRadius:8,border:"1px solid "+C.accent+"40",fontSize:13,color:C.accent}}>
      Você tem {minhasConcessoes.length} aprovação(ões) de concessão pendente(s).
      {minhasConcessoes.map(({i})=>(
        <button key={i} style={{...Sg.btn(),fontSize:11,marginLeft:10,borderColor:C.accent,color:C.accent}} onClick={()=>setAprovConcessaoIdx(i)}>Aprovar item {(itens[i]||{}).codigo}</button>
      ))}
    </div>}

    {/* Análise final (quando fechada) */}
    {status==="fechada"&&d.analiseFinal&&<div style={{marginBottom:14,padding:"12px 16px",background:"#16A34A08",borderRadius:8,border:"1px solid #16A34A30"}}>
      <div style={{fontSize:11,fontWeight:700,color:"#16A34A",marginBottom:4,letterSpacing:.3}}>ANÁLISE FINAL</div>
      <div style={{fontSize:13,color:C.text}}>{d.analiseFinal}</div>
      <div style={{fontSize:11,color:C.muted,marginTop:6}}>Fechada por {d.fechadoByName} em {fmtShort(d.fechadoAt)}</div>
    </div>}

    {/* Dados gerais */}
    <div style={{...Sg.card({marginBottom:14})}}>
      <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",marginBottom:10}}>Dados gerais</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:3}}>Descrição</div>
          <div style={{fontSize:13,color:C.text}}>{d.descricao||"—"}</div>
        </div>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:3}}>Responsável</div>
          <div style={{fontSize:13,color:C.text}}>{d.responsavelNome||"—"}</div>
        </div>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:3}}>Prazo</div>
          <div style={{fontSize:13,color:C.text}}>{d.prazo?new Date(d.prazo+"T12:00:00").toLocaleDateString("pt-BR"):"—"}</div>
        </div>
      </div>
      <div style={{fontSize:11,color:C.muted,marginTop:10}}>Aberta por {ncRecord.createdByName||ncRecord.owner_name||"—"} em {fmt(ncRecord.createdAt)}</div>
    </div>

    {/* Itens afetados */}
    <div style={{...Sg.card({padding:0,overflow:"hidden",marginBottom:14})}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:"1px solid "+C.border}}>
        <span style={{fontSize:12,fontWeight:700,color:C.dim,letterSpacing:.3}}>ITENS AFETADOS ({itensReais.length})</span>
      </div>
      {itensReais.length===0
        ? <div style={{padding:24,textAlign:"center",color:C.muted,fontSize:12}}>Nenhum item registrado.</div>
        : <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:C.surface,borderBottom:"1px solid "+C.border}}>
                {["Código","Descrição","Lote","Qtd NC","Disposição","Justificativa","Tratado por","Aprovado por",""].map((h,i)=>(
                  <th key={i} style={{padding:"7px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.3,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {itens.map((it,i)=>{
                if(!it.codigo) return null;
                const pendenteMinha = it.dispNC==="concessao_solicitada"&&String(it.aprovadorConcessaoId)===String(currentUser?.id);
                const podeTratar = canTratar && status==="em_analise" && !NC_DISP_TERMINAIS.includes(it.dispNC) && it.dispNC!=="concessao_solicitada";
                const podeAprovarConcessao = canAprovConc && pendenteMinha;
                // Coluna "Aprovado por"
                let aprovadoPor = "—";
                if(it.dispNC==="concessao_aprovada") aprovadoPor = (it.concessaoAprovadaBy||"—") + (it.concessaoAprovadaAt?" · "+fmtShort(it.concessaoAprovadaAt):"");
                else if(it.dispNC==="concessao_rejeitada") aprovadoPor = (it.concessaoRejeitadaBy||"—") + " (rejeitada)";
                else if(it.dispNC==="concessao_solicitada") aprovadoPor = it.aprovadorConcessaoNome||"—";
                else if(NC_DISP_TERMINAIS.includes(it.dispNC)&&!it.dispNC.includes("concessao")) aprovadoPor = it.tratadoBy||"—";

                return <tr key={i} style={{borderBottom:"1px solid "+C.border,background:pendenteMinha?C.accent+"06":""}}>
                  <td style={{padding:"8px 10px",fontSize:12,fontWeight:700,color:C.text}}>{it.codigo}</td>
                  <td style={{padding:"8px 10px",fontSize:12,color:C.dim,maxWidth:180}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.descricao||"—"}</div></td>
                  <td style={{padding:"8px 10px",fontSize:12,color:C.muted}}>{it.lote||"—"}</td>
                  <td style={{padding:"8px 10px",fontSize:12,color:C.muted,textAlign:"center"}}>{it.qtdNC||"—"}</td>
                  <td style={{padding:"8px 10px"}}>
                    {it.dispNC ? dispBadge(it.dispNC) : <span style={{color:C.warning,fontSize:11,fontStyle:"italic"}}>Aguardando</span>}
                  </td>
                  <td style={{padding:"8px 10px",fontSize:11,color:C.muted,maxWidth:180}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.justificativaDisposicao||"—"}</div></td>
                  <td style={{padding:"8px 10px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{it.tratadoBy||(it.dispNC?"—":"—")}</td>
                  <td style={{padding:"8px 10px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{aprovadoPor}</td>
                  <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>
                    {podeTratar&&<button style={{...Sg.btn(),fontSize:11,padding:"3px 10px"}} onClick={()=>setTratarIdx(i)}>Definir</button>}
                    {podeAprovarConcessao&&<button style={{...Sg.btn("primary"),fontSize:11,padding:"3px 10px"}} onClick={()=>setAprovConcessaoIdx(i)}>Aprovar</button>}
                  </td>
                </tr>;
              })}
            </tbody>
          </table>
      }
    </div>

    {/* Plano de ações corretivas */}
    <div style={{...Sg.card({padding:0,overflow:"hidden",marginBottom:14})}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:"1px solid "+C.border}}>
        <span style={{fontSize:12,fontWeight:700,color:C.dim,letterSpacing:.3}}>PLANO DE AÇÕES CORRETIVAS ({acoes.length})</span>
        {canGerAcoes&&status==="em_analise"&&<button style={{...Sg.btn(),fontSize:11,padding:"4px 12px"}} onClick={()=>setNovaAcaoModal(true)}>+ Nova ação</button>}
      </div>
      {acoes.length===0
        ? <div style={{padding:24,textAlign:"center",color:C.muted,fontSize:12}}>Nenhuma ação no plano.</div>
        : <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:C.surface,borderBottom:"1px solid "+C.border}}>
                {["Ação","Responsável","Prazo","Status","Concluída por","Em",""].map((h,i)=>(
                  <th key={i} style={{padding:"7px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.3,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {acoes.map((a,i)=>{
                const isTerminal = NC_ACAO_STATUS_TERMINAIS.includes(a.status);
                const isResp = String(a.responsavelId)===String(currentUser?.id);
                const podeConcluir = (isResp||canConclAcao) && !isTerminal && status==="em_analise";
                return <tr key={i} style={{borderBottom:"1px solid "+C.border}}>
                  <td style={{padding:"8px 10px",fontSize:12,color:C.text,maxWidth:260}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.descricao}</div></td>
                  <td style={{padding:"8px 10px",fontSize:12,color:C.dim,whiteSpace:"nowrap"}}>{a.responsavelNome||"—"}</td>
                  <td style={{padding:"8px 10px",fontSize:12,color:C.muted,whiteSpace:"nowrap"}}>{a.prazo?new Date(a.prazo+"T12:00:00").toLocaleDateString("pt-BR"):"—"}</td>
                  <td style={{padding:"8px 10px"}}>{acoesStatusBadge(a.status)}</td>
                  <td style={{padding:"8px 10px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{a.concluidaBy||"—"}</td>
                  <td style={{padding:"8px 10px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{a.concluidaAt?fmtShort(a.concluidaAt):"—"}</td>
                  <td style={{padding:"8px 10px"}}>
                    {podeConcluir&&<button style={{...Sg.btn(),fontSize:11,padding:"3px 10px"}} onClick={()=>setConcluirAcaoIdx(i)}>Registrar</button>}
                    {a.evidencia&&<div style={{fontSize:11,color:C.muted,marginTop:2,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontStyle:"italic"}}>{a.evidencia}</div>}
                  </td>
                </tr>;
              })}
            </tbody>
          </table>
      }
    </div>

    {/* Abas: Comunicações / Histórico */}
    <div style={{...Sg.card({padding:0,overflow:"hidden",marginBottom:14})}}>
      <div style={{display:"flex",borderBottom:"1px solid "+C.border}}>
        {[{k:"comunicacoes",l:"Comunicações ("+comunicacoes.length+")"},{k:"historico",l:"Histórico ("+(d.historico||[]).length+")"}].map(tab=>(
          <button key={tab.k} onClick={()=>setAbaAtiva(tab.k)} style={{padding:"9px 18px",fontSize:12,fontWeight:abaAtiva===tab.k?600:400,color:abaAtiva===tab.k?C.accent:C.muted,background:"none",border:"none",cursor:"pointer",borderBottom:"2px solid "+(abaAtiva===tab.k?C.accent:"transparent"),marginBottom:-1,fontFamily:"inherit"}}>{tab.l}</button>
        ))}
      </div>
      <div style={{padding:"0"}}>
        {abaAtiva==="comunicacoes"&&<div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:C.surface,borderBottom:"1px solid "+C.border}}>
                {["Data","Tipo","Resumo","Registrou"].map((h,i)=>(
                  <th key={i} style={{padding:"7px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.3,textTransform:"uppercase"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {comunicacoes.map((c,i)=>(
                <tr key={i} style={{borderBottom:"1px solid "+C.border}}>
                  <td style={{padding:"8px 10px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{fmtShort(c.at)}</td>
                  <td style={{padding:"8px 10px",fontSize:12,color:C.text,whiteSpace:"nowrap"}}>{c.tipo}</td>
                  <td style={{padding:"8px 10px",fontSize:12,color:C.dim}}>{c.resumo}</td>
                  <td style={{padding:"8px 10px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{c.by}</td>
                </tr>
              ))}
              {comunicacoes.length===0&&!addingComun&&<tr><td colSpan={4} style={{padding:"20px 10px",textAlign:"center",fontSize:12,color:C.muted,fontStyle:"italic"}}>Nenhuma comunicação registrada.</td></tr>}
              {addingComun&&<tr style={{background:C.surface}}>
                <td style={{padding:"6px 8px",fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{new Date().toLocaleDateString("pt-BR")}</td>
                <td style={{padding:"6px 8px"}}>
                  <select style={{...Sg.input(),padding:"3px 6px",fontSize:11}} value={novaComunicacao.tipo} onChange={e=>setNovaComunicacao(p=>({...p,tipo:e.target.value}))}>
                    <option value="">Tipo...</option>
                    {["E-mail","Reunião","Telefone","Carta","Outro"].map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                </td>
                <td style={{padding:"6px 8px"}}><input style={{...Sg.input(),padding:"3px 6px",fontSize:11}} value={novaComunicacao.resumo} onChange={e=>setNovaComunicacao(p=>({...p,resumo:e.target.value}))} placeholder="Resumo da comunicação..."/></td>
                <td style={{padding:"6px 8px",whiteSpace:"nowrap"}}>
                  <button style={{...Sg.btn("primary"),fontSize:10,padding:"3px 8px",marginRight:4}} onClick={handleAddComunicacao} disabled={!novaComunicacao.tipo||!novaComunicacao.resumo.trim()}>Salvar</button>
                  <button style={{...Sg.btn(),fontSize:10,padding:"3px 8px"}} onClick={()=>{setAddingComun(false);setNovaComunicacao({tipo:"",resumo:""});}}>✕</button>
                </td>
              </tr>}
            </tbody>
          </table>
          {(canAnalyze||canTratar||canGerAcoes)&&status==="em_analise"&&!addingComun&&<div style={{padding:"8px 10px",borderTop:"1px solid "+C.border}}>
            <button style={{...Sg.btn(),fontSize:11,padding:"4px 12px"}} onClick={()=>setAddingComun(true)}>+ Registrar comunicação</button>
          </div>}
        </div>}
        {abaAtiva==="historico"&&<div style={{padding:"8px 14px"}}>
          {(d.historico||[]).length===0
            ? <div style={{fontSize:12,color:C.muted,padding:"12px 0"}}>Sem eventos registrados.</div>
            : <div style={{display:"flex",flexDirection:"column",gap:0}}>
                {[...(d.historico||[])].reverse().map((ev,i)=>(
                  <div key={i} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:"1px solid "+C.border,alignItems:"flex-start"}}>
                    <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap",width:112,flexShrink:0}}>{fmtShort(ev.at)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <span style={{fontSize:12,color:C.text,fontWeight:500}}>{ev.event||ev.type}</span>
                      {ev.detail&&<span style={{fontSize:11,color:C.muted,marginLeft:6}}>{ev.detail}</span>}
                    </div>
                    <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{ev.by}</div>
                  </div>
                ))}
              </div>
          }
        </div>}
      </div>
    </div>

    {/* Rodapé */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid "+C.border}}>
      <div style={{fontSize:11,color:C.muted}}>Aberta por {ncRecord.createdByName||ncRecord.owner_name||"—"} em {fmt(ncRecord.createdAt)} · Última atividade {fmt(ncRecord.updatedAt||ncRecord.createdAt)}</div>
      <button style={{...Sg.btn(),fontSize:11,padding:"4px 12px",color:C.accent,borderColor:C.accent+"50"}}>Criar RIACP a partir desta NC</button>
    </div>

    {/* Modals */}
    {tratarIdx!==null&&<TratarItemNCModal
      open={true} item={itens[tratarIdx]} itemIdx={tratarIdx}
      allUsers={allUsers} currentUser={currentUser}
      onClose={()=>setTratarIdx(null)}
      onConfirm={handleTratarItem} C={C} Sg={Sg}/>}

    {aprovConcessaoIdx!==null&&<AprovarConcessaoNCModal
      open={true} nc={ncRecord} itemIdx={aprovConcessaoIdx}
      currentUser={currentUser}
      onClose={()=>setAprovConcessaoIdx(null)}
      onConfirm={handleAprovConcessao} C={C} Sg={Sg}/>}

    {novaAcaoModal&&<NovaAcaoNCModal
      open={true} allUsers={allUsers}
      onClose={()=>setNovaAcaoModal(false)}
      onConfirm={handleNovaAcao} C={C} Sg={Sg}/>}

    {concluirAcaoIdx!==null&&<ConcluirAcaoNCModal
      open={true} acao={acoes[concluirAcaoIdx]}
      onClose={()=>setConcluirAcaoIdx(null)}
      onConfirm={handleConcluirAcao} C={C} Sg={Sg}/>}

    {fecharModal&&<FecharNCModal
      open={true} nc={ncRecord}
      onClose={()=>setFecharModal(false)}
      onConfirm={handleFechar} C={C} Sg={Sg}/>}

    {cancelarModal&&<Modal open={true} onClose={()=>setCancelarModal(false)} title="Cancelar NC" width={480}>
      <div style={{marginBottom:12}}>
        <label style={Sg.lbl}>Motivo do cancelamento *</label>
        <textarea style={{...Sg.input(),minHeight:72,resize:"vertical"}} value={cancelarMotivo} onChange={e=>setCancelarMotivo(e.target.value)} placeholder="Descreva o motivo..."/>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <button style={Sg.btn()} onClick={()=>setCancelarModal(false)}>Voltar</button>
        <button style={{...Sg.btn(),color:C.danger,borderColor:C.danger,opacity:cancelarMotivo.trim()?1:.4}} disabled={!cancelarMotivo.trim()} onClick={()=>setSigModal({action:handleCancelar,title:"Confirmar cancelamento",desc:"Cancelamento da NC "+ncRecord.code,label:"Cancelar NC"})}>
          Cancelar e assinar
        </button>
      </div>
      {sigModal&&<SignatureModal
        open={true}
        onClose={()=>setSigModal(null)}
        onConfirm={(sig)=>{ setSigModal(null); sigModal.action(sig); }}
        title={sigModal.title} description={sigModal.desc} confirmLabel={sigModal.label}
        saId={ncRecord?.code} action="nc_cancelar" C={C} Sg={Sg}/>}
    </Modal>}
  </div>;
}

// ── NCAcoesGerais — gestão de todas as ações NC com filtros ──────
function NCPendenciasInbox({ncRecords, currentUser, allUsers, onUpdate, onNavNC}){
  const {C}=useTheme(); const Sg=mkSg(C);
  const [fStatus,  setFStatus]  = useState("");   // status da ação
  const [fTipo,    setFTipo]    = useState("");   // tipo (acao|concessao|fechar)
  const [fNC,      setFNC]      = useState("");   // código da NC
  const [fResp,    setFResp]    = useState("");   // responsável (id)
  const [fMinha,   setFMinha]   = useState(false);// só minhas
  const [concluirModal, setConcluirModal] = useState(null);
  const [aprovModal,    setAprovModal]    = useState(null);

  const canAnalisar = hasPerm(currentUser,'nc.analisar')||currentUser?.role==='admin';

  // Coleta TUDO — todas NCs, todos status
  const todasLinhas = [];
  (ncRecords||[]).forEach(r=>{
    const d = r.data||{};
    // Ações do plano — TODAS independente de status NC
    (d.acoes||[]).forEach((a,acaoIdx)=>{
      const resp = (allUsers||[]).find(u=>String(u.id)===String(a.responsavelId));
      todasLinhas.push({
        nc:r, tipo:"acao", acaoIdx,
        descricao: a.descricao,
        responsavel: resp?.name||"—", responsavelId: a.responsavelId,
        prazo: a.prazo, statusAcao: a.status,
        isMinha: String(a.responsavelId)===String(currentUser?.id),
        isTerminal: NC_ACAO_STATUS_TERMINAIS.includes(a.status),
      });
    });
    // Concessões de itens
    (d.itens||[]).forEach((it,itemIdx)=>{
      if(!["concessao_solicitada","concessao_aprovada","concessao_rejeitada"].includes(it.dispNC)) return;
      const aprov = (allUsers||[]).find(u=>String(u.id)===String(it.aprovadorConcessaoId));
      const stConc = it.dispNC==="concessao_solicitada"?"pendente":it.dispNC==="concessao_aprovada"?"concluida":"cancelada";
      todasLinhas.push({
        nc:r, tipo:"concessao", itemIdx,
        descricao: "Concessão — "+it.codigo+(it.descricao?" ("+it.descricao+")":""),
        responsavel: aprov?.name||"—", responsavelId: it.aprovadorConcessaoId,
        prazo: null, statusAcao: stConc,
        isMinha: String(it.aprovadorConcessaoId)===String(currentUser?.id),
        isTerminal: it.dispNC!=="concessao_solicitada",
      });
    });
    // NC pronta para fechar — só mostra se não fechada/cancelada
    if(!["fechada","cancelada"].includes(r.status)){
      const itensReais=(d.itens||[]).filter(x=>x.codigo);
      const acoes=d.acoes||[];
      const pronta = itensReais.length>0 &&
        itensReais.every(it=>NC_DISP_TERMINAIS.includes(it.dispNC)) &&
        (acoes.length===0||acoes.every(a=>NC_ACAO_STATUS_TERMINAIS.includes(a.status)));
      if(pronta){
        const canClose=hasPerm(currentUser,'nc.fechar')||currentUser?.role==='admin';
        todasLinhas.push({
          nc:r, tipo:"fechar", itemIdx:null, acaoIdx:null,
          descricao:"NC pronta — análise final pendente",
          responsavel:"Qualidade", responsavelId:null,
          prazo:null, statusAcao:"pendente",
          isMinha:canClose, isTerminal:false,
        });
      }
    }
  });

  // Filtros
  const vis = todasLinhas.filter(p=>{
    if(fMinha && !p.isMinha) return false;
    if(fStatus){
      if(fStatus==="pendente" && p.isTerminal) return false;
      if(fStatus==="terminal" && !p.isTerminal) return false;
      if(!["pendente","terminal"].includes(fStatus) && p.statusAcao!==fStatus) return false;
    }
    if(fTipo && p.tipo!==fTipo) return false;
    if(fNC && !(p.nc.code||p.nc.id||"").toLowerCase().includes(fNC.toLowerCase())) return false;
    if(fResp && String(p.responsavelId)!==String(fResp)) return false;
    return true;
  });

  const pendentes = todasLinhas.filter(p=>p.isMinha&&!p.isTerminal).length;

  // Lista de NCs únicas para o filtro
  const ncsUnicas = [...new Map((ncRecords||[]).map(r=>[(r.code||r.id), r])).values()];
  const responsaveisUnicos = [...new Map(todasLinhas.filter(p=>p.responsavelId).map(p=>[String(p.responsavelId),{id:p.responsavelId,name:p.responsavel}])).values()];

  const TIPO_META = {
    concessao: {label:"Concessão",          cor:"#185FA5"},
    acao:      {label:"Ação corretiva",     cor:"#D97706"},
    fechar:    {label:"Pronta p/ fechar",   cor:"#16A34A"},
  };

  const statusBadge = (st, isTerminal) => {
    if(st==="pendente"&&!isTerminal){
      const s=NC_ACAO_STATUS["pendente"]||{label:"Pendente",color:"#D97706"};
      return <span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:s.color+"18",color:s.color,fontWeight:500,whiteSpace:"nowrap"}}>{s.label}</span>;
    }
    const s = NC_ACAO_STATUS[st]||{label:st||"—",color:"#64748B"};
    return <span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:s.color+"18",color:s.color,fontWeight:500,whiteSpace:"nowrap"}}>{s.label}</span>;
  };

  const handleConcluirAcao = async ({tipo, evidencia}) => {
    if(!concluirModal) return;
    const {nc, acaoIdx} = concluirModal;
    const d = nc.data||{};
    const now = new Date().toISOString();
    const novasAcoes = (d.acoes||[]).map((a,i)=>{
      if(i!==acaoIdx) return a;
      return {...a, status:tipo, evidencia, concluidaAt:now, concluidaBy:currentUser?.name};
    });
    const hist = [...(d.historico||[]),{type:"acao_concluida",at:now,by:currentUser?.name,byId:currentUser?.id,event:"Ação "+tipo,detail:(d.acoes[acaoIdx]?.descricao||"").substring(0,60)}];
    await onUpdate({...nc, data:{...d, acoes:novasAcoes, historico:hist}});
    setConcluirModal(null);
  };

  const handleAprovConcessao = async ({decisao, motivo}) => {
    if(!aprovModal) return;
    const {nc, itemIdx} = aprovModal;
    const d = nc.data||{};
    const now = new Date().toISOString();
    const novosItens = (d.itens||[]).map((it,i)=>{
      if(i!==itemIdx) return it;
      if(decisao==="aprovar") return {...it,dispNC:"concessao_aprovada",concessaoAprovadaAt:now,concessaoAprovadaBy:currentUser?.name,concessaoMotivo:motivo};
      return {...it,dispNC:"concessao_rejeitada",concessaoRejeitadaAt:now,concessaoRejeitadaBy:currentUser?.name,concessaoMotivo:motivo};
    });
    const item=(d.itens||[])[itemIdx];
    const hist=[...(d.historico||[]),{type:"concessao",at:now,by:currentUser?.name,byId:currentUser?.id,event:decisao==="aprovar"?"Concessão aprovada":"Concessão rejeitada",detail:(item?.codigo||"")+" — "+motivo}];
    await onUpdate({...nc, data:{...d, itens:novosItens, historico:hist}});
    setAprovModal(null);
  };

  return <div style={{padding:"18px 22px",maxWidth:1100}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
      <div>
        <h1 style={{margin:0,fontSize:17,color:C.text,fontWeight:700}}>Gestão de ações — NC</h1>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>
          {vis.length} registro{vis.length!==1?"s":""} · {pendentes} pendente{pendentes!==1?"s":""} para você
        </div>
      </div>
    </div>

    {/* Filtros */}
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{...Sg.input(),maxWidth:160}}>
        <option value="">Todos os status</option>
        <option value="pendente">Pendentes</option>
        <option value="em_andamento">Em andamento</option>
        <option value="concluida">Concluídas</option>
        <option value="justificada">Justificadas</option>
        <option value="cancelada">Canceladas</option>
        <option value="terminal">Todos terminais</option>
      </select>
      <select value={fTipo} onChange={e=>setFTipo(e.target.value)} style={{...Sg.input(),maxWidth:160}}>
        <option value="">Todos os tipos</option>
        <option value="acao">Ação corretiva</option>
        <option value="concessao">Concessão</option>
        <option value="fechar">Pronta p/ fechar</option>
      </select>
      <select value={fNC} onChange={e=>setFNC(e.target.value)} style={{...Sg.input(),maxWidth:160}}>
        <option value="">Todas as NCs</option>
        {ncsUnicas.map(r=><option key={r.code||r.id} value={r.code||r.id}>{r.code||r.id}</option>)}
      </select>
      <select value={fResp} onChange={e=>setFResp(e.target.value)} style={{...Sg.input(),maxWidth:180}}>
        <option value="">Todos os responsáveis</option>
        {responsaveisUnicos.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
      </select>
      <label style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.dim,cursor:"pointer",userSelect:"none"}}>
        <input type="checkbox" checked={fMinha} onChange={e=>setFMinha(e.target.checked)} style={{cursor:"pointer"}}/>
        Só minhas
      </label>
      {(fStatus||fTipo||fNC||fResp||fMinha)&&
        <button style={{...Sg.btn(),fontSize:11,padding:"3px 10px",color:C.muted}} onClick={()=>{setFStatus("");setFTipo("");setFNC("");setFResp("");setFMinha(false);}}>Limpar</button>}
      <span style={{fontSize:11,color:C.muted,marginLeft:"auto"}}>{vis.length} resultado{vis.length!==1?"s":""}</span>
    </div>

    {/* Tabela */}
    <div style={{...Sg.card({padding:0,overflow:"hidden"})}}>
      {vis.length===0
        ? <div style={{padding:"32px 20px",textAlign:"center",color:C.muted,fontSize:13}}>Nenhum registro encontrado com esses filtros.</div>
        : <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{borderBottom:"1px solid "+C.border,background:C.surface}}>
                {["NC","Tipo","Descrição","Responsável","Prazo","Status",""].map((h,i)=>(
                  <th key={i} style={{padding:"7px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {vis.map((p,i)=>{

    {concluirModal&&<ConcluirAcaoNCModal

function SeedProdutos({currentUser}){
  const {C}=useTheme();const Sg=mkSg(C);
  const [info,setInfo]=useState(null);
  const [loading,setLoading]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [uploadResult,setUploadResult]=useState(null);
  const fileRef=React.useRef(null);

  const SEED = [
    {codigo:"026377",descricao:"KIT COMPLETO PLACA MODELO LM-PW1-001 - PEME V1.1 - R1.0 – RETRAB MS-PW1-001",tipo:"TP",unidade:"UN",familia:"Placa PW1"},
    {codigo:"025358",descricao:"KIT COMPLETO PLACA MODELO LM-PW1-001 - PEME V1.1 - R1.3 ROHS",tipo:"PI",unidade:"UN",familia:"Placa PW1"},
    {codigo:"026438",descricao:"KIT COMPLETO PLACA MODELO LM-PW1-001 - PEME V1.2 - R1.0 ROHS",tipo:"MP",unidade:"UN",familia:"Placa PW1"},
    {codigo:"029897",descricao:"KIT COMPLETO PLACA MODELO LM-PW1-001 - PEME V1.2 - R1.0 ROHS - RETRAB MS-PW1-003",tipo:"MP",unidade:"UN",familia:"Placa PW1"},
    {codigo:"029932",descricao:"KIT COMPLETO PLACA MODELO LM-PW1-001 - PEME V1.2 - R1.1 ROHS",tipo:"MP",unidade:"UN",familia:"Placa PW1"},
    {codigo:"020424",descricao:"KIT PLACA DE CI PW1-001-PEME V1.1",tipo:"PI",unidade:"UN",familia:"Placa PW1"},
    {codigo:"025385",descricao:"KIT PLACA LM-PW1-001 - PEME V1.1 - R1.1 RETRAB MS-PW1-001",tipo:"PI",unidade:"UN",familia:"Placa PW1"},
  ];

  React.useEffect(()=>{ loadInfo(); },[]);

  const loadInfo = async () => {
    setLoading(true);
    try{
      const token=sessionStorage.getItem('sgq_token');
      const res=await fetch('/api/produtos',{headers:{'Authorization':'Bearer '+token}});
      const data=await res.json();
      if(Array.isArray(data)){
        const ativos=data.filter(p=>p.ativo);
        const lastUpd=data.map(p=>p.updated_at).filter(Boolean).sort().reverse()[0];
        setInfo({total:data.length, ativos:ativos.length, lastUpd});
      }
    }catch{}
    setLoading(false);
  };

  const runSeed = async () => {
    setUploading(true); setUploadResult(null);
    try{
      const token=sessionStorage.getItem('sgq_token');
      const res=await fetch('/api/produtos',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({produtos:SEED,replace:false})});
      const data=await res.json();
      if(res.ok){ setUploadResult({ok:true,msg:data.inserted+" inseridos, "+data.updated+" atualizados."}); loadInfo(); }
      else setUploadResult({ok:false,msg:data.error||'Erro'});
    }catch(e){setUploadResult({ok:false,msg:e.message});}
    setUploading(false);
  };

  const handleCSV = async (file) => {
    if(!file) return;
    setUploading(true); setUploadResult(null);
    try{
      const text=await file.text();
      const lines=text.split(new RegExp('\r?\n')).filter(l=>l.trim());
      // Detecta separador
      const sep=lines[0].indexOf(';')>=0?';':',';
      const headers=lines[0].split(sep).map(h=>h.trim().toLowerCase().replace(/['"]/g,''));
      const iCod=headers.findIndex(h=>h.includes('codigo')||h.includes('código')||h==='code');
      const iDesc=headers.findIndex(h=>h.includes('descri'));
      const iTipo=headers.findIndex(h=>h.includes('tipo')||h==='type');
      const iUn=headers.findIndex(h=>h.includes('unidade')||h==='un'||h==='unit');
      const iFam=headers.findIndex(h=>h.includes('familia')||h.includes('família')||h==='family');
      if(iCod<0||iDesc<0){ setUploadResult({ok:false,msg:'CSV precisa ter colunas "codigo" e "descricao"'}); setUploading(false); return; }
      const produtos=lines.slice(1).map(l=>{
        const cols=l.split(sep).map(c=>c.trim().replace(/^["']|["']$/g,''));
        return {codigo:cols[iCod],descricao:cols[iDesc],tipo:iTipo>=0?cols[iTipo]:null,unidade:iUn>=0?cols[iUn]:'UN',familia:iFam>=0?cols[iFam]:null};
      }).filter(p=>p.codigo&&p.descricao);
      const token=sessionStorage.getItem('sgq_token');
      const res=await fetch('/api/produtos',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({produtos,replace:false})});
      const data=await res.json();
      if(res.ok){ setUploadResult({ok:true,msg:data.inserted+" inseridos, "+data.updated+" atualizados de "+produtos.length+" linhas."}); loadInfo(); }
      else setUploadResult({ok:false,msg:data.error||'Erro'});
    }catch(e){setUploadResult({ok:false,msg:e.message});}
    setUploading(false);
  };

  return <div style={{padding:"18px 22px",maxWidth:560}}>
    <h1 style={{margin:"0 0 4px",fontSize:17,color:C.text,fontWeight:700}}>Gestão de Produtos</h1>
    <div style={{fontSize:11,color:C.muted,marginBottom:20}}>Base de produtos usada pelo autocomplete em todos os módulos.</div>

    {/* Status atual */}
    <div style={{...Sg.card(),marginBottom:16,display:"flex",gap:24,alignItems:"center"}}>
      {loading?<span style={{fontSize:13,color:C.muted}}>Carregando...</span>:<>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:700,color:C.accent}}>{info?.ativos??0}</div>
          <div style={{fontSize:11,color:C.muted}}>produtos ativos</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,color:C.muted}}>Última atualização</div>
          <div style={{fontSize:13,color:C.text,fontWeight:600}}>{info?.lastUpd?fmt(info.lastUpd):"Nunca"}</div>
        </div>
        <button style={{...Sg.btn(),fontSize:11,padding:"4px 10px"}} onClick={loadInfo}>Atualizar</button>
      </>}
    </div>

    {/* Upload CSV */}
    <div style={{...Sg.card(),marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",marginBottom:10}}>Importar CSV</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Colunas obrigatórias: <strong>codigo</strong>, <strong>descricao</strong>. Opcionais: tipo, unidade, familia. Separador: <code>;</code> ou <code>,</code>.</div>
      <input ref={fileRef} type="file" accept=".csv,.txt" style={{display:"none"}} onChange={e=>handleCSV(e.target.files[0])}/>
      <button style={{...Sg.btn("primary"),opacity:uploading?.5:1}} disabled={uploading} onClick={()=>fileRef.current.click()}>
        {uploading?"Importando...":"Selecionar CSV"}
      </button>
    </div>

    {/* Seed de teste */}
    {(info?.ativos??0)===0&&<div style={{...Sg.card(),marginBottom:14,border:"1px dashed "+C.border}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",marginBottom:8}}>Dados de Teste</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Nenhum produto cadastrado. Carregue os dados de teste para começar.</div>
      <button style={{...Sg.btn(),opacity:uploading?.5:1}} disabled={uploading} onClick={runSeed}>
        {uploading?"Carregando...":"Carregar dados de teste (7 produtos)"}
      </button>
    </div>}

    {uploadResult&&<div style={{padding:"10px 14px",borderRadius:8,fontSize:13,fontWeight:600,
      background:uploadResult.ok?C.success+"15":C.danger+"15",
      color:uploadResult.ok?C.success:C.danger,
      border:"1px solid "+(uploadResult.ok?C.success:C.danger)+"40"}}>
      {uploadResult.ok?"Concluído: ":""}{uploadResult.msg}
    </div>}
  </div>;
}

function AuditLog({requests,sysLog}){
  const {C}=useTheme();const Sg=mkSg(C);
  const [f,setF]=useState("");const [fType,setFType]=useState("");
  const evts=requests.flatMap(r=>(r.log||[]).map(e=>({...e,reqId:r.id,reqTitle:r.title,reqType:r.type})));
  const all=[...evts,...(sysLog||[])].sort((a,b)=>new Date(b.at)-new Date(a.at));
  const types=[...new Set(all.map(e=>e.type).filter(Boolean))];
  const vis=all.filter(e=>(!f||(e.event+e.by+(e.reqId||"")+(e.detail||"")).toLowerCase().includes(f.toLowerCase()))&&(!fType||e.type===fType));
  const tc={triagem:C.warning,avaliacao:C.accent,aprovacao:C.success,rejeicao:C.danger,retorno:C.accent,sistema:C.accent,criacao:C.success,anexo:C.warning,extensao:C.warning,owner:C.muted,plano:C.accent,execucao:C.success};
  return <div style={{padding:"18px 22px"}}>
    <h1 style={{margin:"0 0 12px",fontSize:18,color:C.text,fontWeight:700}}>Auditoria — v{APP_VERSION}</h1>
    <div style={{display:"flex",gap:8,marginBottom:11,flexWrap:"wrap"}}>
      <input value={f} onChange={e=>setF(e.target.value)} placeholder="Filtrar..." style={{...Sg.input(),maxWidth:320}}/>
      <select value={fType} onChange={e=>setFType(e.target.value)} style={{...Sg.input(),maxWidth:180}}>
        <option value="">Todos os tipos</option>
        {types.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
      <span style={{fontSize:11,color:C.muted,alignSelf:"center"}}>{vis.length} evento{vis.length!==1?"s":""}</span>
    </div>
    <div style={{...Sg.card({padding:0,overflow:"hidden"})}}>
      <ResizableTable
        storageKey="tbl_audit"
        cols={[140,130,100,90,400]}
        headers={["Data/Hora","Usuario","SA","Tipo","Evento / Detalhe"]}
        C={C}
        rows={vis.map((e,i)=>({
          cells:[
            <span style={{color:C.muted,fontSize:10.5}}>{fmt(e.at)}</span>,
            <span style={{color:C.dim,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block"}}>{e.by}</span>,
            <span style={{color:C.accent,fontSize:11}}>{e.reqId||"—"}</span>,
            <span style={{padding:"1px 6px",borderRadius:4,fontSize:9,fontWeight:700,background:(tc[e.type]||C.muted)+"22",color:tc[e.type]||C.muted,whiteSpace:"nowrap"}}>{e.type||"—"}</span>,
            <div><div style={{color:C.text,fontSize:11.5}}>{e.event}</div>{e.detail&&<div style={{color:C.muted,fontSize:10.5,marginTop:1}}>{e.detail}</div>}</div>
          ]
        }))}
      />
      {vis.length===0&&<div style={{textAlign:"center",padding:26,color:C.muted}}>Nenhum evento.</div>}
    </div>
  </div>;
}
