<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGQ — Vydence Medical</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #F7F8FA;
  --surface:   #FFFFFF;
  --border:    #E4E7EC;
  --border-2:  #D0D5DD;
  --text-1:    #101828;
  --text-2:    #475467;
  --text-3:    #98A2B3;
  --accent:    #1570EF;
  --accent-h:  #175CD3;
  --accent-bg: #EFF4FF;
  --green:     #12B76A;
  --green-bg:  #ECFDF3;
  --yellow:    #F79009;
  --yellow-bg: #FFFAEB;
  --red:       #F04438;
  --red-bg:    #FEF3F2;
  --purple:    #7F56D9;
  --purple-bg: #F9F5FF;
  --nav-w:     240px;
  --radius:    8px;
  --shadow:    0 1px 2px rgba(16,24,40,.05);
  --shadow-md: 0 4px 8px rgba(16,24,40,.08);
}

body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text-1); font-size:14px; line-height:1.5; }
input,textarea,select,button { font-family:inherit; font-size:14px; }
button { cursor:pointer; }

/* ── LAYOUT ── */
.app   { display:flex; min-height:100vh; }
.nav   { width:var(--nav-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; overflow-y:auto; z-index:100; }
.main  { margin-left:var(--nav-w); flex:1; min-height:100vh; display:flex; flex-direction:column; }
.topbar{ background:var(--surface); border-bottom:1px solid var(--border); padding:0 28px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.content { padding:28px; flex:1; }

/* ── NAV ── */
.nav-logo { padding:20px 18px 16px; border-bottom:1px solid var(--border); }
.nav-logo-mark { display:flex; align-items:center; gap:9px; }
.nav-logo-icon { width:32px; height:32px; background:var(--accent); border-radius:7px; display:flex; align-items:center; justify-content:center; }
.nav-logo-icon svg { color:#fff; }
.nav-logo-name { font-size:15px; font-weight:600; color:var(--text-1); letter-spacing:-.3px; }
.nav-logo-sub  { font-size:11px; color:var(--text-3); letter-spacing:.3px; text-transform:uppercase; margin-top:1px; }

.nav-section { padding:16px 10px 6px; }
.nav-section-label { font-size:11px; font-weight:500; color:var(--text-3); letter-spacing:.5px; text-transform:uppercase; padding:0 8px; margin-bottom:4px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:6px; color:var(--text-2); font-size:13.5px; font-weight:400; cursor:pointer; transition:all .15s; user-select:none; }
.nav-item:hover { background:var(--bg); color:var(--text-1); }
.nav-item.active { background:var(--accent-bg); color:var(--accent); font-weight:500; }
.nav-item svg { flex-shrink:0; opacity:.7; }
.nav-item.active svg { opacity:1; }
.nav-badge { margin-left:auto; background:var(--red); color:#fff; font-size:11px; font-weight:600; padding:1px 6px; border-radius:10px; min-width:18px; text-align:center; }

.nav-footer { margin-top:auto; padding:14px 10px; border-top:1px solid var(--border); }
.nav-user { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:6px; cursor:pointer; }
.nav-user:hover { background:var(--bg); }
.nav-avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:600; flex-shrink:0; }
.nav-user-info { flex:1; overflow:hidden; }
.nav-user-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nav-user-role { font-size:11px; color:var(--text-3); }

/* ── TOPBAR ── */
.topbar-title { font-size:16px; font-weight:600; color:var(--text-1); }
.topbar-actions { display:flex; align-items:center; gap:10px; }
.topbar-search { display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:0 12px; height:36px; width:220px; }
.topbar-search input { border:none; background:none; outline:none; color:var(--text-1); flex:1; font-size:13.5px; }
.topbar-search input::placeholder { color:var(--text-3); }

/* ── BUTTONS ── */
.btn { display:inline-flex; align-items:center; gap:6px; padding:0 14px; height:36px; border-radius:var(--radius); font-size:13.5px; font-weight:500; border:none; transition:all .15s; white-space:nowrap; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-h); }
.btn-secondary { background:var(--surface); color:var(--text-1); border:1px solid var(--border-2); box-shadow:var(--shadow); }
.btn-secondary:hover { background:var(--bg); }
.btn-ghost { background:none; color:var(--text-2); border:none; padding:0 10px; }
.btn-ghost:hover { background:var(--bg); color:var(--text-1); }
.btn-danger { background:var(--red); color:#fff; }
.btn-danger:hover { background:#c0392b; }
.btn-sm { height:30px; padding:0 10px; font-size:12.5px; }
.btn-icon { width:36px; height:36px; padding:0; justify-content:center; }

/* ── CARDS ── */
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; }
.card-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px; }
.card-title { font-size:14px; font-weight:600; color:var(--text-1); }
.card-body { padding:20px; }

/* ── STATS ── */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px 20px; }
.stat-label { font-size:12px; color:var(--text-3); font-weight:500; letter-spacing:.3px; text-transform:uppercase; margin-bottom:8px; }
.stat-value { font-size:26px; font-weight:600; color:var(--text-1); letter-spacing:-1px; font-family:'DM Mono',monospace; }
.stat-delta { font-size:12px; margin-top:4px; color:var(--text-3); }
.stat-delta.up { color:var(--green); }
.stat-delta.down { color:var(--red); }

/* ── TABLE ── */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
thead th { padding:10px 14px; text-align:left; font-size:12px; font-weight:500; color:var(--text-3); border-bottom:1px solid var(--border); white-space:nowrap; }
tbody td { padding:12px 14px; border-bottom:1px solid var(--border); color:var(--text-1); font-size:13.5px; vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:var(--bg); }

/* ── BADGES ── */
.badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:20px; font-size:11.5px; font-weight:500; white-space:nowrap; }
.badge::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.badge-green  { background:var(--green-bg);  color:#027A48; } .badge-green::before  { background:var(--green); }
.badge-yellow { background:var(--yellow-bg); color:#B54708; } .badge-yellow::before { background:var(--yellow); }
.badge-red    { background:var(--red-bg);    color:#B42318; } .badge-red::before    { background:var(--red); }
.badge-blue   { background:var(--accent-bg); color:#1849A9; } .badge-blue::before   { background:var(--accent); }
.badge-purple { background:var(--purple-bg); color:#5925DC; } .badge-purple::before { background:var(--purple); }
.badge-gray   { background:var(--bg);        color:var(--text-2); } .badge-gray::before { background:var(--text-3); }

/* ── FORMS ── */
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:13px; font-weight:500; color:var(--text-1); margin-bottom:6px; }
.form-label span { color:var(--red); margin-left:2px; }
.form-input { width:100%; height:38px; border:1px solid var(--border-2); border-radius:var(--radius); padding:0 12px; outline:none; transition:border .15s; background:var(--surface); color:var(--text-1); }
.form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(21,112,239,.08); }
.form-input.error { border-color:var(--red); }
.form-select { width:100%; height:38px; border:1px solid var(--border-2); border-radius:var(--radius); padding:0 12px; outline:none; background:var(--surface); color:var(--text-1); }
.form-select:focus { border-color:var(--accent); }
.form-textarea { width:100%; border:1px solid var(--border-2); border-radius:var(--radius); padding:10px 12px; outline:none; resize:vertical; min-height:80px; background:var(--surface); color:var(--text-1); }
.form-textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(21,112,239,.08); }
.form-hint { font-size:12px; color:var(--text-3); margin-top:4px; }
.form-error { font-size:12px; color:var(--red); margin-top:4px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }

/* ── PASSWORD STRENGTH ── */
.pw-strength { margin-top:8px; }
.pw-bars { display:flex; gap:4px; margin-bottom:4px; }
.pw-bar { height:3px; border-radius:2px; flex:1; background:var(--border); transition:background .2s; }
.pw-bar.active-1 { background:var(--red); }
.pw-bar.active-2 { background:var(--yellow); }
.pw-bar.active-3 { background:var(--yellow); }
.pw-bar.active-4 { background:var(--green); }
.pw-strength-text { font-size:11px; color:var(--text-3); }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(16,24,40,.4); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; backdrop-filter:blur(2px); }
.modal { background:var(--surface); border-radius:12px; width:100%; max-width:520px; box-shadow:0 20px 40px rgba(16,24,40,.15); max-height:90vh; overflow-y:auto; }
.modal-lg { max-width:680px; }
.modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:15px; font-weight:600; }
.modal-body { padding:20px 24px; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }

/* ── LOGIN ── */
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); }
.login-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:36px; width:100%; max-width:400px; box-shadow:var(--shadow-md); }
.login-logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
.login-logo-icon { width:38px; height:38px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; }
.login-logo-name { font-size:16px; font-weight:600; }
.login-logo-sub { font-size:12px; color:var(--text-3); }
.login-title { font-size:20px; font-weight:600; margin-bottom:4px; }
.login-sub { font-size:13.5px; color:var(--text-2); margin-bottom:24px; }
.login-alert { background:var(--red-bg); border:1px solid #FECDCA; border-radius:var(--radius); padding:10px 14px; font-size:13px; color:var(--red); margin-bottom:16px; }
.login-alert-warn { background:var(--yellow-bg); border:1px solid #FEDF89; border-radius:var(--radius); padding:10px 14px; font-size:13px; color:#B54708; margin-bottom:16px; }
.login-footer { text-align:center; margin-top:20px; font-size:12px; color:var(--text-3); }

/* ── TABS ── */
.tabs { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.tab { padding:10px 16px; font-size:13.5px; font-weight:500; color:var(--text-2); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
.tab:hover { color:var(--text-1); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── EMPTY STATE ── */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 20px; color:var(--text-3); text-align:center; }
.empty-icon { margin-bottom:12px; opacity:.4; }
.empty-text { font-size:14px; font-weight:500; color:var(--text-2); margin-bottom:4px; }
.empty-sub { font-size:13px; }

/* ── CHECKBOX / TOGGLE ── */
.checkbox-group { display:flex; flex-wrap:wrap; gap:8px; }
.checkbox-item { display:flex; align-items:center; gap:6px; cursor:pointer; font-size:12.5px; padding:5px 10px; border:1px solid var(--border); border-radius:6px; transition:all .15s; }
.checkbox-item:hover { border-color:var(--accent); background:var(--accent-bg); }
.checkbox-item input { accent-color:var(--accent); }
.checkbox-item.checked { border-color:var(--accent); background:var(--accent-bg); color:var(--accent); font-weight:500; }

/* ── PROGRESS ── */
.progress { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-bar { height:100%; border-radius:3px; background:var(--accent); transition:width .3s; }

/* ── DIVIDER ── */
.divider { height:1px; background:var(--border); margin:16px 0; }

/* ── ALERT ── */
.alert { border-radius:var(--radius); padding:12px 14px; font-size:13.5px; display:flex; gap:10px; align-items:flex-start; margin-bottom:16px; }
.alert-info    { background:var(--accent-bg); border:1px solid #B2CCFF; color:#1849A9; }
.alert-success { background:var(--green-bg);  border:1px solid #ABEFC6; color:#067647; }
.alert-warn    { background:var(--yellow-bg); border:1px solid #FEDF89; color:#B54708; }
.alert-error   { background:var(--red-bg);    border:1px solid #FECDCA; color:#B42318; }

/* ── PROCESSO STEPS ── */
.process-steps { display:flex; gap:0; margin-bottom:20px; }
.process-step { flex:1; display:flex; align-items:center; }
.process-step-inner { flex:1; text-align:center; padding:10px 6px; border-top:3px solid var(--border); }
.process-step-inner.done { border-color:var(--green); }
.process-step-inner.active { border-color:var(--accent); }
.process-step-num { font-size:11px; font-weight:600; color:var(--text-3); }
.process-step-inner.done .process-step-num { color:var(--green); }
.process-step-inner.active .process-step-num { color:var(--accent); }
.process-step-label { font-size:11.5px; color:var(--text-2); margin-top:2px; }

/* ── ACTIONS LIST ── */
.action-item { border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start; }
.action-item:hover { border-color:var(--border-2); box-shadow:var(--shadow); }
.action-num { width:24px; height:24px; border-radius:50%; background:var(--accent-bg); color:var(--accent); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
.action-body { flex:1; }
.action-title { font-size:13.5px; font-weight:500; margin-bottom:2px; }
.action-meta { font-size:12px; color:var(--text-3); display:flex; gap:10px; }

/* ── TOOLTIP ── */
.tooltip-wrap { position:relative; display:inline-flex; }
.tooltip-wrap:hover .tooltip-box { opacity:1; pointer-events:auto; }
.tooltip-box { position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:#1D2939; color:#fff; font-size:11.5px; padding:5px 9px; border-radius:5px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .15s; z-index:999; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:3px; }

/* ── RESPONSIVE ── */
@media(max-width:900px){ .stats-grid{grid-template-columns:1fr 1fr;} .form-row{grid-template-columns:1fr;} }
</style>
</head>

<div id="root"></div>

/* ─── HELPERS ─── */
const api = async (path, method='GET', body=null) => {
  const token = localStorage.getItem('sgq_token');
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type':'application/json', ...(token ? {'Authorization':`Bearer ${token}`} : {}) },
    ...(body ? { body: JSON.stringify(body) } : {})
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Erro na requisição');
  return data;
};

const pwStrength = (pw) => {
  if (!pw) return 0;
  let s = 0;
  if (pw.length >= 8) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return s;
};
const pwLabel = s => ['','Fraca','Razoável','Boa','Forte'][s];
const pwColor = s => ['','red','yellow','yellow','green'][s];

const formatDate = d => d ? new Date(d).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
const initials = name => name ? name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase() : '?';

/* ─── PASSWORD INPUT ─── */
const PasswordInput = ({ value, onChange, showStrength=false, placeholder='Senha', name }) => {
  const [show, setShow] = useState(false);
  const str = pwStrength(value);
  return (
    <div>
      <div style={{position:'relative'}}>
        <input
          className="form-input"
          type={show ? 'text' : 'password'}
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
          name={name}
          style={{paddingRight:'38px'}}
          autoComplete="new-password"
        />
        <button type="button" onClick={() => setShow(!show)}
          style={{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',display:'flex',alignItems:'center'}}>
          <Icon name={show ? 'eyeoff' : 'eye'} size={15} />
        </button>
      </div>
      {showStrength && value && (
        <div className="pw-strength">
          <div className="pw-bars">
            {[1,2,3,4].map(i => <div key={i} className={`pw-bar ${str >= i ? `active-${str}` : ''}`} />)}
          </div>
          <span className="pw-strength-text" style={{color:`var(--${pwColor(str)})`}}>
            Senha {pwLabel(str)}
            {str < 3 && ' — use letras maiúsculas, números e símbolos'}
          </span>
        </div>
      )}
    </div>
  );
};

/* ─── LOGIN PAGE ─── */
const LoginPage = ({ onLogin }) => {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [attempts, setAttempts] = useState(0);

  const handle = async (e) => {
    e.preventDefault();
    if (!email || !password) { setError('Preencha todos os campos'); return; }
    setLoading(true); setError('');
    try {
      const data = await api('/api/auth/login', 'POST', { email, password });
      localStorage.setItem('sgq_token', data.token);
      localStorage.setItem('sgq_user', JSON.stringify(data.user));
      onLogin(data.user);
    } catch(err) {
      setAttempts(a => a+1);
      setError(attempts >= 2 ? 'Muitas tentativas. Verifique suas credenciais ou solicite reset de senha ao administrador.' : (err.message || 'Credenciais inválidas'));
    } finally { setLoading(false); }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-icon"><Icon name="logo" size={20} color="#fff"/></div>

        <div className="login-sub">Entre com suas credenciais corporativas</div>
        {error && <div className="login-alert">{error}</div>}
        <form onSubmit={handle}>
          <div className="form-group">
            <label className="form-label">E-mail<span>*</span></label>
            <input className="form-input" type="email" placeholder="seu@vydence.com" value={email} onChange={e=>setEmail(e.target.value)} autoFocus/>
          </div>
          <div className="form-group">
            <label className="form-label">Senha<span>*</span></label>
            <PasswordInput value={password} onChange={setPassword} placeholder="Sua senha" />
          </div>
          <button className="btn btn-primary" type="submit" style={{width:'100%',height:'40px',marginTop:'4px'}} disabled={loading}>

      </div>
    </div>
  );
};

const ModuleView = ({ mod, user, modKey }) => {

  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('');

  const [showDetail, setShowDetail] = useState(null);
  const [showAction, setShowAction] = useState(false);
  const [tab, setTab] = useState('processo');

  const steps = MODULE_STEPS[modKey] || [];

  const load = async () => {
    setLoading(true);
    try { const d = await api(`/api/${modKey}`); setRecords(d); }
    catch { setRecords([]); }
    setLoading(false);
  };
  useEffect(() => { load(); }, [modKey]);

    const q = search.toLowerCase();

    const matchS = !statusFilter || r.status === statusFilter;
    return matchQ && matchS;

            <div className="card-title">{mod.label}</div>

          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <div className="topbar-search" style={{width:'200px'}}>
              <Icon name="search" size={14} color="var(--text-3)"/>

                <Icon name="plus" size={15} color="#fff"/> Novo

            )}

        </div>
        <div className="table-wrap">
          {loading ? (
            <div className="empty"><div className="empty-sub">Carregando...</div></div>

            <div className="empty">
              <div className="empty-icon"><Icon name={mod.icon} size={32}/></div>
              <div className="empty-text">Nenhum registro encontrado</div>
              {canOpen && <div className="empty-sub">Clique em "Novo" para criar o primeiro</div>}

          ) : (
            <table>
              <thead>
                <tr>
                  <th>Código</th>
                  <th>Título</th>
                  <th>Status</th>
                  <th>Responsável</th>
                  <th>Data</th>
                  <th></th>

                  <tr key={r.id}>
                    <td><span style={{fontFamily:'var(--font-mono,DM Mono)',fontSize:'12.5px',color:'var(--text-3)'}}>{r.code||`#${r.id}`}</span></td>
                    <td style={{maxWidth:'260px'}}>

                      {r.description && <div style={{fontSize:'12px',color:'var(--text-3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.description}</div>}
                    </td>
                    <td><span className={`badge badge-${STATUS_BADGE[r.status]||'gray'}`}>{r.status}</span></td>
                    <td style={{fontSize:'13px',color:'var(--text-2)'}}>{r.owner_name||'—'}</td>
                    <td style={{fontSize:'12.5px',color:'var(--text-3)'}}>{formatDate(r.created_at)}</td>
                    <td>
                      <button className="btn btn-ghost btn-sm" onClick={() => setShowDetail(r)}>
                        <Icon name="eye" size={14}/> Ver

          <div className="tabs">
            {['processo','acoes','historico'].map(t => (
              <div key={t} className={`tab ${tab===t?'active':''}`} onClick={() => setTab(t)}>

          {tab === 'processo' && (
            <div>
              <div className="process-steps" style={{marginBottom:'20px'}}>
                {steps.map((s,i) => {
                  const cur = stepIndex(showDetail.status);
                  const cls = i < cur ? 'done' : i === cur ? 'active' : '';

                      <div className={`process-step-inner ${cls}`}>

                <div><div className="form-label">Criado em</div><div style={{fontSize:'13.5px'}}>{formatDate(showDetail.created_at)}</div></div>
                <div><div className="form-label">Responsável</div><div style={{fontSize:'13.5px'}}>{showDetail.owner_name||'—'}</div></div>
              </div>
              {user.is_admin && stepIndex(showDetail.status) < steps.length - 1 && (
                <div style={{marginTop:'16px'}}>
                  <div className="divider"/>
                  <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
                    <button className="btn btn-primary" onClick={async () => {
                      const next = steps[stepIndex(showDetail.status)+1];
                      await api(`/api/${modKey}/${showDetail.id}`, 'PUT', { status: next });
                      load(); setShowDetail({...showDetail, status: next});
                    }}>
                      Avançar → {steps[stepIndex(showDetail.status)+1]}
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}
          {tab === 'acoes' && (
            <ActionsTab record={showDetail} modKey={modKey} user={user} />
          )}
          {tab === 'historico' && (
            <div className="empty"><div className="empty-icon"><Icon name="log" size={28}/></div><div className="empty-text">Histórico em desenvolvimento</div></div>
          )}
        </Modal>
      )}

  );

/* ─── NEW RECORD MODAL ─── */
const NewRecordModal = ({ open, onClose, modKey, steps, onSaved }) => {
  const [form, setForm] = useState({ title:'', description:'', priority:'media' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const set = (k,v) => setForm(f => ({...f,[k]:v}));

  const save = async () => {
    if (!form.title.trim()) { setError('Título é obrigatório'); return; }
    setLoading(true); setError('');
    try {
      await api(`/api/${modKey}`, 'POST', { ...form, status: steps[0] });
      onSaved();
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }

  return (
    <Modal open={open} onClose={onClose} title="Novo Registro"

  );

/* ─── USER MODAL ─── */
const UserModal = ({ open, onClose, groups, user: editUser, onSaved }) => {
  const isEdit = !!editUser;
  const [form, setForm] = useState({ name:'', email:'', password:'', is_admin:false, group_id:'', active:true });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const set = (k,v) => setForm(f => ({...f,[k]:v}));

  useEffect(() => {
    if (editUser) setForm({ name:editUser.name||'', email:editUser.email||'', password:'', is_admin:editUser.is_admin||false, group_id:editUser.group_id||'', active:editUser.active??true });
    else setForm({ name:'', email:'', password:'', is_admin:false, group_id:'', active:true });
    setError('');
  }, [editUser, open]);

  const validate = () => {
    if (!form.name.trim()) return 'Nome é obrigatório';
    if (!form.email.trim() || !/\S+@\S+\.\S+/.test(form.email)) return 'E-mail inválido';
    if (!isEdit && !form.password) return 'Senha é obrigatória';
    if (!isEdit && pwStrength(form.password) < 3) return 'Senha fraca — use maiúsculas, números e símbolos';
    return null;
  };

  const save = async () => {
    const err = validate(); if (err) { setError(err); return; }
    setLoading(true); setError('');
    try {
      const payload = { name:form.name, email:form.email, is_admin:form.is_admin, group_id:form.group_id||null, active:form.active };
      if (!isEdit || form.password) payload.password = form.password;
      if (isEdit) await api(`/api/users/${editUser.id}`, 'PUT', payload);
      else await api('/api/users', 'POST', payload);
      onSaved();
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <Modal open={open} onClose={onClose} title={isEdit ? `Editar — ${editUser?.name}` : 'Novo Usuário'}
      footer={<><button className="btn btn-secondary" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={save} disabled={loading}>{loading?'Salvando...':isEdit?'Salvar':'Criar Usuário'}</button></>}>
      {error && <div className="alert alert-error">{error}</div>}
      <div className="form-row">
        <div className="form-group"><label className="form-label">Nome completo<span>*</span></label><input className="form-input" value={form.name} onChange={e=>set('name',e.target.value)}/></div>
        <div className="form-group"><label className="form-label">E-mail corporativo<span>*</span></label><input className="form-input" type="email" value={form.email} onChange={e=>set('email',e.target.value)}/></div>
      </div>
      <div className="form-row">
        <div className="form-group">
          <label className="form-label">{isEdit ? 'Nova senha (deixe vazio para manter)' : 'Senha'}{!isEdit && <span>*</span>}</label>
          <PasswordInput value={form.password} onChange={v=>set('password',v)} showStrength={true} />
        </div>
        <div className="form-group">
          <label className="form-label">Grupo de Acesso</label>
          <select className="form-select" value={form.group_id} onChange={e=>set('group_id',e.target.value)}>
            <option value="">Sem grupo</option>
            {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:'flex',gap:'20px'}}>
        <label style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'13.5px',cursor:'pointer'}}>
          <input type="checkbox" checked={form.is_admin} onChange={e=>set('is_admin',e.target.checked)} style={{accentColor:'var(--accent)'}}/>
          Administrador do sistema
        </label>
        <label style={{display:'flex',alignItems:'center',gap:'8px',fontSize:'13.5px',cursor:'pointer'}}>
          <input type="checkbox" checked={form.active} onChange={e=>set('active',e.target.checked)} style={{accentColor:'var(--accent)'}}/>
          Usuário ativo
        </label>
      </div>
    </Modal>
  );
};

/* ─── RESET PASSWORD MODAL ─── */
const ResetPasswordModal = ({ open, onClose, target }) => {
  const [pw, setPw] = useState('');
  const [confirm, setConfirm] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState(false);

  useEffect(() => { if (open) { setPw(''); setConfirm(''); setError(''); setSuccess(false); } }, [open]);

  const save = async () => {
    if (!pw) { setError('Digite a nova senha'); return; }
    if (pwStrength(pw) < 3) { setError('Senha fraca — use maiúsculas, números e símbolos'); return; }
    if (pw !== confirm) { setError('Senhas não coincidem'); return; }
    setLoading(true); setError('');
    try {
      await api(`/api/users/${target.id}/reset-password`, 'POST', { password: pw });
      setSuccess(true);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <Modal open={open} onClose={onClose} title={`Reset de Senha — ${target?.name}`}
      footer={success ? <button className="btn btn-primary" onClick={onClose}>Fechar</button> : <><button className="btn btn-secondary" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={save} disabled={loading}>{loading?'Salvando...':'Redefinir Senha'}</button></>}>
      {success ? (
        <div className="alert alert-success"><Icon name="check" size={16}/>Senha redefinida com sucesso! O usuário deverá usar a nova senha no próximo acesso.</div>
      ) : (
        <>
          {error && <div className="alert alert-error">{error}</div>}
          <div className="alert alert-warn"><Icon name="info" size={15}/>O usuário <strong>{target?.name}</strong> precisará usar esta nova senha no próximo login.</div>
          <div className="form-group"><label className="form-label">Nova senha<span>*</span></label><PasswordInput value={pw} onChange={setPw} showStrength={true}/></div>
          <div className="form-group"><label className="form-label">Confirmar senha<span>*</span></label><PasswordInput value={confirm} onChange={setConfirm} placeholder="Confirme a nova senha"/>{confirm && pw !== confirm && <div className="form-error">Senhas não coincidem</div>}</div>
        </>
      )}
    </Modal>
  );
};

/* ─── SELF PASSWORD MODAL ─── */
const SelfPasswordModal = ({ open, onClose, currentUser }) => {
  const [current, setCurrent] = useState('');
  const [pw, setPw] = useState('');
  const [confirm, setConfirm] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState(false);

  useEffect(() => { if (open) { setCurrent(''); setPw(''); setConfirm(''); setError(''); setSuccess(false); } }, [open]);

  const save = async () => {
    if (!current) { setError('Digite sua senha atual'); return; }
    if (!pw) { setError('Digite a nova senha'); return; }
    if (pwStrength(pw) < 3) { setError('Senha fraca — use maiúsculas, números e símbolos'); return; }
    if (pw !== confirm) { setError('Senhas não coincidem'); return; }
    if (pw === current) { setError('A nova senha deve ser diferente da atual'); return; }
    setLoading(true); setError('');
    try {
      await api(`/api/users/${currentUser.id}/change-password`, 'POST', { current_password: current, new_password: pw });
      setSuccess(true);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <Modal open={open} onClose={onClose} title="Alterar Minha Senha"
      footer={success ? <button className="btn btn-primary" onClick={onClose}>Fechar</button> : <><button className="btn btn-secondary" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={save} disabled={loading}>{loading?'Salvando...':'Alterar Senha'}</button></>}>
      {success ? (
        <div className="alert alert-success"><Icon name="check" size={16}/>Senha alterada com sucesso!</div>
      ) : (
        <>
          {error && <div className="alert alert-error">{error}</div>}
          <div className="form-group"><label className="form-label">Senha atual<span>*</span></label><PasswordInput value={current} onChange={setCurrent} placeholder="Sua senha atual"/></div>
          <div className="divider"/>
          <div className="form-group"><label className="form-label">Nova senha<span>*</span></label><PasswordInput value={pw} onChange={setPw} showStrength={true}/></div>
          <div className="form-group"><label className="form-label">Confirmar nova senha<span>*</span></label><PasswordInput value={confirm} onChange={setConfirm} placeholder="Confirme"/>{confirm && pw !== confirm && <div className="form-error">Senhas não coincidem</div>}</div>
        </>
      )}
    </Modal>
  );
};

    { label:'Principal', items:[{ key:'dashboard', label:'Dashboard', icon:'home' }] },
    { label:'Módulos SGQ', items: MODULES },
    { label:'Administração', items:[
      { key:'users', label:'Usuários', icon:'users' },
      { key:'groups', label:'Grupos de Acesso', icon:'shield' },
      { key:'audit', label:'Auditoria', icon:'log' },
    ]},
  ];

  const currentMod = MODULES.find(m => m.key === page);
  const pageTitle = currentMod?.label || { dashboard:'Dashboard', users:'Usuários', groups:'Grupos de Acesso', audit:'Auditoria' }[page] || '';

  return (
    <div className="app">
      {/* NAV */}
      <nav className="nav">
        <div className="nav-logo">
          <div className="nav-logo-mark">
            <div className="nav-logo-icon"><Icon name="logo" size={16} color="#fff"/></div>
            <div>
              <div className="nav-logo-name">Vydence Medical</div>
              <div className="nav-logo-sub">SGQ v1.0</div>
            </div>
          </div>
        </div>

        {navSections.map(sec => (
          <div className="nav-section" key={sec.label}>
            <div className="nav-section-label">{sec.label}</div>
            {sec.items.map(item => (
              <div key={item.key} className={`nav-item ${page===item.key?'active':''}`} onClick={() => setPage(item.key)}>
                <Icon name={item.icon} size={15}/>
                {item.label}
              </div>
            ))}
          </div>
        ))}

        <div className="nav-footer">
          <div className="nav-user" onClick={logout} title="Sair">
            <div className="nav-avatar">{initials(user.name)}</div>
            <div className="nav-user-info">
              <div className="nav-user-name">{user.name}</div>
              <div className="nav-user-role">{user.is_admin ? 'Administrador' : 'Usuário'}</div>
            </div>
            <Icon name="logout" size={14} color="var(--text-3)"/>
          </div>
        </div>
      </nav>

      {/* MAIN */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{pageTitle}</div>
          <div className="topbar-actions">
            <button className="btn btn-ghost btn-icon"><Icon name="bell" size={16}/></button>
            <div style={{width:'1px',height:'20px',background:'var(--border)'}}/>
            <div style={{fontSize:'13px',color:'var(--text-2)'}}>{user.email}</div>
          </div>
        </div>

        <div className="content">
          {page === 'dashboard' && <Dashboard user={user} records={records}/>}
          {MODULES.map(m => page === m.key && <ModuleView key={m.key} mod={m} user={user} modKey={m.key} records={records[m.key]||[]}/>)}
          {page === 'users'  && <UsersPage user={user}/>}
          {page === 'groups' && <GroupsPage user={user}/>}
          {page === 'audit'  && <AuditPage/>}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
