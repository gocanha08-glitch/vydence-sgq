// ── Histórico unificado da RO ────────────────────────────────────
function ROHistorico({r, C}){
  const [open, setOpen] = useState(true);
  const Sg = mkSg(C);
  const d = r?.data||{};
  const novo = d.historico||[];
  const velho = (r?.log||[]).map(e=>({
    at: e.at,
    by: e.by||"—",
    detail: e.event + (e.detail?": "+e.detail:"")
  }));
  const todos = [...novo, ...velho]
    .filter(e=>e.at)
    .sort((a,b)=> (b.at||"").localeCompare(a.at||""));

  return <div style={{...Sg.card({padding:0,overflow:"hidden"})}}>
    <div
      onClick={()=>setOpen(o=>!o)}
      style={{display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer", userSelect:"none", padding:"12px 14px", borderBottom: open?"1px solid "+C.border:"none"}}>
      <span style={{fontSize:12, fontWeight:700, color:C.muted, letterSpacing:.4, textTransform:"uppercase"}}>
        Histórico {todos.length>0 && <span style={{color:C.dim, fontWeight:400}}>({todos.length})</span>}
      </span>
      <span style={{fontSize:11, color:C.muted}}>{open?"− minimizar":"+ expandir"}</span>
    </div>
    {open && (todos.length===0
      ? <div style={{padding:"20px 14px", color:C.muted, fontSize:12, textAlign:"center"}}>Nenhuma alteração registrada.</div>
      : <table style={{width:"100%", borderCollapse:"collapse", fontSize:12}}>
          <thead>
            <tr style={{background:C.surface}}>
              <th style={{padding:"8px 14px", textAlign:"left", fontSize:10, fontWeight:700, color:C.muted, letterSpacing:.4, textTransform:"uppercase", width:140}}>Data</th>
              <th style={{padding:"8px 14px", textAlign:"left", fontSize:10, fontWeight:700, color:C.muted, letterSpacing:.4, textTransform:"uppercase", width:160}}>Usuário</th>
              <th style={{padding:"8px 14px", textAlign:"left", fontSize:10, fontWeight:700, color:C.muted, letterSpacing:.4, textTransform:"uppercase"}}>O que foi feito</th>
            </tr>
          </thead>
          <tbody>
            {todos.map((h,i)=>(
              <tr key={i} style={{borderTop:"1px solid "+C.border}}>
                <td style={{padding:"10px 14px", color:C.muted, fontSize:11, verticalAlign:"top", whiteSpace:"nowrap"}}>{fmt(h.at)}</td>
                <td style={{padding:"10px 14px", color:C.text, fontSize:12, verticalAlign:"top"}}>{h.by||"—"}</td>
                <td style={{padding:"10px 14px", color:C.text, fontSize:12, verticalAlign:"top", whiteSpace:"pre-wrap"}}>{h.detail||"—"}</td>
              </tr>
            ))}
          </tbody>
        </table>)
    }
  </div>;
}

function RODetail({roRecord, currentUser, allUsers, onBack, onUpdate, onGenerateNC}){
  const {C}=useTheme();const Sg=mkSg(C);
  const [sigModal,setSigModal]=useState(null);
  const [ncModal,setNcModal]=useState(false);
  const [analise,setAnalise]=useState("");
  const [disposicaoEdit,setDisposicaoEdit]=useState("");
  const [conclusao,setConclusao]=useState("");
  const [itensEdit,setItensEdit]=useState([]);
  const [pecasEdit,setPecasEdit]=useState([]);
  const [editingItens,setEditingItens]=useState(false);
  const [addingAtt,setAddingAtt]=useState(false);
  const [actionMenuOpen, setActionMenuOpen] = useState(false);
  const [motiveModal, setMotiveModal] = useState(null);
  // Modal de validação final (análise da qualidade antes de fechar)
  const [validarModal, setValidarModal] = useState(false);
  // tratarItemIdx: índice do item sendo tratado no TratarItemModal
  const [tratarItemIdx, setTratarItemIdx] = useState(null);
  // aprovacaoState: { idx, step: 'decidir' | 'rejeitar' }
  const [aprovacaoState, setAprovacaoState] = useState(null);
  // pendingApply: dados aguardando confirmação por assinatura
  const [pendingApply, setPendingApply] = useState(null);
  const actionMenuRef = React.useRef(null);

  React.useEffect(()=>{
    if(!actionMenuOpen) return;
    const close = (e) => { if(actionMenuRef.current && !actionMenuRef.current.contains(e.target)) setActionMenuOpen(false); };
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [actionMenuOpen]);

  // Bloqueia auto-refresh enquanto qualquer modal estiver aberto
  const anyModalOpen = !!(tratarItemIdx!==null || aprovacaoState!==null || sigModal || motiveModal || ncModal || editingItens || validarModal);
  React.useEffect(()=>{
    window.__sgqModalOpen = anyModalOpen;
    return () => { window.__sgqModalOpen = false; };
  }, [anyModalOpen]);

  const r = roRecord;
  React.useEffect(()=>{
    if(r){
      setAnalise(r.data?.analise||"");
      setDisposicaoEdit(r.data?.disposicao||"");
      setItensEdit(r.data?.itens||[]);
      setPecasEdit(r.data?.pecasSolicitadas||[]);
      setConclusao("");
    }
  },[r?.id||r?.code]);

  const addAttachment = async (att) => {
    const now = new Date().toISOString();
    const updated = {
      ...r,
      data: {...(r.data||{}), attachments: [...((r.data||{}).attachments||[]), att]},
      log: [...(r.log||[]), {at:now, by:currentUser.name, type:"anexo", event:"Anexo adicionado", detail:att.name||""}],
    };
    await onUpdate(updated);
  };

  const removeAttachment = async (att) => {
    const now = new Date().toISOString();
    const updated = {
      ...r,
      data: {...(r.data||{}), attachments: ((r.data||{}).attachments||[]).filter(x=>x.id!==att.id)},
      log: [...(r.log||[]), {at:now, by:currentUser.name, type:"anexo", event:"Anexo removido", detail:att.name||""}],
    };
    await onUpdate(updated);
  };

  if(!r) return <div style={{padding:32,color:C.muted}}>Registro não encontrado.</div>;
  const d = r.data||{};
  const status = r.status;
  const canAnalyze = hasPerm(currentUser,'ro.analisar');
  const canClose   = hasPerm(currentUser,'ro.fechar');

  // Calcula se a RO está pronta para a qualidade dar validação final e fechar
  const todosItens = d.itens||[];
  const temItens = todosItens.length > 0;
  const prontaParaConcluir = temItens && ["em_analise","aguardando_conclusao"].includes(status) && status!=="fechada" && status!=="cancelada" && todosItens.every(it=>{
    if(!it.disposicao) return false; // sem disposição = pendente
    if(it.disposicao==="correcao") return it.status==="concluida"; // precisa aprovação
    if(it.disposicao==="segregar"){
      if(it.sublotes && it.sublotes.length > 0)
        return it.sublotes.every(s=>["sucatamento","concessao_aprovada","migrada_nc"].includes(s.tipo));
      return false; // segregado sem sublotes = não tratado
    }
    return ["sucatamento","concessao_aprovada","migrada_nc"].includes(it.disposicao);
  });

  // Disposição atual requer conclusão da qualidade? (legado)
  const dispAtual = disposicaoEdit||d.disposicao||"";
  const needsConclusao = RO_DISP_CONCLUSAO.includes(dispAtual);

  const doAnalyze = async (sig) => {
    const now = new Date().toISOString();
    // Se disposição requer conclusão → vai para aguardando_conclusao
    const novoStatus = needsConclusao ? "aguardando_conclusao" : "em_analise";
    const updated = {
      ...r,
      status: novoStatus,
      data: {...d, analise, disposicao: disposicaoEdit, itens: itensEdit,
        analiseBy: currentUser.id, analiseByName: currentUser.name, analiseAt: now},
      log: [...(r.log||[]), {at:now, by:currentUser.name, type:"analise",
        event:"Análise registrada", detail: (disposicaoEdit?"Disposição: "+disposicaoEdit+". ":"")+analise.substring(0,60)}],
    };
    await onUpdate(updated);
    setSigModal(null);
  };

  const doConclusao = async (sig) => {
    const now = new Date().toISOString();
    const updated = {
      ...r,
      status: "fechada",
      data: {...d, conclusaoFinal: conclusao,
        conclusaoBy: currentUser.id, conclusaoByName: currentUser.name, conclusaoAt: now},
      log: [...(r.log||[]), {at:now, by:currentUser.name, type:"conclusao",
        event:"Conclusão final registrada", detail: conclusao.substring(0,80)}],
    };
    await onUpdate(updated);
    setSigModal(null);
  };

  const doClose = async (sig, analiseFinal) => {
    const now = new Date().toISOString();
    const novoHist = {
      type: "fechamento", at: now, by: currentUser.name, byId: currentUser.id,
      detail: "Ocorrência fechada pela qualidade." + (analiseFinal?"\nAnálise final: "+analiseFinal:"") + "\n(assinado eletronicamente)"
    };
    const updated = {
      ...r,
      status: "fechada",
      data: {
        ...d,
        analiseFinal: analiseFinal||"",
        fechadoBy: currentUser.id, fechadoByName: currentUser.name, fechadoAt: now,
        historico: [...(d.historico||[]), novoHist]
      },
      log: [...(r.log||[]), {at:now, by:currentUser.name, type:"fechamento", event:"Ocorrência fechada", detail:(analiseFinal||"").substring(0,80)}],
    };
    await onUpdate(updated);
    setSigModal(null);
    setValidarModal(false);
  };

  const doCancelar = async (sig, motivo) => {
    const now = new Date().toISOString();
    const newHist = {
      type: "cancelamento",
      at: now,
      by: currentUser.name,
      byId: currentUser.id,
      detail: "Ocorrência cancelada\nMotivo: " + (motivo||"—") + (sig?"\nAssinado por: "+sig.signedByName:"")
    };
    const updated = {
      ...r,
      status: "cancelada",
      data: {
        ...d,
        historico: [...(d.historico||[]), newHist],
        canceladaAt: now,
        canceladaBy: currentUser.id,
        canceladaByName: currentUser.name,
        cancelamentoMotivo: motivo||""
      }
    };
    await onUpdate(updated);
    setSigModal(null);
  };

  const doReabrir = async (sig, motivo) => {
    const now = new Date().toISOString();
    const newHist = {
      type: "reabertura",
      at: now,
      by: currentUser.name,
      byId: currentUser.id,
      detail: "Ocorrência reaberta\nMotivo: " + (motivo||"—") + (sig?"\nAssinado por: "+sig.signedByName:"")
    };
    const updated = {
      ...r,
      status: "em_analise",
      data: {
        ...d,
        historico: [...(d.historico||[]), newHist],
        reabertaAt: now,
        reabertaBy: currentUser.id,
        reabertaByName: currentUser.name,
        reaberturaMotivo: motivo||""
      }
    };
    await onUpdate(updated);
    setSigModal(null);
  };

  // Aplica a ação pendente após o usuário confirmar via SignatureModal.
  const applyPending = async (sig) => {
    if(!pendingApply){ setSigModal(null); return; }
    const idx = pendingApply.idx;
    const itens = [...(d.itens||[])];
    const linha = {...itens[idx]};
    const codigo = linha.codigo || ("item #"+(idx+1));
    const userName = currentUser?.name || currentUser?.email || "—";
    const now = new Date().toISOString();
    let detalhe = "";
    let histType = "tratamento_qualidade";

    if(pendingApply.type==="tratamento_sublotes"){
      // Novo modelo: sublotes com disposições múltiplas
      const { linhas, aprovador } = pendingApply;
      const aprovadorNome = (allUsers||[]).find(u=>String(u.id)===String(aprovador))?.name || "—";
      linha.sublotes = linhas.map(l=>({
        tipo: l.tipo,
        qtd: parseInt(l.qtd)||0,
        extra: l.extra||"",
        // campos de rastreabilidade
        ...(l.tipo==="concessao_solicitada" ? {
          concessaoAprovadorId: aprovador,
          concessaoAprovadorNome: aprovadorNome,
          concessaoSolicitadaAt: now,
          concessaoSolicitadaBy: userName,
        } : {}),
        ...(l.tipo==="sucatamento" ? {
          sucatadoAt: now,
          sucatadoBy: userName,
        } : {}),
        ...(l.tipo==="migrada_nc" ? {
          migradaAt: now,
          migradaBy: userName,
        } : {}),
      }));
      // aprovador global da RO (para concessões)
      if(aprovador) linha.concessaoAprovadorId = aprovador;
      linha.tratadoAt = now;
      linha.tratadoBy = userName;
      const resumo = linhas.map(l=>{
        const labels = {concessao_solicitada:"Concessão", sucatamento:"Sucatamento", migrada_nc:"→ NC"};
        return (parseInt(l.qtd)||0)+"x "+(labels[l.tipo]||l.tipo)+(l.extra?" ("+l.extra+")":"");
      }).join(", ");
      detalhe = "Item "+codigo+" tratado: "+resumo+(aprovador?"\nAprovador concessão: "+aprovadorNome:"");
    }
    else if(pendingApply.type==="aprovacao_aprovar_sublote"){
      // Aprovar sublote de concessão específico
      const si = pendingApply.subloteIdx;
      const sublotes = [...(linha.sublotes||[])];
      sublotes[si] = {...sublotes[si],
        tipo: "concessao_aprovada",
        concessaoAprovadaAt: now,
        concessaoAprovadaBy: userName,
      };
      linha.sublotes = sublotes;
      histType = "decisao_aprovador";
      detalhe = "Item "+codigo+": concessão de "+sublotes[si].qtd+"x APROVADA por "+userName+".";
    }
    else if(pendingApply.type==="aprovacao_rejeitar_sublote"){
      const si = pendingApply.subloteIdx;
      const sublotes = [...(linha.sublotes||[])];
      sublotes[si] = {...sublotes[si],
        tipo: "concessao_rejeitada",
        concessaoRejeitadaAt: now,
        concessaoRejeitadaBy: userName,
        concessaoRejeitadaMotivo: pendingApply.motivo,
      };
      linha.sublotes = sublotes;
      histType = "decisao_aprovador";
      detalhe = "Item "+codigo+": concessão de "+sublotes[si].qtd+"x REJEITADA por "+userName+".\nMotivo: "+pendingApply.motivo;
    }
    // legado (ROs antigas com modelo antigo)
    else if(pendingApply.type==="aprovacao_aprovar"){
      linha.disposicao = "concessao_aprovada";
      linha.status = "concluida";
      linha.concessaoAprovadaAt = now;
      linha.concessaoAprovadaBy = userName;
      histType = "decisao_aprovador";
      detalhe = "Item " + codigo + ": concessão APROVADA por " + userName + ".";
    }
    else if(pendingApply.type==="aprovacao_rejeitar"){
      linha.disposicao = "concessao_rejeitada";
      linha.status = "pendente";
      linha.concessaoRejeitadaAt = now;
      linha.concessaoRejeitadaBy = userName;
      linha.concessaoRejeitadaMotivo = pendingApply.motivo;
      histType = "decisao_aprovador";
      detalhe = "Item " + codigo + ": concessão REJEITADA por " + userName + ".\nMotivo: " + pendingApply.motivo;
    }

    itens[idx] = linha;
    const novoHist = {
      type: histType, at: now, by: userName, byId: currentUser?.id,
      itemIdx: idx, itemCodigo: linha.codigo || "",
      detail: detalhe + "\n(assinado eletronicamente)"
    };
    const histTotal = [...(d.historico||[]), novoHist];
    await onUpdate({...r, data: {...d, itens, historico: histTotal}});
    setPendingApply(null);
    setSigModal(null);
  };

  const itensVisiveis = editingItens ? itensEdit : (d.itens||[]);

  return <div style={{padding:"18px 22px",maxWidth:1100}}>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div>
        <button style={{...Sg.btn(),fontSize:11,padding:"3px 10px",marginBottom:8}} onClick={onBack}>← Voltar</button>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <h1 style={{margin:0,fontSize:17,color:C.text,fontWeight:700}}>{r.code||r.id}</h1>
          <ROStatusBadge status={status}/>
        </div>
        <div style={{fontSize:12,color:C.muted,marginTop:3}}>{d.tipo||""}{d.local?" · "+d.local:""}</div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
        {(canAnalyze || canClose || hasPerm(currentUser,'ro.cancelar') || hasPerm(currentUser,'ro.reabrir')) && <div style={{position:"relative"}} ref={actionMenuRef}>
          <button
            style={{...Sg.btn("primary"),fontSize:12,padding:"6px 14px",display:"flex",alignItems:"center",gap:6}}
            onClick={()=>setActionMenuOpen(o=>!o)}>
            Ações <span style={{fontSize:10,opacity:.7}}>{actionMenuOpen?"▲":"▼"}</span>
          </button>
          {actionMenuOpen && <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:C.card,border:"1px solid "+C.border,borderRadius:10,boxShadow:"0 8px 32px #0006",zIndex:200,minWidth:240,padding:"6px 0"}}>

            {/* Próximo passo */}
            {status==="em_analise" && canClose && <>
              <div style={{padding:"6px 14px 3px",fontSize:10,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:.5}}>Próximo passo</div>
              <button
                style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"8px 14px",textAlign:"left",fontSize:13,color:C.accent,fontFamily:"inherit",display:"flex",alignItems:"center",gap:8}}
                onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                onClick={()=>{
                  setActionMenuOpen(false);
                  setValidarModal(true);
                }}>
                <span>✓</span> Fechar Ocorrência
              </button>
              <div style={{height:1,background:C.border,margin:"4px 0"}}/>
            </>}

            {status==="fechada" && <>
              <button
                style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"8px 14px",textAlign:"left",fontSize:13,color:C.text,fontFamily:"inherit",display:"flex",alignItems:"center",gap:8}}
                onMouseEnter={e=>e.currentTarget.style.background=C.surface}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                onClick={()=>{setActionMenuOpen(false); setNcModal(true);}}>
                <span>↗</span> Gerar NC
              </button>
              <div style={{height:1,background:C.border,margin:"4px 0"}}/>
            </>}

            {/* Cancelar */}
            {!["cancelada","fechada"].includes(status) && hasPerm(currentUser,'ro.cancelar') && <button
              style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"8px 14px",textAlign:"left",fontSize:13,color:C.danger,fontFamily:"inherit",display:"flex",alignItems:"center",gap:8}}
              onMouseEnter={e=>e.currentTarget.style.background=C.surface}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}
              onClick={()=>{
                setActionMenuOpen(false);
                setMotiveModal({
                  kind:"cancelar",
                  title:"Cancelar Ocorrência",
                  description:"Informe o motivo do cancelamento. A RO ficará marcada como cancelada e o motivo será registrado no histórico com sua assinatura.",
                  confirmLabel:"Continuar para assinatura",
                  confirmStyle:"danger"
                });
              }}>
              <span>✕</span> Cancelar Ocorrência
            </button>}

            {/* Reabrir */}
            {["cancelada","fechada"].includes(status) && hasPerm(currentUser,'ro.reabrir') && <button
              style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"8px 14px",textAlign:"left",fontSize:13,color:C.warning,fontFamily:"inherit",display:"flex",alignItems:"center",gap:8}}
              onMouseEnter={e=>e.currentTarget.style.background=C.surface}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}
              onClick={()=>{
                setActionMenuOpen(false);
                setMotiveModal({
                  kind:"reabrir",
                  title:"Reabrir Ocorrência",
                  description:"Informe o motivo da reabertura. A RO voltará para status 'Em análise' e o motivo será registrado no histórico com sua assinatura.",
                  confirmLabel:"Continuar para assinatura",
                  confirmStyle:"warning"
                });
              }}>
              <span>↻</span> Reabrir Ocorrência
            </button>}

          </div>}
        </div>}
      </div>
    </div>

    {/* Banner pronta para conclusão (novo modelo) */}
    {prontaParaConcluir && canClose && <div style={{
      padding:"12px 16px", background:C.success+"18", border:"1px solid "+C.success+"50",
      borderRadius:8, marginBottom:14, fontSize:13, color:C.success, fontWeight:600,
      display:"flex", alignItems:"center", justifyContent:"space-between", gap:12
    }}>
      <span>Todos os itens foram tratados. RO pronta para conclusão.</span>
      <button
        style={{...Sg.btn("success"), fontSize:12, padding:"6px 14px", whiteSpace:"nowrap"}}
        onClick={()=>setValidarModal(true)}>
        Validar e concluir
      </button>
    </div>}

    {/* Banner aguardando conclusão (legado) */}
    {status==="aguardando_conclusao" && !prontaParaConcluir && <div style={{padding:"10px 14px",background:C.purple+"15",border:"1px solid "+C.purple+"40",borderRadius:8,marginBottom:14,fontSize:13,color:C.purple,fontWeight:600}}>
      Aguardando conclusão da qualidade — disposição: <strong>{d.disposicao}</strong>
    </div>}

    {/* Banner fechada */}
    {status==="fechada"&&<div style={{padding:"10px 14px",background:C.success+"15",border:"1px solid "+C.success+"40",borderRadius:8,marginBottom:14,fontSize:13,color:C.success,fontWeight:600}}>
      Ocorrência fechada {d.conclusaoAt?("em "+fmt(d.conclusaoAt)+" por "+d.conclusaoByName):d.fechadoAt?("em "+fmt(d.fechadoAt)+" por "+d.fechadoByName):""}
    </div>}

    {/* Banner cancelada */}
    {status==="cancelada"&&<div style={{padding:"10px 14px",background:C.danger+"15",border:"1px solid "+C.danger+"40",borderRadius:8,marginBottom:14,fontSize:13,color:C.danger,fontWeight:600}}>
      Ocorrência cancelada {d.canceladaAt?("em "+fmt(d.canceladaAt)+" por "+d.canceladaByName):""}
      {d.cancelamentoMotivo&&<div style={{fontWeight:400,fontSize:12,marginTop:4,color:C.text}}>Motivo: {d.cancelamentoMotivo}</div>}
    </div>}

    {/* Dados principais */}
    <div style={{...Sg.card(),marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",marginBottom:12}}>Dados da Ocorrência</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div><span style={Sg.lbl}>Tipo</span><div style={{fontSize:13,color:C.text}}>{d.tipo||"—"}</div></div>
        <div><span style={Sg.lbl}>Local</span><div style={{fontSize:13,color:C.text}}>{d.local||"—"}</div></div>
        <div><span style={Sg.lbl}>Nº OP / Chamado</span><div style={{fontSize:13,color:C.text}}>{d.opChamado||"—"}</div></div>
        <div><span style={Sg.lbl}>Classificação</span><div style={{fontSize:13,color:C.text}}>{d.classificacao||"—"}</div></div>
        <div><span style={Sg.lbl}>Aberto por</span><div style={{fontSize:13,color:C.text}}>{r.owner_name||r.createdByName||"—"}</div></div>
      </div>
      <div><span style={Sg.lbl}>Descrição</span><div style={{fontSize:13,color:C.text,whiteSpace:"pre-wrap",background:C.surface,borderRadius:6,padding:"8px 10px",marginTop:2}}>{d.descricao||"—"}</div></div>
    </div>

    {/* Produto não conforme + Peças solicitadas (Produto) */}
    {d.tipo==="Produto"&&<div style={{...Sg.card(),marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase"}}>Produto não conforme</div>
        {status!=="fechada"&&canAnalyze&&!editingItens&&<button style={{...Sg.btn(),fontSize:11,padding:"3px 10px"}} onClick={()=>setEditingItens(true)}>Editar</button>}
        {editingItens&&<div style={{display:"flex",gap:6}}>
          <button style={{...Sg.btn(),fontSize:11,padding:"3px 10px"}} onClick={()=>{setItensEdit(d.itens||[]);setPecasEdit(d.pecasSolicitadas||[]);setEditingItens(false);}}>Cancelar</button>
          <button style={{...Sg.btn("primary"),fontSize:11,padding:"3px 10px"}} onClick={async()=>{
            const now=new Date().toISOString();
            await onUpdate({...r,data:{...d,itens:itensEdit,pecasSolicitadas:pecasEdit},log:[...(r.log||[]),{at:now,by:currentUser.name,type:"itens",event:"Itens / peças atualizados",detail:itensEdit.length+" item(ns) · "+pecasEdit.length+" peça(s) solicitada(s)"}]});
            setEditingItens(false);
          }}>Salvar</button>
        </div>}
      </div>
      <ItensTable
        itens={editingItens?itensEdit:(d.itens||[])}
        onChange={v=>{if(editingItens)setItensEdit(v);}}
        readOnly={!editingItens}
        currentUser={currentUser}
        onTratar={(idx)=>setTratarItemIdx(idx)}
        canTratar={hasPerm(currentUser,'ro.tratar_segregado') && !editingItens && !["cancelada","fechada"].includes(status)}
        onAprovar={(idx, si)=>setAprovacaoState({idx, subloteIdx:si, step:"decidir"})}
        canAprovar={hasPerm(currentUser,'ro.aprovar_concessao') && !editingItens && !["cancelada","fechada"].includes(status)}
        C={C} Sg={Sg} allUsers={allUsers}/>
    </div>}

    {/* Peças solicitadas — lista simples sem status, só pra rastreabilidade */}
    {d.tipo==="Produto"&&<div style={{...Sg.card(),marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,gap:12}}>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase"}}>Peças solicitadas</div>
          <div style={{fontSize:11,color:C.muted,marginTop:3}}>Peças necessárias para o retrabalho — só registro, controle de estoque é feito no ERP</div>
        </div>
      </div>
      <PecasSolicitadasTable
        pecas={editingItens?pecasEdit:(d.pecasSolicitadas||[])}
        onChange={v=>{if(editingItens)setPecasEdit(v);}}
        readOnly={!editingItens}
        currentUser={currentUser}
        C={C} Sg={Sg}/>
    </div>}

    {/* Histórico legado da Análise / Conclusão (só leitura — modelo antigo) */}
    {(d.analise||d.conclusaoFinal) && <div style={{...Sg.card(),marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",marginBottom:8}}>Análise registrada (histórico)</div>
      {d.analise && <div style={{marginBottom: d.conclusaoFinal?12:0}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Análise da qualidade</div>
        <div style={{fontSize:13,color:C.text,whiteSpace:"pre-wrap",background:C.surface,borderRadius:6,padding:"8px 10px"}}>{d.analise}</div>
        {d.analiseAt&&<div style={{fontSize:11,color:C.muted,marginTop:6}}>Por {d.analiseByName||"—"} em {fmt(d.analiseAt)}</div>}
      </div>}
      {d.conclusaoFinal && <div>
        <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Conclusão final</div>
        <div style={{fontSize:13,color:C.text,whiteSpace:"pre-wrap",background:C.surface,borderRadius:6,padding:"8px 10px"}}>{d.conclusaoFinal}</div>
        <div style={{fontSize:11,color:C.muted,marginTop:6}}>Por {d.conclusaoByName||"—"} em {fmt(d.conclusaoAt)}</div>
      </div>}
    </div>}

    {/* NCs vinculadas */}
    {(d.linkedNCs||[]).length>0&&<div style={{...Sg.card(),marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",marginBottom:10}}>Não Conformidades Vinculadas</div>
      {(d.linkedNCs||[]).map(nc=>(
        <div key={nc} style={{padding:"6px 10px",background:C.surface,borderRadius:6,fontSize:13,color:C.accent,marginBottom:4}}>{nc}</div>
      ))}
    </div>}

    {/* Anexos */}
    <div style={{...Sg.card(),marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",marginBottom:12}}>Anexos</div>
      <AttachmentsPanel
        attachments={(d.attachments)||[]}
        onAdd={addAttachment}
        onRemove={removeAttachment}
        readOnly={status==="fechada"}
        stage={status}
        currentUser={currentUser}
        isAdmin={canAnalyze}
        refId={r.id||r.code}
        refType="ro"
        C={C}/>
    </div>

    {/* Histórico unificado */}
    <ROHistorico r={r} C={C}/>

    {/* Aprovar concessão — etapa 1: ler análise e decidir */}
    {aprovacaoState!==null && aprovacaoState.step==="decidir" && d.itens && d.itens[aprovacaoState.idx] && <AprovarConcessaoModal
      open={true}
      item={d.itens[aprovacaoState.idx]}
      subloteIdx={aprovacaoState.subloteIdx}
      onClose={()=>setAprovacaoState(null)}
      onAprovar={()=>{
        const idx = aprovacaoState.idx;
        const si = aprovacaoState.subloteIdx;
        setPendingApply(si!=null
          ? {type:"aprovacao_aprovar_sublote", idx, subloteIdx:si}
          : {type:"aprovacao_aprovar", idx});
        setAprovacaoState(null);
        setSigModal({action:"apply_pending", title:"Assinar — Aprovação de concessão", confirmLabel:"Assinar e aprovar", confirmStyle:"success"});
      }}
      onRejeitar={()=>{
        setAprovacaoState({...aprovacaoState, step:"rejeitar"});
      }}
      C={C} Sg={Sg}
    />}

    {/* Aprovar concessão — etapa 2: motivo de rejeição */}
    {aprovacaoState!==null && aprovacaoState.step==="rejeitar" && <MotiveModal
      open={true}
      onClose={()=>setAprovacaoState({...aprovacaoState, step:"decidir"})}
      onConfirm={(motivo)=>{
        const idx = aprovacaoState.idx;
        const si = aprovacaoState.subloteIdx;
        setPendingApply(si!=null
          ? {type:"aprovacao_rejeitar_sublote", idx, subloteIdx:si, motivo: motivo||""}
          : {type:"aprovacao_rejeitar", idx, motivo: motivo||""});
        setAprovacaoState(null);
        setSigModal({action:"apply_pending", title:"Assinar — Rejeição de concessão", confirmLabel:"Assinar e rejeitar", confirmStyle:"danger"});
      }}
      title="Motivo da rejeição"
      description="Por que está rejeitando a concessão? A qualidade vai precisar dessa informação pra decidir outra coisa pro item."
      confirmLabel="Continuar para assinatura"
      confirmStyle="danger"
      C={C} Sg={Sg}
    />}

    {/* Tratar segregado — novo modelo de sublotes */}
    {tratarItemIdx!==null && d.itens && d.itens[tratarItemIdx] && <TratarItemModal
      open={true}
      item={d.itens[tratarItemIdx]}
      allUsers={allUsers}
      currentUser={currentUser}
      aprovadorGlobal={(d.itens||[]).reduce((acc,it)=>acc||(it.sublotes||[]).find(s=>s.tipo==="concessao_solicitada")?.concessaoAprovadorId||it.concessaoAprovadorId, null)}
      onClose={()=>setTratarItemIdx(null)}
      onConfirm={({linhas, aprovador})=>{
        const idx = tratarItemIdx;
        setPendingApply({type:"tratamento_sublotes", idx, linhas, aprovador});
        setTratarItemIdx(null);
        setSigModal({action:"apply_pending", title:"Assinar — Tratamento do item", confirmLabel:"Assinar e confirmar", confirmStyle:"primary"});
      }}
      C={C} Sg={Sg}
    />}

    {/* Validar e concluir — análise final da qualidade */}
    {validarModal && <ValidarConcluirModal
      open={true}
      itens={d.itens||[]}
      onClose={()=>setValidarModal(false)}
      onConfirm={(analise)=>{
        setValidarModal(false);
        setSigModal({action:"fechar", analiseFinal:analise, title:"Assinar — Fechamento da RO", confirmLabel:"Assinar e fechar", confirmStyle:"success"});
      }}
      C={C} Sg={Sg}
    />}

    {/* Motive modal — pra cancelar / reabrir */}
    {motiveModal && <MotiveModal
      open={true}
      onClose={()=>setMotiveModal(null)}
      onConfirm={(motivo)=>{
        const m = motiveModal;
        setMotiveModal(null);
        if(m.kind==="cancelar"){
          setSigModal({action:"cancelar",title:"Assinar — Cancelamento",confirmLabel:"Assinar e cancelar",confirmStyle:"danger",cancelMotivo:motivo});
        } else if(m.kind==="reabrir"){
          setSigModal({action:"reabrir",title:"Assinar — Reabertura",confirmLabel:"Assinar e reabrir",confirmStyle:"warning",reaberturaMotivo:motivo});
        }
      }}
      title={motiveModal.title}
      description={motiveModal.description}
      confirmLabel={motiveModal.confirmLabel}
      confirmStyle={motiveModal.confirmStyle}
      C={C} Sg={Sg}
    />}

    {/* Signature modal */}
    {sigModal&&<SignatureModal
      open={true}
      onClose={()=>setSigModal(null)}
      title={sigModal.title}
      confirmLabel={sigModal.confirmLabel||"Confirmar"}
      confirmStyle={sigModal.confirmStyle||"primary"}
      saId={r.id||r.code}
      action={sigModal.action}
      C={C} Sg={Sg}
      onConfirm={async(sig)=>{
        if(sigModal.action==="fechar") await doClose(sig, sigModal.analiseFinal||"");
        else if(sigModal.action==="conclusao") await doConclusao(sig);
        else if(sigModal.action==="cancelar") await doCancelar(sig, sigModal.cancelMotivo||"");
        else if(sigModal.action==="reabrir") await doReabrir(sig, sigModal.reaberturaMotivo||"");
        else if(sigModal.action==="apply_pending") await applyPending(sig);
        else await doAnalyze(sig);
      }}
    />}

    {/* Modal Gerar NC */}
    {ncModal&&<GerarNCModal
      ro={r}
      currentUser={currentUser}
      C={C} Sg={Sg}
      onClose={()=>setNcModal(false)}
      onConfirm={onGenerateNC}
    />}
  </div>;
}

// ─── ROQuickViewModal — popup de detalhes rápidos de uma RO ─────
function ROQuickViewModal({open, roCode, onClose, C, Sg}){
  const [loading, setLoading] = React.useState(false);
  const [error, setError]     = React.useState("");
  const [ro, setRo]           = React.useState(null);

  React.useEffect(()=>{
    if(!open || !roCode){ setRo(null); setError(""); return; }
    setLoading(true); setError(""); setRo(null);
    apiGet('/api/records?module=ro&id=' + encodeURIComponent(roCode))
      .then(r => { setRo(r); setLoading(false); })
      .catch(e => { setError(e?.message || "RO não encontrada"); setLoading(false); });
  },[open, roCode]);

  if(!open) return null;

  const d = (ro && (ro.data || ro)) || {};
  const itens = (d.itens||[]).filter(x=>x.codigo);

  return <Modal open={open} onClose={onClose} title={"Detalhes — "+(roCode||"")} width={620}>
    {loading && <div style={{padding:"20px 0",textAlign:"center",color:C.muted,fontSize:13}}>Carregando...</div>}
    {error && <div style={{padding:"12px",background:C.danger+"15",border:"1px solid "+C.danger+"40",borderRadius:6,color:C.danger,fontSize:12}}>{error}</div>}
    {ro && !loading && <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12,fontSize:12}}>
        <div><span style={{color:C.muted}}>Status:</span> <b>{ro.status||"—"}</b></div>
        <div><span style={{color:C.muted}}>Tipo:</span> <b>{d.tipo||"—"}</b></div>
        <div><span style={{color:C.muted}}>Local:</span> <b>{d.local||"—"}</b></div>
        <div><span style={{color:C.muted}}>OP/Chamado:</span> <b>{d.opChamado||"—"}</b></div>
      </div>
      {d.descricao && <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",marginBottom:4}}>Descrição</div>
        <div style={{fontSize:12,color:C.text,whiteSpace:"pre-wrap",padding:"8px 10px",background:C.surface,borderRadius:6,border:"1px solid "+C.border}}>{d.descricao}</div>
      </div>}
      {itens.length>0 && <div>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.4,textTransform:"uppercase",marginBottom:4}}>Itens ({itens.length})</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:C.surface,borderBottom:"1px solid "+C.border}}>
            {["Código","Descrição","Lote/Série","Qtd","Disposição"].map(h=>(
              <th key={h} style={{padding:"5px 8px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.3,textTransform:"uppercase"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {itens.map((it,i)=>{
              const ls = [it.lote, it.numSerie].filter(Boolean).join(" / ");
              return <tr key={i} style={{borderBottom:"1px solid "+C.border}}>
                <td style={{padding:"6px 8px",fontWeight:600,color:C.accent}}>{it.codigo}</td>
                <td style={{padding:"6px 8px",color:C.text}}>{it.descricao||"—"}</td>
                <td style={{padding:"6px 8px",color:C.muted}}>{ls||"—"}</td>
                <td style={{padding:"6px 8px",color:C.text}}>{it.qtdNC||"—"}</td>
                <td style={{padding:"6px 8px"}}>{(RO_DISP_TODAS[it.disposicao]||{}).short || "—"}</td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>}
    </div>}
    <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}>
      <button style={Sg.btn()} onClick={onClose}>Fechar</button>
    </div>
  </Modal>;
}

// ─── VincularROModal — confirma importação de itens da RO na NC ───
function VincularROModal({open, roCode, currentNCItens, alreadyLinkedROs, onClose, onConfirm, ncRecords, currentUser, C, Sg}){
  const [loading, setLoading] = React.useState(false);
  const [error, setError]     = React.useState("");
  const [ro, setRo]           = React.useState(null);

  React.useEffect(()=>{
    if(!open || !roCode){ setRo(null); setError(""); return; }
    setLoading(true); setError(""); setRo(null);

    // Validação rápida antes da chamada: já está vinculada nesta NC?
    if((alreadyLinkedROs||[]).map(x=>String(x).toLowerCase()).includes(String(roCode).toLowerCase())){
      setError("Esta RO já está vinculada nesta NC.");
      setLoading(false);
      return;
    }

    // Validação: RO já está vinculada em outra NC ativa?
    const ativa = (ncRecords||[]).find(nc => {
      if(nc.status === "cancelada" || nc.status === "encerrada") return false;
      const ls = (nc.data?.linkedROs)||(nc.linkedROs)||[];
      return ls.map(x=>String(x).toLowerCase()).includes(String(roCode).toLowerCase());
    });
    if(ativa){
      setError("Esta RO já está vinculada à NC "+(ativa.code||ativa.id)+" (ativa). Bloqueado: uma RO só pode estar em uma NC ativa por vez.");
      setLoading(false);
      return;
    }

    // Buscar a RO no backend
    apiGet('/api/records?module=ro&id=' + encodeURIComponent(roCode))
      .then(r => {
        if(!r){ setError("RO "+roCode+" não encontrada."); setLoading(false); return; }
        setRo(r); setLoading(false);
      })
      .catch(e => { setError("RO "+roCode+" não encontrada."); setLoading(false); });
  },[open, roCode]);

  if(!open) return null;

  const d = (ro && (ro.data || ro)) || {};
  const itensRO = (d.itens||[]).filter(x=>x.codigo);

  // Identifica itens já migrados (não devem ser importados de novo)
  const itensImportaveis = itensRO.filter(it => it.disposicao !== "migrada_nc");
  const itensJaMigrados = itensRO.length - itensImportaveis.length;

  // Identifica duplicatas com a tabela atual da NC (mesmo codigo+lote+série)
  const isDup = (it) => (currentNCItens||[]).some(cur => {
    if((cur.codigo||"").toLowerCase() !== (it.codigo||"").toLowerCase()) return false;
    if((cur.lote||"") !== (it.lote||"")) return false;
    if((cur.num_serie||"") !== (it.numSerie||"")) return false;
    return true;
  });
  const itensNovos = itensImportaveis.filter(it => !isDup(it));
  const itensDuplicados = itensImportaveis.length - itensNovos.length;

  const canConfirm = ro && itensNovos.length > 0;

  return <Modal open={open} onClose={onClose} title={"Vincular "+(roCode||"")} width={640}>
    {loading && <div style={{padding:"20px 0",textAlign:"center",color:C.muted,fontSize:13}}>Buscando RO...</div>}

    {error && <div>
      <div style={{padding:"12px",background:C.danger+"15",border:"1px solid "+C.danger+"40",borderRadius:6,color:C.danger,fontSize:12,marginBottom:14}}>{error}</div>
      <div style={{display:"flex",justifyContent:"flex-end"}}>
        <button style={Sg.btn()} onClick={onClose}>Fechar</button>
      </div>
    </div>}

    {ro && !loading && <div>
      <div style={{padding:"10px 12px",background:C.accent+"10",border:"1px solid "+C.accent+"30",borderRadius:6,marginBottom:12,fontSize:12,color:C.dim}}>
        <div><b>{ro.code||roCode}</b> — Status: <b>{ro.status||"—"}</b> · Tipo: <b>{d.tipo||"—"}</b> · Local: <b>{d.local||"—"}</b></div>
        {d.descricao && <div style={{marginTop:6,color:C.muted,fontSize:11,whiteSpace:"pre-wrap"}}>{d.descricao.substring(0,200)}{d.descricao.length>200?"...":""}</div>}
      </div>

      <div style={{fontSize:11,color:C.muted,marginBottom:8,fontWeight:600,letterSpacing:.4,textTransform:"uppercase"}}>
        Itens que serão importados ({itensNovos.length})
      </div>

      {itensNovos.length===0 && <div style={{padding:"10px 12px",background:C.warning+"15",border:"1px solid "+C.warning+"40",borderRadius:6,color:C.warning,fontSize:12,marginBottom:12}}>
        Nada para importar. {itensJaMigrados>0 && "(Todos os itens da RO já foram migrados pra outra NC.) "}{itensDuplicados>0 && "(Há itens duplicados na tabela atual.)"}
      </div>}

      {itensNovos.length>0 && <table style={{width:"100%",borderCollapse:"collapse",marginBottom:10,fontSize:12}}>
        <thead><tr style={{background:C.surface,borderBottom:"1px solid "+C.border}}>
          {["Código","Descrição","Lote/Série","Qtd"].map(h=>(
            <th key={h} style={{padding:"5px 8px",textAlign:"left",fontSize:10,fontWeight:700,color:C.muted,letterSpacing:.3,textTransform:"uppercase"}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>
          {itensNovos.map((it,i)=>{
            const ls = [it.lote, it.numSerie].filter(Boolean).join(" / ");
            return <tr key={i} style={{borderBottom:"1px solid "+C.border}}>
              <td style={{padding:"6px 8px",fontWeight:600,color:C.accent}}>{it.codigo}</td>
              <td style={{padding:"6px 8px",color:C.text}}>{it.descricao||"—"}</td>
              <td style={{padding:"6px 8px",color:C.muted}}>{ls||"—"}</td>
              <td style={{padding:"6px 8px",color:C.text}}>{it.qtdNC||"—"}</td>
            </tr>;
          })}
        </tbody>
      </table>}

      {(itensJaMigrados>0 || itensDuplicados>0) && <div style={{fontSize:11,color:C.muted,marginBottom:10,fontStyle:"italic"}}>
        {itensJaMigrados>0 && itensJaMigrados+" item(s) já migrado(s) pra outra NC — ignorado(s). "}
        {itensDuplicados>0 && itensDuplicados+" item(s) já existem nesta NC — ignorado(s)."}
      </div>}

      <div style={{padding:"8px 12px",background:C.warning+"10",border:"1px solid "+C.warning+"30",borderRadius:6,color:C.dim,fontSize:11,marginBottom:14}}>
        Ao confirmar, os itens acima serão importados e marcados na RO como <b>"Migrada para NC"</b>. Se outros itens da RO ainda tiverem disposição pendente, a RO continuará aberta.
      </div>

      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <button style={Sg.btn()} onClick={onClose}>Cancelar</button>
        <button style={{...Sg.btn("primary"),opacity:canConfirm?1:.4}} disabled={!canConfirm} onClick={()=>{
          onConfirm({ ro, itensNovos });
        }}>Vincular e importar</button>
      </div>
    </div>}
  </Modal>;
}
